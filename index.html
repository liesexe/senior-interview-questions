  {label:"Para auditoría sin impacto en rendimiento, deshabilitar todas las auditorías en horas pico y habilitarlas en horarios de baja carga", explain:"Incorrecto. La auditoría en sistemas financieros regulados (SBS, SUNAT) debe ser continua y completa. Deshabilitar la auditoría viola regulaciones y puede resultar en sanciones. La solución correcta es implementarla de forma asíncrona para que no impacte el rendimiento transaccional."},
], correct:1},

{cat:"Seguridad & Operaciones BD",
q:"¿Cómo manejas datos sensibles (números de tarjeta, DNI) en logs y queries de BD en un sistema bancario?",
options:[
  {label:"Loguear toda la información posible incluyendo datos sensibles facilita el debugging en producción", explain:"Incorrecto. Loguear datos sensibles viola PCI-DSS (números de tarjeta), GDPR/LPDP peruana (datos personales), y crea vectores de ataque si los logs son comprometidos. Muchos incidentes de seguridad han expuesto datos sensibles vía logs."},
  {label:"Data Masking en logs: loguear solo los últimos 4 dígitos de tarjeta (**** **** **** 1234). Tokenización: almacenar un token irreversible en lugar del número real. Dynamic Data Masking en SQL Server: usuarios con menos privilegios ven datos enmascarados. Nunca loguear PINs, CVV, o contraseñas.", explain:"Correcto. Estrategias: Tokenización (Vault, AWS KMS): el número de tarjeta real se almacena en un sistema seguro; la BD guarda solo el token. Dynamic Data Masking SQL Server: @Column MASKED WITH FUNCTION=partial(0,'****',4) — DBA ve el número completo, aplicación ve ****. SLF4J MDC: no incluir datos sensibles en el contexto de logging. Logs estructurados JSON: configurar un sanitizador que remueve campos sensibles antes de escribir al log. Regulación SBS Perú: requiere auditoría de acceso a datos sensibles."},
  {label:"La solución es encriptar todos los logs con TDE; así aunque alguien acceda a los logs, los datos están protegidos", explain:"Incorrecto. TDE encripta archivos en disco, no los valores individuales dentro de los archivos de log. Si el log contiene '4532 1234 5678 9012' en texto plano y TDE encripta el archivo, alguien con acceso legítimo al sistema (un DBA) puede aún leer el número de tarjeta en el log."},
  {label:"Usar SHA-256 para hashear datos sensibles antes de guardarlos en BD; el hash es reversible si se necesita el dato original", explain:"Incorrecto. SHA-256 es una función hash unidireccional (no reversible). No es adecuado para datos que necesitan recuperarse (número de cuenta, DNI). Para datos que necesitan ser buscados sin revelarlos: tokenización. Para datos que solo se necesitan verificar (contraseñas): bcrypt/argon2."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Cómo configuras y monitorizas el connection pool en producción para detectar problemas tempranamente?",
options:[
  {label:"El connection pool no necesita monitorización; HikariCP maneja automáticamente todos los problemas", explain:"Incorrecto. Sin monitorización no sabrás cuándo el pool está cerca de la saturación, cuándo hay connection leaks, o cuándo la BD está respondiendo lentamente. Los problemas del pool a menudo aparecen antes de que el sistema colapse."},
  {label:"Métricas clave: pool size activo vs total (saturación), tiempo de espera por conexión (connectionTimeout), connection creation time (BD lenta), idle connections, pending threads. Exponer via Spring Boot Actuator + Prometheus + Grafana. Alertar cuando active connections > 80% del pool.", explain:"Correcto. Spring Boot Actuator con HikariCP: management.endpoints.web.exposure.include=health,metrics. Métricas en /actuator/metrics/hikaricp.connections.active, hikaricp.connections.pending, hikaricp.connections.timeout. En Grafana: alerta cuando hikaricp.connections.active/hikaricp.connections.max > 0.8 durante más de 30 segundos. También monitorear hikaricp.connections.creation (tiempo para crear conexión nueva) — si sube, la BD puede estar bajo presión."},
  {label:"Aumentar el connection pool size al máximo posible (1000+) para evitar que se sature", explain:"Incorrecto. Pools extremadamente grandes saturan la BD con demasiadas conexiones concurrentes, degradando el rendimiento del motor. Cada conexión en SQL Server consume memoria (~10MB de RAM). La clave es el tamaño correcto basado en la carga real, no el máximo posible."},
  {label:"La mejor forma de monitorizar el pool es revisar los logs de HikariCP manualmente cada hora", explain:"Incorrecto. La revisión manual de logs no escala y no detecta problemas en tiempo real. El monitoreo automatizado con alertas es esencial en sistemas bancarios donde los problemas deben detectarse en segundos, no horas."},
], correct:1},

{cat:"Arquitectura de BD",
q:"¿Qué consideraciones tienes al diseñar el esquema de una BD para un sistema de pagos de alta transaccionalidad?",
options:[
  {label:"Normalizar al máximo (5FN) para eliminar toda redundancia; la normalización siempre mejora el rendimiento", explain:"Incorrecto. Ultra-normalización puede empeorar el rendimiento en sistemas OLTP al requerir muchos JOINs para obtener datos relacionados. El balance entre normalización y desnormalización estratégica es clave."},
  {label:"Normalización adecuada para integridad (3FN para tablas de referencia). Desnormalización estratégica para tablas de alta lectura (ej: incluir monto_formateado en la tabla de transacciones para evitar cálculos repetidos). PKs numéricas secuenciales. Índices en columnas de búsqueda frecuente. Tipos de datos precisos (DECIMAL(18,2) para montos, nunca FLOAT).", explain:"Correcto. Para montos monetarios: DECIMAL(18,2) o NUMERIC(18,2) es obligatorio. FLOAT tiene errores de representación binaria (0.1 + 0.2 ≠ 0.3 en floating point). Fechas: DATETIME2 en SQL Server (más precisión, rango más amplio que DATETIME). PKs: INT IDENTITY o BIGINT IDENTITY para tablas de alta escritura (evitar GUID como clustered PK → fragmentación). Considerar: tablas de estados separadas (transacciones_estado) para evitar actualizaciones masivas en la tabla principal."},
  {label:"Para alta transaccionalidad, usar solo un índice por tabla (la PK) y hacer full scans; los índices adicionales degradan las escrituras en más de un 50%", explain:"Incorrecto. El overhead de índices adicionales en escrituras es real pero generalmente mucho menor que el costo de full scans para operaciones de lectura. Un sistema de pagos hace muchas más lecturas (consulta de saldo, historial) que escrituras."},
  {label:"Almacenar todos los montos como VARCHAR para flexibilidad; se convierten a número en la capa de aplicación", explain:"Incorrecto. Almacenar montos como VARCHAR es una práctica peligrosa: no garantiza que los valores sean numéricos, no permite cálculos directos en SQL (SUM, agregaciones), no tiene precisión garantizada, y ocupa más espacio. DECIMAL/NUMERIC es el tipo correcto para montos monetarios."},
], correct:1},

{cat:"BD con Kafka & CDC",
q:"¿Cómo manejas la consistencia eventual entre la BD transaccional y el índice de búsqueda (Elasticsearch) en un sistema bancario?",
options:[
  {label:"Escribir simultáneamente a SQL Server y Elasticsearch en la misma transacción para garantizar consistencia", explain:"Incorrecto. No existe transacción distribuida entre SQL Server y Elasticsearch. Si una escritura falla y la otra no, hay inconsistencia. Además, la latencia de Elasticsearch afectaría a todas las transacciones."},
  {label:"Outbox Pattern + Kafka: la transacción escribe en SQL Server + tabla outbox. Un relay publica a Kafka. Un consumer indexa en Elasticsearch. La consistencia es eventual: Elasticsearch puede estar levemente desactualizado, pero la BD SQL Server es siempre la fuente de verdad.", explain:"Correcto. Flujo: 1) Transacción → SQL Server (fuente de verdad) + outbox event. 2) Debezium/relay → topic Kafka. 3) Consumer → Elasticsearch index actualización. Latencia típica: 100ms-2s. Para búsquedas donde datos levemente desactualizados son aceptables (historial de transacciones de hace minutos), es perfecto. Para verificación de saldo antes de una transferencia: siempre leer de SQL Server. El sistema debe tener claridad sobre qué datos pueden ser eventuales y cuáles requieren consistencia fuerte."},
  {label:"Elasticsearch reemplaza completamente a SQL Server en sistemas bancarios modernos porque es más rápido para búsquedas", explain:"Incorrecto. Elasticsearch es excelente para búsqueda full-text y análisis. No tiene las garantías ACID de SQL Server y no está diseñado para operaciones transaccionales. Son sistemas complementarios con roles distintos."},
  {label:"La consistencia eventual es inaceptable en sistemas bancarios; siempre debe usarse consistencia fuerte en todos los sistemas", explain:"Incorrecto. La consistencia eventual es perfectamente aceptable para sistemas auxiliares (índices de búsqueda, cachés, reportes) donde los datos base (SQL Server transaccional) son la fuente de verdad. Exigir consistencia fuerte en todos los sistemas limitaría severamente la escalabilidad y disponibilidad."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Qué estrategia usarías para procesar 1 millón de registros diarios en un proceso batch sin afectar la BD transaccional?",
options:[
  {label:"Procesar el millón de registros en un único thread durante la noche; la BD puede manejarlo sin configuración especial", explain:"Incorrecto. Un único thread puede tardar horas para 1M registros. Sin límites de recursos, puede saturar la BD incluso en horario nocturno si hay operaciones de madrugada."},
  {label:"Procesamiento en chunks (Spring Batch): leer en lotes de 1000, procesar en paralelo con múltiples threads, escribir en batch. Usar réplica de lectura para el source data. Limitar el pool de conexiones del batch para no competir con transacciones online. Programar en horario de baja carga.", explain:"Correcto. Spring Batch: ItemReader (chunk=1000, réplica), ItemProcessor (lógica de transformación), ItemWriter (JDBC batch insert, primary). Paralelismo: TaskExecutor con 4-8 threads para el step. Controlar: spring.batch.job.enabled=false para no ejecutar al iniciar, usar @Scheduled o un disparador externo. Monitorear: tiempo total, registros procesados/fallidos, impacto en CPU/IO de la BD. Partition Step: dividir los 1M registros entre múltiples workers (por rango de ID) para paralelismo máximo."},
  {label:"La solución es usar Kafka para el batch: publicar 1M mensajes y que los consumers los procesen; Kafka elimina la presión en la BD", explain:"Incorrecto. Kafka puede ser parte de la solución pero no elimina la presión en la BD de destino. Si 1M consumers escriben a la BD simultáneamente desde Kafka, la presión en la BD es igual o mayor. Spring Batch con control de concurrencia es más apropiado para ETL/batch a BD."},
  {label:"Spring Batch está desactualizado; en sistemas modernos todo debe ser reactivo con WebFlux y R2DBC para batch", explain:"Incorrecto. Spring Batch sigue siendo el estándar para procesamiento batch en el ecosistema Spring. WebFlux/R2DBC son para APIs reactivas de alta concurrencia, no para orquestación de procesos batch con retry, skip, y gestión de jobs."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Qué es un índice parcial/filtrado y cuándo es más eficiente que un índice completo?",
options:[
  {label:"Un índice filtrado cubre solo una condición específica del WHERE. Más pequeño y eficiente para queries que siempre filtran por ese criterio. Ejemplo: índice en transacciones WHERE estado='PENDIENTE' — solo indexa el 2% de la tabla en vez del 100%.", explain:"Correcto. CREATE INDEX IX_trans_pendientes ON transacciones(fecha) WHERE estado='PENDIENTE'. Si el 98% de las transacciones están completadas, este índice tiene solo el 2% de las filas. Queries que siempre filtran por estado='PENDIENTE' lo usan eficientemente. El índice es mucho más pequeño: menos espacio, menos mantenimiento en escrituras, mejor cache hit rate. Muy útil en sistemas bancarios donde la mayoría de las operaciones son sobre registros activos/pendientes."},
  {label:"Los índices filtrados son inútiles porque SQL Server nunca los usa si hay un índice completo disponible", explain:"Incorrecto. El optimizador de SQL Server elige el índice más eficiente. Un índice filtrado que cubre exactamente la query (mismo filtro en el WHERE) será preferido sobre un índice completo porque es más pequeño y tiene mejor selectividad."},
  {label:"Un índice filtrado cubre solo las primeras N filas de la tabla ordenadas por la clave del índice", explain:"Incorrecto. Un índice filtrado incluye filas que cumplen una condición del WHERE (ej: WHERE activo=1), no las primeras N filas. No está relacionado con el orden o posición de las filas."},
  {label:"Los índices filtrados solo están disponibles en SQL Server Enterprise; en Standard Edition no se pueden crear", explain:"Incorrecto. Los índices filtrados están disponibles en todas las ediciones de SQL Server 2008 o posterior (Express, Standard, Enterprise). No es una característica exclusiva de Enterprise."},
], correct:0},

{cat:"Performance & Query Plans",
q:"¿Qué es la fragmentación de páginas de datos (heap fragmentation) vs la fragmentación de índices?",
options:[
  {label:"Heap fragmentation y fragmentación de índices son exactamente lo mismo; se tratan con las mismas operaciones", explain:"Incorrecto. Son problemas distintos en estructuras distintas. Heap es la tabla sin Clustered Index (datos desordenados en páginas). La fragmentación del índice es sobre la estructura del árbol B+ del índice."},
  {label:"Heap fragmentation: páginas de datos desordenadas en tablas sin Clustered Index (heap tables). Causa lecturas físicas no contiguas. Solución: ALTER TABLE REBUILD o crear un Clustered Index. Index fragmentation: desalineamiento lógico/físico del índice B+. Solución: REORGANIZE o REBUILD del índice.", explain:"Correcto. Las tablas heap (sin Clustered Index) acumulan páginas en cualquier orden físico. Con el tiempo, los datos se dispersan en el disco causando muchas lecturas físicas no contiguas. La solución más efectiva es agregar un Clustered Index (convierte la heap en una tabla organizada). Si la heap es intencional (por patrón de escritura), ALTER TABLE nombre REBUILD reorganiza las páginas físicamente."},
  {label:"Las tablas en SQL Server nunca son heaps; siempre tienen un Clustered Index creado automáticamente", explain:"Incorrecto. En SQL Server, una tabla sin Clustered Index explícito es una heap. La PK crea un índice pero no necesariamente Clustered (depende de si se especifica CLUSTERED). Solo con CREATE CLUSTERED INDEX o PRIMARY KEY con CLUSTERED se define el orden físico."},
  {label:"La fragmentación de datos solo importa en discos HDD; en discos SSD es irrelevante porque el acceso es aleatorio a igual velocidad", explain:"Incorrecto. Aunque los SSDs tienen menor penalización por acceso aleatorio que los HDDs, la fragmentación sigue importando en SSDs: más páginas leídas = más I/O, más datos en caché, más tiempo de procesamiento. La fragmentación impacta el rendimiento en cualquier tipo de almacenamiento, aunque menos en SSD."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Cómo implementas rate limiting a nivel de BD para proteger el sistema de consultas abusivas?",
options:[
  {label:"Rate limiting a nivel de BD se implementa con DENY en los permisos de usuario cuando hay abuso detectado", explain:"Incorrecto. DENY es una medida drástica y estática que bloquea el acceso completamente. Rate limiting es dinámico y throttlea gradualmente según el volumen de peticiones."},
  {label:"Resource Governor en SQL Server: clasifica conexiones en grupos de recursos con límites de CPU/memoria/IOPS. Para aplicaciones externas: implementar rate limiting en el API Gateway o en la capa de aplicación con Redis (contador por ventana de tiempo) antes de llegar a la BD.", explain:"Correcto. Resource Governor (SQL Server Enterprise): CREATE RESOURCE POOL pool_reportes WITH (MAX_CPU_PERCENT=20); — las queries de reportes nunca consumen más del 20% de CPU aunque la BD esté libre. Para APIs: Redis con INCR + EXPIRE implementa rate limiting: si usuario X supera 100 queries/minuto, retornar 429 sin llegar a la BD. Spring Cloud Gateway tiene rate limiting nativo con Redis. La capa correcta para rate limiting es generalmente antes de la BD, no dentro de ella."},
  {label:"La única forma de limitar el uso de BD es reducir el connection pool size; con menos conexiones hay menos queries concurrentes", explain:"Incorrecto. Reducir el pool size limita la concurrencia pero no el rate. Un solo usuario con una conexión puede ejecutar miles de queries en un minuto. Rate limiting requiere contar operaciones por unidad de tiempo, no solo limitar conexiones activas."},
  {label:"Rate limiting a nivel de BD no es necesario si se usa caché correctamente; todos los requests serán servidos por caché y la BD no recibirá carga", explain:"Incorrecto. El caché tiene tasa de aciertos (cache hit rate) típicamente del 70-90% en sistemas bien diseñados. El 10-30% restante llega a la BD. Además, las escrituras siempre llegan a la BD. El rate limiting protege contra el 100% de carga, no solo el cache miss."},
], correct:1},

const KAFKA_QUESTIONS = [
// ══════════ CORE CONCEPTS ══════════
{cat:"Kafka – Core Concepts",
q:"¿Qué es un topic en Kafka y cómo difiere de una cola de mensajes tradicional (Queue)?",
options:[
  {label:"Un topic es exactamente igual a una Queue: un mensaje es consumido por un solo consumidor y luego eliminado", explain:"Incorrecto. En una Queue tradicional, un mensaje es consumido por un solo consumidor. En Kafka, un topic puede ser leído por múltiples consumer groups independientes, y el mensaje se retiene según la política de retención (no se elimina al consumir)."},
  {label:"Un topic es un log de eventos inmutable y append-only. Múltiples consumer groups pueden leer el mismo topic de forma independiente sin interferir entre sí. Los mensajes se retienen por tiempo o tamaño configurado, no al consumirlos.", explain:"Correcto. Esto es una diferencia fundamental con colas tradicionales. En RabbitMQ/SQS, consumir un mensaje lo elimina. En Kafka, el mensaje persiste y múltiples sistemas pueden consumirlo independientemente. Ejemplo en banca: el evento PagoRealizado puede ser consumido por el sistema de notificaciones, el sistema de auditoría y el sistema de reportes, todos leyendo el mismo topic de forma independiente y a su propio ritmo."},
  {label:"Un topic en Kafka es siempre más rápido que una Queue porque Kafka usa RAM en lugar de disco", explain:"Incorrecto. Kafka escribe en disco (diseñado para esto). Su alto rendimiento viene del acceso secuencial al disco (mucho más rápido que acceso aleatorio), zero-copy, y batching. No usa RAM como almacenamiento principal."},
  {label:"Un topic puede tener máximo un consumidor activo a la vez para garantizar orden global", explain:"Incorrecto. Un topic puede tener múltiples consumer groups, y dentro de cada grupo múltiples consumers (uno por partición). El orden está garantizado a nivel de partición, no a nivel de topic completo."},
], correct:1},

{cat:"Kafka – Core Concepts",
q:"¿Qué es el offset en Kafka y quién es responsable de gestionarlo?",
options:[
  {label:"El offset es el tamaño en bytes de un mensaje; Kafka lo gestiona automáticamente sin intervención del consumer", explain:"Incorrecto. El offset es la posición secuencial de un mensaje dentro de una partición, no su tamaño."},
  {label:"El offset es un número secuencial que identifica la posición de cada mensaje dentro de una partición. El consumer es responsable de gestionar (commit) su offset. Kafka almacena los offsets commiteados en el topic interno __consumer_offsets.", explain:"Correcto. El offset empieza en 0 para cada partición. Cuando el consumer procesa un mensaje con offset=150, hace commit de offset=151 (el próximo a procesar). Si el consumer muere y reinicia, retoma desde el último offset commiteado. El topic __consumer_offsets es un topic especial de Kafka que almacena los offsets por consumer group + topic + partición. Esto permite recuperación ante fallos."},
  {label:"El offset es gestionado por el broker; el consumer no necesita preocuparse por él", explain:"Incorrecto. El broker almacena los mensajes y sus offsets, pero la decisión de cuándo hacer commit del offset es del consumer. enable.auto.commit=true delega el commit automáticamente, pero esto puede causar pérdida o duplicación de mensajes según el escenario."},
  {label:"El offset se reinicia a 0 cuando el consumer reinicia; no hay persistencia entre ejecuciones", explain:"Incorrecto. El offset commiteado persiste en __consumer_offsets en el broker. Al reiniciar, el consumer recupera su último offset commiteado y continúa desde allí. Solo si no hay offset previo se aplica la política auto.offset.reset (latest o earliest)."},
], correct:1},

{cat:"Kafka – Core Concepts",
q:"¿Qué es el log compaction en Kafka y para qué casos de uso está diseñado?",
options:[
  {label:"Log compaction comprime los mensajes con gzip para reducir el espacio en disco", explain:"Incorrecto. La compresión de mensajes (gzip, snappy, lz4) es una característica separada del log compaction. Compaction se refiere a la retención de la última versión de cada clave."},
  {label:"Log compaction retiene solo el último mensaje de cada key en una partición, eliminando versiones anteriores. Ideal para topics que representan estado actual (changelog): la última transacción de una cuenta, la última posición de un vehículo, el perfil actualizado de un cliente.", explain:"Correcto. Configurar: cleanup.policy=compact. Con compaction: si hay 100 mensajes con key='cuenta-001' (actualizaciones de saldo), compaction retiene solo el más reciente. Garantiza que cualquier consumer que lea desde el principio del topic puede reconstruir el estado actual completo sin necesidad de leer todo el historial. Kafka Streams usa topics compactados como changelog stores para fault tolerance. En banca: topic de estado de cuentas compactado → nuevo microservicio puede hacer catch-up del estado actual sin leer años de historia."},
  {label:"Log compaction elimina mensajes duplicados para garantizar exactly-once delivery", explain:"Incorrecto. Log compaction no está relacionado con exactly-once. La deduplicación de exactly-once se maneja con el idempotent producer y el transaction API. Compaction es sobre retención del último valor por clave."},
  {label:"Log compaction es automático en todos los topics de Kafka por defecto", explain:"Incorrecto. El default de cleanup.policy es delete (retención por tiempo o tamaño). Log compaction debe configurarse explícitamente con cleanup.policy=compact. Puede combinarse con delete: cleanup.policy=[compact,delete] para retener el último valor de cada clave pero también eliminar keys muy antiguas."},
], correct:1},

// ══════════ BROKERS & CLUSTERS ══════════
{cat:"Kafka – Brokers & Clusters",
q:"¿Qué es el broker controller en Kafka y qué funciones cumple?",
options:[
  {label:"El controller es el broker que recibe todas las peticiones de los producers; los demás brokers son solo réplicas", explain:"Incorrecto. Todos los brokers reciben peticiones de producers y consumers directamente para sus particiones líderes. El controller tiene un rol especial de coordinación del cluster, no de recepción de datos."},
  {label:"El controller es un broker especial elegido del cluster que gestiona: elección de líderes de partición cuando un broker falla, gestión del ISR (In-Sync Replicas), registro de brokers activos, y asignación de particiones a brokers. Solo hay un controller activo a la vez.", explain:"Correcto. En Kafka clásico (con ZooKeeper): el controller se elige a través de ZooKeeper. Si el controller falla, los brokers restantes eligen uno nuevo en ZooKeeper. En KRaft mode (Kafka 3.x sin ZooKeeper): el controller es parte de un quorum de metadata usando Raft consensus. El controller es crítico: si falla y la elección del nuevo tarda, puede haber una breve interrupción en la disponibilidad de particiones."},
  {label:"Kafka puede funcionar con múltiples controllers activos simultáneamente para mayor disponibilidad", explain:"Incorrecto. Solo puede haber un controller activo en un momento dado (split-brain prevention). En KRaft mode hay un quorum de controllers pero solo uno es el leader activo."},
  {label:"El controller es un proceso separado que se instala en un servidor dedicado fuera del cluster de brokers", explain:"Incorrecto. El controller es un rol que uno de los brokers del cluster asume. No es un proceso separado en Kafka tradicional. En KRaft mode, algunos brokers pueden ser designados solo como controllers, pero siguen siendo parte del proceso de Kafka."},
], correct:1},

{cat:"Kafka – Brokers & Clusters",
q:"¿Qué es el ISR (In-Sync Replicas) y qué ocurre cuando una réplica cae fuera del ISR?",
options:[
  {label:"ISR son todas las réplicas configuradas para un topic; es un nombre alternativo para el replication factor", explain:"Incorrecto. El replication factor define cuántas copias existen (ej: 3). El ISR es el subconjunto de réplicas que están actualizadas con el líder en un momento dado. Siempre ISR.size ≤ replication factor."},
  {label:"ISR es el conjunto de réplicas que están al día con el líder (dentro de replica.lag.time.max.ms). Si una réplica se retrasa demasiado, sale del ISR. Con acks=all, el producer solo recibe ACK cuando TODAS las réplicas del ISR confirmaron el mensaje.", explain:"Correcto. Escenario: replication factor=3, ISR=[broker1(líder), broker2, broker3]. Si broker3 se lentifica y se retrasa más de replica.lag.time.max.ms (default 30s), sale del ISR: ISR=[broker1, broker2]. Con acks=all, el producer ahora solo necesita confirmación de broker1 y broker2. Cuando broker3 se recupera y pone al día, vuelve al ISR. Si ISR cae a tamaño 1 (solo el líder) y min.insync.replicas=2, el producer recibirá NotEnoughReplicasException — protección contra pérdida de datos."},
  {label:"Si una réplica cae fuera del ISR, Kafka detiene la recepción de mensajes en ese topic hasta que se recupere", explain:"Incorrecto. Kafka continúa operando con las réplicas que permanecen en el ISR. La operación se detiene solo si el ISR cae por debajo de min.insync.replicas (cuando acks=all o acks=-1)."},
  {label:"El ISR siempre incluye todas las réplicas configuradas porque Kafka garantiza sincronización en tiempo real", explain:"Incorrecto. La sincronización no es instantánea. Las réplicas deben hacer fetch de mensajes del líder. Una réplica lenta, con alto lag de red, o en un broker bajo presión puede quedarse atrás y salir del ISR."},
], correct:1},

{cat:"Kafka – Brokers & Clusters",
q:"¿Qué pasa con los mensajes no replicados cuando el líder de una partición falla?",
options:[
  {label:"Los mensajes no replicados se pierden automáticamente; esto es un comportamiento esperado en Kafka", explain:"Incorrecto en un cluster bien configurado. Con acks=all y min.insync.replicas correctos, los mensajes no commiteados (no replicados) nunca reciben ACK al producer, por lo que el producer sabe que debe reintentar."},
  {label:"Con acks=all: los mensajes que no fueron confirmados a todas las ISR nunca recibieron ACK al producer. El producer sabe que debe reintentar. Con unclean.leader.election.enable=false (default): solo una réplica del ISR puede convertirse en nuevo líder, evitando pérdida de datos commiteados.", explain:"Correcto. Si unclean.leader.election.enable=true (no recomendado en banca): cualquier réplica puede ser líder, incluyendo las que están fuera del ISR (tienen mensajes atrasados). Esto puede causar que mensajes ya commiteados desaparezcan al nuevo líder no tenerlos. Con false (default en Kafka 3.x): si todas las réplicas ISR están caídas, la partición queda unavailable hasta que una ISR se recupere. Disponibilidad vs durabilidad: trade-off explícito."},
  {label:"Kafka garantiza que ningún mensaje se pierde nunca, independientemente de la configuración", explain:"Incorrecto. Kafka ofrece garantías configurables. Con acks=0 (fire-and-forget), los mensajes pueden perderse si el broker falla antes de escribirlos. La durabilidad es proporcional a la configuración de replicación y acks."},
  {label:"El líder fallido se recupera automáticamente en segundos y ningún mensaje se pierde porque están en RAM", explain:"Incorrecto. Kafka persiste mensajes en disco (no en RAM como estado principal). La recuperación del líder puede tardar más que segundos dependiendo del volumen de datos a recuperar. La nueva elección de líder ocurre desde las réplicas ISR existentes."},
], correct:1},

// ══════════ PRODUCERS ══════════
{cat:"Kafka – Producers",
q:"¿Cuáles son las garantías de entrega de acks=0, acks=1 y acks=all en el producer?",
options:[
  {label:"acks=1 es siempre la mejor opción porque balancea rendimiento y durabilidad en todos los casos", explain:"Incorrecto. acks=1 no es universalmente la mejor opción. En sistemas bancarios, acks=all es necesario para garantizar durabilidad. acks=1 puede perder mensajes si el líder falla justo después de confirmar pero antes de replicar."},
  {label:"acks=0: fire-and-forget, sin confirmación, máximo throughput pero puede perder mensajes. acks=1: solo el líder confirma, moderada durabilidad, puede perder si el líder falla antes de replicar. acks=all (-1): todas las réplicas ISR confirman, máxima durabilidad, menor throughput.", explain:"Correcto. En banca siempre acks=all. Combinado con min.insync.replicas=2 (en cluster de 3 brokers): el mensaje no se confirma hasta que al menos 2 brokers lo tienen. Configurar también: retries=Integer.MAX_VALUE, delivery.timeout.ms según SLA, enable.idempotence=true para evitar duplicados en retries."},
  {label:"acks=all significa que todos los brokers del cluster confirman el mensaje, incluyendo los que no tienen particiones del topic", explain:"Incorrecto. acks=all (o acks=-1) significa confirmación de todas las réplicas en el ISR para esa partición específica, no todos los brokers del cluster."},
  {label:"Con acks=0 Kafka garantiza at-least-once delivery porque el producer siempre reintenta automáticamente", explain:"Incorrecto. acks=0 es at-most-once: el producer envía y no espera confirmación. Si el mensaje se pierde, el producer no lo sabe y no reintenta. Para at-least-once se necesita acks=1 o acks=all con retries."},
], correct:1},

{cat:"Kafka – Producers",
q:"¿Qué es el idempotent producer y qué problema resuelve en sistemas de pagos?",
options:[
  {label:"El idempotent producer es uno que envía cada mensaje exactamente una vez sin posibilidad de retry", explain:"Incorrecto. El idempotent producer permite retries de forma segura garantizando que los reintentos no generen duplicados, no que elimine los retries."},
  {label:"enable.idempotence=true asigna un Producer ID (PID) y un sequence number a cada mensaje. Si el broker recibe un mensaje duplicado (mismo PID + sequence), lo descarta silenciosamente. Garantiza exactly-once a nivel de producer → broker.", explain:"Correcto. Sin idempotencia: producer envía mensaje, broker lo escribe, ACK se pierde en la red, producer reintenta → duplicado. Con idempotencia: el broker detecta el reintento por el PID+sequence y descarta el duplicado. Configurar: enable.idempotence=true (default en Kafka 3.0+, requiere acks=all automáticamente). En banca: crítico para pagos. Sin esto, un reintento por timeout puede cobrar dos veces."},
  {label:"El idempotent producer garantiza exactly-once end-to-end, incluyendo la lógica del consumer y la BD", explain:"Incorrecto. El idempotent producer garantiza exactly-once solo en el segmento producer→broker. Para exactly-once end-to-end (incluyendo consumer + BD) se necesita además el transaction API de Kafka o el patrón Idempotent Consumer."},
  {label:"El idempotent producer aumenta la latencia en 10x porque debe hacer una consulta extra al broker para verificar duplicados", explain:"Incorrecto. El overhead del idempotent producer es mínimo. El broker verifica el sequence number en memoria; es una operación O(1). La latencia adicional es negligible comparada con el beneficio de garantizar no-duplicados."},
], correct:1},

{cat:"Kafka – Producers",
q:"¿Cómo funciona el batching del producer y qué configuraciones lo controlan?",
options:[
  {label:"Kafka no tiene batching a nivel de producer; cada mensaje se envía individualmente para minimizar latencia", explain:"Incorrecto. El batching es una característica fundamental del producer de Kafka. Enviar mensajes individualmente sería muy ineficiente para high-throughput scenarios."},
  {label:"El producer acumula mensajes en un buffer por partición. batch.size (bytes máx del batch) y linger.ms (tiempo de espera para llenar el batch) controlan el balance entre latencia y throughput. Un batch lleno o linger.ms expirado → envío.", explain:"Correcto. Default: batch.size=16384 (16KB), linger.ms=0 (envía inmediatamente si el batch no está lleno). Para high-throughput: aumentar batch.size=65536, linger.ms=5-20ms. Esto permite que más mensajes se acumulen, reduciendo el número de requests al broker y mejorando la compresión. Trade-off: linger.ms=20 añade hasta 20ms de latencia por message. Para sistemas bancarios de alto volumen: batch.size=65536, linger.ms=5, compression.type=lz4. Para latencia crítica: linger.ms=0 con batch pequeño."},
  {label:"linger.ms controla cuánto tiempo espera el broker para procesar el mensaje; es una configuración del servidor", explain:"Incorrecto. linger.ms es una configuración del producer (cliente), no del broker. Controla cuánto tiempo el producer espera para acumular más mensajes antes de enviar el batch al broker."},
  {label:"Aumentar batch.size siempre mejora el rendimiento sin ningún downside", explain:"Incorrecto. Batch grande: más throughput, menos requests, mejor compresión, pero más latencia por mensaje (espera más tiempo para llenar el batch) y más uso de memoria del producer. El tamaño óptimo depende del volumen de mensajes y los requisitos de latencia."},
], correct:1},

{cat:"Kafka – Producers",
q:"¿Cómo elige el producer en qué partición enviar un mensaje?",
options:[
  {label:"El producer siempre envía a la partición 0 para garantizar orden global en el topic", explain:"Incorrecto. Enviar todo a la partición 0 eliminaría el paralelismo. El objetivo es distribuir mensajes entre particiones de forma inteligente."},
  {label:"Si hay key: hash(key) % num_partitions → misma key siempre va a la misma partición (orden garantizado por key). Si no hay key: round-robin o sticky partitioner (Kafka 2.4+, agrupa en el mismo batch para eficiencia). Se puede implementar un Custom Partitioner.", explain:"Correcto. Partition key es crucial para orden: todas las transacciones de la cuenta '001' con key='001' siempre van a la partición 2 (por ejemplo). El consumer que procesa la partición 2 las recibe en orden. Sin key (round-robin): los mensajes se distribuyen uniformemente pero sin orden garantizado entre particiones. Sticky partitioner (default desde 2.4): sin key, envía múltiples mensajes al mismo batch/partición hasta completarlo, luego cambia. Mejor throughput que round-robin puro."},
  {label:"La partición se elige aleatoriamente en cada envío para garantizar balanceo perfecto de carga", explain:"Incorrecto. La elección aleatoria pura no es el comportamiento de Kafka. El random round-robin existió en versiones antiguas pero fue reemplazado por sticky partitioner. Y con key, nunca es aleatorio."},
  {label:"El broker decide en qué partición almacenar el mensaje; el producer no tiene control sobre esto", explain:"Incorrecto. El producer elige la partición antes de enviar al broker. El broker puede redirigir si el producer envía a un broker que no es el líder de esa partición, pero la decisión de partición la toma el producer."},
], correct:1},

// ══════════ CONSUMERS & CONSUMER GROUPS ══════════
{cat:"Kafka – Consumers & Consumer Groups",
q:"¿Cómo funciona un consumer group y qué garantías ofrece sobre el procesamiento?",
options:[
  {label:"En un consumer group, todos los consumers leen todos los mensajes de todas las particiones simultáneamente", explain:"Incorrecto. Eso sería un escenario de broadcast (múltiples consumer groups, no un group). Dentro de un consumer group, cada partición es asignada a exactamente un consumer."},
  {label:"Cada partición del topic es asignada a exactamente un consumer dentro del grupo. Si hay más consumers que particiones, los extras quedan ociosos. Diferentes consumer groups son completamente independientes: cada uno mantiene sus propios offsets y procesa todos los mensajes.", explain:"Correcto. Topic con 6 particiones y consumer group con 3 consumers: cada consumer procesa 2 particiones. Si se agrega un 4to consumer: rebalanceo → algunos consumers toman 1 partición. Con 7 consumers: 6 activos, 1 ocioso. Múltiples grupos: el grupo 'notificaciones' y el grupo 'auditoria' leen el mismo topic independientemente, cada uno con sus propios offsets. Esto es la base del modelo pub-sub de Kafka."},
  {label:"Un consumer group puede tener como máximo tantos consumers como brokers en el cluster", explain:"Incorrecto. El límite es el número de particiones del topic, no el número de brokers. Puedes tener más consumers en el grupo que brokers, pero los consumers extras quedan ociosos si ya hay un consumer por partición."},
  {label:"Los consumer groups comparten los mismos offsets; si un grupo commitea offset=100, todos los grupos avanzan a 100", explain:"Incorrecto. Los offsets son independientes por consumer group. El grupo A puede estar en offset=100 y el grupo B en offset=50 para el mismo topic y partición. Cada grupo tiene su registro en __consumer_offsets."},
], correct:1},

{cat:"Kafka – Consumers & Consumer Groups",
q:"¿Qué es un rebalanceo en Kafka y cuáles son sus implicaciones en sistemas productivos?",
options:[
  {label:"Un rebalanceo es cuando Kafka redistribuye la carga entre brokers; es transparente para los consumers", explain:"Incorrecto. El rebalanceo redistribuye particiones entre consumers de un mismo grupo, no entre brokers. Implica una pausa (stop-the-world) durante la cual ningún consumer procesa mensajes."},
  {label:"El rebalanceo ocurre cuando cambia el número de consumers en el grupo (join/leave) o particiones. Durante el rebalanceo, todos los consumers del grupo dejan de consumir (stop-the-world). Puede causar latencia picos y duplicados si los offsets no están bien commiteados.", explain:"Correcto. Causas: un consumer muere (session.timeout.ms expira), un consumer nuevo se une, topic gana particiones. Durante rebalanceo: el broker (Group Coordinator) revoca todas las particiones y las reasigna. Impacto: lag aumenta, latencia sube. Solución: Cooperative Sticky Assignor (Kafka 2.4+) hace rebalanceos incrementales — solo reasigna las particiones necesarias, los demás consumers continúan procesando. Configurar max.poll.interval.ms alto si el procesamiento es lento para evitar que el broker piense que el consumer murió."},
  {label:"Los rebalanceos son instantáneos en Kafka moderno y no tienen impacto en el procesamiento de mensajes", explain:"Incorrecto. Incluso con Cooperative Rebalancing (Kafka 2.4+), hay un impacto durante la fase de transición. El rebalanceo stop-the-world clásico puede durar segundos o minutos según el número de consumers y particiones."},
  {label:"La única forma de evitar rebalanceos es no cambiar nunca el número de consumers en el grupo", explain:"Incorrecto. Los rebalanceos también ocurren cuando un consumer falla (no voluntariamente), cuando se agregan particiones al topic, o cuando el broker pierde contacto con el consumer (session.timeout.ms). No se pueden evitar completamente, solo minimizar su impacto."},
], correct:1},

{cat:"Kafka – Consumers & Consumer Groups",
q:"¿Cuál es la diferencia entre enable.auto.commit=true y el commit manual, y cuándo usar cada uno?",
options:[
  {label:"enable.auto.commit=true es siempre preferible porque es más simple y garantiza que ningún mensaje se procese dos veces", explain:"Incorrecto. Auto-commit puede commitear el offset ANTES de que el procesamiento complete, causando pérdida de mensajes si el consumer muere después del commit pero antes de terminar el procesamiento."},
  {label:"Auto-commit: commitea el offset cada auto.commit.interval.ms sin saber si el procesamiento fue exitoso. Riesgo: at-most-once (pérdida si falla después del commit). Manual commit (commitSync/commitAsync): commitea solo después de procesar exitosamente. Garantiza at-least-once.", explain:"Correcto. Auto-commit riesgo: consumer recibe mensajes [100,101,102], auto-commit commitea offset=103, luego falla procesando el 101 → los mensajes 101,102 se pierden. Manual commitAsync: procesar 100, 101, 102 → commitAsync(offset=103). Si falla antes del commit, al reiniciar retoma desde 100 (at-least-once, puede procesar duplicados). Para exactly-once: commit manual + Idempotent Consumer (verificar si ya fue procesado). En sistemas bancarios: siempre manual commit después del procesamiento y persistencia exitosa en BD."},
  {label:"El commit manual solo está disponible en Kafka Streams; la API de consumer estándar no lo soporta", explain:"Incorrecto. El consumer API estándar de Kafka tiene commitSync() y commitAsync() para commit manual. Kafka Streams tiene su propio mecanismo de commit, pero el consumer API básico también soporta commit manual completamente."},
  {label:"Con auto.commit.interval.ms=1 (1ms), el auto-commit es equivalente al commit manual en términos de garantías", explain:"Incorrecto. Incluso con 1ms, el auto-commit puede commitear el offset de mensajes cuyo procesamiento no ha completado aún. El commit manual garantiza semántica because commitea explícitamente después del procesamiento."},
], correct:1},

{cat:"Kafka – Consumers & Consumer Groups",
q:"¿Qué es el consumer lag y cómo monitorizas y manejas un lag creciente en producción?",
options:[
  {label:"Consumer lag es el número de consumers activos en un grupo; lag alto significa muchos consumers", explain:"Incorrecto. Consumer lag es la diferencia entre el último offset producido y el último offset commiteado por el consumer. Mide cuánto está el consumer por detrás del producer."},
  {label:"Consumer lag = (log-end-offset) - (consumer-committed-offset). Indica cuántos mensajes no han sido procesados. Monitorizar con: kafka-consumer-groups.sh --describe, Confluent Control Center, o métricas JMX exportadas a Prometheus/Grafana. Alertar cuando lag supera umbral.", explain:"Correcto. Lag creciente indica que el producer genera mensajes más rápido de lo que el consumer procesa. Causas: consumer lento (procesamiento pesado, BD lenta), pocos consumers para el volumen, GC pauses, rebalanceos frecuentes. Soluciones: aumentar consumidores (hasta el número de particiones), aumentar particiones (permite más paralelismo), optimizar el procesamiento del consumer, usar batch processing en el consumer. Alerta crítica en banca: lag>1000 en topic de pagos → riesgo de SLA."},
  {label:"Un lag alto en Kafka no es problemático porque Kafka retiene los mensajes indefinidamente hasta que se procesen", explain:"Incorrecto. Aunque Kafka retiene los mensajes según la política de retención, un lag creciente puede causar: procesamiento de eventos obsoletos, incumplimiento de SLAs de tiempo real, riesgo de que los mensajes expiren (si retention.ms es finito) antes de ser procesados."},
  {label:"La solución a cualquier lag creciente es siempre aumentar el número de brokers en el cluster", explain:"Incorrecto. Más brokers no aceleran al consumer existente. El bottleneck del lag generalmente está en el consumer (procesamiento lento) o en la capacidad de paralelismo (pocas particiones/consumers). Los brokers adicionales ayudan con la ingesta del producer, no con el consumo."},
], correct:1},

{cat:"Kafka – Consumers & Consumer Groups",
q:"¿Qué ocurre cuando max.poll.interval.ms expira en un consumer y cuáles son las consecuencias?",
options:[
  {label:"Cuando max.poll.interval.ms expira, el consumer recibe un error que debe manejar, pero sigue siendo parte del grupo", explain:"Incorrecto. Cuando max.poll.interval.ms expira, el broker considera que el consumer está muerto y lo expulsa del grupo, disparando un rebalanceo."},
  {label:"Si el consumer no llama a poll() dentro de max.poll.interval.ms, el broker considera que el consumer murió, lo expulsa del consumer group y dispara un rebalanceo. Las particiones del consumer fallido son reasignadas. Sus offsets no commiteados se reprocesarán.", explain:"Correcto. Escenario: consumer llama poll(), obtiene 500 mensajes, tarda 10 minutos procesando (consulta a BD lenta para cada uno), max.poll.interval.ms=5min → expira. El broker reasigna las particiones a otro consumer que vuelve a procesar los mismos 500 mensajes (duplicados). Solución: reducir el número de registros por poll (max.poll.records), optimizar el procesamiento, o aumentar max.poll.interval.ms si el procesamiento tarda más. Importante: session.timeout.ms es heartbeat-based (hilo separado), max.poll.interval.ms es poll-based."},
  {label:"max.poll.interval.ms solo aplica a Kafka Streams; el consumer API estándar no tiene esta limitación", explain:"Incorrecto. max.poll.interval.ms aplica al consumer API estándar. Kafka Streams internamente usa el consumer API y también está sujeto a esta limitación. Es una configuración universal del consumer."},
  {label:"Para evitar que max.poll.interval.ms expire, el consumer debe enviar heartbeats cada segundo", explain:"Incorrecto. Los heartbeats (session.timeout.ms) son enviados por un hilo separado del hilo de polling. max.poll.interval.ms no se resetea con heartbeats; solo se resetea con llamadas a poll(). Son dos mecanismos independientes de detección de fallos del consumer."},
], correct:1},

// ══════════ PARTITIONS ══════════
{cat:"Kafka – Partitions",
q:"¿Cuántas particiones debe tener un topic y qué factores consideras para dimensionarlo?",
options:[
  {label:"Siempre usar 1 partición por topic para garantizar orden global de los mensajes", explain:"Incorrecto. Una sola partición elimina el paralelismo: solo un consumer puede procesar el topic. Solo es apropiado para casos donde el orden global es estrictamente necesario y el volumen es bajo."},
  {label:"Factores: target throughput / throughput por consumer, número de consumers deseados (máx parallelismo = num_partitions), retention y tamaño de almacenamiento. Regla práctica: empezar con más particiones de las necesarias (no se pueden reducir sin recrear el topic).", explain:"Correcto. Fórmula básica: si necesitas procesar 1M msg/s y cada consumer puede procesar 100K msg/s, necesitas mínimo 10 particiones (y por tanto 10 consumers). Más particiones = más paralelismo pero también: más connections al broker, más overhead de election si hay falla, más memoria en el broker. Regla de Confluent: empezar con 6-10 particiones para topics no críticos, calibrar con métricas reales. Importante: solo se pueden AGREGAR particiones, no reducir (aumentar puede romper el orden por key si los consumers no están preparados)."},
  {label:"El número óptimo de particiones siempre es igual al número de brokers del cluster para balanceo perfecto", explain:"Incorrecto. El número de particiones debería ser un múltiplo del número de brokers para distribución uniforme, pero el factor determinante es el throughput necesario y el número de consumers, no el número de brokers."},
  {label:"Las particiones se pueden reducir o aumentar libremente en cualquier momento sin impacto en los consumers", explain:"Incorrecto. Las particiones solo pueden aumentarse, no reducirse, sin recrear el topic. Aumentar particiones puede romper la garantía de orden por key (los mensajes que ya están en la partición anterior y los nuevos pueden llegar a consumers distintos). Requiere que los consumers sean idempotentes o tengan manejo de este caso."},
], correct:1},

{cat:"Kafka – Partitions",
q:"¿Qué es la replicación de particiones y cómo se relaciona con la disponibilidad y durabilidad?",
options:[
  {label:"La replicación de particiones copia los datos entre topics, no entre brokers; no afecta la disponibilidad", explain:"Incorrecto. La replicación copia los datos de cada partición entre múltiples brokers, no entre topics. Es el mecanismo principal de alta disponibilidad y durabilidad en Kafka."},
  {label:"Replication factor=3: cada partición tiene 1 líder (recibe escrituras/lecturas) y 2 followers (replican del líder). Si el líder falla, un follower del ISR asume el liderazgo automáticamente. Kafka puede tolerar (replication_factor - 1) fallas de broker sin pérdida de datos.", explain:"Correcto. Con RF=3 y min.insync.replicas=2: tolerancia a 1 falla de broker sin pérdida de datos. Si 2 brokers fallan simultáneamente con RF=3: si la única réplica restante no era líder, puede haber elección de líder sucia (unclean) o la partición queda unavailable (según unclean.leader.election.enable). En producción bancaria: RF=3, min.insync.replicas=2, unclean.leader.election.enable=false. El costo: 3x el almacenamiento."},
  {label:"El líder de una partición siempre está en el primer broker del cluster por convención de Kafka", explain:"Incorrecto. El líder se elige por el controller basándose en qué brokers están disponibles y en el ISR. El liderazgo puede migrarse entre brokers. Kafka tiene un concepto de 'preferred leader' (generalmente el primer broker en la lista de réplicas de esa partición) al que intenta volver después de fallos."},
  {label:"Con replication factor=1, Kafka ofrece las mismas garantías de disponibilidad que con factor=3", explain:"Incorrecto. Con RF=1, si el único broker que tiene la partición falla, el topic queda completamente unavailable y puede haber pérdida de datos no commiteados. RF=1 solo es aceptable en entornos de desarrollo o para datos completamente descartables."},
], correct:1},

// ══════════ KAFKA CONNECT ══════════
{cat:"Kafka Connect",
q:"¿Qué es Kafka Connect y cuál es la diferencia entre un Source Connector y un Sink Connector?",
options:[
  {label:"Kafka Connect es una API de Java para escribir consumers personalizados; es una alternativa a KafkaConsumer", explain:"Incorrecto. Kafka Connect es un framework declarativo (configuración JSON) para integrar Kafka con sistemas externos sin escribir código. KafkaConsumer es la API de bajo nivel."},
  {label:"Source Connector: ingesta datos desde un sistema externo (BD, S3, API) hacia topics Kafka. Sink Connector: consume topics Kafka y escribe en sistemas externos (Elasticsearch, BD, S3). Configuración declarativa en JSON, sin código Java. Escalable con workers distribuidos.", explain:"Correcto. Ejemplo Source: Debezium SQL Server Source Connector → lee el transaction log de SQL Server → publica cambios en topic kafka 'db.cuentas.cuentas'. Ejemplo Sink: JDBC Sink Connector → consume el topic → escribe en una BD de reportería. Ventaja: no requiere escribir código; solo configurar el JSON del conector. El Kafka Connect cluster gestiona la distribución de tareas entre workers, la tolerancia a fallos, y los offsets (almacenados en topics Kafka internos)."},
  {label:"Kafka Connect solo funciona con bases de datos; no puede conectarse a sistemas como S3, Elasticsearch o APIs REST", explain:"Incorrecto. El ecosistema de conectores cubre cientos de sistemas: bases de datos (JDBC, Debezium), storage (S3, HDFS, GCS), motores de búsqueda (Elasticsearch, OpenSearch), sistemas de mensajería (JMS, RabbitMQ), APIs (HTTP Connector), y muchos más. Confluent Hub tiene 200+ conectores."},
  {label:"Kafka Connect requiere escribir código Java para cada integración; la configuración JSON es solo un complemento", explain:"Incorrecto. La mayoría de las integraciones de Kafka Connect se hacen únicamente con configuración JSON usando conectores existentes. Solo si necesitas un conector para un sistema no soportado debes escribir código Java implementando la interfaz SourceConnector/SinkConnector."},
], correct:1},

{cat:"Kafka Connect",
q:"¿Cómo maneja Kafka Connect los errores y el dead letter queue?",
options:[
  {label:"Kafka Connect detiene completamente el connector cuando hay un error en un mensaje; requiere reinicio manual", explain:"Incorrecto. El comportamiento ante errores es configurable. Detener el connector por cada error sería inaceptable en producción."},
  {label:"errors.tolerance=all: los mensajes fallidos se envían a un Dead Letter Queue (DLQ) topic configurado en errors.deadletterqueue.topic.name. El connector continúa procesando. El DLQ incluye headers con el error original para debugging.", explain:"Correcto. Configuración típica para producción: errors.tolerance=all, errors.deadletterqueue.topic.name=dlq-mi-connector, errors.deadletterqueue.context.headers.enable=true (incluye el stack trace del error en los headers del mensaje del DLQ). Con errors.tolerance=none (default): el connector se detiene al primer error de deserialización o transformación. En banca: configurar DLQ y monitorear su tamaño. Un DLQ que crece indica un problema sistemático (schema cambiado, datos corruptos) que debe resolverse."},
  {label:"El DLQ en Kafka Connect es el mismo concepto que el DLQ de RabbitMQ; ambos funcionan igual", explain:"Incorrecto. Aunque ambos son 'colas de mensajes muertos', su implementación difiere. El DLQ de Kafka Connect es simplemente otro topic Kafka. El DLQ de RabbitMQ es una cola separada con semántica diferente. La configuración, la redelivery policy, y el manejo son distintos."},
  {label:"errors.tolerance=all garantiza que ningún mensaje se pierde nunca en Kafka Connect", explain:"Incorrecto. errors.tolerance=all garantiza que el connector continúa operando a pesar de errores, enviando los mensajes problemáticos al DLQ. Pero si el DLQ no está configurado, los mensajes fallidos simplemente se descartan (skippean)."},
], correct:1},

{cat:"Kafka Connect",
q:"¿Qué es Debezium y cómo implementas CDC con él para un sistema bancario en SQL Server?",
options:[
  {label:"Debezium es una librería Java para escribir consumers de Kafka; no tiene relación con bases de datos", explain:"Incorrecto. Debezium es una plataforma de CDC (Change Data Capture) basada en Kafka Connect que captura cambios de bases de datos directamente desde el transaction log."},
  {label:"Debezium SQL Server Connector: lee el transaction log de SQL Server (requiere habilitar SQL Server CDC en las tablas). Cada INSERT/UPDATE/DELETE genera un evento Kafka con el estado anterior y posterior. Schema Registry gestiona la evolución del schema.", explain:"Correcto. Configuración: habilitar SQL Server CDC: EXEC sys.sp_cdc_enable_table @source_schema='dbo', @source_name='transacciones', @role_name=NULL. Debezium connector config JSON: connector.class=io.debezium.connector.sqlserver.SqlServerConnector, database.hostname, database.port=1433, database.user, database.password, table.include.list=dbo.transacciones. Genera eventos con before/after del registro. Ventaja: captura DELETEs (que el JDBC polling no puede capturar). Desventaja: requiere permisos de CDC en SQL Server y acceso al transaction log."},
  {label:"Debezium solo soporta MySQL y PostgreSQL; para SQL Server se necesita un conector comercial de pago", explain:"Incorrecto. Debezium tiene soporte oficial y open-source para SQL Server, MySQL, PostgreSQL, Oracle, MongoDB, Db2, Cassandra, y otros. El conector de SQL Server es parte del proyecto principal de Debezium."},
  {label:"Debezium captura cambios leyendo la tabla directamente con SELECT * cada 5 segundos; no usa el transaction log", explain:"Incorrecto. Eso describe el JDBC Source Connector con polling. Debezium es fundamentalmente diferente: lee el transaction log del motor de BD (binary log en MySQL, WAL en PostgreSQL, CDC tables en SQL Server), capturando cambios en tiempo real sin polling y sin impacto en la BD operacional."},
], correct:1},

// ══════════ KAFKA STREAMS & KSQLDB ══════════
{cat:"Kafka Streams & ksqlDB",
q:"¿Cuál es la diferencia entre Kafka Streams y ksqlDB para procesamiento en tiempo real?",
options:[
  {label:"Kafka Streams y ksqlDB hacen exactamente lo mismo; ksqlDB es simplemente la versión más nueva que reemplaza a Kafka Streams", explain:"Incorrecto. Son herramientas complementarias con diferentes casos de uso. ksqlDB internamente usa Kafka Streams, pero tienen abstracciones y audiencias distintas."},
  {label:"Kafka Streams: librería Java para procesamiento de streams en la aplicación (no requiere cluster separado). ksqlDB: motor SQL sobre Kafka con sintaxis SQL (CREATE STREAM, SELECT, FILTER). ksqlDB requiere un cluster de servers ksqlDB. Streams para lógica compleja en código; ksqlDB para equipos que prefieren SQL.", explain:"Correcto. Kafka Streams: KStream<String, Pago> pagos = builder.stream('pagos'); pagos.filter((k,v) -> v.getMonto() > 10000).to('pagos-alto-valor'); — código Java puro, se despliega como parte de tu microservicio, sin infraestructura extra. ksqlDB: CREATE STREAM pagos_alto_valor AS SELECT * FROM pagos WHERE monto > 10000; — sintaxis SQL, se ejecuta en el cluster ksqlDB. Kafka Streams ideal para transformaciones complejas con estado en código. ksqlDB ideal para analíticos, dashboards en tiempo real, equipos con background en SQL."},
  {label:"Kafka Streams requiere un cluster de Kafka Streams separado del cluster de Kafka principal", explain:"Incorrecto. Kafka Streams es una librería cliente que corre dentro de tu aplicación. Usa el cluster de Kafka normal para state stores (changelog topics), repartition topics, y los topics de input/output. No requiere infraestructura adicional."},
  {label:"ksqlDB no puede acceder a los offsets de Kafka; solo puede procesar mensajes nuevos desde que se crea la query", explain:"Incorrecto. ksqlDB puede configurarse para procesar desde el inicio del topic (auto.offset.reset=earliest) o solo mensajes nuevos (latest). También puede hacer time-based windowing y replay de eventos históricos."},
], correct:1},

{cat:"Kafka Streams & ksqlDB",
q:"¿Qué es una KTable vs un KStream en Kafka Streams y cómo se combinan?",
options:[
  {label:"KTable y KStream son idénticos; son solo nombres diferentes para el mismo concepto en versiones distintas de Kafka", explain:"Incorrecto. Son abstracciones fundamentalmente distintas: KStream representa un flujo de eventos (immutable log), KTable representa el estado actual (changelog compactado)."},
  {label:"KStream: flujo de eventos inmutables (cada mensaje es un evento independiente). KTable: vista materializada del estado actual (changelog: cada key tiene el último valor). KStream JOIN KTable: enriquecer eventos con el estado actual (ej: join transacción con datos del cliente).", explain:"Correcto. KStream de pagos: cada mensaje es una transacción (no reemplaza la anterior). KTable de clientes: cada key (cliente_id) tiene los datos actuales del cliente (un UPDATE reemplaza el anterior). JOIN: KStream<clienteId, Transaccion> enriquecida con KTable<clienteId, Cliente> → cada transacción se enriquece con el nombre, límite de crédito, etc. del cliente. El join es automáticamente eficiente porque la KTable está en estado local (state store). Casos de uso: enriquecer eventos con datos de referencia en tiempo real sin consultar una BD externa."},
  {label:"KTable solo puede tener un registro total; es como un singleton que almacena el estado global de la aplicación", explain:"Incorrecto. KTable puede tener millones de entradas (una por key distinta). Representa el estado actual de cada key, similar a una tabla de BD donde cada key tiene un solo registro actual."},
  {label:"Para hacer JOIN entre KStream y KTable se necesita que ambos tengan el mismo número de particiones, configurado manualmente", explain:"Incorrecto parcialmente. Para un JOIN eficiente, ambos topics deben estar co-particionados (mismo número de particiones y misma clave de particionado). Si no lo están, Kafka Streams hace automáticamente un reparticionamiento interno (crea un topic intermedio). El número de particiones no se configura manualmente para el JOIN; es un requisito de co-particionamiento."},
], correct:1},

{cat:"Kafka Streams & ksqlDB",
q:"¿Qué son los state stores en Kafka Streams y cómo garantizan fault tolerance?",
options:[
  {label:"Los state stores de Kafka Streams están en RAM solamente y se pierden completamente si la aplicación reinicia", explain:"Incorrecto. Los state stores tienen persistencia en disco local (RocksDB por defecto) y se respaldan automáticamente en changelog topics de Kafka para fault tolerance."},
  {label:"State stores (RocksDB por defecto): almacenamiento local de estado para operaciones con estado (aggregations, joins, windowing). Cada state store tiene un changelog topic en Kafka. Si la instancia falla, otra instancia reconstruye el state store releyendo el changelog topic.", explain:"Correcto. Sin state stores, operaciones como 'cuenta cuántos pagos ha hecho este cliente hoy' requerirían una BD externa. Con state store: el estado se guarda localmente en RocksDB. Changelog topic: cada cambio al state store se publica a un topic compactado de Kafka. Si la instancia falla: otra instancia lee el changelog topic desde el último punto y reconstruye el estado (tiempo de recuperación proporcional al tamaño del estado, por eso se usan también standby replicas). Interactive Queries: permite exponer el state store vía REST para consultas desde otros servicios."},
  {label:"Los state stores requieren una BD externa (PostgreSQL, Redis) configurada manualmente; Kafka no tiene almacenamiento propio", explain:"Incorrecto. Los state stores son una funcionalidad integrada de Kafka Streams. No requieren BD externa. El almacenamiento es local (RocksDB) con backup automático en Kafka topics. Se puede usar un state store personalizado (ej: Redis) pero no es necesario para la mayoría de casos."},
  {label:"Los state stores solo están disponibles con ksqlDB; la librería Kafka Streams estándar no tiene persistencia de estado", explain:"Incorrecto. Los state stores son parte central de la librería Kafka Streams (no ksqlDB). ksqlDB usa Kafka Streams internamente y también tiene state stores. La persistencia con RocksDB y changelog topics es nativa de Kafka Streams."},
], correct:1},

// ══════════ SCHEMA REGISTRY ══════════
{cat:"Kafka – Schema Registry",
q:"¿Qué es Schema Registry y por qué es importante en un ecosistema Kafka empresarial?",
options:[
  {label:"Schema Registry es un sistema de autenticación para Kafka; gestiona qué producers pueden escribir en qué topics", explain:"Incorrecto. Schema Registry gestiona los schemas (estructura de los datos) de los mensajes, no la autenticación. La autenticación se maneja con ACLs y SASL."},
  {label:"Schema Registry centraliza la gestión de schemas (Avro, Protobuf, JSON Schema) para producers y consumers. Garantiza compatibilidad de schema evolution. El producer registra el schema; el mensaje incluye solo el schema ID. El consumer recupera el schema por ID para deserializar.", explain:"Correcto. Sin Schema Registry: si el producer cambia el schema (agrega un campo), los consumers que no saben del nuevo campo fallarán al deserializar. Con Schema Registry: el consumer recupera el schema del registry y puede manejar la evolución. El mensaje incluye 5 bytes: 1 magic byte + 4 bytes schema ID + datos Avro. Ahorro de espacio vs incluir el schema completo en cada mensaje. En banca: el schema de 'Transaccion' se registra una vez; todos los producers/consumers lo consultan dinámicamente."},
  {label:"Schema Registry es obligatorio para usar Kafka; sin él Kafka no puede funcionar", explain:"Incorrecto. Schema Registry es opcional. Kafka funciona perfectamente con JSON plain sin Schema Registry. Schema Registry agrega gobernanza y compatibilidad pero no es un requisito técnico de Kafka."},
  {label:"Schema Registry solo soporta el formato JSON; Avro y Protobuf requieren herramientas separadas", explain:"Incorrecto. Confluent Schema Registry soporta Avro (el formato más común con Kafka), JSON Schema, y Protobuf. Cada formato tiene su propio serializer/deserializer que consulta el Schema Registry."},
], correct:1},

{cat:"Kafka – Schema Registry",
q:"¿Cuáles son los modos de compatibilidad de Schema Registry y cuándo aplica cada uno?",
options:[
  {label:"Schema Registry solo tiene un modo: FULL compatibility que verifica compatibilidad en ambas direcciones siempre", explain:"Incorrecto. Schema Registry tiene múltiples modos de compatibilidad que permiten diferentes tipos de evolución del schema."},
  {label:"BACKWARD: consumers con schema nuevo pueden leer mensajes con schema viejo (agregar campos con default). FORWARD: consumers con schema viejo pueden leer mensajes con schema nuevo (eliminar campos con default). FULL: ambas. NONE: sin verificación.", explain:"Correcto. BACKWARD (más común): producer actualiza schema → agrega campo opcional con default. Consumers con schema viejo: ignoran el campo nuevo. Consumers con schema nuevo: leen el campo nuevo (o default si no está). Permite desplegar consumers primero, luego producers. FULL_TRANSITIVE: compatibilidad con TODAS las versiones anteriores del schema, no solo la última. Recomendado en banca para mayor seguridad. NONE: para desarrollo/migración controlada. En producción bancaria: FULL_TRANSITIVE para evitar sorpresas en deployments con múltiples versiones corriendo simultáneamente."},
  {label:"El modo BACKWARD permite eliminar campos obligatorios del schema sin impacto en los consumers existentes", explain:"Incorrecto. Eliminar un campo obligatorio (sin default) en BACKWARD mode causa que el consumer con schema nuevo no pueda leer mensajes viejos que tienen ese campo como obligatorio. Solo se pueden eliminar campos que tienen default values, o agregar campos nuevos con defaults."},
  {label:"El modo de compatibilidad solo aplica al Avro schema; con JSON Schema no hay verificación de compatibilidad", explain:"Incorrecto. Schema Registry verifica compatibilidad para todos los formatos que soporta: Avro, JSON Schema, y Protobuf. Cada formato tiene sus propias reglas de compatibilidad."},
], correct:1},

// ══════════ SPRING BOOT INTEGRATION ══════════
{cat:"Kafka con Spring Boot",
q:"¿Cómo configuras un KafkaListener básico en Spring Boot y qué consideraciones hay para el manejo de errores?",
options:[
  {label:"En Spring Boot, los Kafka consumers se crean implementando la interfaz KafkaConsumerInterface; @KafkaListener no existe", explain:"Incorrecto. @KafkaListener es la anotación principal de Spring Kafka para crear consumers. No existe KafkaConsumerInterface como interfaz a implementar."},
  {label:"@KafkaListener(topics='pagos', groupId='pagos-processor') en el método de procesamiento. Spring gestiona el poll loop, commit de offsets, y deserialización. Para errores: DefaultErrorHandler con BackOffPolicy para retries, DeadLetterPublishingRecoverer para DLQ.", explain:"Correcto. Configuración completa: @Bean public ConcurrentKafkaListenerContainerFactory<String,Pago> kafkaListenerContainerFactory() { factory.setCommonErrorHandler(new DefaultErrorHandler(new DeadLetterPublishingRecoverer(kafkaTemplate), new FixedBackOff(1000L, 3))); }. Con @RetryableTopic (Kafka 2.7+): @RetryableTopic(attempts='4', backoff=@Backoff(delay=1000, multiplier=2)) — Spring Boot crea automáticamente topics de retry (pagos-retry-0, pagos-retry-1) y un DLT (pagos-dlt). Mucho más simple que configurar manualmente."},
  {label:"@KafkaListener no soporta múltiples topics; se necesita un listener separado por topic", explain:"Incorrecto. @KafkaListener soporta múltiples topics: @KafkaListener(topics={'pagos', 'transferencias'}). También soporta patrones con topicPattern: @KafkaListener(topicPattern='pago.*')."},
  {label:"En Spring Boot, el commit de offset es siempre manual; Spring no puede gestionar el ciclo de vida del offset automáticamente", explain:"Incorrecto. Spring Kafka gestiona el commit de offset automáticamente según la configuración del ContainerFactory. Por defecto usa BATCH ack mode (commitea después de procesar el batch del poll). Se puede configurar MANUAL, MANUAL_IMMEDIATE, RECORD, etc."},
], correct:1},

{cat:"Kafka con Spring Boot",
q:"¿Cómo implementas transacciones en Kafka con Spring Boot para garantizar exactly-once?",
options:[
  {label:"@Transactional de Spring automáticamente incluye Kafka en la transacción de BD; no se necesita configuración adicional", explain:"Incorrecto. @Transactional de Spring gestiona transacciones de BD (JPA/JDBC). Para incluir Kafka en la transacción se necesita un KafkaTransactionManager configurado explícitamente o ChainedKafkaTransactionManager para combinar Kafka + BD."},
  {label:"KafkaTransactionManager + transactional KafkaTemplate: el producer con transactional.id puede hacer operaciones atómicas en Kafka (publish + offset commit). Para exactly-once con BD: Outbox Pattern es más robusto que 2PC entre Kafka y BD.", explain:"Correcto. Configuración: spring.kafka.producer.transaction-id-prefix=pago-tx-. KafkaTemplate.executeInTransaction(ops -> { ops.send('pagos', evento); // atómico return null; }); Spring Kafka también soporta @Transactional con KafkaTransactionManager. Limitación: las transacciones Kafka (exactly-once) son entre topics de Kafka. Para consistencia con BD, la transacción Kafka no incluye la BD. La solución robusta es Outbox Pattern: BD + tabla outbox en una transacción ACID, luego publicar el outbox a Kafka por separado."},
  {label:"Las transacciones de Kafka son imposibles porque Kafka es un sistema de mensajería sin soporte transaccional", explain:"Incorrecto. Kafka soporta transacciones desde la versión 0.11. El transaction API permite que un producer haga publish atómico a múltiples topics y/o commit de offsets de consumer de forma atómica. Es la base de exactly-once semantics en Kafka Streams."},
  {label:"Para exactly-once en Spring Boot, simplemente configurar enable.idempotence=true es suficiente para todos los escenarios", explain:"Incorrecto. enable.idempotence=true garantiza exactly-once solo en el segmento producer→broker (no duplicados en escritura). Para exactly-once end-to-end (read-process-write) se necesita además las transacciones de Kafka y el consumer leyendo offsets de forma transaccional."},
], correct:1},

{cat:"Kafka con Spring Boot",
q:"¿Qué es @RetryableTopic en Spring Kafka y cómo simplifica el manejo de errores?",
options:[
  {label:"@RetryableTopic es una anotación que hace que el listener procese el mismo mensaje hasta 3 veces sin ninguna configuración adicional", explain:"Incorrecto. @RetryableTopic crea automáticamente topics de retry y configura el flujo de reintento, pero requiere cierta configuración (número de intentos, backoff, etc.)."},
  {label:"@RetryableTopic crea automáticamente topics de retry y un Dead Letter Topic (DLT). El mensaje fallido se publica al retry topic con un delay, se reintenta N veces con backoff configurable, y si falla todas, va al DLT. No bloquea el procesamiento de otros mensajes.", explain:"Correcto. @RetryableTopic(attempts='4', backoff=@Backoff(delay=2000, multiplier=2.0), dltTopicSuffix='-dlt') genera: topic-retry-0 (intento 2, delay 2s), topic-retry-1 (intento 3, delay 4s), topic-retry-2 (intento 4, delay 8s), topic-dlt (si falla 4 veces). Ventaja enorme sobre el retry síncrono: el retry síncrono bloquea la partición (los mensajes siguientes esperan). Con @RetryableTopic, el mensaje fallido va a un topic de retry y el consumer principal continúa con el siguiente mensaje. No bloquear la partición es crítico en sistemas bancarios con bajo lag."},
  {label:"@RetryableTopic requiere configurar manualmente los topics de retry en el broker antes de usarlo", explain:"Incorrecto. Spring Kafka crea automáticamente los topics de retry y DLT si están configurados con auto.create.topics.enable=true en el broker, o pueden crearse vía KafkaAdmin en la configuración de Spring. No requiere configuración manual en el broker."},
  {label:"@RetryableTopic solo funciona con deserialización de Avro; con JSON no está soportado", explain:"Incorrecto. @RetryableTopic funciona con cualquier formato de deserialización: JSON, Avro, String, etc. El formato de serialización es independiente del mecanismo de retry."},
], correct:1},

{cat:"Kafka con Spring Boot",
q:"¿Cómo configuras múltiples consumers en paralelo en Spring Boot para escalar el procesamiento?",
options:[
  {label:"En Spring Boot solo puede haber un consumer por aplicación; para paralelismo se necesitan múltiples instancias", explain:"Incorrecto. ConcurrentKafkaListenerContainerFactory permite configurar múltiples threads (consumers) dentro de una sola instancia de la aplicación."},
  {label:"ConcurrentKafkaListenerContainerFactory con setConcurrency(N): crea N consumer threads dentro de la misma JVM, cada uno procesando particiones distintas. O desplegar múltiples instancias de la aplicación con el mismo groupId.", explain:"Correcto. factory.setConcurrency(3) con un topic de 6 particiones: 3 threads en la JVM, cada uno procesando 2 particiones. Alternativa: desplegar 6 pods en Kubernetes con el mismo groupId → cada pod procesa 1 partición. Trade-off: múltiples threads en 1 JVM = menor overhead de red pero comparten recursos de JVM. Múltiples pods = mayor aislamiento, mejor escalabilidad horizontal, pero más overhead de red y conexiones. En banca con AKS: generalmente múltiples pods con 1 consumer thread cada uno para máximo aislamiento y escalabilidad."},
  {label:"setConcurrency solo funciona si el número de threads es exactamente igual al número de particiones; de lo contrario hay errores", explain:"Incorrecto. setConcurrency puede ser mayor o menor que el número de particiones. Si concurrency > partitions: threads extra quedan ociosos. Si concurrency < partitions: cada thread procesa múltiples particiones. Kafka gestiona la asignación automáticamente."},
  {label:"Para paralelismo en Kafka con Spring Boot, la única opción válida es aumentar el número de particiones del topic", explain:"Incorrecto. Aumentar particiones es una opción, pero no la única. También se puede: aumentar setConcurrency, desplegar más instancias de la aplicación, o una combinación. Las particiones definen el máximo de paralelismo posible, pero otras configuraciones definen cuánto paralelismo se usa realmente."},
], correct:1},

// ══════════ ADVANCED & TRICKY ══════════
{cat:"Kafka – Preguntas Tricky & Senior",
q:"¿Qué es el zombie fencing en Kafka y en qué escenario ocurre?",
options:[
  {label:"Zombie fencing es cuando un consumer muerto sigue procesando mensajes aunque ya fue expulsado del grupo", explain:"Parcialmente correcto en la descripción del problema, pero no en la solución. Zombie fencing es el mecanismo que PREVIENE este comportamiento usando el transaction ID."},
  {label:"Un 'zombie' producer es una instancia antigua que cree que sigue siendo activa. Con transactional.id, el broker rechaza mensajes de un producer zombie: si una nueva instancia inicia con el mismo transactional.id, invalida al anterior (epoch++). Previene mensajes duplicados de instancias 'zombie'.", explain:"Correcto. Escenario: instancia A del producer inicia transacción con transactional.id='pago-service-0', epoch=5. A pausa por GC largo. Kafka cree que A murió, la misma tarea es asignada a instancia B que inicia con el mismo transactional.id, epoch=6. Cuando A se recupera e intenta completar su transacción con epoch=5, el broker la rechaza (epoch stale). Así los mensajes de A 'zombie' no llegan al topic. En Kafka Streams, esto se maneja automáticamente con el transaction.id generado por el nombre del task."},
  {label:"Zombie fencing solo ocurre en Kafka Streams; en el producer API estándar no existe este problema", explain:"Incorrecto. El zombie fencing con transactional.id aplica al producer API estándar. Kafka Streams lo usa internamente, pero el mecanismo es del producer transaccional de Kafka."},
  {label:"Zombie fencing se configura habilitando enable.auto.commit=false; el commit manual previene el comportamiento zombie", explain:"Incorrecto. El commit manual no tiene relación con zombie fencing. El zombie fencing es sobre el producer transaccional invalidando instancias antiguas con el mismo transactional.id mediante el incremento del epoch."},
], correct:1},

{cat:"Kafka – Preguntas Tricky & Senior",
q:"¿Por qué llamar a seekToBeginning() en un consumer puede ser peligroso en producción y cuándo es apropiado?",
options:[
  {label:"seekToBeginning() es siempre seguro porque Kafka es idempotente por diseño y los mensajes pueden procesarse múltiples veces sin problemas", explain:"Incorrecto. Kafka no es idempotente por diseño. Los mensajes pueden generar efectos secundarios (enviar notificaciones, cobrar pagos) si se procesan de nuevo. seekToBeginning sin idempotencia en el consumer causa duplicados reales."},
  {label:"seekToBeginning() reprocesa todos los mensajes desde el inicio del topic. Peligroso si el procesamiento tiene efectos secundarios (enviar emails, cobrar tarjetas) sin idempotencia. Apropiado para: reconstruir estado, replay de datos de prueba, o cuando el consumer tiene lógica idempotente garantizada.", explain:"Correcto. Escenario peligroso: consumer de notificaciones hace seekToBeginning() sin idempotencia → envía emails duplicados por cada transacción histórica. Escenario seguro: consumer de Kafka Streams hacía seekToBeginning() para reconstruir un state store → idempotente porque el state store simplemente reemplaza el valor anterior. En banca: nunca hacer seekToBeginning() en un consumer de pagos o notificaciones sin verificar idempotencia primero. Alternativa segura: consumer group diferente para replay, sin afectar el grupo de producción."},
  {label:"seekToBeginning() solo afecta al consumer que lo llama; otros consumers del mismo grupo continúan desde sus offsets normales", explain:"Incorrecto. seekToBeginning() afecta al consumer que lo llama en el contexto de sus particiones asignadas. Si ese consumer hace commit después del seek, el offset commiteado para el consumer group cambia, afectando potencialmente a otros consumers que hereden esas particiones después de un rebalanceo."},
  {label:"seekToBeginning() no funciona si el topic tiene log compaction habilitado; generaría una excepción", explain:"Incorrecto. seekToBeginning() funciona con topics compactados. Sin embargo, en un topic compactado, el 'inicio' puede no tener todos los mensajes históricos si ya fueron compactados. El consumer recibirá solo el último valor de cada key desde el punto de inicio de los segmentos activos."},
], correct:1},

{cat:"Kafka – Preguntas Tricky & Senior",
q:"¿Qué es el 'unclean leader election' y cuándo representa un riesgo crítico en sistemas financieros?",
options:[
  {label:"Unclean leader election es cuando el líder se elige sin consultar a ZooKeeper; es más rápido pero menos seguro", explain:"Incorrecto. Unclean leader election no está relacionado con ZooKeeper. Se refiere a elegir como nuevo líder a una réplica que NO está en el ISR (está atrasada), sacrificando datos por disponibilidad."},
