    {label:"Es un tipo de índice en bases de datos para optimizar consultas largas", explain:"Incorrecto. SAGA es un patrón de arquitectura de microservicios, no un índice de base de datos."},
    {label:"Es un patrón de diseño de UI para formularios con múltiples pasos", explain:"Incorrecto. SAGA se aplica en el backend para manejar transacciones distribuidas, no en interfaces de usuario."},
    {label:"Es un patrón para manejar transacciones distribuidas entre microservicios usando compensating transactions ante errores", explain:"Correcto. SAGA divide una transacción larga en pasos locales; si alguno falla, ejecuta transacciones compensatorias para deshacer los pasos anteriores."},
    {label:"Es una especificación de REST API para microservicios en Java", explain:"Incorrecto. SAGA no es una especificación REST; es un patrón de coordinación de transacciones distribuidas."},
  ], correct:2
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"Si manejas listas en WebFlux, ¿el flujo deja de ser reactivo?",
  options:[
    {label:"Sí, siempre que haya una lista el flujo es bloqueante", explain:"Incorrecto. Una lista puede fluir de forma reactiva si se maneja como Flux; el problema ocurre solo si se bloquea la cadena reactiva."},
    {label:"No, sigue siendo reactivo si se maneja la lista como Flux; solo deja de serlo si llamas a .block() o .collectList().block()", explain:"Correcto. Flux puede emitir múltiples elementos (una lista) de forma reactiva. El problema surge al forzar la materialización con .block()."},
    {label:"No importa cómo se maneje; WebFlux siempre es reactivo sin excepción", explain:"Incorrecto. Si en algún punto de la cadena se llama a código bloqueante (.block(), Thread.sleep(), JDBC), se rompe la reactividad."},
    {label:"Sí, porque Flux no puede manejar colecciones, solo valores únicos", explain:"Incorrecto. Flux está diseñado precisamente para manejar 0 a N elementos, incluyendo colecciones."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Qué anotaciones JPA son fundamentales para mapear una entidad?",
  options:[
    {label:"@SpringBootApplication, @RestController, @Service", explain:"Incorrecto. Esas son anotaciones de Spring Boot para configurar la aplicación y definir beans, no para mapeo JPA."},
    {label:"@Entity, @Table, @Id, @GeneratedValue, @Column, @OneToMany, @ManyToOne", explain:"Correcto. Estas anotaciones definen la entidad, su tabla, clave primaria, generación de ID, columnas y relaciones en JPA."},
    {label:"@Transactional, @Repository, @Query", explain:"Incorrecto. Aunque son útiles en el contexto JPA/Spring Data, no mapean la entidad en sí; son para transacciones y consultas."},
    {label:"@Autowired, @Bean, @Configuration", explain:"Incorrecto. Son anotaciones de inyección de dependencias y configuración de Spring IoC, no de JPA."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Qué criterios definen cuándo crear un índice en una columna de SQL Server?",
  options:[
    {label:"Indexar todas las columnas por defecto para maximizar la velocidad de todas las consultas", explain:"Incorrecto. Indexar todo degrada el rendimiento de INSERT/UPDATE/DELETE y consume espacio innecesario; los índices deben ser selectivos."},
    {label:"Indexar columnas usadas en WHERE y JOIN con alta cardinalidad; evitar columnas de baja selectividad o muy variables", explain:"Correcto. Los índices son más efectivos en columnas con alta cardinalidad (muchos valores distintos) usadas frecuentemente como criterio de filtrado o join."},
    {label:"Solo indexar la clave primaria; las demás columnas no necesitan índices", explain:"Incorrecto. Las FK, columnas de filtrado frecuente y columnas de ordenamiento también se benefician de índices."},
    {label:"Crear índices solo en tablas con más de 1 millón de filas", explain:"Incorrecto. Los índices pueden ser útiles con menos filas dependiendo de la cardinalidad y el patrón de consultas."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Cuál es el lenguaje de consultas estándar en JPA?",
  options:[
    {label:"HQL (Hibernate Query Language)", explain:"Incorrecto. HQL es específico de Hibernate. JPA tiene su propio estándar que es JPQL."},
    {label:"JPQL (Java Persistence Query Language)", explain:"Correcto. JPQL es el lenguaje orientado a objetos de JPA. Opera sobre entidades y sus propiedades, no sobre tablas y columnas directamente."},
    {label:"LINQ (Language Integrated Query)", explain:"Incorrecto. LINQ es de .NET/C#, no de Java."},
    {label:"OQL (Object Query Language)", explain:"Incorrecto. OQL es parte del estándar ODMG para bases de datos orientadas a objetos; no es el lenguaje de JPA."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"Para reducir un flujo SAGA de 30 segundos a 8 segundos, ¿qué estrategias aplicarías?",
  options:[
    {label:"Aumentar el timeout de todos los servicios a 60 segundos", explain:"Incorrecto. Aumentar timeouts no reduce la duración del SAGA; solo enmascara el problema."},
    {label:"Paralelizar pasos independientes, eliminar llamadas síncronas innecesarias, optimizar queries de BD y usar caché", explain:"Correcto. Identificar qué pasos pueden ejecutarse en paralelo, eliminar esperas síncronas evitables, optimizar la capa de datos y cachear resultados estables son las palancas correctas."},
    {label:"Convertir el SAGA de orquestado a coreografiado siempre resuelve el problema de latencia", explain:"Incorrecto. Cambiar el tipo de coordinación puede ayudar en algunos casos pero no garantiza reducir la latencia; lo importante es paralización y optimización de cada paso."},
    {label:"Eliminar el patrón SAGA y reemplazarlo con una sola transacción de base de datos distribuida (XA)", explain:"Incorrecto. Las transacciones XA distribuidas tienen sus propios problemas de latencia y bloqueo, y no son la solución recomendada en microservicios modernos."},
  ], correct:1
},

// ─────────────── BALOTARIO 03 ───────────────
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Qué stack de herramientas es más común para observabilidad completa (métricas + logs + tracing) en microservicios?",
  options:[
    {label:"JUnit + Mockito + JaCoCo", explain:"Incorrecto. Esas son herramientas de testing, no de observabilidad en producción."},
    {label:"Prometheus + Grafana (métricas), ELK Stack (logs), Jaeger/Zipkin (tracing distribuido)", explain:"Correcto. Esta combinación cubre los tres pilares de observabilidad: métricas con Prometheus/Grafana, logs centralizados con ELK, y trazas distribuidas con Jaeger o Zipkin."},
    {label:"Maven + Docker + Kubernetes", explain:"Incorrecto. Son herramientas de build, contenedores y orquestación; no de observabilidad."},
    {label:"Redis + RabbitMQ + Nginx", explain:"Incorrecto. Son caché, mensajería y proxy reverso; no herramientas de observabilidad."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Qué es un Correlation ID y para qué sirve en microservicios?",
  options:[
    {label:"Es un campo de la base de datos para identificar filas duplicadas", explain:"Incorrecto. Un Correlation ID es un concepto de trazabilidad distribuida, no de integridad de datos en BD."},
    {label:"Es un identificador único que se propaga en todos los servicios de una misma petición, permitiendo correlacionar logs y trazas de extremo a extremo", explain:"Correcto. El Correlation ID permite rastrear el camino completo de una petición a través de múltiples microservicios en los logs centralizados."},
    {label:"Es el ID del pod de Kubernetes que procesó la petición", explain:"Incorrecto. Aunque se puede incluir el ID del pod en los logs, el Correlation ID es un token generado para la petición específica, no para el pod."},
    {label:"Es el identificador de sesión HTTP del usuario final", explain:"Incorrecto. El Correlation ID puede existir incluso en comunicaciones sin usuario (batch, eventos), y es interno a la arquitectura de microservicios."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"En Kafka, ¿qué sucede si tienes 3 particiones y escalas a 6 consumidores en el mismo consumer group?",
  options:[
    {label:"Los 6 consumidores se reparten el trabajo equitativamente, procesando media partición cada uno", explain:"Incorrecto. Las particiones no se pueden dividir entre consumidores; cada partición es asignada a un solo consumidor."},
    {label:"3 consumidores quedan activos (uno por partición) y los otros 3 quedan ociosos sin asignación", explain:"Correcto. Kafka asigna como máximo un consumidor por partición dentro de un consumer group. Los consumidores extra quedan inactivos hasta que se añadan más particiones."},
    {label:"Kafka crea automáticamente 3 particiones adicionales para acomodar los nuevos consumidores", explain:"Incorrecto. Kafka no crea particiones automáticamente al escalar consumidores; las particiones deben configurarse explícitamente."},
    {label:"Los 6 consumidores forman dos grupos independientes y cada grupo consume todas las particiones", explain:"Incorrecto. Si están en el mismo consumer group, compiten por las particiones; para que todos consuman todo, deberían estar en grupos distintos."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Qué es el enfoque 'Contract First' (API First) en el diseño de APIs?",
  options:[
    {label:"Implementar primero el backend y luego generar la documentación automáticamente", explain:"Incorrecto. Eso es 'Code First'. Contract First invierte el orden: se define el contrato antes de implementar."},
    {label:"Diseñar y acordar el contrato de la API (OpenAPI/Swagger) antes de implementar, permitiendo desarrollo paralelo de frontend y backend", explain:"Correcto. API First permite que frontend y backend acuerden la interfaz desde el principio, generar SDK automáticamente y desarrollar en paralelo."},
    {label:"Firmar un contrato legal antes de desarrollar una API pública", explain:"Incorrecto. 'Contract' aquí se refiere al contrato técnico (interfaz), no a un documento legal."},
    {label:"Usar contratos de SLA para definir el tiempo de respuesta máximo de una API", explain:"Incorrecto. Los SLA son acuerdos de nivel de servicio; API First es sobre el diseño técnico de la interfaz."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Qué servicio de Azure permite gestionar, publicar y asegurar APIs con rate limiting y versionamiento?",
  options:[
    {label:"Azure Blob Storage", explain:"Incorrecto. Blob Storage es para almacenamiento de objetos; no gestiona APIs."},
    {label:"Azure Kubernetes Service (AKS)", explain:"Incorrecto. AKS es un orquestador de contenedores; aunque puede hospedar APIs, no gestiona el ciclo de vida de las mismas."},
    {label:"Azure API Management (APIM)", explain:"Correcto. APIM es el gateway de APIs de Azure. Permite publicar, versionar, asegurar con OAuth/JWT, aplicar rate limiting y monitorear APIs."},
    {label:"Azure Service Bus", explain:"Incorrecto. Service Bus es un broker de mensajería asincrónica; no gestiona APIs REST."},
  ], correct:2
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Qué es GitOps y cuáles son sus herramientas representativas?",
  options:[
    {label:"Es una estrategia de branching en Git para equipos grandes (como GitFlow)", explain:"Incorrecto. GitFlow es una estrategia de branching; GitOps es una práctica de despliegue de infraestructura basada en Git como fuente de verdad."},
    {label:"Es usar Git como única fuente de verdad para infraestructura, con despliegues automáticos desde el repositorio. Herramientas: ArgoCD, Flux", explain:"Correcto. GitOps trata la infraestructura como código en Git. Cambios en el repositorio desencadenan despliegues automáticos; ArgoCD y Flux son las implementaciones más populares."},
    {label:"Es integrar pipelines de CI/CD directamente dentro de los commits de Git", explain:"Incorrecto. Los pipelines de CI/CD son parte del ecosistema DevOps pero GitOps implica además que el estado deseado del sistema vive en Git y se reconcilia continuamente."},
    {label:"Es el proceso de revisar código en pull requests antes de mergear", explain:"Incorrecto. Eso es una práctica de code review; GitOps es sobre el despliegue de infraestructura y aplicaciones."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"Si un sistema batch con alto volumen empieza a responder lento, ¿qué analizarías primero?",
  options:[
    {label:"Reiniciar los pods de Kubernetes inmediatamente", explain:"Incorrecto. Reiniciar pods es un parche temporal; no diagnostica la causa raíz y puede enmascarar el problema real."},
    {label:"Revisar queries lentas, índices, locks/bloqueos y uso de CPU/memoria en la base de datos", explain:"Correcto. El cuello de botella en sistemas batch suele estar en la capa de datos. Analizar el execution plan, índices y locks es el primer paso antes de escalar recursos."},
    {label:"Aumentar el tamaño de los pods (escalar verticalmente) de inmediato", explain:"Incorrecto. Escalar verticalmente sin diagnóstico puede ser costoso e inefectivo si el problema está en la BD o en queries no optimizadas."},
    {label:"Reducir la frecuencia del batch para aliviar la carga", explain:"Incorrecto. Reducir la frecuencia no resuelve el problema; solo lo pospone y puede causar acumulación de datos."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Qué enfoque usarías para implementar auditoría/logs de forma transversal en todos los microservicios?",
  options:[
    {label:"Copiar y pegar el código de auditoría en cada microservicio manualmente", explain:"Incorrecto. Duplicar código viola DRY, complica el mantenimiento y genera inconsistencias entre servicios."},
    {label:"Programación Orientada a Aspectos (AOP), que permite interceptar métodos para aplicar lógica transversal sin modificar el código de negocio", explain:"Correcto. AOP con Spring (via @Aspect, @Around, etc.) permite agregar auditoría, logging y seguridad de forma declarativa sin contaminar la lógica de negocio."},
    {label:"Crear un microservicio dedicado al que todos los demás envían mensajes de auditoría sincrónicamente", explain:"Incorrecto. Llamadas síncronas a un servicio de auditoría acoplan los microservicios y añaden latencia; un tópico Kafka asincrónico sería mejor."},
    {label:"Usar filtros HTTP a nivel de Nginx para capturar todos los logs", explain:"Incorrecto. Nginx puede capturar logs de acceso pero no puede conocer el contexto de negocio ni los detalles internos de cada operación."},
  ], correct:1
},
{
  cat:"Balotario 03 – Monitoreo / Kafka / Azure / Arquitectura",
  q:"¿Cómo sincronizarías datos entre una base transaccional y una base batch sin usar Kafka?",
  options:[
    {label:"Reescribir todos los datos de la BD transaccional a la batch cada hora con un DELETE + INSERT masivo", explain:"Incorrecto. DELETE + INSERT masivo genera locks, afecta rendimiento y no es near real-time."},
    {label:"CDC (Change Data Capture), replicación nativa o jobs ETL controlados", explain:"Correcto. CDC captura cambios a nivel de log de la BD de forma eficiente. La replicación nativa o jobs ETL son alternativas según la latencia requerida."},
    {label:"Usar una única base de datos compartida para ambos procesos", explain:"Incorrecto. Compartir una BD entre carga transaccional y batch genera contención de recursos, afectando el rendimiento de ambos."},
    {label:"Exponer una API REST en la BD transaccional para que la batch consulte cada 5 segundos", explain:"Incorrecto. Polling frecuente genera carga innecesaria; CDC es mucho más eficiente y menos intrusivo."},
  ], correct:1
},

// ─────────────── BALOTARIO 04 ───────────────
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Cuándo activar un Circuit Breaker y cuáles son sus tres estados?",
  options:[
    {label:"Se activa al primer error; estados: Activo, Inactivo, Roto", explain:"Incorrecto. El Circuit Breaker no se activa con un solo error (eso generaría demasiados falsos positivos) y los estados tienen nombres específicos."},
    {label:"Se activa tras múltiples fallas consecutivas o timeouts frecuentes; estados: Closed (normal), Open (bloquea llamadas), Half-Open (prueba con llamadas limitadas)", explain:"Correcto. El Circuit Breaker sigue el mismo principio que el de electricidad: abre el circuito ante sobrecarga, y periódicamente prueba si el servicio externo se recuperó (Half-Open)."},
    {label:"Se activa solo ante errores 500; estados: Funcionando, Fallido, Recuperado", explain:"Incorrecto. El Circuit Breaker puede activarse por timeouts o alto porcentaje de errores, no solo por errores 500."},
    {label:"Se activa manualmente por el operador de infraestructura; no tiene estados automáticos", explain:"Incorrecto. El Circuit Breaker (Resilience4j, Hystrix) cambia de estado automáticamente según las métricas configuradas."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Qué son los Virtual Threads de Java 21 y qué problema resuelven?",
  options:[
    {label:"Son hilos gestionados por el sistema operativo que reemplazan a los hilos de plataforma", explain:"Incorrecto. Los Virtual Threads son gestionados por la JVM, no por el SO. Los hilos de plataforma (tradicionales) sí son gestionados por el SO."},
    {label:"Son hilos ligeros gestionados por la JVM que permiten miles de ejecuciones concurrentes con bajo costo, resolviendo la limitación de los thread pools tradicionales en escenarios I/O intensivos", explain:"Correcto. Virtual Threads (Project Loom) son muy ligeros (KB vs MB) y gestionados por la JVM, permitiendo escalar a millones de tareas concurrentes sin la complejidad de programación reactiva."},
    {label:"Son procesos separados de la JVM que corren en paralelo real en todos los cores", explain:"Incorrecto. Los Virtual Threads no son procesos separados; son hilos ligeros dentro de la misma JVM."},
    {label:"Son una forma de programación reactiva que reemplaza a Mono y Flux en WebFlux", explain:"Incorrecto. Virtual Threads son un enfoque complementario/alternativo a la programación reactiva para manejar concurrencia I/O, pero no reemplazan directamente a Reactor/WebFlux."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Cuándo preferirías R2DBC sobre JDBC?",
  options:[
    {label:"Cuando trabajas con bases de datos NoSQL exclusivamente", explain:"Incorrecto. R2DBC es para bases de datos relacionales; para NoSQL hay drivers específicos reactivos (ej: MongoDB Reactive Streams)."},
    {label:"Cuando tu aplicación es completamente reactiva (WebFlux), necesitas no bloqueo en la capa de datos y el driver de tu BD soporta R2DBC", explain:"Correcto. R2DBC tiene sentido cuando todo el stack es reactivo. Mezclar R2DBC con una app bloqueante aporta complejidad sin beneficio."},
    {label:"Siempre; R2DBC es superior a JDBC en todos los escenarios", explain:"Incorrecto. Para aplicaciones Spring MVC tradicionales, JDBC/JPA sigue siendo la elección correcta por madurez y soporte del ecosistema."},
    {label:"Cuando necesitas procedimientos almacenados; JDBC no los soporta", explain:"Incorrecto. JDBC tiene soporte nativo para stored procedures via CallableStatement."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Cuál es la diferencia entre hilos tradicionales y Virtual Threads respecto a su uso óptimo?",
  options:[
    {label:"Los hilos tradicionales son mejores para I/O; Virtual Threads para CPU intensivo", explain:"Incorrecto. Es al revés: Virtual Threads brillan en I/O (porque no bloquean el carrier thread) y los hilos tradicionales se usan para CPU intensivo."},
    {label:"Los hilos tradicionales son apropiados para tareas CPU intensivas; Virtual Threads son óptimos para operaciones I/O intensivas (APIs, BD, red)", explain:"Correcto. Virtual Threads liberan el carrier thread mientras esperan I/O, escalando mucho mejor. Para CPU intensivo, el paralelismo real sigue dependiendo de cores y threads de plataforma."},
    {label:"No hay diferencia de rendimiento; es solo una cuestión de preferencia del desarrollador", explain:"Incorrecto. La diferencia es fundamental: Virtual Threads tienen overhead mínimo en I/O wait, mientras que los tradicionales bloquean un thread de OS por operación."},
    {label:"Los Virtual Threads eliminan la necesidad de cualquier tipo de pool en todos los escenarios", explain:"Incorrecto. Para CPU intensivo, los pools de hilos de plataforma siguen siendo la herramienta correcta."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Qué es la Programación Orientada a Aspectos (AOP) y para qué se usa en microservicios?",
  options:[
    {label:"Es un paradigma para diseñar bases de datos relacionales en múltiples aspectos o dimensiones", explain:"Incorrecto. AOP es un paradigma de programación sobre separación de concerns transversales en el código de aplicación."},
    {label:"Permite interceptar y aplicar lógica transversal (logs, auditoría, seguridad) en puntos del código sin modificar la lógica de negocio", explain:"Correcto. AOP con @Aspect en Spring permite definir advice (before, after, around) que se inyectan en join points del código, manteniendo el código de negocio limpio."},
    {label:"Es sinónimo de programación reactiva con Flux y Mono", explain:"Incorrecto. Son paradigmas completamente distintos: AOP trata concerns transversales; la programación reactiva trata flujos asíncronos no bloqueantes."},
    {label:"Es una técnica para dividir un microservicio grande en servicios más pequeños", explain:"Incorrecto. Eso sería el proceso de decomposición de monolitos; AOP opera dentro de un servicio para separar concerns."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Qué significa que una API sea idempotente y por qué es importante en microservicios?",
  options:[
    {label:"Que devuelve siempre el mismo tipo de contenido (JSON/XML)", explain:"Incorrecto. La idempotencia es sobre el efecto de la operación, no sobre el formato de la respuesta."},
    {label:"Que ejecutar la misma operación múltiples veces produce el mismo resultado que ejecutarla una vez, lo cual es crucial para reintentos seguros ante fallos de red", explain:"Correcto. La idempotencia garantiza que los retries no generen efectos duplicados (ej: doble cobro). Es esencial en sistemas distribuidos donde los fallos parciales son inevitables."},
    {label:"Que la API funciona igualmente en todos los idiomas de programación", explain:"Incorrecto. Eso se llama interoperabilidad o compatibilidad cross-language; no tiene relación con idempotencia."},
    {label:"Que la API no requiere autenticación para ser consumida", explain:"Incorrecto. La idempotencia es independiente de los mecanismos de autenticación de la API."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Qué es MicroProfile y para qué sirve?",
  options:[
    {label:"Es el nombre del plan de configuración mínima de memoria para microservices en Kubernetes", explain:"Incorrecto. MicroProfile es una especificación Java, no un plan de recursos de Kubernetes."},
    {label:"Es una especificación estándar de Jakarta EE para microservicios Java, que incluye Config, Fault Tolerance, Metrics y más; compatible con Quarkus y Open Liberty", explain:"Correcto. MicroProfile define APIs estándar para microservicios empresariales en Java, permitiendo portabilidad entre implementaciones como Quarkus, Open Liberty y Payara."},
    {label:"Es un micro-framework JavaScript para frontends de microservicios", explain:"Incorrecto. MicroProfile es 100% del ecosistema Java Enterprise."},
    {label:"Es un plugin de Maven para generar perfiles de rendimiento de aplicaciones Java", explain:"Incorrecto. MicroProfile no es una herramienta de profiling; es una especificación de APIs para microservicios."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Cómo diseñarías un sistema resiliente ante fallas de servicios externos?",
  options:[
    {label:"Incrementar el número de intentos (retries) sin límite hasta que el servicio responda", explain:"Incorrecto. Retries sin límite pueden generar una 'retry storm' que satura el servicio externo y empeora la situación."},
    {label:"Combinando Circuit Breaker, Retry con backoff exponencial, Timeout y Fallback", explain:"Correcto. Estos cuatro patrones se complementan: el timeout evita bloqueos, el retry recupera fallos transitorios, el circuit breaker protege ante fallos sostenidos, y el fallback garantiza una respuesta degradada."},
    {label:"Aumentar el timeout a valores muy altos para esperar la recuperación del servicio", explain:"Incorrecto. Timeouts altos bloquean recursos (hilos/conexiones) durante toda la espera y degradan el sistema."},
    {label:"Deshabilitar la integración con el servicio externo hasta que el equipo lo repare manualmente", explain:"Incorrecto. Deshabilitar manualmente no es escalable ni eficiente; el Circuit Breaker automatiza este comportamiento."},
  ], correct:1
},
{
  cat:"Balotario 04 – Cloud / Circuit Breaker / Threads / SQL",
  q:"¿Por qué es problemático el uso de CachedThreadPool cuando el sistema interactúa con una base de datos?",
  options:[
    {label:"Porque CachedThreadPool no soporta operaciones SQL", explain:"Incorrecto. El problema no es de compatibilidad con SQL; es de gestión de recursos."},
    {label:"Porque CachedThreadPool crea hilos sin límite, pudiendo generar más conexiones a la BD de las que el pool soporta, causando saturación y bloqueos", explain:"Correcto. CachedThreadPool puede escalar a miles de hilos bajo carga, saturando el pool de conexiones de BD (ej: HikariCP con 20 conexiones) y provocando timeouts en cadena."},
    {label:"Porque CachedThreadPool es más lento que FixedThreadPool en todos los casos", explain:"Incorrecto. CachedThreadPool puede ser más rápido en cargas variables, pero el problema es que no tiene cota máxima de hilos."},
    {label:"Porque CachedThreadPool no es compatible con Java 17+", explain:"Incorrecto. CachedThreadPool sigue siendo parte de java.util.concurrent en todas las versiones de Java."},
  ], correct:1
},

// ─────────────── BALOTARIO 05 ───────────────
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Cuáles son los problemas más comunes en programación concurrente?",
  options:[
    {label:"Memory leaks, NullPointerException, StackOverflow", explain:"Incorrecto. Esos son bugs generales de programación; no son específicos ni representativos de los problemas de concurrencia."},
    {label:"Race conditions, Deadlocks, Starvation y Livelock", explain:"Correcto. Estos cuatro son los problemas clásicos de concurrencia: condiciones de carrera (datos inconsistentes), deadlocks (bloqueo mutuo), inanición (un hilo nunca avanza) y livelock (hilos activos pero sin progreso)."},
    {label:"SQL Injection, XSS y CSRF", explain:"Incorrecto. Esos son problemas de seguridad de aplicaciones web, no de concurrencia."},
    {label:"Fragmentación de heap, GC pressure y classloader leaks", explain:"Incorrecto. Son problemas de gestión de memoria de la JVM, relacionados pero distintos a los problemas de concurrencia."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Qué modificadores o mecanismos de Java garantizan visibilidad y consistencia en código concurrente?",
  options:[
    {label:"public, private, protected", explain:"Incorrecto. Esos son modificadores de acceso (encapsulamiento), no tienen relación con la sincronización entre hilos."},
    {label:"volatile (visibilidad entre hilos), synchronized (exclusión mutua) y final (inmutabilidad)", explain:"Correcto. volatile garantiza que las escrituras son visibles para todos los hilos. synchronized provee exclusión mutua. final crea objetos inmutables que son inherentemente seguros en entornos concurrentes."},
    {label:"static, abstract y transient", explain:"Incorrecto. Son modificadores de clase/campo con otros propósitos; transient es para serialización."},
    {label:"@Override, @Deprecated y @SuppressWarnings", explain:"Incorrecto. Son anotaciones de metadatos del compilador; no afectan la concurrencia."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Es posible tener una única transacción atómica entre dos bases de datos independientes en un sistema distribuido?",
  options:[
    {label:"Sí, con Spring @Transactional se puede abarcar múltiples bases de datos automáticamente", explain:"Incorrecto. @Transactional de Spring gestiona transacciones en un único DataSource; para múltiples BD se requieren mecanismos adicionales."},
    {label:"No directamente. La opción estándar son XA Transactions (poco recomendadas por bloqueos) o el patrón SAGA (recomendado)", explain:"Correcto. XA Transactions son un estándar para transacciones distribuidas pero generan bloqueos y reducen disponibilidad. SAGA es el enfoque moderno con transacciones compensatorias."},
    {label:"Sí, con Kafka se puede coordinar una transacción entre dos bases de datos sin problemas", explain:"Incorrecto. Kafka no provee atomicidad entre dos bases de datos; es un bus de mensajes. SAGA puede usar Kafka, pero la atomicidad es eventual, no estricta."},
    {label:"Sí, basta con usar el mismo usuario de BD para ambas bases en la misma conexión JDBC", explain:"Incorrecto. Compartir usuario de BD no garantiza atomicidad entre bases de datos independientes."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Las claves foráneas (FK) generan automáticamente índices en SQL Server?",
  options:[
    {label:"Sí, SQL Server crea índices automáticamente en todas las FK al igual que en las PK", explain:"Incorrecto. SQL Server crea el índice clustered en la PK automáticamente, pero NO crea índices en las FK. Debes crearlos manualmente."},
    {label:"Las PK sí generan índice clustered automáticamente; las FK no generan índice automáticamente y deben crearse manualmente si se necesitan", explain:"Correcto. Es un error común asumir que las FK tienen índice. Sin índice en FK, los JOINs y validaciones de integridad referencial pueden hacer full table scans."},
    {label:"Ni las PK ni las FK generan índices automáticamente en SQL Server", explain:"Incorrecto. Las PK sí crean un índice clustered (o non-clustered si se especifica) automáticamente al definirlas."},
    {label:"Las FK generan índices solo si la tabla tiene más de 1000 filas", explain:"Incorrecto. SQL Server no aplica ninguna heurística de tamaño para crear índices en FK; simplemente no los crea automáticamente."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Cuál es la configuración ideal de particiones y réplicas en Kafka para un topic de pagos?",
  options:[
    {label:"1 partición y 1 réplica para máxima velocidad", explain:"Incorrecto. 1 réplica no tiene alta disponibilidad; si el broker falla, se pierden mensajes. 1 partición limita el paralelismo."},
    {label:"Particiones ≥ número de consumidores esperados, y 2-3 réplicas para alta disponibilidad", explain:"Correcto. Tener al menos tantas particiones como consumidores garantiza que todos puedan trabajar en paralelo. Las réplicas (2-3) garantizan que no se pierdan mensajes ante falla de un broker."},
    {label:"100 particiones siempre para máximo paralelismo sin importar el volumen", explain:"Incorrecto. Demasiadas particiones generan overhead de coordinación en Kafka y en ZooKeeper/KRaft; las particiones deben dimensionarse según el volumen real."},
    {label:"Las réplicas no son necesarias si tienes backups de la base de datos", explain:"Incorrecto. Los backups de BD no protegen contra la pérdida de mensajes en Kafka que aún no han sido consumidos y procesados."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"En programación reactiva, ¿por qué no es recomendable modificar variables compartidas (ej: contadores) dentro de un flujo Flux?",
  options:[
    {label:"Porque Flux no permite código con efectos secundarios dentro de sus operadores", explain:"Incorrecto. Flux permite efectos secundarios (via doOnNext, etc.) pero eso no significa que sea una buena práctica con estado compartido mutable."},
    {label:"Porque rompe la inmutabilidad del flujo y puede causar race conditions al ejecutarse en múltiples hilos del scheduler reactivo", explain:"Correcto. Los operadores reactivos pueden ejecutarse en distintos hilos. Modificar un contador compartido sin sincronización rompe la semántica funcional y causa condiciones de carrera."},
    {label:"Porque Flux es solo para operaciones de lectura; para escritura se usa Mono", explain:"Incorrecto. Flux puede modelar tanto lectura como escritura; el problema es la mutabilidad compartida, no el tipo reactivo."},
    {label:"No es un problema; los Schedulers de Reactor garantizan sincronización automática", explain:"Incorrecto. Los Schedulers gestionan qué hilo ejecuta cada operación, pero no sincronizan automáticamente el acceso a estado mutable externo."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Qué es el problema N+1 en ORM y cómo se evita?",
  options:[
    {label:"Es cuando una tabla tiene N+1 columnas más de las necesarias; se resuelve normalizando", explain:"Incorrecto. El problema N+1 es de consultas SQL generadas, no de diseño de esquema."},
    {label:"Es cuando una consulta principal genera N consultas adicionales (una por entidad relacionada); se evita con JOIN FETCH, estrategias de carga apropiadas y proyecciones/DTOs", explain:"Correcto. Por ejemplo, cargar 100 pedidos con lazy loading y luego acceder a sus clientes genera 1+100 queries. JOIN FETCH o @EntityGraph lo resuelve con una sola query."},
    {label:"Es un error de compilación cuando se declaran N+1 relaciones @OneToMany en una entidad", explain:"Incorrecto. JPA permite múltiples relaciones sin generar errores de compilación."},
    {label:"Es un problema de Kubernetes al escalar de N a N+1 pods", explain:"Incorrecto. El problema N+1 en ORM es específico de cómo Hibernate/JPA genera consultas SQL al navegar relaciones lazy."},
  ], correct:1
},
{
  cat:"Balotario 05 – Concurrencia / BD Distribuida / Performance",
  q:"¿Por qué escalar horizontalmente (más pods) no siempre resuelve un problema de rendimiento?",
  options:[
    {label:"Porque Kubernetes tiene un límite máximo de 10 pods por deployment", explain:"Incorrecto. Kubernetes no tiene ese límite; los deployments pueden escalar a cientos de pods dependiendo de los recursos del cluster."},
    {label:"Porque si el cuello de botella está en la BD (locks, queries lentas), más pods aumentan la presión sobre la BD y empeoran el problema", explain:"Correcto. Más pods generan más conexiones y más queries a la BD. Si la BD es el cuello, el escalado horizontal empeora la situación hasta que se resuelva la causa raíz."},
    {label:"Porque el escalado horizontal siempre es más caro que optimizar el código", explain:"Incorrecto. El costo es secundario; el punto es que el escalado horizontal no resuelve problemas en capas que no se escalan (como una BD relacional sin réplicas de lectura)."},
    {label:"Porque los microservicios stateless no pueden escalarse horizontalmente", explain:"Incorrecto. Los microservicios stateless están diseñados precisamente para el escalado horizontal."},
  ], correct:1
},

// ─────────────── SENIOR BACKEND SECTION ───────────────
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cómo se define correctamente el CPU request y CPU limit de un pod en Kubernetes?",
  options:[
    {label:"Request y limit deben ser siempre iguales para garantizar rendimiento predecible", explain:"Incorrecto. Tener request = limit (Guaranteed QoS) puede desperdiciar capacidad del cluster. Es válido pero no obligatorio ni siempre óptimo."},
    {label:"Request cercano al consumo promedio estable; limit mayor para absorber picos pero controlado, validado con pruebas de carga", explain:"Correcto. Request define lo que el scheduler reserva; limit define el máximo. Un limit muy bajo causa CPU throttling; muy alto oculta ineficiencias. Las métricas guían los valores correctos."},
    {label:"Siempre asignar el máximo de CPU disponible para garantizar que el pod nunca sea limitado", explain:"Incorrecto. Asignar todo el CPU disponible a todos los pods impide que otros pods del nodo tengan recursos; Kubernetes no podría programar el nodo eficientemente."},
    {label:"No definir limits de CPU; solo requests son necesarios para el scheduler", explain:"Incorrecto. Sin límites, un pod puede consumir toda la CPU del nodo y afectar a otros pods; los limits son importantes para la estabilidad del cluster."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Qué es CPU Throttling en Kubernetes y por qué es importante detectarlo?",
  options:[
    {label:"Es cuando un pod se reinicia automáticamente por falta de CPU", explain:"Incorrecto. El reinicio automático ocurre por OOMKilled (falta de memoria) o por liveness probe failures; el throttling no reinicia pods."},
    {label:"Es la limitación del uso de CPU cuando un contenedor supera su limit, causando aumento de latencia y reducción de throughput sin que el pod se reinicie", explain:"Correcto. El throttling es silencioso y difícil de detectar sin métricas. Un pod bajo throttling sigue 'funcionando' pero con latencia incrementada; puede enmascararse como problema de la aplicación."},
    {label:"Es el mecanismo de escalado automático de CPU en contenedores Linux", explain:"Incorrecto. El escalado automático de pods es HPA; el throttling es una limitación, no un mecanismo de escalado."},
    {label:"Es un error de configuración que impide que el pod arranque", explain:"Incorrecto. El throttling ocurre en pods que están corriendo y procesando requests; no impide el arranque."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cuál es la diferencia entre Index Seek e Index Scan en SQL Server y cuál es más eficiente?",
  options:[
    {label:"Son sinónimos; el optimizador los usa indistintamente", explain:"Incorrecto. Son operaciones distintas con costos muy diferentes; el query optimizer elige entre ellas según la selectividad del predicado."},
    {label:"Index Seek va directamente a los registros relevantes (eficiente); Index Scan recorre gran parte del índice (costoso). Diseñar queries orientadas a Seek es la mejor práctica", explain:"Correcto. Un Seek usa el B-tree del índice para navegar directo al dato (bajo I/O). Un Scan recorre páginas del índice de forma secuencial (alto I/O). Ejemplo: WHERE YEAR(fecha)=2025 fuerza Scan; WHERE fecha BETWEEN '...' permite Seek."},
    {label:"Index Scan siempre es más rápido porque lee datos en orden físico", explain:"Incorrecto. La lectura secuencial puede ser ventajosa para grandes rangos, pero en general Seek es más eficiente al acceder a un subconjunto específico."},
    {label:"Index Seek solo funciona con índices clustered; Scan con non-clustered", explain:"Incorrecto. Tanto Seek como Scan pueden ocurrir en índices clustered y non-clustered, dependiendo del predicado de la consulta."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cómo alineas el tamaño del thread pool con la capacidad de conexiones de la base de datos?",
  options:[
    {label:"El thread pool debe ser siempre el mayor posible para maximizar la concurrencia", explain:"Incorrecto. Un thread pool mayor que las conexiones disponibles genera contención; los hilos extras esperarán conexiones, aumentando latencia."},
    {label:"El número de hilos debe ser ≤ al número de conexiones disponibles del pool de BD (ej: pool 20 conexiones → thread pool máx 20-25)", explain:"Correcto. Si tienes más hilos que conexiones, los hilos sobrantes esperan conexiones disponibles, generando cola y latencia. La regla práctica es hilos ≈ conexiones del pool."},
    {label:"Son independientes; el pool de hilos y el pool de conexiones no se relacionan", explain:"Incorrecto. Cada hilo que interactúa con la BD necesita una conexión. Si hay más hilos que conexiones, se genera contención en el pool de BD."},
    {label:"Siempre usar CachedThreadPool con HikariCP para máxima flexibilidad", explain:"Incorrecto. CachedThreadPool crece sin límite y puede generar más hilos que conexiones disponibles, saturando HikariCP."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cuándo usarías ORM (JPA) y cuándo JDBC puro en un sistema con BD principal y réplica?",
  options:[
    {label:"Siempre ORM para todo; JDBC es obsoleto en aplicaciones modernas", explain:"Incorrecto. JDBC sigue siendo muy relevante para consultas complejas, reportería y escenarios donde el overhead del ORM es inaceptable."},
    {label:"ORM para operaciones OLTP transaccionales (simplicidad y mantenibilidad); JDBC/SQL nativo para la réplica/reportería (control del execution plan, queries complejas, mayor rendimiento)", explain:"Correcto. Este enfoque híbrido aprovecha la productividad del ORM donde importa la mantenibilidad y usa JDBC donde importa el control y el rendimiento."},
    {label:"JDBC siempre; el ORM genera demasiado overhead que no se puede tolerar en producción", explain:"Incorrecto. El overhead del ORM es manejable en OLTP estándar; rechazarlo categóricamente reduce la productividad sin justificación."},
    {label:"ORM para la réplica y JDBC para la BD principal, porque la réplica solo es de lectura", explain:"Incorrecto. La réplica de lectura es precisamente donde las consultas complejas/analíticas se benefician del control de SQL nativo, no del ORM."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Qué métricas combinadas son más adecuadas para configurar el autoscaling de un microservicio?",
  options:[
    {label:"Solo CPU utilization; es la métrica más representativa del estado del servicio", explain:"Incorrecto. En servicios I/O bound, la CPU puede estar baja mientras el servicio está saturado por conexiones de BD o latencia de servicios externos."},
    {label:"Combinación de CPU, memoria, latencia (p95/p99), RPS/TPS, errores y conexiones a BD según el tipo de carga del servicio", explain:"Correcto. CPU sola engaña en servicios I/O bound. La latencia y el error rate reflejan mejor la experiencia real del usuario; las conexiones a BD evitan escalar más allá de la capacidad de la BD."},
    {label:"Solo el número de requests por segundo (RPS); es la métrica más directa de carga", explain:"Incorrecto. RPS no indica si el servicio está respondiendo bien; puede haber alto RPS con baja latencia o alto RPS con saturación total."},
    {label:"Solo la memoria; si el pod usa mucha memoria está bajo carga", explain:"Incorrecto. La memoria no indica carga de procesamiento; puede ser alta por caché interna sin que el servicio esté saturado."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cuál es el beneficio principal del enfoque híbrido (ORM + JDBC) en un sistema con múltiples bases de datos?",
  options:[
    {label:"Reduce el número de líneas de código en un 50%", explain:"Incorrecto. El beneficio no es reducción mecánica de código; es usar cada herramienta donde aporta más valor."},
    {label:"Combina la productividad y mantenibilidad del ORM para OLTP con el control y rendimiento del SQL nativo para reportería/consultas complejas, sin comprometer ninguno de los dos", explain:"Correcto. ORM reduce boilerplate y gestiona relaciones para operaciones transaccionales. JDBC/SQL nativo da control total del execution plan para queries analíticas pesadas."},
    {label:"Permite usar la misma entidad JPA tanto en la BD principal como en la réplica sin cambios", explain:"Incorrecto. Las entidades JPA pueden usarse en ambas BD, pero eso no es la razón del enfoque híbrido."},
    {label:"Es el único enfoque compatible con Quarkus; Spring Boot no lo soporta", explain:"Incorrecto. Tanto Quarkus como Spring Boot soportan el uso mixto de ORM y JDBC nativo."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cómo defines el número de réplicas de un microservicio transaccional sin que la BD sea el cuello de botella?",
  options:[
    {label:"Réplicas = núcleos de CPU disponibles en el nodo", explain:"Incorrecto. El dimensionamiento de réplicas no se basa en CPUs del nodo sino en la capacidad de la BD y el patrón de carga."},
    {label:"Réplicas × conexiones por pod ≤ capacidad total de conexiones de la BD; más allá de este límite, escalar pods aumenta la contención en la BD", explain:"Correcto. Esta es la regla clave: si cada pod tiene 10 conexiones al pool y la BD acepta 100, el máximo efectivo es 10 pods. Agregar más pods solo genera esperas de conexión."},
    {label:"Siempre 3 réplicas; es el estándar de la industria para alta disponibilidad", explain:"Incorrecto. 3 réplicas es una buena práctica para HA pero no garantiza que sea el número correcto para el throughput requerido; depende de la carga y la capacidad de la BD."},
    {label:"El número de réplicas no importa si se usa HPA; él ajusta automáticamente al valor óptimo", explain:"Incorrecto. HPA escala según métricas configuradas, pero si no se modela la restricción de la BD, puede escalar más allá del punto óptimo y degradar el sistema."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Qué herramientas se usan para pruebas de rendimiento de microservicios y qué tipos de pruebas aplicas?",
  options:[
    {label:"JUnit y Mockito; se ejecutan en CI/CD para medir rendimiento", explain:"Incorrecto. JUnit y Mockito son para unit/integration tests funcionales; no generan carga de rendimiento real."},
    {label:"JMeter, k6, Gatling; con pruebas de carga (load), stress, spike y soak para medir latencia p95/p99, throughput y error rate", explain:"Correcto. Cada tipo de prueba valida un escenario distinto: load test valida la carga esperada, stress test encuentra el límite, spike simula picos repentinos, soak detecta memory leaks bajo carga sostenida."},
    {label:"Solo SonarQube; analiza la complejidad del código y predice problemas de rendimiento", explain:"Incorrecto. SonarQube es análisis estático de código (calidad, seguridad); no ejecuta pruebas de carga."},
    {label:"Postman en modo bulk; envía 1000 requests y reporta el tiempo promedio", explain:"Incorrecto. Postman puede hacer pruebas básicas de rendimiento pero no es una herramienta especializada para pruebas de carga a escala."},
  ], correct:1
},
{
  cat:"Senior – Performance & Cloud",
  q:"¿Cuál es la diferencia entre Kafka Streams y Kafka Connect?",
  options:[
    {label:"Kafka Streams consume mensajes; Kafka Connect los produce", explain:"Incorrecto. Ambos pueden producir y consumir; la diferencia es su propósito, no el rol de productor/consumidor."},
    {label:"Kafka Streams es para procesamiento y transformación de eventos en tiempo real; Kafka Connect es para integración con sistemas externos (BD, filesystems, servicios)", explain:"Correcto. Streams provee una API para crear topologías de procesamiento de streams. Connect provee conectores out-of-the-box para leer/escribir en fuentes externas sin código personalizado."},
    {label:"Son lo mismo; 'Streams' y 'Connect' son nombres alternativos del mismo componente", explain:"Incorrecto. Son componentes completamente distintos del ecosistema Kafka con APIs, configuraciones y casos de uso diferentes."},
    {label:"Kafka Connect requiere ZooKeeper; Kafka Streams no", explain:"Incorrecto. La dependencia de ZooKeeper/KRaft es a nivel de broker de Kafka, no de Streams o Connect específicamente."},
  ], correct:1
},


// ─────────────── BALOTARIO 06 – Experiencia Senior ───────────────
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué característica importante introdujo Java 21 que no estaba disponible en Java 17?",
  options:[
    {label:"Records y Sealed Classes", explain:"Incorrecto. Records llegaron en Java 16 y Sealed Classes se estabilizaron en Java 17; no son novedades de Java 21."},
    {label:"Streams API y Lambdas", explain:"Incorrecto. Streams y Lambdas son características de Java 8, introducidas hace más de una década."},
    {label:"Virtual Threads, Structured Concurrency y Scoped Values", explain:"Correcto. Java 21 (LTS) introdujo Virtual Threads (Project Loom) para concurrencia masiva con bajo overhead, Structured Concurrency para organizar tareas concurrentes, y Scoped Values como alternativa moderna a ThreadLocal."},
    {label:"HttpClient moderno y mejoras en String API", explain:"Incorrecto. El HttpClient moderno llegó con Java 11 y las mejoras en String API también son de versiones anteriores."},
  ], correct:2
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuál es la principal razón por la que Spring Boot es tan relevante en arquitecturas de microservicios?",
  options:[
    {label:"Porque incluye su propio servidor de base de datos embebido", explain:"Incorrecto. Spring Boot puede incluir H2 embebido para testing, pero no es su principal aporte; su valor es la auto-configuración y el ecosistema."},
    {label:"Porque simplifica el desarrollo con auto-configuración, starters, IoC Container y fácil integración con Kafka, Redis, OAuth2 y Kubernetes", explain:"Correcto. Spring Boot elimina la complejidad de configuración XML, proporciona starters para integrar tecnologías rápidamente y su IoC Container facilita el desacoplamiento de componentes en microservicios."},
    {label:"Porque es el único framework compatible con Java 17+", explain:"Incorrecto. Quarkus, Micronaut y otros frameworks también son compatibles con Java 17+; Spring Boot no tiene exclusividad."},
    {label:"Porque reemplaza completamente a Docker y Kubernetes en el despliegue", explain:"Incorrecto. Spring Boot es un framework de aplicación; Docker y Kubernetes son tecnologías de contenedores y orquestación independientes."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"En un flujo de pagos, ¿cómo difiere la experiencia del usuario entre un enfoque bloqueante y uno no bloqueante?",
  options:[
    {label:"No hay diferencia; ambos enfoques entregan el mismo tiempo de respuesta al usuario", explain:"Incorrecto. Hay una diferencia significativa en experiencia: el modelo no bloqueante puede devolver respuesta inmediata mientras procesa en segundo plano."},
    {label:"El bloqueante es siempre más rápido porque no tiene overhead de callbacks", explain:"Incorrecto. El bloqueante puede ser más simple para casos de bajo tráfico, pero bajo alta concurrencia se satura porque cada petición retiene un hilo."},
    {label:"Bloqueante: el usuario espera todo el ciclo completo (validación, persistencia, confirmación); no bloqueante: el sistema devuelve un ID de operación de inmediato y procesa asíncronamente", explain:"Correcto. El modelo no bloqueante mejora la experiencia devolviendo respuesta rápida mientras el procesamiento pesado ocurre en background, liberando el hilo para atender otras peticiones."},
    {label:"No bloqueante es solo útil para operaciones de lectura; para pagos siempre se usa bloqueante", explain:"Incorrecto. El modelo no bloqueante aplica también a escrituras; en pagos se puede devolver un identificador de transacción y confirmar el resultado vía webhook o polling."},
  ], correct:2
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuándo es más adecuado usar Spring WebFlux en lugar de Spring MVC?",
  options:[
    {label:"Siempre; WebFlux es superior a MVC en todos los escenarios", explain:"Incorrecto. WebFlux añade complejidad de programación reactiva; para APIs simples con baja concurrencia, Spring MVC es perfectamente válido y más sencillo de mantener."},
    {label:"Cuando hay muchas llamadas concurrentes, I/O intensivo, múltiples integraciones externas y se requiere alta escalabilidad con bajo consumo de threads", explain:"Correcto. WebFlux brilla en escenarios de alta concurrencia I/O bound: BFFs, API Gateways, servicios que orquestan múltiples llamadas externas. Donde el modelo de un-hilo-por-petición se convierte en cuello de botella."},
    {label:"Solo cuando se usa Kotlin; con Java es mejor seguir usando Spring MVC", explain:"Incorrecto. WebFlux funciona perfectamente con Java y con Kotlin; el lenguaje no determina el stack web."},
    {label:"Cuando la aplicación necesita acceso a bases de datos NoSQL exclusivamente", explain:"Incorrecto. La elección de WebFlux no depende del tipo de base de datos; hay drivers reactivos tanto para SQL (R2DBC) como para NoSQL (MongoDB Reactive)."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"Al migrar un BFF de Spring MVC a WebFlux reemplazando RestTemplate con WebClient, ¿cuáles son los beneficios observables en producción?",
  options:[
    {label:"Solo se reduce el tamaño del JAR desplegado", explain:"Incorrecto. El tamaño del artefacto no es la mejora principal ni relevante en esta migración."},
    {label:"Mejor aprovechamiento de recursos, mayor concurrencia, menor consumo de threads y menor latencia bajo carga", explain:"Correcto. WebClient usa el modelo event-loop no bloqueante de Netty. Bajo alta carga, se eliminan los problemas de saturación de thread pools que sufre RestTemplate (bloqueante)."},
    {label:"Se eliminan todos los errores HTTP 500 automáticamente", explain:"Incorrecto. El modelo reactivo no elimina errores de negocio; mejora el rendimiento pero los errores de lógica siguen existiendo."},
    {label:"No hay diferencia observable; el cambio es solo cosmético en el código", explain:"Incorrecto. La diferencia es fundamental: bajo carga alta, WebClient permite procesar muchas más peticiones concurrentes con la misma infraestructura."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué valores de timeout son razonables para configurar en un microservicio según las buenas prácticas?",
  options:[
    {label:"Connection: 3-5s, Read: 10-30s, Write: ~10s; complementados con retry controlado, Circuit Breaker y fallback", explain:"Correcto. Los valores dependen del SLA del proveedor, pero estos rangos son representativos. Lo clave es combinarlos con patrones de resiliencia para evitar degradaciones en cadena."},
    {label:"Todos los timeouts deben ser de 60 segundos para garantizar que las respuestas lentas lleguen", explain:"Incorrecto. Timeouts tan altos bloquean hilos/recursos durante toda la espera y pueden derribar el sistema bajo carga moderada."},
    {label:"No configurar timeouts; dejar que el sistema operativo maneje los cortes de conexión", explain:"Incorrecto. Sin timeouts explícitos, una dependencia lenta puede bloquear hilos indefinidamente, agotando el pool y generando fallos en cascada."},
    {label:"Connection: 60s, Read: 5ms, Write: 5ms para respuestas ultrarrápidas", explain:"Incorrecto. Un read timeout de 5ms provocaría timeouts en prácticamente todas las operaciones reales de red; los valores deben basarse en métricas de latencia observadas."},
  ], correct:0
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Por qué WebClient reemplaza a RestTemplate en aplicaciones modernas con Spring?",
  options:[
    {label:"Porque RestTemplate no soporta JSON y WebClient sí", explain:"Incorrecto. RestTemplate tiene soporte completo para JSON via HttpMessageConverter; esa no es la razón del cambio."},
    {label:"Porque RestTemplate solo funciona con HTTP/1.1 y WebClient con HTTP/2", explain:"Incorrecto. El protocolo HTTP no es la razón principal del cambio; ambos pueden operar sobre HTTP/1.1 y HTTP/2 con las dependencias correctas."},
    {label:"Porque RestTemplate es bloqueante y está en mantenimiento; WebClient es no bloqueante, compatible con WebFlux, y soporta retry reactivo, backpressure y timeouts reactivos", explain:"Correcto. Spring marcó RestTemplate como en mantenimiento (sin nuevas features). WebClient es el cliente HTTP moderno para arquitecturas reactivas y también puede usarse en aplicaciones Spring MVC."},
    {label:"Porque WebClient tiene mejor soporte para SOAP que RestTemplate", explain:"Incorrecto. WebClient está orientado a APIs REST/HTTP modernas; para SOAP existen otras herramientas como Spring-WS."},
  ], correct:2
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuál es el principal beneficio de la Arquitectura Hexagonal (Ports & Adapters) en microservicios?",
  options:[
    {label:"Reduce el número de clases Java necesarias en el proyecto", explain:"Incorrecto. La Arquitectura Hexagonal suele aumentar el número de clases por la separación de capas; el beneficio es de diseño, no de cantidad de código."},
    {label:"Permite separar el Dominio de la Infraestructura mediante puertos y adaptadores, facilitando testing, mantenibilidad y reemplazo de tecnologías sin afectar la lógica de negocio", explain:"Correcto. Al aislar el dominio de frameworks, bases de datos y servicios externos, es posible cambiar la persistencia o el protocolo de comunicación sin tocar las reglas de negocio."},
    {label:"Garantiza que el microservicio nunca falle en producción", explain:"Incorrecto. Ninguna arquitectura garantiza cero fallos; la Hexagonal mejora la mantenibilidad y testabilidad, no la disponibilidad per se."},
    {label:"Es obligatoria para usar Spring Boot con Kubernetes", explain:"Incorrecto. Spring Boot y Kubernetes son agnósticos de la arquitectura interna del microservicio; puedes usar MVC en capas, CQRS, hexagonal, etc."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué patrón de resiliencia evita que el fallo de un servicio externo cause fallos en cascada en todo el sistema?",
  options:[
    {label:"Builder Pattern", explain:"Incorrecto. Builder es un patrón de creación de objetos; no tiene relación con resiliencia de servicios."},
    {label:"Circuit Breaker (implementado con Resilience4j), complementado con Retry, Timeout, Bulkhead y Fallback", explain:"Correcto. El Circuit Breaker detecta fallos sostenidos y abre el circuito para no seguir llamando al servicio caído. El Bulkhead aísla recursos. El Fallback devuelve respuesta alternativa. Juntos previenen el efecto dominó."},
    {label:"Singleton Pattern", explain:"Incorrecto. Singleton es un patrón creacional que garantiza una única instancia de una clase; no gestiona resiliencia entre servicios."},
    {label:"Strategy Pattern", explain:"Incorrecto. Strategy permite intercambiar algoritmos; no gestiona fallos de servicios externos."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué componentes de Kafka se deben configurar para garantizar seguridad en un entorno empresarial?",
  options:[
    {label:"Solo encriptar el disco duro del servidor Kafka", explain:"Incorrecto. El cifrado de disco protege datos en reposo, pero no protege la comunicación ni la autenticación de clientes."},
    {label:"SASL para autenticación, API Keys para acceso y Schema Registry para validar contratos de mensajes", explain:"Correcto. SASL (ej: SASL/SCRAM o SASL/OAUTHBEARER) autentica productores/consumidores. Las API Keys controlan el acceso. Schema Registry valida que los mensajes cumplan el contrato definido."},
    {label:"Usar solo consumer groups sin autenticación; los grupos ya aíslan los mensajes", explain:"Incorrecto. Los consumer groups son para distribución de carga, no para seguridad; sin autenticación cualquier cliente podría conectarse al broker."},
    {label:"Configurar TLS solo para el Zookeeper, no para los brokers", explain:"Incorrecto. TLS debe configurarse en los brokers para cifrar la comunicación cliente-broker; Zookeeper también debe asegurarse pero no es el único punto."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué ocurre en Kafka cuando hay más particiones que consumidores en un consumer group?",
  options:[
    {label:"Kafka rechaza los mensajes de las particiones sin consumidor asignado", explain:"Incorrecto. Kafka no rechaza mensajes; los almacena en las particiones hasta que sean consumidos o expiren según la política de retención."},
    {label:"Algunos consumidores reciben mensajes de más de una partición, distribuyendo la carga equitativamente", explain:"Correcto. Si hay 6 particiones y 3 consumidores, cada consumidor recibe mensajes de 2 particiones. Kafka balancea la asignación dentro del consumer group."},
    {label:"Kafka crea automáticamente más consumidores hasta igualar el número de particiones", explain:"Incorrecto. Kafka no gestiona la creación de instancias de consumidores; eso es responsabilidad de la aplicación o del orquestador (Kubernetes)."},
    {label:"Las particiones sin consumidor asignado se eliminan automáticamente", explain:"Incorrecto. Las particiones son configuración del topic y no se eliminan por falta de consumidores activos."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Por qué es recomendable deshabilitar el auto-register en Schema Registry en entornos productivos?",
  options:[
    {label:"Porque Schema Registry no soporta auto-register en versiones modernas de Kafka", explain:"Incorrecto. Schema Registry sí soporta auto-register; la decisión de deshabilitarlo es una práctica de gobernanza, no una limitación técnica."},
    {label:"Para evitar que productores registren esquemas no validados automáticamente, garantizando que cada cambio pase por un proceso de revisión y aprobación que proteja a los consumidores", explain:"Correcto. Con auto-register habilitado, cualquier producer podría registrar un esquema incompatible accidentalmente. Deshabilitarlo exige que los cambios se gestionen de forma controlada."},
    {label:"Porque deshabilitar auto-register mejora el rendimiento de Kafka en un 50%", explain:"Incorrecto. La configuración de auto-register no tiene impacto significativo en el rendimiento del broker o del schema registry."},
    {label:"Porque Schema Registry solo soporta JSON cuando auto-register está deshabilitado", explain:"Incorrecto. Schema Registry soporta Avro, JSON Schema y Protobuf independientemente de la configuración de auto-register."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿En qué escenario tiene sentido usar R2DBC con SQL Server?",
  options:[
    {label:"Cuando se necesita ejecutar stored procedures complejos con múltiples result sets; R2DBC los maneja mejor que JDBC", explain:"Incorrecto. R2DBC tiene soporte limitado para stored procedures complejos; JDBC es más maduro en ese aspecto."},
    {label:"Cuando la aplicación es completamente reactiva (WebFlux), se requiere no bloqueo en la capa de persistencia y SQL Server tiene driver R2DBC disponible", explain:"Correcto. R2DBC completa el stack reactivo end-to-end. Mezclarlo con una app bloqueante añade complejidad sin beneficio; tiene sentido solo cuando todo el pipeline es reactivo."},
    {label:"Siempre que se use SQL Server; R2DBC es el driver oficial recomendado por Microsoft", explain:"Incorrecto. Microsoft recomienda JDBC para la mayoría de aplicaciones; R2DBC es para casos reactivos específicos."},
    {label:"Solo cuando la base de datos tiene más de 100 millones de registros", explain:"Incorrecto. El tamaño de la base de datos no determina si usar R2DBC; el criterio es el modelo de concurrencia de la aplicación."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Para qué sirven las Readiness Probes en Kubernetes y qué sucede cuando fallan?",
  options:[
    {label:"Verifican si la aplicación sigue viva; si fallan, Kubernetes reinicia el pod", explain:"Incorrecto. Esa es la descripción de la Liveness Probe. La Readiness es diferente en propósito y consecuencia."},
    {label:"Verifican si el servicio está listo para recibir tráfico; si fallan, el pod se saca del load balancer sin reiniciarse, dejando de recibir nuevos requests hasta que se recupere", explain:"Correcto. La Readiness Probe protege a los usuarios de peticiones que llegarían a un pod que aún está iniciando, conectando dependencias o en un estado temporalmente degradado."},
    {label:"Miden el uso de CPU del contenedor para activar HPA", explain:"Incorrecto. HPA usa métricas de CPU/memoria del metrics-server, no las probes de salud."},
    {label:"Verifican la conectividad de red entre pods en distintos namespaces", explain:"Incorrecto. Las probes verifican el estado de la aplicación dentro del pod; la conectividad entre pods es responsabilidad de las Network Policies y el CNI."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuál es la diferencia entre Liveness Probe y Readiness Probe en Kubernetes?",
  options:[
    {label:"Son lo mismo; Kubernetes usa cualquiera de los dos indistintamente", explain:"Incorrecto. Tienen propósitos y consecuencias distintas; confundirlos puede causar reinicios innecesarios o tráfico a pods no disponibles."},
    {label:"Liveness verifica si la app sigue viva (fallo → reinicia el pod); Readiness verifica si está lista para tráfico (fallo → saca el pod del load balancer sin reiniciarlo)", explain:"Correcto. Liveness resuelve pods en estado zombie que no responden. Readiness gestiona el arranque gradual y degradaciones temporales sin perder el pod."},
    {label:"Liveness es para bases de datos; Readiness es para servicios HTTP", explain:"Incorrecto. Ambas probes aplican a cualquier tipo de contenedor; no están restringidas por el tipo de tecnología que usa la app."},
    {label:"Readiness reinicia el pod; Liveness solo lo marca como no disponible", explain:"Incorrecto. Es al revés: Liveness puede provocar el reinicio del pod; Readiness solo lo excluye del tráfico."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuál es el flujo típico de un pipeline CI/CD en un proyecto de microservicios Java?",
  options:[
    {label:"Deploy → Testing → Build → Compilación", explain:"Incorrecto. El orden está invertido; no se puede desplegar antes de compilar y testear."},
    {label:"Compilación → Testing → Quality Gates (SonarQube) → Build del artefacto → Deploy a Kubernetes", explain:"Correcto. Este flujo garantiza que solo el código que pasa calidad y pruebas llega a producción. SonarQube valida coverage, bugs y vulnerabilidades antes de generar el artefacto final."},
    {label:"Deploy → Quality Gates → Compilación → Testing", explain:"Incorrecto. Desplegar antes de compilar y pasar quality gates es una práctica insegura que llevaría código con errores a producción."},
    {label:"Testing → Deploy → Compilación → Quality Gates", explain:"Incorrecto. No se puede testear código sin compilarlo primero, y el deploy debe ser el último paso del pipeline."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué métrica mínima de cobertura de código se suele establecer como Quality Gate en SonarQube?",
  options:[
    {label:"10%; con más tests el desarrollo se vuelve demasiado lento", explain:"Incorrecto. Un 10% de cobertura es insuficiente para detectar regresiones; deja la mayoría del código sin ninguna validación automatizada."},
    {label:"100%; todo el código debe estar cubierto por tests", explain:"Incorrecto. El 100% es teóricamente ideal pero imprácticamente costoso; se prioriza cubrir la lógica de negocio crítica sobre código trivial (getters, etc.)."},
    {label:"80% como mínimo, enfocando los tests en lógica de negocio crítica, reduciendo bugs y mejorando la mantenibilidad", explain:"Correcto. El 80% es el estándar industrial más común. Combinado con Code Smells, vulnerabilidades y revisión de duplicación, permite asegurar calidad sin paralizar el desarrollo."},
    {label:"La cobertura no importa; SonarQube solo evalúa vulnerabilidades de seguridad", explain:"Incorrecto. SonarQube evalúa múltiples dimensiones: coverage, bugs, code smells, vulnerabilidades, duplicación y maintainability."},
  ], correct:2
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuándo es preferible usar Trunk Based Development sobre GitFlow?",
  options:[
    {label:"Cuando el proyecto tiene un solo desarrollador", explain:"Incorrecto. El tamaño del equipo no es el criterio principal; la cadencia de releases y la madurez del equipo son más determinantes."},
    {label:"Cuando se requiere CI/CD moderno con integración continua frecuente, deploys rápidos y menor complejidad de ramas", explain:"Correcto. Trunk Based Development integra cambios en la rama principal frecuentemente, reduciendo los merge conflicts de ramas de larga vida y habilitando deploys continuos. GitFlow es más adecuado para ciclos de release bien definidos."},
    {label:"Solo cuando se usa Kubernetes; con servidores tradicionales se usa GitFlow siempre", explain:"Incorrecto. La estrategia de branching es independiente de la infraestructura de despliegue."},
    {label:"Trunk Based Development no es recomendable para proyectos enterprise porque no soporta hotfixes", explain:"Incorrecto. Trunk Based Development soporta hotfixes mediante feature flags y releases controladas; es ampliamente usado en empresas tech de alto rendimiento."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué comando de kubectl usarías para diagnosticar por qué un pod está fallando en producción?",
  options:[
    {label:"kubectl delete pod y luego observar si vuelve a fallar", explain:"Incorrecto. Eliminar el pod sin diagnóstico destruye la evidencia del error y no revela la causa raíz."},
    {label:"kubectl logs <pod> para ver los logs y kubectl describe pod <pod> para ver eventos y estado del contenedor", explain:"Correcto. kubectl logs muestra el output de la aplicación (incluyendo stack traces). kubectl describe muestra eventos de Kubernetes como OOMKilled, CrashLoopBackOff, fallos de probe, etc."},
    {label:"kubectl top pods únicamente; muestra todos los errores del pod", explain:"Incorrecto. kubectl top pods muestra uso de CPU y memoria en tiempo real, no logs de errores ni eventos de ciclo de vida del pod."},
    {label:"kubectl apply -f deployment.yaml para redeployer y el error se corrige automáticamente", explain:"Incorrecto. Redeployar sin diagnóstico no resuelve la causa raíz; el pod seguirá fallando por el mismo motivo."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué métricas puede usar HPA (Horizontal Pod Autoscaler) para escalar pods automáticamente?",
  options:[
    {label:"Solo el número de réplicas mínimas configuradas en el Deployment", explain:"Incorrecto. El número de réplicas mínimas es la configuración base de HPA, no una métrica de escalado."},
    {label:"CPU, memoria y métricas custom (ej: requests por segundo, longitud de cola), permitiendo escalar según la carga real del servicio", explain:"Correcto. HPA escala según métricas del metrics-server (CPU, memoria) o métricas externas/custom via la Custom Metrics API, lo que permite escalar basándose en indicadores de negocio más representativos."},
    {label:"Solo CPU; memoria y métricas custom no están soportadas en HPA", explain:"Incorrecto. HPA ha soportado memoria y métricas custom desde Kubernetes 1.6+ via la API de métricas."},
    {label:"Solo el tiempo de respuesta HTTP de los pods", explain:"Incorrecto. HPA no tiene acceso directo a métricas HTTP por defecto; para latencia se necesita configuración adicional con métricas custom del API server."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuándo usarías el flujo 'Client Credentials' de OAuth2 y cuándo 'Authorization Code'?",
  options:[
    {label:"Client Credentials para usuarios humanos; Authorization Code para comunicación entre máquinas", explain:"Incorrecto. Es exactamente al revés de lo que corresponde a cada flujo."},
    {label:"Client Credentials para comunicación máquina a máquina (APIs internas, microservicios); Authorization Code cuando hay un usuario humano que debe autenticarse en nombre propio", explain:"Correcto. Client Credentials es ideal para integración M2M donde no hay usuario involucrado. Authorization Code es para aplicaciones que actúan en nombre del usuario final, con redirect y consentimiento."},
    {label:"Ambos flujos son equivalentes; se elige por preferencia del equipo", explain:"Incorrecto. Tienen propósitos y mecanismos completamente distintos; elegir el incorrecto puede generar vulnerabilidades de seguridad."},
    {label:"Authorization Code solo se usa con aplicaciones móviles; Client Credentials con APIs web", explain:"Incorrecto. Authorization Code puede usarse en web, móvil y SPA (con PKCE). La distinción es si hay usuario humano, no el tipo de cliente."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Para qué casos de uso es más valioso usar Redis en un microservicio?",
  options:[
    {label:"Como base de datos principal para datos transaccionales críticos y operaciones de pago", explain:"Incorrecto. Redis es excelente como caché y almacenamiento en memoria, pero como base de datos principal para datos transaccionales críticos se prefieren BD relacionales con durabilidad garantizada."},
    {label:"Como caché distribuido para reducir latencia y carga en la BD, almacenamiento de sesiones reactivas y datos de alta lectura que cambian poco", explain:"Correcto. Redis brilla en caché (latencia sub-milisegundo), sesiones distribuidas (acceso desde múltiples pods), rate limiting y colas ligeras. Reduce drásticamente la presión sobre la BD principal."},
    {label:"Solo para almacenar logs de la aplicación en producción", explain:"Incorrecto. Redis no está diseñado para logging; para eso se usan herramientas como ELK Stack o Loki."},
    {label:"Como reemplazo de Kafka para streaming de eventos de alto volumen", explain:"Incorrecto. Redis Streams puede manejar eventos ligeros, pero no reemplaza Kafka para streaming de alto volumen con retención, replayability y consumer groups avanzados."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué herramientas forman un stack de observabilidad completo y qué mide cada una?",
  options:[
    {label:"JUnit + Mockito + JaCoCo; miden cobertura de código en producción", explain:"Incorrecto. Son herramientas de testing en tiempo de desarrollo; no monitorizan servicios en producción."},
    {label:"Prometheus (scraping de métricas), Grafana (dashboards), Micrometer (instrumentación Java) y tracing distribuido (Zipkin/Jaeger/OpenTelemetry)", explain:"Correcto. Prometheus recopila métricas temporales. Grafana las visualiza. Micrometer expone métricas de la JVM y Spring en formato Prometheus. El tracing distribuido conecta la latencia entre microservicios."},
    {label:"Docker + Kubernetes + Helm; monitorizan el ciclo de vida de los contenedores", explain:"Incorrecto. Son herramientas de despliegue y orquestación; la observabilidad requiere instrumentación de la aplicación y herramientas especializadas."},
    {label:"SonarQube + Checkstyle + PMD; analizan métricas de latencia en tiempo real", explain:"Incorrecto. Son herramientas de análisis estático de código en tiempo de build; no analizan métricas de runtime."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Qué ventaja específica aporta el tracing distribuido frente al logging centralizado?",
  options:[
    {label:"El tracing distribuido reemplaza completamente a los logs; son mutuamente excluyentes", explain:"Incorrecto. Son complementarios: los logs dan detalle de cada servicio; el tracing da visibilidad del flujo completo entre servicios."},
    {label:"Permite seguir una transacción completa a través de múltiples microservicios, identificando exactamente en qué servicio y en qué operación ocurre la latencia o el fallo", explain:"Correcto. Con Correlation IDs y spans, el tracing muestra el árbol de llamadas completo: qué servicio llamó a cuál, cuánto tardó cada paso, y dónde ocurrió el error en un flujo distribuido."},
    {label:"Solo sirve para medir el uso de CPU de cada microservicio individualmente", explain:"Incorrecto. Eso lo mide Prometheus; el tracing distribuido modela las relaciones causales entre servicios en una transacción."},
    {label:"Reemplaza la necesidad de un Circuit Breaker en arquitecturas resilientes", explain:"Incorrecto. El tracing distribuido es observabilidad (ver qué pasa); el Circuit Breaker es resiliencia (actuar cuando algo falla). Son capas complementarias."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuáles son las ventajas del procesamiento en chunks de Spring Batch frente a procesar registros uno a uno?",
  options:[
    {label:"El procesamiento chunk es más lento pero más seguro para datos financieros", explain:"Incorrecto. El procesamiento chunk es más eficiente en memoria y velocidad; la seguridad de datos no depende del tamaño del chunk."},
    {label:"Procesa N registros por transacción, reduciendo el número de commits, mejorando la memoria, habilitando retry/skip por chunk y permitiendo restart desde el último checkpoint", explain:"Correcto. Con chunks de ej: 100 registros, se hacen 10.000 commits en lugar de 1M. Si falla el chunk 500, el job puede reiniciarse desde ahí. El retry permite reintentar chunks con errores transitorios."},
    {label:"Los chunks son solo para procesar archivos CSV; para bases de datos se deben procesar registros uno a uno", explain:"Incorrecto. Spring Batch soporta chunks con cualquier ItemReader (JDBC, JPA, archivo, Kafka, etc.); no está limitado a CSV."},
    {label:"El procesamiento chunk no soporta rollback; por eso se usa solo para operaciones de lectura", explain:"Incorrecto. Spring Batch tiene soporte transaccional completo para chunks; si un chunk falla, la transacción se revierte y se aplica la política de retry o skip configurada."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿En qué escenario aplicarías el patrón Strategy en un microservicio de pagos?",
  options:[
    {label:"Para garantizar que solo exista una instancia del procesador de pagos en la JVM", explain:"Incorrecto. Eso describe el patrón Singleton, no Strategy."},
    {label:"Para encapsular distintos algoritmos de validación de pago (tarjeta, transferencia, billetera digital) intercambiables en tiempo de ejecución sin modificar el código cliente", explain:"Correcto. Strategy permite definir una familia de algoritmos y seleccionar el apropiado dinámicamente. En pagos, cada canal (tarjeta, BACS, wallet) tiene su propia lógica de validación que se puede intercambiar sin condicionales."},
    {label:"Para construir objetos complejos de solicitud de pago paso a paso con validaciones encadenadas", explain:"Incorrecto. Eso describe el patrón Builder, que construye objetos complejos de forma fluida."},
    {label:"Para notificar a múltiples sistemas cuando se completa un pago exitosamente", explain:"Incorrecto. Eso describe el patrón Observer/Event, donde múltiples suscriptores reaccionan a un evento."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Por qué es importante el Code Review como parte del proceso de aseguramiento de calidad?",
  options:[
    {label:"Solo sirve para detectar errores de sintaxis que el compilador no detecta", explain:"Incorrecto. El compilador detecta errores de sintaxis; el Code Review aporta valor en lógica, legibilidad, seguridad, patrones y transferencia de conocimiento."},
