{cat:"Spring MVC / REST",
q:"¿Qué hace @PathVariable vs @RequestParam vs @RequestBody y cuál es correcto para cada caso?",
code:`// Casos de uso:
// A: GET /cuentas/12345
// B: GET /cuentas?estado=ACTIVA&tipo=AHORRO
// C: POST /transferencias  (con JSON en el body)`,
options:[
  {label:"@RequestParam para A (identificadores en URL), @PathVariable para B (filtros), @RequestBody para C",explain:"Incorrecto. Los roles están invertidos. Los identificadores de recurso van en el path, los filtros como query params."},
  {label:"@PathVariable para A (extrae {id} del path de la URL), @RequestParam para B (extrae ?estado= y ?tipo= del query string), @RequestBody para C (deserializa el JSON del body de la petición en un objeto Java)",explain:"Correcto. La semántica REST: identificadores de recursos en el path (/cuentas/{id}), parámetros de filtrado/búsqueda como query params (?estado=ACTIVA), y datos de la operación en el body (JSON de transferencia). Mezclarlos viola las convenciones REST."},
  {label:"@RequestBody se usa tanto para POST como para GET cuando se necesitan filtros complejos",explain:"Incorrecto. Las peticiones GET no deben tener body según la especificación HTTP (aunque técnicamente es posible). Para filtros complejos en GET se usan @RequestParam múltiples o se define un endpoint POST específico para búsquedas."},
  {label:"Los tres son equivalentes; Spring decide automáticamente cómo mapear los datos según el tipo del parámetro",explain:"Incorrecto. Spring no decide automáticamente. Cada anotación indica explícitamente de dónde tomar el dato: path, query string, o body."},
], correct:1},

{cat:"Spring MVC / REST",
q:"¿Qué es ResponseEntity<T> y cuándo usarlo en lugar de retornar el objeto directamente?",
code:`// Opción A:
@GetMapping("/{id}")
public Cuenta getCuenta(@PathVariable Long id) {
    return service.findById(id);
}

// Opción B:
@GetMapping("/{id}")
public ResponseEntity<Cuenta> getCuenta(@PathVariable Long id) {
    return ResponseEntity.ok(service.findById(id));
}`,
options:[
  {label:"ResponseEntity es siempre obligatorio; retornar el objeto directamente no es válido en Spring MVC",explain:"Incorrecto. Retornar el objeto directamente es válido. Spring lo serializa con HTTP 200 automáticamente. ResponseEntity añade control adicional."},
  {label:"ResponseEntity<T> da control total sobre el status HTTP, headers y body. Úsalo cuando: necesitas status distinto de 200 (201 Created con Location header, 204 No Content), necesitas añadir headers personalizados (X-Request-ID), o el status depende de la lógica (200 si existe, 404 si no)",explain:"Correcto. Para un GET simple que siempre retorna 200, Opción A es más concisa y válida. Para un POST que crea un recurso, ResponseEntity.created(location).body(recurso) retorna 201 con el header Location. La elección depende de si necesitas control sobre el response HTTP."},
  {label:"ResponseEntity es más eficiente porque evita la serialización automática de Spring MVC",explain:"Incorrecto. ResponseEntity no cambia el mecanismo de serialización. Jackson serializa el objeto T de ResponseEntity exactamente igual que un objeto retornado directamente."},
  {label:"Opción A es deprecada desde Spring Boot 3; siempre usar ResponseEntity",explain:"Incorrecto. Retornar el objeto directamente sigue siendo válido en Spring Boot 3. Es una cuestión de estilo y requisitos, no de deprecación."},
], correct:1},

// ══════════ SPRING DATA JPA ══════════
{cat:"Spring Data JPA",
q:"¿Qué es el problema N+1 en JPA y cuáles son las dos formas más directas de resolverlo?",
code:`// Con FetchType.LAZY (default en @OneToMany):
List<Cliente> clientes = repo.findAll(); // 1 query
for (Cliente c : clientes) {
    c.getCuentas().size(); // +1 query POR CADA cliente
}`,
options:[
  {label:"El problema no existe si se usa Spring Data JPA; Spring optimiza automáticamente las queries",explain:"Incorrecto. Spring Data JPA no resuelve N+1 automáticamente. El problema ocurre cuando el ORM hace lazy loading de relaciones dentro de un loop."},
  {label:"Para N clientes: 1 query de clientes + N queries de cuentas. Solución 1: JOIN FETCH en JPQL: 'SELECT c FROM Cliente c JOIN FETCH c.cuentas'. Solución 2: @EntityGraph en el método del repositorio para especificar qué relaciones cargar eagerly solo en esa consulta",explain:"Correcto. JOIN FETCH genera un SQL JOIN que trae todo en una query. @EntityGraph es declarativo y reutilizable. Ambos evitan el problema sin cambiar el mapping global de la entidad a EAGER (que siempre cargaría todo aunque no se necesite)."},
  {label:"Se resuelve cambiando la anotación @OneToMany a FetchType.EAGER; así Hibernate siempre precarga las cuentas",explain:"Incorrecto. EAGER es peor: carga siempre todas las cuentas aunque no se necesiten. Un findAll() de clientes cargaría todas las cuentas de todos los clientes en cada consulta, aunque solo quieras los nombres."},
  {label:"Usar @BatchSize(size=100) resuelve completamente el N+1 convirtiéndolo en 1 sola query",explain:"Incorrecto. @BatchSize reduce el N+1 a N/size queries (batches), no a 1 query. Con 1000 clientes y @BatchSize(100) serían ~10 queries, mejor que 1000 pero no óptimo como JOIN FETCH."},
], correct:1},

{cat:"Spring Data JPA",
q:"¿Cuándo usar un método derivado de Spring Data JPA vs @Query, y cuándo usar proyecciones?",
options:[
  {label:"Métodos derivados son siempre preferibles; @Query es una feature legacy que debería evitarse",explain:"Incorrecto. Los métodos derivados tienen un límite de legibilidad y complejidad. @Query es perfectamente válido y a menudo más claro para consultas complejas."},
  {label:"Método derivado: para queries simples de 1-3 condiciones (findByEstadoAndTipo). @Query: para queries complejas, joins, subselects o cuando el nombre del método sería ilegible. Proyecciones (interfaces o records): cuando solo necesitas un subconjunto de campos para evitar cargar entidades completas innecesariamente",explain:"Correcto. Ejemplo de proyección: interface CuentaResumen { String getNumeroCuenta(); BigDecimal getSaldo(); } y el repositorio retorna List<CuentaResumen>. Spring genera una query que solo selecciona esas dos columnas, sin cargar la entidad completa con todos sus campos y relaciones."},
  {label:"Proyecciones son solo para compatibilidad con versiones antiguas de Spring; en Spring Boot 3 se deben usar Records directamente",explain:"Incorrecto. Las proyecciones basadas en interfaces siguen siendo válidas. Spring Boot 3 también soporta proyecciones con Records como alternativa más concisa, pero no reemplaza a las de interface."},
  {label:"@Query solo soporta JPQL; para SQL nativo hay que usar JdbcTemplate obligatoriamente",explain:"Incorrecto. @Query soporta tanto JPQL como SQL nativo con el atributo nativeQuery=true: @Query(value='SELECT * FROM cuentas WHERE estado = :estado', nativeQuery = true)."},
], correct:1},

{cat:"Spring Data JPA",
q:"¿Qué son los estados de una entidad JPA (Transient, Managed, Detached, Removed) y cuál es el bug más común relacionado?",
options:[
  {label:"JPA solo tiene dos estados: persistido y no persistido; los otros son conceptos teóricos",explain:"Incorrecto. Los cuatro estados tienen comportamientos concretos y distintos en el EntityManager."},
  {label:"Transient: nuevo objeto sin contexto JPA. Managed: dentro de una sesión activa; cambios se sincronizan automáticamente al hacer flush. Detached: la sesión cerró; cambios no se persisten. Removed: marcado para DELETE. Bug común: acceder a relaciones lazy en estado Detached lanza LazyInitializationException",explain:"Correcto. El bug típico: cargar una entidad con @OneToMany lazy dentro de @Transactional, cerrar la transacción (fin del método), y luego en la vista/controller intentar entity.getLista(). La sesión ya cerró, la entidad está Detached, y Hibernate no puede cargar la colección lazy."},
  {label:"El estado Detached significa que la entidad fue eliminada de la base de datos",explain:"Incorrecto. Detached significa que la entidad existió en el EntityManager pero ya no está asociada a ninguna sesión activa. La entidad sigue existiendo en la BD; solo que los cambios que hagas no se rastrean ni persisten automáticamente."},
  {label:"Managed y Detached son los únicos estados relevantes; Transient y Removed se manejan automáticamente sin que el desarrollador deba conocerlos",explain:"Incorrecto. Transient es relevante cuando creas un nuevo objeto y llamas persist(). Removed es relevante cuando llamas remove() y un rollback podría restaurar la entidad. Ambos estados tienen implicaciones prácticas."},
], correct:1},

{cat:"Spring Data JPA",
q:"¿Qué hace spring.jpa.open-in-view=true (que Spring Boot habilita por defecto) y por qué es un problema en producción?",
options:[
  {label:"Mejora el rendimiento manteniendo la conexión a BD abierta para reutilizarse entre requests",explain:"Incorrecto. Es exactamente lo contrario: mantiene la sesión JPA abierta durante todo el request HTTP, lo que puede degradar el rendimiento bajo carga."},
  {label:"Mantiene la sesión JPA abierta durante todo el ciclo HTTP request-response (incluyendo el rendering de la vista), permitiendo lazy loading en la capa de presentación. Problema: retiene una conexión del pool durante todo el request (incluyendo serialización JSON), reduciendo la disponibilidad del pool bajo carga",explain:"Correcto. Con open-in-view=true, si tienes un pool de 20 conexiones y 20 requests concurrentes en fase de serialización JSON (sin BD), todas las conexiones están ocupadas y los nuevos requests esperan. Spring Boot 2.0 añadió una advertencia en los logs cuando está habilitado. La solución correcta es cargar todo lo que necesitas dentro de la @Transactional y deshabilitar open-in-view."},
  {label:"open-in-view=true hace que cada operación JPA cree una nueva conexión a BD en lugar de usar el pool",explain:"Incorrecto. El pool de conexiones (HikariCP) siempre gestiona las conexiones. open-in-view controla cuánto tiempo se mantiene abierta la sesión JPA (y por ende la conexión del pool)."},
  {label:"Es una configuración de seguridad que previene ataques de inyección SQL; no tiene relación con rendimiento",explain:"Incorrecto. La seguridad frente a SQL injection se maneja con PreparedStatements y parámetros vinculados. open-in-view es exclusivamente una configuración de gestión del ciclo de vida de la sesión JPA."},
], correct:1},

// ══════════ SPRING SECURITY ══════════
{cat:"Spring Security",
q:"¿Cuál es la diferencia entre autenticación y autorización, y cómo Spring Security implementa cada una?",
options:[
  {label:"Son lo mismo: verificar si el usuario puede acceder al sistema",explain:"Incorrecto. Son dos pasos distintos y secuenciales en la seguridad de aplicaciones."},
  {label:"Autenticación: verificar quién es el usuario (¿es quien dice ser?). Autorización: verificar qué puede hacer (¿tiene permiso para esta operación?). Spring Security: autenticación via filtros (JwtAuthenticationFilter valida el token), autorización via @PreAuthorize('hasRole(\"GERENTE\")') o SecurityFilterChain con .authorizeHttpRequests()",explain:"Correcto. En banca: autenticación verifica que el token JWT sea válido y pertenezca a un usuario real del BCP. Autorización verifica que ese usuario tenga el rol OPERADOR_TRANSFERENCIAS para ejecutar una transferencia mayor a S/ 50.000. Ambos pueden fallar independientemente."},
  {label:"Spring Security hace autenticación automáticamente; la autorización siempre se implementa manualmente con if/else en el código de negocio",explain:"Incorrecto. Spring Security gestiona ambas. @PreAuthorize y las reglas en SecurityFilterChain manejan autorización declarativamente sin if/else en el código de negocio."},
  {label:"JWT maneja autenticación y autorización; Spring Security solo es necesario para aplicaciones con formulario de login",explain:"Incorrecto. JWT es un formato de token. Spring Security proporciona los filtros, el contexto de seguridad, y los mecanismos de autorización que procesan y validan ese token."},
], correct:1},

{cat:"Spring Security",
q:"¿Qué es el SecurityContext en Spring Security y por qué es importante entender su ciclo de vida en un microservicio?",
options:[
  {label:"Es una tabla de base de datos donde se almacenan los permisos de cada usuario",explain:"Incorrecto. SecurityContext es un objeto en memoria que almacena el estado de autenticación del usuario para el request actual."},
  {label:"SecurityContext almacena el Authentication (usuario + roles) del request actual, guardado en SecurityContextHolder via ThreadLocal. Importante: al final de cada request debe limpiarse (Spring Security lo hace automáticamente). En microservicios asíncronos con @Async, el SecurityContext del thread principal NO se propaga automáticamente al thread del pool",explain:"Correcto. Si un método @Async llama a SecurityContextHolder.getContext().getAuthentication() espera encontrar el usuario del request original, pero el thread del pool no tiene ese contexto. Solución: configurar SecurityContextHolder.setStrategyName(MODE_INHERITABLETHREADLOCAL) o propagar manualmente el contexto con DelegatingSecurityContextRunnable."},
  {label:"SecurityContext es global para toda la aplicación; todos los threads comparten el mismo contexto de seguridad",explain:"Incorrecto. SecurityContext usa ThreadLocal por defecto: cada thread tiene su propio contexto independiente. Por eso el problema con @Async."},
  {label:"SecurityContext se reinicia en cada request automáticamente; no hay riesgo de contaminación entre requests",explain:"Incorrecto en el contexto de threads asíncronos. En el thread principal del request sí se limpia al final. En threads de @Async o CompletableFuture, el SecurityContext NO está disponible a menos que se configure explícitamente."},
], correct:1},

{cat:"Spring Security",
q:"¿Cuál es la diferencia entre @PreAuthorize y .authorizeHttpRequests() en SecurityFilterChain, y cuándo usar cada uno?",
options:[
  {label:"Son equivalentes; usar cualquiera es indistinto",explain:"Incorrecto. Operan en niveles distintos y tienen diferentes capacidades expresivas."},
  {label:"authorizeHttpRequests(): configuración basada en patrones de URL en el SecurityFilterChain, evaluada antes de llegar al Controller. @PreAuthorize: anotación en el método del Controller o Service, puede usar SpEL complejo (ej: hasRole('GERENTE') and #monto < 100000) para lógica de autorización basada en parámetros",explain:"Correcto. authorizeHttpRequests es bueno para reglas URL-level genéricas (todos los endpoints /admin/** requieren ROLE_ADMIN). @PreAuthorize es mejor cuando la autorización depende de los parámetros del método (el usuario solo puede ver sus propias cuentas: @PreAuthorize(\"#clienteId == authentication.principal.id\"))."},
  {label:"@PreAuthorize solo funciona con JWT; para OAuth2 se debe usar authorizeHttpRequests",explain:"Incorrecto. @PreAuthorize es agnóstico al mecanismo de autenticación. Funciona con JWT, OAuth2, LDAP, etc., siempre que el SecurityContext tenga el Authentication poblado."},
  {label:".authorizeHttpRequests() fue deprecated en Spring Security 6; usar solo @PreAuthorize",explain:"Incorrecto. authorizeHttpRequests() sigue siendo válido y recomendado en Spring Security 6 (es la forma moderna reemplazando a authorizeRequests() que sí fue deprecated)."},
], correct:1},

// ══════════ CONFIGURACIÓN & PROPERTIES ══════════
{cat:"Configuración & Properties",
q:"¿Cuál es la diferencia entre @Value y @ConfigurationProperties, y cuándo usar cada uno?",
code:`// Opción A: @Value
@Value("\${banco.transferencia.limite-diario}")
private BigDecimal limiteDiario;

// Opción B: @ConfigurationProperties
@ConfigurationProperties(prefix = "banco.transferencia")
public class TransferenciaConfig {
    private BigDecimal limiteDiario;
    private int maxIntentos;
    private Duration timeout;
}`,
options:[
  {label:"@Value es más moderno y siempre preferible; @ConfigurationProperties es legacy de Spring 2.x",explain:"Incorrecto. @ConfigurationProperties es la forma recomendada para grupos de propiedades relacionadas en Spring Boot moderno."},
  {label:"@Value inyecta una propiedad individual con SpEL o expresión. @ConfigurationProperties mapea un grupo de propiedades con el mismo prefijo a una clase tipada, con binding automático, validación con @Validated y mejor soporte en IDEs (autocompletado en application.yml)",explain:"Correcto. Para una propiedad suelta, @Value es conveniente. Para 5+ propiedades relacionadas (límites, timeouts, configuración de un cliente externo), @ConfigurationProperties agrupa todo en una clase cohesiva. El IDE puede sugerir autocomplete y el binding soporta tipos complejos (Duration, List, Map) sin conversiones manuales."},
  {label:"@ConfigurationProperties solo funciona con archivos .properties; para .yml se usa @Value",explain:"Incorrecto. Ambos soportan tanto .properties como .yml. @ConfigurationProperties tiene mejor binding para tipos complejos en YAML (listas, mapas anidados)."},
  {label:"@Value con SpEL puede acceder a beans de Spring; @ConfigurationProperties no puede",explain:"Incorrecto. @ConfigurationProperties no usa SpEL pero tampoco necesita hacerlo. Para lógica compleja, la clase @ConfigurationProperties puede tener métodos que computan valores derivados."},
], correct:1},

{cat:"Configuración & Properties",
q:"¿Cómo funciona el orden de precedencia de propiedades en Spring Boot y para qué sirven los perfiles?",
options:[
  {label:"application.properties siempre tiene la mayor prioridad; las variables de entorno no pueden sobrescribirlo",explain:"Incorrecto. Las variables de entorno y los argumentos de línea de comandos tienen mayor prioridad que application.properties."},
  {label:"Orden (mayor a menor prioridad): argumentos de línea de comandos > variables de entorno > application-{perfil}.properties > application.properties. Los perfiles (dev, staging, prod) permiten tener configuraciones distintas por ambiente sin cambiar el código; spring.profiles.active=prod activa application-prod.properties",explain:"Correcto. En banca: application-prod.properties tiene la URL de BD de producción, límites reales y seguridad completa. application-dev.properties usa BD local y límites relajados. Las variables de entorno en el servidor de producción pueden sobrescribir propiedades sensibles (passwords) sin meterlos en el repositorio."},
  {label:"Los perfiles de Spring son equivalentes a los profiles de Maven; se activan durante el build",explain:"Incorrecto. Los perfiles de Spring Boot son de runtime (se activan al arrancar la aplicación). Los profiles de Maven son de build time (afectan qué dependencias incluir). Son mecanismos distintos aunque relacionados."},
  {label:"application-prod.properties sobrescribe siempre a application.properties; no hay forma de que application.properties tenga mayor prioridad",explain:"Incorrecto. application-{perfil}.properties sobrescribe solo las propiedades que define. Las propiedades no definidas en el perfil se heredan de application.properties."},
], correct:1},

// ══════════ TESTING ══════════
{cat:"Testing en Spring Boot",
q:"¿Cuál es la diferencia entre @SpringBootTest, @WebMvcTest y @DataJpaTest, y cuándo usar cada uno?",
options:[
  {label:"Son equivalentes; la elección es de preferencia personal del equipo",explain:"Incorrecto. Cargan contextos Spring de diferente alcance y tienen impactos muy distintos en velocidad y cobertura."},
  {label:"@SpringBootTest: carga el contexto completo (lento, para tests de integración end-to-end). @WebMvcTest: solo la capa web (Controllers, filtros, security) sin capa de servicio ni BD (rápido, para testear endpoints REST). @DataJpaTest: solo la capa JPA con BD embebida H2 (para testear repositorios y queries)",explain:"Correcto. En banca: @WebMvcTest para verificar que el endpoint /transferencias retorna 422 ante saldo insuficiente (usando @MockBean para el servicio). @DataJpaTest para verificar que findByClienteIdAndEstado genera el SQL correcto. @SpringBootTest para el test de integración completo del flujo de pago."},
  {label:"@WebMvcTest carga el contexto completo incluyendo BD; es el más completo de los tres",explain:"Incorrecto. @WebMvcTest es un slice test que carga solo la capa web. No incluye @Service, @Repository ni conectividad real a BD."},
  {label:"@DataJpaTest siempre usa la BD de producción para garantizar que los tests son realistas",explain:"Incorrecto. @DataJpaTest usa H2 en memoria por defecto para aislamiento y velocidad. Se puede configurar para usar la BD real, pero el default es H2."},
], correct:1},

{cat:"Testing en Spring Boot",
q:"¿Cuál es la diferencia entre @Mock y @MockBean, y qué bug ocurre si usas @MockBean en tests unitarios?",
options:[
  {label:"@MockBean es siempre la opción correcta; @Mock es una feature antigua de JUnit 4",explain:"Incorrecto. @Mock es de Mockito (independiente de JUnit) y sigue siendo la opción correcta para tests unitarios rápidos."},
  {label:"@Mock (Mockito): crea un mock sin contexto Spring, para tests unitarios rápidos con @InjectMocks. @MockBean: registra el mock en el ApplicationContext de Spring, reemplazando el bean real. Bug de @MockBean en tests unitarios: provoca la carga innecesaria del contexto Spring, haciendo el test 10-100x más lento sin necesidad",explain:"Correcto. @Mock + @InjectMocks es el patrón para tests unitarios: new TransferService(mockRepo) o @InjectMocks, sin levantar Spring. @MockBean es para @SpringBootTest o @WebMvcTest donde necesitas que el mock esté en el contexto Spring. Usar @MockBean en tests sin @SpringBootTest no tiene sentido y agrega overhead."},
  {label:"@MockBean funciona sin Spring Boot; se puede usar en cualquier test de JUnit",explain:"Incorrecto. @MockBean es parte de spring-boot-test y requiere un ApplicationContext de Spring. Sin @SpringBootTest o similar, @MockBean no hace nada útil."},
  {label:"@Mock no puede mockear interfaces; solo puede mockear clases concretas",explain:"Incorrecto. Mockito puede mockear tanto interfaces como clases concretas (usando CGLIB para las clases)."},
], correct:1},

{cat:"Testing en Spring Boot",
q:"¿Qué hace @Transactional en un test de JPA y por qué no es siempre correcto usarlo?",
code:`@DataJpaTest
class TransaccionRepositoryTest {
    @Autowired TransaccionRepository repo;

    @Test
    @Transactional
    void deberiaGuardarTransaccion() {
        repo.save(new Transaccion(...));
        // ¿se persiste en BD?
    }
}`,
options:[
  {label:"@Transactional en tests siempre hace rollback al final; la entidad guardada persiste hasta que el test termine",explain:"Incorrecto. @Transactional en tests hace rollback automáticamente al final del test (no al terminar). El dato NO persiste en BD después del test."},
  {label:"@Transactional en tests de Spring hace rollback automático al final de cada test, dejando la BD limpia para el siguiente test. Útil para aislamiento. Problema: si necesitas testear comportamiento tras commit (ej: constraints de BD que se evalúan al hacer flush/commit), el rollback oculta errores que ocurrirían en producción",explain:"Correcto. @Transactional en tests es una herramienta de limpieza automática. Pero si testeas que una transacción de pagos actualiza correctamente el saldo y quieres verificar persistencia real, el rollback automático puede dar falsos positivos. Para testear comportamiento post-commit, usar @Commit o @Rollback(false) explícitamente."},
  {label:"@Transactional en tests fuerza el commit inmediato; los datos persisten permanentemente",explain:"Incorrecto. Es exactamente al revés. @Transactional en tests hace rollback por defecto al final del test, NO commit."},
  {label:"@DataJpaTest no soporta @Transactional; lanza error si se usa juntos",explain:"Incorrecto. @DataJpaTest y @Transactional son perfectamente compatibles. De hecho, @DataJpaTest ya aplica @Transactional con rollback por defecto a todos los tests."},
], correct:1},

// ══════════ AOP ══════════
{cat:"AOP & Aspectos",
q:"¿Qué es AOP (Programación Orientada a Aspectos) en Spring y cuáles son sus casos de uso principales?",
options:[
  {label:"AOP es otro nombre para la programación orientada a objetos con Spring; son sinónimos",explain:"Incorrecto. Son paradigmas distintos. OOP organiza código en clases con estado y comportamiento. AOP complementa OOP permitiendo modularizar preocupaciones transversales."},
  {label:"AOP permite extraer lógica transversal (que aplica en múltiples puntos del código) a una clase separada llamada Aspecto. Casos de uso: logging de entrada/salida de métodos, auditoría de operaciones bancarias, métricas de latencia, validación de seguridad, manejo de transacciones (@Transactional es AOP internamente)",explain:"Correcto. Sin AOP, el logging de auditoría en cada método de cada Service duplicaría código. Con @Aspect y @Around, una sola clase intercepta todos los métodos que coincidan con el pointcut (ej: todos los métodos de @Service), ejecutando el logging antes y después sin modificar el código de negocio."},
  {label:"AOP solo funciona con bases de datos; no puede interceptar llamadas a servicios HTTP",explain:"Incorrecto. AOP puede interceptar cualquier método de un bean de Spring: llamadas a repositorios, servicios, llamadas HTTP con RestTemplate/WebClient, o cualquier punto de ejecución definido en el pointcut."},
  {label:"@Transactional es una alternativa a AOP; usarlos juntos causa conflictos",explain:"Incorrecto. @Transactional es implementado internamente con AOP en Spring. No son alternativas sino que @Transactional ES un ejemplo de AOP aplicado."},
], correct:1},

{cat:"AOP & Aspectos",
q:"¿Cuál es la diferencia entre @Before, @After, @Around y @AfterReturning en Spring AOP?",
code:`@Aspect @Component
class AuditoriaAspect {
    @Around("@annotation(Auditable)")
    public Object auditarOperacion(ProceedingJoinPoint pjp) throws Throwable {
        String operacion = pjp.getSignature().getName();
        log.info("Iniciando: " + operacion);
        Object resultado = pjp.proceed(); // ejecuta el método real
        log.info("Completado: " + operacion);
        return resultado;
    }
}`,
options:[
  {label:"Son equivalentes; la diferencia es solo el nombre de la anotación",explain:"Incorrecto. Tienen diferentes momentos de ejecución y capacidades distintas."},
  {label:"@Before: ejecuta antes del método (no puede modificar el resultado). @After: ejecuta siempre después (como finally). @AfterReturning: ejecuta solo si el método termina exitosamente, tiene acceso al valor retornado. @Around: rodea el método completamente; puede modificar argumentos, resultado, y decidir si llamar al método original con pjp.proceed()",explain:"Correcto. @Around es el más poderoso: puede cambiar parámetros antes de llamar al método, modificar el resultado retornado, o incluso no llamar al método original. Se usa para auditoría completa (capturar entrada, salida y duración), métricas de latencia, y caching."},
  {label:"@Around no puede capturar excepciones; para eso se necesita @AfterThrowing separado",explain:"Incorrecto. @Around puede capturar excepciones con un try-catch alrededor de pjp.proceed(). Si la excepción no se relanza, el método llamante no la verá. @AfterThrowing es más declarativo para reaccionar a excepciones sin necesidad de try-catch."},
  {label:"Solo se puede tener un tipo de advice por método; no se pueden combinar @Before y @Around en el mismo Aspecto",explain:"Incorrecto. Un Aspecto puede tener múltiples advices de cualquier tipo. Incluso múltiples @Around con distintos pointcuts son válidos."},
], correct:1},

// ══════════ ACTUATOR & OBSERVABILIDAD ══════════
{cat:"Actuator & Observabilidad",
q:"¿Qué es Spring Boot Actuator y qué endpoints son críticos para monitorear un microservicio bancario en producción?",
options:[
  {label:"Actuator es un plugin de terceros; no viene incluido en Spring Boot y requiere licencia comercial",explain:"Incorrecto. Spring Boot Actuator es un módulo oficial de Spring Boot, incluido agregando spring-boot-starter-actuator como dependencia."},
  {label:"Actuator expone endpoints HTTP para monitoreo y gestión. Endpoints críticos en banca: /actuator/health (estado del servicio y sus dependencias para Kubernetes probes), /actuator/metrics (métricas para Prometheus), /actuator/info (versión, build), /actuator/loggers (cambiar nivel de log en caliente sin restart)",explain:"Correcto. En Kubernetes, la Liveness Probe llama a /actuator/health/liveness y la Readiness Probe a /actuator/health/readiness. Si la BD está caída, /actuator/health devuelve DOWN y Kubernetes deja de enviar tráfico al pod. Los endpoints sensibles (/env, /beans) deben estar protegidos con Spring Security."},
  {label:"Todos los endpoints de Actuator son seguros de exponer públicamente; no contienen información sensible",explain:"Incorrecto. Endpoints como /actuator/env exponen variables de entorno (incluyendo passwords enmascarados pero revelando nombres de propiedades), /actuator/beans expone la estructura interna de la aplicación. Deben protegerse o deshabilitarse en producción."},
  {label:"Actuator solo funciona con Prometheus; para otros sistemas de monitoreo hay que implementar los endpoints manualmente",explain:"Incorrecto. Actuator expone métricas en múltiples formatos. Con Micrometer como capa de abstracción, soporta Prometheus, Datadog, New Relic, CloudWatch, etc., con simple configuración."},
], correct:1},

{cat:"Actuator & Observabilidad",
q:"¿Cómo implementarías un health check personalizado en Spring Boot para un microservicio bancario que depende de un servicio externo (SUNAT)?",
code:`// ¿Cuál es la implementación correcta?`,
options:[
  {label:"Modificar el endpoint /actuator/health directamente editando el código de Spring Boot Actuator",explain:"Incorrecto. No se debe modificar el código de Spring Boot. Actuator está diseñado para ser extendido con indicadores de salud personalizados."},
  {label:"Implementar la interfaz HealthIndicator: un @Component que implementa health() retornando Health.up() o Health.down().withDetail('mensaje', '...') según si el servicio externo responde. Spring Boot lo incluye automáticamente en /actuator/health",explain:"Correcto. Ejemplo: SunatHealthIndicator llama al endpoint de health de SUNAT con timeout de 2s. Si responde, retorna Health.up(). Si no, Health.down().withDetail('error', 'SUNAT no responde'). Kubernetes verá que el health es DOWN y dejará de enviar tráfico hasta que SUNAT se recupere."},
  {label:"Los health checks solo pueden verificar la conexión a la base de datos; para servicios externos hay que usar Circuit Breaker",explain:"Incorrecto. HealthIndicator puede verificar cualquier dependencia: BD, servicios REST externos, colas de mensajes, sistemas de archivos, etc."},
  {label:"Crear un endpoint GET /health propio en un @RestController; Spring Boot lo detecta y lo agrega a /actuator/health",explain:"Incorrecto. Spring Boot no detecta automáticamente endpoints GET /health personalizados. Se debe implementar la interfaz HealthIndicator que el framework sí reconoce."},
], correct:1},

// ══════════ WEBCLIENT & RESILIENCIA ══════════
{cat:"WebClient & Resiliencia",
q:"¿Por qué WebClient reemplaza a RestTemplate y cuáles son sus ventajas en un microservicio bancario?",
options:[
  {label:"WebClient es más rápido que RestTemplate porque usa HTTP/2 por defecto",explain:"Incorrecto. La ventaja no es el protocolo HTTP sino el modelo de I/O. Ambos pueden usar HTTP/1.1 o HTTP/2."},
  {label:"RestTemplate es bloqueante (el thread espera la respuesta) y está en modo mantenimiento. WebClient es no bloqueante (libera el thread mientras espera), soporta retry reactivo, timeout reactivo, y se integra nativamente con WebFlux. También puede usarse en aplicaciones Spring MVC para llamadas HTTP sin bloquear",explain:"Correcto. En un microservicio bancario que llama a SUNAT, RENIEC y el Core Bancario en paralelo: con RestTemplate se necesitan 3 threads bloqueados esperando. Con WebClient.create() y CompletableFuture o Mono.zip(), el mismo thread puede iniciar las 3 llamadas y procesar los resultados cuando lleguen."},
  {label:"WebClient solo funciona con APIs REST; para SOAP hay que usar RestTemplate",explain:"Incorrecto. WebClient es un cliente HTTP genérico que puede llamar a cualquier endpoint HTTP independientemente del protocolo de mensajería (REST, SOAP, GraphQL)."},
  {label:"RestTemplate fue eliminado en Spring Boot 3; no existe en proyectos modernos",explain:"Incorrecto. RestTemplate sigue siendo parte de Spring Framework en la versión 6 / Spring Boot 3, aunque en modo mantenimiento (no recibe nuevas features). Muchos proyectos legacy lo siguen usando."},
], correct:1},

{cat:"WebClient & Resiliencia",
q:"¿Cómo configurarías reintentos (retry) en WebClient para llamadas a un servicio externo bancario que puede fallar transitoriamente?",
code:`// ¿Cuál de estas implementaciones es correcta y por qué?
// A:
webClient.get().uri("/api/saldo")
    .retrieve()
    .bodyToMono(Saldo.class)
    .retry(3);

// B:
webClient.get().uri("/api/saldo")
    .retrieve()
    .bodyToMono(Saldo.class)
    .retryWhen(Retry.backoff(3, Duration.ofMillis(500))
        .filter(e -> e instanceof WebClientResponseException.ServiceUnavailable));`,
options:[
  {label:"La opción A es mejor porque es más simple y reintenta exactamente 3 veces",explain:"Incorrecto. retry(3) reintenta ante CUALQUIER error incluyendo errores del cliente (400, 401, 422) donde reintentar es inútil o perjudicial. También reintenta sin espera entre intentos, lo que puede saturar el servicio caído."},
  {label:"La opción B es correcta: retryWhen con backoff exponencial (espera creciente entre reintentos) y filter para solo reintentar ante errores específicos (503 Service Unavailable). retry(3) sin filtro reintenta ante errores de cliente (400) donde reintentar nunca ayudará",explain:"Correcto. El backoff exponencial da tiempo al servicio externo para recuperarse. El filter previene reintentos ante errores que no son transitorios (400 Bad Request nunca mejorará con reintentos). En banca: reintentar ante 503 de SUNAT tiene sentido; reintentar ante 422 (datos de factura inválidos) es inútil."},
  {label:"No se deben implementar reintentos en WebClient; deben manejarse siempre en el Circuit Breaker",explain:"Incorrecto. Retry y Circuit Breaker son patrones complementarios. El retry maneja fallos transitorios individuales. El Circuit Breaker abre cuando el servicio falla de forma sostenida."},
  {label:"Ambas opciones son equivalentes para servicios bancarios; la elección es de preferencia",explain:"Incorrecto. Tienen comportamientos significativamente distintos en cuanto a qué errores retardan, cuándo esperar entre intentos, y el impacto en el servicio externo."},
], correct:1},

// ══════════ SPRING BOOT AUTOCONFIG ══════════
{cat:"Spring Boot Internals",
q:"¿Cómo funciona la auto-configuración de Spring Boot y cómo puedes sobreescribir un auto-configurado bean?",
options:[
  {label:"Spring Boot escanea todas las clases del proyecto y configura automáticamente lo que necesita sin ninguna forma de sobrescribirlo",explain:"Incorrecto. La auto-configuración es condicional (@ConditionalOnMissingBean) y está diseñada para que puedas sobrescribir cualquier bean."},
  {label:"Auto-configuración: Spring Boot lee spring.factories (o META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports en Boot 3) y activa clases de configuración condicionalmente (@ConditionalOnClass, @ConditionalOnMissingBean). Para sobrescribir: define tu propio @Bean del mismo tipo; la condición @ConditionalOnMissingBean detecta que ya existe y no crea el default",explain:"Correcto. Ejemplo: Spring Boot auto-configura un ObjectMapper (Jackson) por defecto. Si defines @Bean ObjectMapper customObjectMapper() en una @Configuration, Spring Boot detecta que ya existe un ObjectMapper y no crea el suyo. Esto permite personalizar serialización JSON (formato de fechas, nombres de campos) sin tocar la auto-configuración."},
  {label:"Para sobrescribir un auto-configurado bean siempre se debe excluir la clase de auto-configuración con @SpringBootApplication(exclude=...)",explain:"Incorrecto. Excluir la clase de auto-configuración es una opción más agresiva que desactiva toda esa configuración. Definir tu propio @Bean es más quirúrgico: solo sobrescribe el bean específico."},
  {label:"La auto-configuración de Spring Boot solo aplica a la BD; el resto de beans se configuran manualmente",explain:"Incorrecto. Spring Boot auto-configura decenas de componentes: DataSource, JPA, Jackson, WebMVC, Security, Kafka, Redis, Actuator, etc. Todo basado en las dependencias presentes en el classpath."},
], correct:1},

{cat:"Spring Boot Internals",
q:"¿Qué hace @EnableCaching y cómo usarías @Cacheable para cachear consultas frecuentes en un servicio bancario?",
code:`@Service
class TipoCambioService {
    @Cacheable(value = "tiposCambio", key = "#moneda",
               condition = "#moneda != null")
    public TipoCambio obtenerTipoCambio(String moneda) {
        return clienteSBS.consultarTipoCambio(moneda); // llamada HTTP costosa
    }
}`,
options:[
  {label:"@Cacheable almacena el resultado en disco; el caché persiste entre reinicios de la aplicación por defecto",explain:"Incorrecto. Por defecto Spring Cache usa ConcurrentHashMap en memoria. El caché se pierde al reiniciar. Para persistencia se configura Redis o EhCache."},
  {label:"@EnableCaching activa el soporte de caché en la aplicación. @Cacheable intercepta el método: si el resultado para esa key ya está cacheado, retorna el valor cacheado sin ejecutar el método. Si no, ejecuta el método y guarda el resultado. Ideal para datos que cambian poco (tipos de cambio, listas de monedas)",explain:"Correcto. En banca: el tipo de cambio SBS se actualiza una vez al día. Sin caché, cada consulta haría una llamada HTTP a SBS. Con @Cacheable, la primera llamada del día consulta SBS y cachea el resultado. Las siguientes llamadas del día retornan el valor cacheado en nanosegundos. Usar @CacheEvict o @CachePut para invalidar/actualizar cuando cambia el tipo de cambio."},
  {label:"@Cacheable solo funciona con bases de datos Redis; para caché en memoria hay que implementar manualmente con HashMap",explain:"Incorrecto. El default de Spring Cache es un ConcurrentHashMap en memoria. Redis, EhCache, Caffeine son implementaciones opcionales que se activan añadiendo la dependencia correspondiente."},
  {label:"@Cacheable y @Transactional no pueden usarse juntos en el mismo método",explain:"Incorrecto. Pueden coexistir. El caché evita que el método se ejecute si hay hit, ahorrando también la apertura de transacción. Si no hay hit, el método se ejecuta y la transacción gestiona la consulta a BD normalmente."},
], correct:1},


// ══════════ BEAN VALIDATION ══════════
{cat:"Bean Validation",
q:"¿Cómo funciona @Valid en Spring MVC y qué pasa cuando la validación falla?",
code:`@RestController
class TransferenciaController {
    @PostMapping("/transferencias")
    public ResponseEntity<?> crear(@RequestBody @Valid TransferenciaRequest req,
                                   BindingResult result) {
        if (result.hasErrors()) { ... }
        return service.procesar(req);
    }
}

record TransferenciaRequest(
    @NotBlank String cuentaOrigen,
    @NotBlank String cuentaDestino,
    @Positive @DecimalMax("1000000") BigDecimal monto
) {}`,
options:[
  {label:"@Valid solo valida que el objeto no sea null; las anotaciones @NotBlank y @Positive son solo documentación",explain:"Incorrecto. @Valid dispara la validación de todas las anotaciones de Bean Validation (@NotBlank, @Positive, @Size, etc.) en el objeto. Sin @Valid, esas anotaciones son ignoradas por Spring MVC."},
  {label:"@Valid dispara la validación del objeto antes de entrar al método. Sin BindingResult, si hay errores Spring lanza MethodArgumentNotValidException automáticamente (que @ControllerAdvice puede capturar como 400). Con BindingResult, el control de errores es manual en el método",explain:"Correcto. La forma recomendada en APIs bancarias es sin BindingResult: dejar que Spring lance MethodArgumentNotValidException y capturarla en @ControllerAdvice para retornar un 400 con los detalles de validación de forma uniforme en toda la API. BindingResult mezcla lógica de validación con lógica de negocio en el controller."},
  {label:"@Valid y @Validated son lo mismo; elegir uno u otro es preferencia del equipo",explain:"Incorrecto. @Valid es estándar de Bean Validation (javax/jakarta). @Validated es de Spring y añade soporte para validación de grupos (group validation) y puede usarse en @Service para validar parámetros de métodos (no solo @RequestBody)."},
  {label:"@Valid no funciona con Records de Java; solo con clases con getters tradicionales",explain:"Incorrecto. Bean Validation funciona perfectamente con Records de Java. Las anotaciones de validación en los componentes del Record son procesadas correctamente por la implementación (Hibernate Validator)."},
], correct:1},

{cat:"Bean Validation",
q:"¿Cómo crearías una validación personalizada para verificar que un número de cuenta peruano tiene formato válido (CCI de 20 dígitos)?",
code:`// ¿Cuál es el enfoque correcto?
record TransferenciaRequest(
    @CCI  // anotación personalizada
    String numeroCCI
) {}`,
options:[
  {label:"Usar una expresión regular con @Pattern directamente en el campo; no se necesita anotación personalizada",explain:"Incorrecto. @Pattern con regex es válido para formatos simples, pero para lógica compleja (como verificar el dígito de control del CCI) se necesita un ConstraintValidator personalizado. Además, una anotación propia es más expresiva y reutilizable que una regex incrustada."},
  {label:"Crear una anotación @CCI con @Constraint(validatedBy = CCIValidator.class) y la clase CCIValidator implementando ConstraintValidator<CCI, String> con la lógica de validación en isValid(). Reutilizable en cualquier parte del código con una sola anotación",explain:"Correcto. El patrón estándar de Bean Validation: (1) crear la anotación @interface CCI con @Constraint, (2) crear CCIValidator con isValid() que verifica longitud, solo dígitos y el dígito de control del banco. La anotación puede añadir el mensaje de error en español para los clientes del banco."},
  {label:"Las validaciones personalizadas requieren interceptores Servlet; no se pueden hacer con anotaciones de Bean Validation",explain:"Incorrecto. Bean Validation fue diseñado para ser extensible con validadores personalizados. Es el mecanismo estándar y no requiere interceptores."},
  {label:"Validar el CCI en el @Service después de recibirlo; la capa de Controller no debe tener lógica de validación de negocio",explain:"Incorrecto. El formato del CCI es una restricción de integridad de datos de entrada (no lógica de negocio compleja) y es correcto validarla en la capa de entrada con Bean Validation, fallando rápido con un 400 antes de llegar al Service."},
], correct:1},

// ══════════ @ASYNC & CONCURRENCIA ══════════
{cat:"@Async & Concurrencia",
q:"¿Qué hace @Async en Spring Boot y cuáles son los dos errores más comunes al usarlo?",
code:`@Service
class NotificacionService {
    @Async
    public void enviarEmail(String destinatario, String mensaje) {
        // operación lenta (llamada SMTP)
        emailClient.send(destinatario, mensaje);
    }
}

// Llamada desde otro service:
notificacionService.enviarEmail("cliente@bcp.pe", "Transferencia exitosa");
// ← la llamada retorna inmediatamente sin esperar el envío`,
options:[
  {label:"@Async hace que el método retorne null siempre; para obtener resultado hay que usar synchronized",explain:"Incorrecto. @Async puede retornar void (fire-and-forget) o Future<T>/CompletableFuture<T> para obtener el resultado asíncronamente."},
  {label:"@Async ejecuta el método en un thread separado del pool de Spring. Error 1: llamada interna desde la misma clase (bypasea el proxy AOP, se ejecuta síncronamente). Error 2: sin @EnableAsync en la configuración, @Async es ignorado silenciosamente sin error ni advertencia",explain:"Correcto. @EnableAsync es obligatorio en la clase @Configuration o @SpringBootApplication para que @Async funcione. Sin él, los métodos se ejecutan síncronamente sin ningún error. El problema de llamada interna es el mismo de @Transactional: el proxy AOP no intercepta this.metodo()."},
  {label:"@Async solo funciona con métodos void; para métodos con return type se debe usar CompletableFuture manualmente",explain:"Incorrecto. @Async puede retornar void, Future<T> o CompletableFuture<T>. Con CompletableFuture<T> como tipo de retorno, Spring envuelve automáticamente el resultado en un CompletableFuture completado cuando el método termina."},
  {label:"@Async usa el ForkJoinPool común de Java; no se puede configurar un thread pool personalizado",explain:"Incorrecto. Spring usa por defecto SimpleAsyncTaskExecutor (que crea un thread por llamada, sin pool). Para producción se debe configurar un ThreadPoolTaskExecutor personalizado con @Bean Executor."},
], correct:1},

{cat:"@Async & Concurrencia",
q:"¿Qué problema tiene este código con @Async y SecurityContext, y cómo lo resuelves en un microservicio bancario?",
code:`@Async
public void generarReporteAuditoria(Long clienteId) {
    // Necesita el usuario autenticado del request original
    Authentication auth = SecurityContextHolder.getContext()
                                               .getAuthentication();
    // auth es NULL aquí ← ¿por qué?
}`,
options:[
  {label:"El SecurityContext es global y siempre disponible en todos los threads; si auth es null, el usuario no se autenticó",explain:"Incorrecto. SecurityContext usa ThreadLocal por defecto: cada thread tiene su propio contexto. El thread de @Async no hereda el SecurityContext del thread del request HTTP."},
  {label:"El thread de @Async no hereda el SecurityContext del thread del request porque SecurityContextHolder usa MODE_THREADLOCAL por defecto. Soluciones: configurar MODE_INHERITABLETHREADLOCAL para herencia, o usar DelegatingSecurityContextAsyncTaskExecutor que propaga el contexto automáticamente",explain:"Correcto. En banca es crítico: el log de auditoría asíncrono necesita saber qué usuario ejecutó la operación. Con MODE_INHERITABLETHREADLOCAL, los threads hijo heredan el SecurityContext del padre. DelegatingSecurityContextAsyncTaskExecutor es la solución más limpia porque envuelve el Executor existente sin cambiar la estrategia global."},
  {label:"@Async y Spring Security son incompatibles; no se puede acceder al SecurityContext en métodos asíncronos",explain:"Incorrecto. Son perfectamente compatibles con la configuración correcta. La incompatibilidad es con el modo por defecto de ThreadLocal, no con Spring Security en sí."},
  {label:"Pasar el Authentication como parámetro al método @Async es suficiente; SecurityContextHolder no es necesario",explain:"Incorrecto en general. Pasar el Authentication como parámetro funciona pero acopla la firma del método a Spring Security. DelegatingSecurityContextAsyncTaskExecutor es la solución más limpia y transparente."},
], correct:1},

// ══════════ @SCHEDULED ══════════
{cat:"@Scheduled & Tareas Programadas",
q:"¿Cómo funciona @Scheduled en Spring Boot y cuál es el problema de ejecutarlo en múltiples instancias del mismo microservicio?",
code:`@Component
class ProcesadorBatch {
    @Scheduled(cron = "0 0 1 * * *") // Todos los días a la 1 AM
    public void procesarTransaccionesPendientes() {
        // procesa miles de transacciones
    }
}`,
options:[
  {label:"@Scheduled garantiza automáticamente que solo una instancia ejecute la tarea aunque haya múltiples pods en Kubernetes",explain:"Incorrecto. @Scheduled ejecuta la tarea en TODAS las instancias del servicio. En un cluster de 3 pods, la tarea se ejecutaría 3 veces simultáneamente."},
  {label:"En múltiples instancias (Kubernetes con 3 pods), @Scheduled ejecuta la tarea en cada instancia simultáneamente, causando triple procesamiento de las mismas transacciones. Soluciones: ShedLock (distributed lock con tabla en BD), Spring Batch con particionamiento, o un diseño idempotente que maneje duplicados",explain:"Correcto. En banca, procesar las mismas transacciones 3 veces puede resultar en débitos o créditos duplicados. ShedLock es la solución más popular: antes de ejecutar, intenta adquirir un lock en una tabla compartida. Solo el pod que obtiene el lock ejecuta la tarea; los otros la saltan."},
  {label:"La solución es usar @Scheduled(fixedDelay) en lugar de cron; fixedDelay garantiza ejecución en una sola instancia",explain:"Incorrecto. fixedDelay y fixedRate son parámetros de frecuencia, no de coordinación entre instancias. El problema de ejecución múltiple ocurre igualmente con cualquier parámetro de @Scheduled."},
  {label:"@EnableScheduling es suficiente para coordinar la ejecución entre múltiples instancias automáticamente",explain:"Incorrecto. @EnableScheduling habilita el soporte de scheduling en el ApplicationContext. No tiene ningún mecanismo de coordinación distribuida entre instancias."},
], correct:1},

// ══════════ TESTING - MOCKMVC ══════════
{cat:"Testing en Spring Boot",
q:"¿Cómo usarías MockMvc para testear un endpoint REST de creación de transferencia sin levantar el servidor HTTP?",
code:`@WebMvcTest(TransferenciaController.class)
class TransferenciaControllerTest {
    @Autowired MockMvc mockMvc;
    @MockBean TransferenciaService service;

    @Test
    void deberiaRetornar201AlCrearTransferencia() throws Exception {
        // ¿cómo escribir el test?
    }
}`,
options:[
  {label:"MockMvc levanta un servidor Tomcat en un puerto aleatorio para hacer peticiones HTTP reales",explain:"Incorrecto. MockMvc simula el stack de Spring MVC en memoria sin levantar ningún servidor HTTP. Es mucho más rápido que un servidor real."},
  {label:"mockMvc.perform(post('/transferencias').contentType(APPLICATION_JSON).content(json)).andExpect(status().isCreated()).andExpect(jsonPath('$.id').exists()) — verifica el status HTTP y el body sin servidor real, usando @MockBean para simular el service",explain:"Correcto. MockMvc ejecuta el request a través del DispatcherServlet de Spring en memoria: pasa por filtros, interceptors, validación y el Controller, pero sin red real. andExpect() permite verificar status, headers, body con jsonPath, y cualquier aspecto de la respuesta HTTP."},
  {label:"@WebMvcTest no puede probar validaciones de @Valid; para eso se necesita @SpringBootTest",explain:"Incorrecto. @WebMvcTest incluye la infraestructura de Spring MVC completa, incluyendo el soporte de Bean Validation para @Valid. Es perfectamente válido para probar que un request inválido retorna 400."},
  {label:"@MockBean en @WebMvcTest no es necesario; Spring inyecta automáticamente versiones mock de todos los Services",explain:"Incorrecto. Spring no crea mocks automáticamente. Sin @MockBean, Spring intenta inyectar el TransferenciaService real, que puede fallar si tiene dependencias no disponibles en el slice de @WebMvcTest."},
], correct:1},

{cat:"Testing en Spring Boot",
q:"¿Cuál es la diferencia entre Mockito.verify() y asserting el resultado, y cuándo usar cada uno?",
code:`@Test
void deberiaEnviarNotificacionAlProcesarPago() {
    // Arrange
    when(repo.save(any())).thenReturn(pagoGuardado);

    // Act
    service.procesarPago(pago);

    // ¿Qué verificar aquí?
    // Opción A:
    verify(notificacionService).enviarEmail(eq("cliente@bcp.pe"), any());

    // Opción B:
    assertEquals("PROCESADO", pago.getEstado());
}`,
options:[
  {label:"Siempre usar assertEquals; verify() es redundante porque el estado del objeto refleja todo lo que ocurrió",explain:"Incorrecto. El estado del objeto no refleja si se envió un email o si se llamó a un servicio externo sin retorno de valor."},
  {label:"verify() verifica que se llamó a un colaborador con ciertos argumentos (útil para efectos secundarios sin valor de retorno: emails, notificaciones, auditoría). assertEquals verifica el resultado directo del método. Ambos son necesarios: uno verifica la salida, el otro los efectos secundarios",explain:"Correcto. En banca: después de procesar un pago, quieres verificar que (A) el estado del pago cambió a PROCESADO (assertEquals) y (B) se envió la notificación al cliente (verify). Si solo haces assertEquals, un bug que elimina el envío de notificaciones pasaría desapercibido."},
  {label:"verify() solo funciona con mocks de clases abstractas; para interfaces usar assertEquals con el valor retornado",explain:"Incorrecto. verify() funciona con cualquier mock de Mockito, sea de interfaz o clase concreta. No tiene relación con el tipo de mock."},
  {label:"verify() es un antipatrón en TDD; los tests deben solo verificar estado, nunca interacciones",explain:"Incorrecto. Verificar interacciones (behavior verification) es un enfoque válido y a veces el único posible cuando el método no retorna valor (void) o el efecto secundario es el objetivo principal del test."},
], correct:1},

// ══════════ PAGINACIÓN ══════════
{cat:"Spring Data JPA",
q:"¿Cómo implementas paginación eficiente en Spring Data JPA para un listado de transacciones bancarias con millones de registros?",
code:`// ¿Cuál es la implementación correcta?`,
options:[
  {label:"Cargar todas las transacciones con findAll() y paginar en Java con subList()",explain:"Incorrecto. Cargar millones de registros en memoria para paginar en Java es inviable. La paginación debe hacerse en la BD con LIMIT/OFFSET."},
  {label:"Usar Pageable como parámetro del repositorio: Page<Transaccion> findByClienteId(Long id, Pageable pageable). Llamar con PageRequest.of(0, 20, Sort.by('fecha').descending()). Page<T> incluye el contenido, total de elementos, total de páginas y si hay siguiente página",explain:"Correcto. Spring Data genera automáticamente el SQL con LIMIT y OFFSET (o FETCH FIRST en algunos dialectos). Page<T> incluye metadatos de paginación útiles para el frontend. Para volúmenes muy grandes, Slice<T> es más eficiente porque no hace COUNT(*) para calcular el total de páginas."},
  {label:"Paginación en Spring Data solo funciona con @Query nativa; los métodos derivados no soportan Pageable",explain:"Incorrecto. Pageable funciona tanto con métodos derivados como con @Query JPQL y @Query nativa. Spring Data genera automáticamente el paginado en todos los casos."},
  {label:"La paginación por defecto en Spring Boot usa cursor-based pagination; Pageable usa keyset pagination internamente",explain:"Incorrecto. La paginación estándar de Spring Data JPA usa OFFSET-based pagination (LIMIT/OFFSET). Keyset/cursor pagination es una técnica diferente y más eficiente para tablas muy grandes, pero no está implementada por defecto."},
], correct:1},

// ══════════ HIKARICP ══════════
{cat:"Configuración & Properties",
q:"¿Qué es HikariCP y cuáles son las configuraciones más importantes para un microservicio bancario de alto tráfico?",
options:[
  {label:"HikariCP es la implementación de caché de segundo nivel de Hibernate en Spring Boot",explain:"Incorrecto. HikariCP es el connection pool de base de datos que Spring Boot usa por defecto desde la versión 2.0. No tiene relación con la caché de Hibernate."},
  {label:"HikariCP es el connection pool por defecto de Spring Boot. Configuraciones críticas: maximumPoolSize (máximo de conexiones; base 10, ajustar según carga), minimumIdle (conexiones mínimas activas), connectionTimeout (tiempo máximo esperando una conexión del pool antes de lanzar excepción), y maxLifetime (tiempo máximo de vida de una conexión para evitar conexiones obsoletas)",explain:"Correcto. En banca de alto tráfico: maximumPoolSize demasiado bajo causa timeout esperando conexiones. Demasiado alto sobrecarga el servidor de BD. La fórmula de HikariCP: pool_size = (núcleos_BD * 2) + spindle_count. connectionTimeout por defecto es 30s (reducir a 5s en producción para fallar rápido ante BD caída)."},
  {label:"HikariCP se configura solo en código Java; no se puede configurar con application.properties",explain:"Incorrecto. HikariCP se puede configurar completamente en application.properties/yml con el prefijo spring.datasource.hikari.*: spring.datasource.hikari.maximum-pool-size=10."},
  {label:"maximumPoolSize debe ser siempre igual al número de threads del servidor de aplicaciones para máxima eficiencia",explain:"Incorrecto. El pool de conexiones y el número de threads son dimensionados independientemente según la carga de trabajo. No hay una relación 1:1 entre threads de la aplicación y conexiones de BD."},
], correct:1},

// ══════════ MDC LOGGING ══════════
{cat:"Actuator & Observabilidad",
q:"¿Qué es MDC (Mapped Diagnostic Context) en logging y por qué es esencial en un microservicio bancario?",
code:`// En un filtro HTTP:
MDC.put("correlationId", request.getHeader("X-Correlation-ID"));
MDC.put("clienteId", obtenerClienteId(request));
try {
    filterChain.doFilter(request, response);
} finally {
    MDC.clear(); // ← ¿por qué es necesario el clear?
}

// En application.yml:
// logging.pattern.console: "%d [%X{correlationId}] [%X{clienteId}] %-5level %msg%n"`,
options:[
  {label:"MDC es una forma de almacenar logs en base de datos en lugar de archivos; mejora el rendimiento de escritura",explain:"Incorrecto. MDC es un mecanismo de enriquecimiento de logs: añade contexto automáticamente a cada línea de log del thread actual sin modificar cada llamada a log.info()."},
  {label:"MDC añade datos contextuales (correlationId, clienteId, operación) a todos los logs del thread actual automáticamente. MDC.clear() es obligatorio en thread pools: sin él, el siguiente request que use ese thread reutilizará el MDC del request anterior, mezclando IDs de correlación de distintos clientes en los logs",explain:"Correcto. En banca: con MDC, cada línea de log automáticamente incluye el ID de la operación y el ID del cliente. Cuando hay un incidente, filtrar por correlationId en ELK/Grafana da todo el flujo de una transacción en orden. MDC.clear() en el bloque finally es crítico para limpiar el contexto del thread antes de que sea reutilizado por otro request."},
  {label:"MDC.clear() es opcional; el MDC se limpia automáticamente al final de cada request HTTP en Spring Boot",explain:"Incorrecto. Spring Boot no limpia el MDC automáticamente. En thread pools (que reutilizan threads entre requests), el MDC persiste entre requests si no se limpia explícitamente. Esto es un bug silencioso difícil de detectar."},
  {label:"MDC solo funciona con Log4j2; con Logback hay que añadir el correlationId manualmente en cada log.info()",explain:"Incorrecto. MDC es parte de la API de SLF4J y funciona con cualquier implementación (Logback, Log4j2, java.util.logging). Logback es el logger por defecto de Spring Boot y soporta MDC plenamente con %X{key} en el pattern."},
], correct:1},

// ══════════ CORS ══════════
{cat:"Spring MVC / REST",
q:"¿Qué es CORS y cómo lo configuras correctamente en una API bancaria Spring Boot?",
options:[
  {label:"CORS es un tipo de ataque web que Spring Security bloquea automáticamente; no requiere configuración explícita",explain:"Incorrecto. CORS no es un ataque sino un mecanismo de seguridad del navegador que restringe peticiones cross-origin. Debe configurarse explícitamente para permitir los orígenes legítimos."},
  {label:"CORS (Cross-Origin Resource Sharing): el navegador bloquea peticiones desde un origen diferente al del API (ej: app en app.bcp.pe llamando a api.bcp.pe). Configuración en Spring: @CrossOrigin en el Controller, o globalmente en WebMvcConfigurer.addCorsMappings() definiendo orígenes, métodos y headers permitidos. En producción nunca usar allowedOrigins('*')",explain:"Correcto. En banca: el frontend en https://app.bcp.com.pe necesita llamar a la API en https://api.bcp.com.pe. Sin CORS configurado, el navegador bloquea esas peticiones. allowedOrigins('*') es peligroso porque permite cualquier origen, incluyendo sitios maliciosos. Configurar explícitamente los dominios de BCP."},
  {label:"CORS solo aplica a peticiones GET; los POST no tienen restricciones de origen en los navegadores",explain:"Incorrecto. CORS aplica a todas las peticiones cross-origin, especialmente las que modifican datos (POST, PUT, DELETE). Los browsers envían primero una petición OPTIONS (preflight) para verificar los permisos CORS antes de enviar la petición real."},
  {label:"Configurar CORS en Spring Security con http.cors() y en WebMvcConfigurer son excluyentes; solo se puede usar uno",explain:"Incorrecto. Spring Security y WebMvcConfigurer pueden coexistir para CORS, pero deben configurarse coherentemente. Si se usa Spring Security, la configuración de CORS debe hacerse en la SecurityFilterChain para que los filtros de seguridad respeten los headers CORS."},
], correct:1},

// ══════════ CIRCUIT BREAKER ══════════
{cat:"WebClient & Resiliencia",
q:"¿Cómo integrarías Resilience4j Circuit Breaker con Spring Boot para proteger llamadas a un servicio externo bancario?",
code:`@Service
class SunatService {
    @CircuitBreaker(name = "sunat", fallbackMethod = "fallbackConsulta")
    public RespuestaSunat consultarRUC(String ruc) {
        return webClient.get().uri("/ruc/" + ruc)
                        .retrieve().bodyToMono(RespuestaSunat.class).block();
    }

    public RespuestaSunat fallbackConsulta(String ruc, Exception e) {
        return RespuestaSunat.noDisponible(ruc);
    }
}`,
options:[
  {label:"El fallbackMethod debe tener exactamente los mismos parámetros que el método original sin el parámetro Exception",explain:"Incorrecto. El fallbackMethod puede incluir un parámetro Exception (o Throwable) al final para conocer la causa del fallo, lo cual es recomendado para logging."},
  {label:"@CircuitBreaker intercepta el método via AOP. Cuando supera el umbral de fallos configurable (ej: 50% de error en las últimas 10 llamadas), abre el circuito y llama directamente al fallbackMethod sin intentar la llamada real. El fallback debe tener la misma firma más un parámetro Throwable opcional",explain:"Correcto. El Circuit Breaker tiene tres estados: CLOSED (normal), OPEN (falla rápido al fallback), HALF_OPEN (prueba con algunas llamadas para ver si el servicio se recuperó). En banca: cuando SUNAT está caído, el fallback puede retornar datos en caché o indicar 'servicio no disponible' sin hacer esperar al cliente del banco."},
  {label:"Resilience4j Circuit Breaker requiere Spring Cloud para funcionar; no es compatible con Spring Boot standalone",explain:"Incorrecto. Resilience4j funciona con Spring Boot standalone via spring-boot-starter-aop y resilience4j-spring-boot3. Spring Cloud Circuit Breaker es una abstracción sobre Resilience4j pero no es obligatoria."},
  {label:"El Circuit Breaker solo funciona con métodos void; para métodos con retorno se debe usar @Retry",explain:"Incorrecto. @CircuitBreaker funciona con cualquier tipo de retorno. @Retry es otro patrón de resiliencia complementario que reintenta automáticamente ante fallos, independiente del Circuit Breaker."},
], correct:1},

// ══════════ FEIGN CLIENT ══════════
{cat:"Spring MVC / REST",
q:"¿Qué es Feign Client y qué ventaja tiene sobre WebClient para llamadas entre microservicios bancarios?",
code:`@FeignClient(name = "cuenta-service", url = "\${servicios.cuentas.url}")
interface CuentaClient {
    @GetMapping("/cuentas/{id}/saldo")
    SaldoDTO obtenerSaldo(@PathVariable Long id);

    @PostMapping("/cuentas/{id}/debitar")
    void debitar(@PathVariable Long id, @RequestBody MontoDTO monto);
}`,
options:[
  {label:"Feign Client es más rápido que WebClient porque usa HTTP/2 y conexiones persistentes por defecto",explain:"Incorrecto. La ventaja de Feign no es de rendimiento sino de productividad. Por defecto usa HTTP/1.1 igual que RestTemplate."},
  {label:"Feign genera automáticamente un cliente HTTP a partir de la interfaz anotada, sin código de implementación. Ventaja: declarativo y más legible que WebClient para llamadas síncronas simples. Integra con Ribbon (load balancing), Eureka (service discovery) y Circuit Breaker automáticamente con configuración mínima",explain:"Correcto. En un microservicio bancario que llama a otros 5 microservicios internos, Feign reduce drásticamente el boilerplate: una interfaz por servicio externo, sin builders de WebClient ni manejo manual de respuestas. Ideal para comunicación síncrona entre microservicios. WebClient es mejor cuando necesitas programación reactiva o streaming."},
  {label:"Feign Client es obsoleto en Spring Boot 3; fue reemplazado completamente por WebClient",explain:"Incorrecto. Spring Cloud OpenFeign sigue siendo activamente mantenido y soportado en Spring Boot 3. Muchos proyectos lo prefieren por su simplicidad declarativa."},
  {label:"Feign Client no soporta autenticación OAuth2; para endpoints protegidos hay que usar WebClient",explain:"Incorrecto. Feign soporta interceptores de request que pueden añadir tokens Bearer automáticamente: @Bean RequestInterceptor bearerInterceptor() que añade el Authorization header a todas las peticiones Feign."},
], correct:1},

// ══════════ APPLICATION EVENTS ══════════
{cat:"IoC & Dependency Injection",
q:"¿Cómo desacoplarías dos servicios bancarios usando el sistema de eventos de Spring?",
code:`// Cuando se completa una transferencia, notificar al servicio de auditoría
// sin que TransferService conozca a AuditoriaService directamente

@Service
class TransferService {
    private final ApplicationEventPublisher publisher;

    public void ejecutarTransferencia(Transferencia t) {
        // ... lógica de transferencia
        publisher.publishEvent(new TransferenciaCompletadaEvent(this, t));
    }
}

@Component
class AuditoriaService {
    @EventListener
    public void onTransferenciaCompletada(TransferenciaCompletadaEvent event) {
        auditarTransferencia(event.getTransferencia());
    }
}`,
options:[
  {label:"ApplicationEventPublisher es para eventos de la JVM; para eventos entre microservicios hay que usar Kafka siempre",explain:"Incorrecto. ApplicationEventPublisher es para comunicación dentro del mismo proceso (intra-servicio). Kafka es para comunicación entre procesos (inter-servicios). Ambos son válidos en sus contextos."},
  {label:"TransferService publica un evento sin saber quién lo escucha, desacoplando emisor de receptor. @EventListener puede ser síncrono (mismo thread) o asíncrono con @Async. Ventaja: múltiples listeners pueden reaccionar al mismo evento sin modificar el emisor (auditoría, notificaciones, métricas)",explain:"Correcto. Este patrón implementa el principio Open/Closed a nivel de servicios: para añadir un nuevo listener (ej: RiesgoService que también reacciona a TransferenciaCompletadaEvent), no se toca TransferService. En banca, esto es útil para añadir nuevas integraciones (scoring, cumplimiento) sin modificar el flujo de negocio principal."},
  {label:"@EventListener solo puede escuchar eventos de Spring (ContextRefreshedEvent, ContextClosedEvent); no soporta eventos de negocio personalizados",explain:"Incorrecto. @EventListener soporta cualquier clase como tipo de evento. Los eventos personalizados de negocio (TransferenciaCompletadaEvent) son el caso de uso principal."},
  {label:"publishEvent() es asíncrono por defecto; el listener se ejecuta en un thread separado sin configuración adicional",explain:"Incorrecto. publishEvent() es síncrono por defecto: el listener se ejecuta en el mismo thread antes de que publishEvent() retorne. Para ejecución asíncrona hay que añadir @Async al @EventListener."},
], correct:1},

// ══════════ JPA SPECIFICATIONS ══════════
{cat:"Spring Data JPA",
q:"¿Cuándo usar JPA Specifications (Criteria API) en lugar de @Query para búsquedas con filtros dinámicos?",
code:`// El usuario puede filtrar transacciones por cualquier combinación de:
// fecha, monto mínimo, monto máximo, tipo, estado, cuentaOrigen
// Algunos filtros son opcionales`,
options:[
  {label:"Siempre usar @Query con todos los parámetros opcionales marcados como null; SQL Server maneja automáticamente los parámetros null",explain:"Incorrecto. Escribir una @Query que maneje todos los parámetros opcionales con lógica OR condiciones resulta en SQL verboso y difícil de mantener. Los parámetros null en JPQL requieren condiciones adicionales como ':param IS NULL OR t.campo = :param'."},
  {label:"JPA Specifications permite construir queries dinámicamente en código Java: se crea una Specification por cada filtro y se combinan con and()/or(). Spring Data JPA con JpaSpecificationExecutor ejecuta la Specification final. Ideal cuando los filtros son opcionales y el usuario puede combinarlos libremente",explain:"Correcto. Specification<Transaccion> byFecha = (root, query, cb) -> cb.between(root.get('fecha'), desde, hasta). Las Specifications se encadenan: spec.and(byMonto).and(byEstado). El resultado es una query construida solo con los filtros que el usuario proporcionó. Mucho más limpio que un @Query con 10 parámetros opcionales."},
  {label:"QueryDSL es la única opción para queries dinámicas en Spring Boot; JPA Specifications fueron deprecated",explain:"Incorrecto. JPA Specifications siguen siendo válidas en Spring Boot 3. QueryDSL es una alternativa igualmente válida con una API diferente. La elección depende de las preferencias del equipo."},
  {label:"Para filtros dinámicos siempre usar SQL nativo con LIKE '%' + param + '%'; es más eficiente que la Criteria API",explain:"Incorrecto. SQL nativo con LIKE y concatenación de strings es vulnerable a SQL injection si no se parametriza correctamente. JPA Specifications usa siempre parámetros vinculados, siendo segura por diseño."},
], correct:1},

// ══════════ PROBLEM DETAIL ══════════
{cat:"Spring MVC / REST",
q:"¿Qué es ProblemDetail (RFC 9457) en Spring Boot 3 y por qué mejora las respuestas de error en APIs bancarias?",
options:[
  {label:"ProblemDetail es una librería de terceros para Spring; no está incluida en Spring Boot por defecto",explain:"Incorrecto. ProblemDetail es parte de Spring Framework 6 / Spring Boot 3, implementando el estándar RFC 7807 (ahora RFC 9457) directamente."},
  {label:"ProblemDetail es el formato estándar RFC para respuestas de error HTTP: incluye type (URI del tipo de error), title (descripción), status (código HTTP), detail (descripción específica del caso), instance (URI del recurso afectado). Spring Boot 3 puede retornarlo automáticamente con spring.mvc.problemdetails.enabled=true",explain:"Correcto. Antes de ProblemDetail, cada equipo creaba su propio formato de error JSON (message, errorCode, details). Con ProblemDetail, todas las APIs BCP pueden tener un formato de error estándar, interoperable y autodocumentado. Los clientes (apps móviles, frontend) saben exactamente qué campos esperar en un error, facilitando el manejo de errores."},
  {label:"ProblemDetail reemplaza completamente a @ControllerAdvice; ya no se necesita manejar excepciones manualmente",explain:"Incorrecto. ProblemDetail es el formato de la respuesta de error. @ControllerAdvice sigue siendo necesario para mapear excepciones específicas (SaldoInsuficienteException → 422 ProblemDetail). Spring Boot 3 usa ProblemDetail internamente para algunas excepciones, pero las excepciones de dominio siguen requiriendo @ExceptionHandler."},
  {label:"ProblemDetail solo soporta errores de validación de Bean Validation; para otros errores hay que usar ResponseEntity<String>",explain:"Incorrecto. ProblemDetail es un formato de respuesta genérico para cualquier tipo de error. Puede incluir campos personalizados (extensiones) para añadir información específica del dominio bancario, como el código de error de la SBS o el ID de la transacción fallida."},
], correct:1},

// ══════════ SPRING BOOT PROFILES AVANZADO ══════════
{cat:"Configuración & Properties",
q:"¿Cómo usarías @Profile para tener implementaciones distintas de un servicio según el ambiente en un banco?",
code:`interface NotificacionService {
    void enviar(String destinatario, String mensaje);
}

@Service @Profile("!prod")  // todos excepto prod
class NotificacionMock implements NotificacionService {
    public void enviar(String dest, String msg) {
        log.info("[MOCK] Email a {} : {}", dest, msg);
    }
}

@Service @Profile("prod")
class NotificacionSMTP implements NotificacionService {
    public void enviar(String dest, String msg) {
        smtpClient.send(dest, msg); // envío real
    }
}`,
options:[
  {label:"@Profile no puede usarse con interfaces; solo con clases concretas que extienden una clase abstracta",explain:"Incorrecto. @Profile puede usarse en cualquier @Component, @Service, @Bean, o clase de @Configuration. El tipo de la interfaz que implementa es irrelevante."},
  {label:"@Profile activa el bean solo cuando el perfil especificado está activo. @Profile('!prod') activa el bean cuando 'prod' NO está activo. En dev/test se usa el mock; en producción el SMTP real. Spring inyecta la implementación correcta automáticamente según el perfil activo",explain:"Correcto. Este patrón es muy útil en banca: en desarrollo no se envían emails/SMS reales a clientes, pero el código es idéntico. En producción se activa el perfil 'prod' y Spring inyecta el servicio real. También aplica para servicios externos: @Profile('!prod') puede usar un stub de SUNAT en lugar de llamar a la API real."},
  {label:"Para lograr el mismo resultado se deben usar variables de entorno en application.properties; @Profile es solo para tests",explain:"Incorrecto. @Profile es una feature de primera clase de Spring para ambientes, no limitada a tests. application.properties con perfiles es complementario, no alternativo."},
  {label:"Si ambos beans implementan la misma interfaz y uno tiene @Profile('prod'), Spring lanza NoUniqueBeanDefinitionException siempre",explain:"Incorrecto. Spring solo registra los beans cuyo @Profile coincide con el perfil activo. Si el perfil activo es 'prod', solo NotificacionSMTP existe en el contexto. No hay ambigüedad."},
], correct:1},

// ══════════ SPRING BOOT BANNER/STARTUP ══════════
{cat:"Spring Boot Internals",
q:"¿Cuál es el orden correcto de eventos durante el arranque de una aplicación Spring Boot y qué uso tiene ApplicationRunner?",
options:[
  {label:"Los beans se crean después de que la aplicación empieza a recibir tráfico HTTP; el servidor Tomcat arranca primero",explain:"Incorrecto. El servidor HTTP arranca después de que el ApplicationContext esté completamente inicializado y todos los beans estén creados y configurados."},
  {label:"Orden: (1) SpringApplication crea el ApplicationContext, (2) escanea y registra beans, (3) inyecta dependencias, (4) ejecuta ApplicationRunner/CommandLineRunner, (5) arranca el servidor HTTP. ApplicationRunner es útil para pre-cargar cachés, verificar conectividad con servicios externos o migrar datos al iniciar",explain:"Correcto. En banca: ApplicationRunner puede pre-cargar los tipos de cambio del día en caché al arrancar (evitando que la primera petición sea lenta), verificar que la conexión con el Core Bancario funciona antes de empezar a recibir tráfico, o ejecutar scripts de inicialización. Si ApplicationRunner lanza excepción, la aplicación no arranca."},
  {label:"ApplicationRunner y CommandLineRunner son lo mismo; la diferencia es solo el nombre del método abstracto",explain:"Incorrecto. La diferencia es el tipo de argumento: CommandLineRunner recibe String[] args (argumentos de línea de comandos crudos). ApplicationRunner recibe ApplicationArguments que ofrece acceso tipado a opciones (--nombre=valor) y argumentos no-option."},
  {label:"ApplicationRunner se ejecuta en un thread separado para no retrasar el arranque del servidor HTTP",explain:"Incorrecto. ApplicationRunner se ejecuta síncronamente en el thread principal de arranque, antes de que el servidor HTTP empiece a aceptar conexiones. Si el runner tarda, el servicio no estará disponible hasta que termine."},
], correct:1},

  q:"¿Cuáles son las principales características de Java 17 que mencionarías en una entrevista senior?",

    {label:"Generics, Autoboxing y Varargs", explain:"Incorrecto. Esas son características de Java 5, no de Java 17."},
    {label:"Records, Pattern Matching (instanceof), Switch expressions y Sealed Classes", explain:"Correcto. Java 17 introdujo/estabilizó Records (DTOs inmutables), Pattern Matching, Switch expressions y Sealed Classes para jerarquías controladas."},
    {label:"Virtual Threads y Structured Concurrency", explain:"Incorrecto. Virtual Threads y Structured Concurrency son características de Java 21, no de Java 17."},
    {label:"Modules System (Jigsaw) y JShell", explain:"Incorrecto. El sistema de módulos y JShell llegaron con Java 9."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Cuál es la diferencia entre Mono y Flux en Project Reactor (Spring WebFlux)?",
  options:[
    {label:"Mono es para streams infinitos; Flux para un único valor asincrónico", explain:"Incorrecto. Es exactamente al revés."},
    {label:"Mono representa 0 o 1 elemento; Flux representa 0 a N elementos", explain:"Correcto. Mono<T> modela respuestas de un único elemento (o vacío). Flux<T> modela colecciones o streams con múltiples elementos."},
    {label:"No hay diferencia práctica; son intercambiables", explain:"Incorrecto. Son tipos distintos con semántica diferente; usar el incorrecto puede causar errores de compilación o comportamiento inesperado."},
    {label:"Mono se usa solo para errores; Flux para resultados exitosos", explain:"Incorrecto. Ambos pueden emitir errores. La distinción es la cardinalidad (1 vs. N), no el tipo de resultado."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Por qué JDBC no es adecuado para aplicaciones completamente reactivas y cuál es la alternativa?",
  options:[
    {label:"JDBC no soporta SQL estándar; la alternativa es usar NoSQL", explain:"Incorrecto. JDBC soporta SQL estándar perfectamente; el problema es el modelo de I/O, no el lenguaje de consultas."},
    {label:"JDBC es bloqueante por naturaleza; la alternativa reactiva es R2DBC", explain:"Correcto. JDBC bloquea el hilo mientras espera la respuesta de la BD. R2DBC (Reactive Relational Database Connectivity) provee acceso no bloqueante a bases de datos relacionales."},
    {label:"JDBC solo funciona con MySQL; R2DBC con cualquier BD", explain:"Incorrecto. JDBC soporta múltiples bases de datos; la razón del cambio es el modelo reactivo, no la compatibilidad."},
    {label:"JDBC no soporta transacciones; R2DBC sí", explain:"Incorrecto. JDBC tiene soporte completo para transacciones; R2DBC también las soporta en modo reactivo."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Cómo se previene la inyección SQL al usar JDBC puro?",
  options:[
    {label:"Usando Statement y concatenando los valores del usuario directamente en el SQL", explain:"Incorrecto. Concatenar valores del usuario en SQL es exactamente el vector de ataque de SQL Injection; debe evitarse siempre."},
    {label:"Usando PreparedStatement con parámetros (?), sin concatenar strings del usuario", explain:"Correcto. PreparedStatement separa el código SQL de los datos. Los parámetros ? son tratados como datos literales, no como SQL ejecutable."},
    {label:"Encriptando la contraseña de la base de datos", explain:"Incorrecto. Encriptar credenciales no protege contra SQL Injection; son vectores de ataque completamente distintos."},
    {label:"Usando un firewall de red frente a la base de datos", explain:"Incorrecto. Un firewall de red no puede inspeccionar ni sanitizar el contenido de las consultas SQL de la aplicación."},
  ], correct:1
},
{
  cat:"Balotario 02 – Reactivo / JDBC / JPA / SQL / SAGA",
  q:"¿Qué es el patrón SAGA y cuándo se usa?",
  options:[
