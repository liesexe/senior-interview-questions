const CONCURRENCY_QUESTIONS = [
// ══════════ FUNDAMENTOS & THREAD LIFECYCLE ══════════
{cat:"Thread Lifecycle",
q:"¿Cuáles son los 6 estados del ciclo de vida de un Thread en Java y qué transición ocurre en cada caso?",
options:[
  {label:"NEW → RUNNING → DEAD. Solo hay tres estados lineales sin posibilidad de bloqueos intermedios.", explain:"Incorrecto. El ciclo de vida tiene 6 estados definidos en Thread.State. Las transiciones no son lineales: un thread puede pasar de RUNNABLE a BLOCKED, WAITING o TIMED_WAITING múltiples veces."},
  {label:"NEW (creado, no iniciado) → RUNNABLE (ejecutando o listo) → BLOCKED (esperando monitor lock) → WAITING (wait/join sin timeout) → TIMED_WAITING (sleep/wait con timeout) → TERMINATED. Transiciones controladas por scheduler y llamadas del programa.", explain:"Correcto. En banca: un thread BLOCKED esperando synchronized puede causar contención en alta carga. WAITING con Object.wait() necesita notify() explícito. TIMED_WAITING con Thread.sleep() retiene todos sus locks. Diagnosticar con jstack: threads en BLOCKED esperándose mutuamente = deadlock. Threads huérfanos en WAITING = memory/resource leak."},
  {label:"Los threads tienen solo dos estados observables: activo e inactivo. Los demás son abstracciones del SO.", explain:"Incorrecto. Java expone 6 estados mediante el enum Thread.State, accesibles con thread.getState(). Son parte del API público y críticos para debugging con jstack/JConsole."},
  {label:"Un thread en WAITING consume CPU activamente con busy-wait hasta recibir notificación.", explain:"Incorrecto. Un thread en WAITING está suspendido por la JVM y NO consume CPU. El busy-wait (while(!condition){}) sí consume CPU y es un antipatrón grave en servidores bancarios bajo alta carga."},
], correct:1},

{cat:"Thread Lifecycle",
q:"¿Qué diferencia hay entre thread.start() y thread.run(), y cuál es el riesgo real en código bancario?",
options:[
  {label:"start() y run() son equivalentes; la JVM decide internamente cómo ejecutar el thread.", explain:"Incorrecto. Son fundamentalmente distintos: run() es un método regular sin paralelismo; start() crea un nuevo OS thread."},
  {label:"thread.start(): crea un nuevo OS thread y ejecuta run() en él concurrentemente. thread.run(): llama run() en el thread ACTUAL, sin crear ningún thread nuevo. Error clásico: for(Thread t : threads) { t.run(); } — todo corre secuencial en el thread principal, nunca hay paralelismo.", explain:"Correcto. En banca: si el servicio de validación de pagos llama t.run() en lugar de t.start() para n validaciones paralelas, todo corre secuencial. Con SLAs de 200ms y 10 validaciones de 50ms cada una = 500ms → incumplimiento de SLA. El bug es silencioso: el código compila, corre, y da resultados correctos pero sin concurrencia."},
  {label:"thread.start() es deprecated desde Java 11; la forma moderna es ExecutorService.execute().", explain:"Incorrecto. Thread.start() no está deprecated en ninguna versión de Java. ExecutorService es preferible para gestión de pools pero Thread.start() sigue siendo válido."},
  {label:"run() inicia el thread inmediatamente; start() lo agenda para ejecución futura.", explain:"Incorrecto. Es exactamente al revés. run() ejecuta el código en el thread actual. start() crea el OS thread y lo registra con el scheduler."},
], correct:1},

{cat:"Thread Lifecycle",
q:"¿Qué es un daemon thread, cuándo usarlo en banca, y qué bug grave puede ocurrir si se usa incorrectamente?",
options:[
  {label:"Daemon threads tienen mayor prioridad que los non-daemon; se usan para tareas urgentes.", explain:"Incorrecto. Daemon vs non-daemon no tiene relación con prioridad. Es sobre si el thread impide o no que la JVM finalice."},
  {label:"Daemon thread: la JVM finaliza aunque esté corriendo si no quedan threads non-daemon activos. Uso correcto: monitoring de métricas, heartbeats, cleanup de caché. Bug crítico: usar daemon para escrituras a BD o publicación a Kafka — si la JVM recibe SIGTERM, el thread muere abruptamente sin commit.", explain:"Correcto. Ejemplo de bug real: thread daemon que hace flush de un buffer de eventos a Kafka cada 5 segundos. En un rolling deployment, la JVM recibe SIGTERM, los threads non-daemon terminan en shutdown hook, y el daemon de Kafka muere con eventos sin publicar → pérdida de datos sin excepción visible. Solución: usar thread non-daemon + shutdown hook explícito con awaitTermination."},
  {label:"Daemon threads garantizan que su tarea siempre se completa incluso con SIGTERM.", explain:"Incorrecto. Es exactamente lo opuesto. La JVM los mata sin ejecutar finally blocks ni shutdown hooks."},
  {label:"ExecutorService crea daemon threads por defecto; se necesita ThreadFactory personalizado para non-daemon.", explain:"Incorrecto. Los ThreadFactory por defecto de Executors crean threads non-daemon. Para daemon threads se necesita factory personalizado: t -> { Thread th = new Thread(r); th.setDaemon(true); return th; }."},
], correct:1},

{cat:"Thread Lifecycle",
q:"¿Cómo funciona Thread.interrupt() y cuál es el patrón correcto para manejar InterruptedException en un worker bancario?",
options:[
  {label:"Thread.interrupt() termina el thread inmediatamente como Thread.stop().", explain:"Incorrecto. interrupt() solo establece una bandera booleana. El thread debe verificarla activamente o estar bloqueado en un método que lanza InterruptedException. Thread.stop() fue deprecated por inseguro."},
  {label:"interrupt() establece la bandera de interrupción. Si el thread está en sleep/wait/join → lanza InterruptedException (y limpia la bandera). Si está ejecutando → el thread debe verificar isInterrupted() periódicamente. Patrón correcto: catch(InterruptedException e) { Thread.currentThread().interrupt(); limpiar; return; }", explain:"Correcto. Error frecuente: catch(InterruptedException e) { log.warn('interrupted'); } — se traga la señal, el thread no puede detenerse, el shutdown del ExecutorService nunca termina. En banca: un worker de procesamiento de pagos que traga InterruptedException puede causar que un shutdown graceful de 30 segundos nunca complete, forzando un kill -9 que interrumpe transacciones en curso. Siempre restaurar la bandera con Thread.currentThread().interrupt()."},
  {label:"isInterrupted() e interrupted() son idénticos: ambos devuelven el estado sin modificar la bandera.", explain:"Incorrecto. isInterrupted() (instancia) devuelve el estado SIN limpiar. Thread.interrupted() (estático) devuelve el estado Y LIMPIA la bandera. Diferencia crítica: llamar interrupted() dos veces puede dar true luego false."},
  {label:"En Java 17+ los threads responden automáticamente a interrupt() sin necesidad de verificar la bandera.", explain:"Incorrecto. El manejo de interrupt() siempre ha sido responsabilidad del código del thread. Ninguna versión de Java automatiza esto."},
], correct:1},

{cat:"Thread Lifecycle",
q:"¿Qué diferencia hay entre Thread.sleep(), Object.wait() y LockSupport.park() y cuál usar en cada caso?",
options:[
  {label:"Son sinónimos funcionales; la elección es de estilo.", explain:"Incorrecto. Tienen semánticas completamente distintas respecto a locks, quién los reanuda, y manejo de interrupción."},
  {label:"sleep(ms): suspende sin liberar ningún lock. wait(): debe estar en bloque synchronized, LIBERA el monitor durante la espera. park(): suspende sin monitor, se reanuda con unpark() — base de java.util.concurrent. Usar wait() en patrón productor-consumidor, park/unpark raramente en código de aplicación.", explain:"Correcto. El bug más común: usar sleep() dentro de synchronized en lugar de wait(). Resultado: el thread duerme RETENIENDO el lock — todos los threads que necesiten ese monitor quedan bloqueados. En banca: un thread que duerme 5 segundos dentro de synchronized(cuenta) bloquea todas las operaciones sobre esa cuenta durante 5 segundos. LockSupport.park/unpark es la base interna de ReentrantLock, CountDownLatch, Semaphore — raramente se usa directamente en código de aplicación."},
  {label:"Object.wait() solo puede usarse en threads daemon.", explain:"Incorrecto. wait() lanza IllegalMonitorStateException si no se tiene el monitor del objeto. El tipo de thread (daemon o no) no tiene relación con wait()."},
  {label:"Thread.sleep() libera todos los locks adquiridos.", explain:"Incorrecto. sleep() NO libera ningún lock. Solo suspende la ejecución por el tiempo indicado, reteniendo todos los monitors adquiridos."},
], correct:1},

// ══════════ SINCRONIZACIÓN & MEMORIA ══════════
{cat:"Sincronización & Memoria",
q:"¿Qué es el Java Memory Model (JMM) y qué bug de visibilidad puede ocurrir sin él en un sistema bancario?",
options:[
  {label:"El JMM define la velocidad de acceso a memoria; no impacta la corrección del código.", explain:"Incorrecto. El JMM define cuándo los cambios de un thread son visibles para otros. Sin sincronización correcta, el código puede parecer correcto pero tener bugs de visibilidad sutiles que solo aparecen bajo carga."},
  {label:"El JMM define la relación happens-before: garantiza que acciones anteriores a una escritura sincronizada son visibles tras la lectura correspondiente. Sin sincronización, la JVM/CPU puede reordenar instrucciones y cachear valores. Un thread puede leer un valor obsoleto aunque otro ya lo actualizó.", explain:"Correcto. Bug real en banca: volatile boolean procesando = false; Thread A: while(!procesando) { Thread.sleep(1); } Thread B: procesando = true; Sin volatile, Thread A puede nunca ver el cambio — el valor está en el registro del CPU de Thread B. Con volatile: se establece happens-before que garantiza visibilidad. En sistemas bancarios: flags de shutdown, límites de crédito actualizados en caliente, configuración de tasas de interés — todos requieren volatile o sincronización explícita para garantizar que todos los threads ven el valor más reciente."},
  {label:"El JMM garantiza thread-safety automática si el objeto se construye en un constructor synchronized.", explain:"Incorrecto. Un constructor synchronized no hace los campos thread-safe. La publicación segura del objeto (cómo la referencia llega a otros threads) es lo que importa."},
  {label:"El JMM de Java es idéntico al de C++11; no necesita estudio adicional.", explain:"Incorrecto. Difieren en detalles importantes: volatile en Java tiene semántica más fuerte que en C++, y el modelo de construcción de objetos difiere. Conocer C++ concurrente no es suficiente."},
], correct:1},

{cat:"Sincronización & Memoria",
q:"¿Por qué volatile no es suficiente para un contador de transacciones y qué usar en su lugar?",
code:`public class ContadorTx {
  private volatile long contador = 0;

  public void registrar() {
    contador++; // ¿thread-safe?
  }
}`,
options:[
  {label:"Es thread-safe. volatile garantiza que todos los threads ven el valor más reciente.", explain:"Incorrecto. volatile garantiza visibilidad pero NO atomicidad. contador++ es read-modify-write (3 pasos): leer, sumar 1, escribir. Dos threads pueden leer el mismo valor y ambos escribir el mismo resultado, perdiendo un conteo."},
  {label:"contador++ NO es atómico aunque sea volatile. Dos threads leen valor=100, ambos calculan 101, ambos escriben 101 → el contador muestra 101 en lugar de 102. Solución: AtomicLong.incrementAndGet() para operaciones simples, o synchronized para operaciones compuestas.", explain:"Correcto. Escenario bancario: contador de transacciones procesadas. Con volatile, en alta concurrencia el contador puede reportar 9,850 transacciones cuando realmente se procesaron 10,000. La diferencia es silenciosa — el sistema funciona pero los reportes son incorrectos. Para auditoría bancaria, esto es un problema de compliance. Solución: private final AtomicLong contador = new AtomicLong(0); → contador.incrementAndGet(); es atómico mediante CAS sin bloqueo."},
  {label:"El problema se resuelve usando long en lugar de int; los longs son atómicos en Java 64-bit.", explain:"Incorrecto. Las operaciones sobre long (leer + modificar + escribir) no son atómicas independientemente del tipo de sistema. El problema es la operación compuesta, no el tipo de dato."},
  {label:"volatile solo falla con más de 10 threads; para menos threads es suficiente para contadores.", explain:"Incorrecto. La race condition puede ocurrir con solo 2 threads. El número de threads no define si volatile es suficiente — la naturaleza de la operación (simple escritura vs read-modify-write) es lo que importa."},
], correct:1},

{cat:"Sincronización & Memoria",
q:"¿Qué garantías distintas ofrece synchronized en método de instancia vs método estático vs bloque con objeto custom?",
code:`class ServicioPagos {
  public synchronized void procesar() { ... }        // (A)
  public static synchronized void auditar() { ... }  // (B)
  private final Object lockCuenta = new Object();
  public void transferir() {
    synchronized(lockCuenta) { ... }                 // (C)
  }
}`,
options:[
  {label:"Los tres casos usan el mismo lock; synchronized siempre bloquea la clase completa.", explain:"Incorrecto. Cada caso usa un monitor diferente: (A) usa this (la instancia), (B) usa ServicioPagos.class, (C) usa lockCuenta. Son completamente independientes."},
  {label:"(A) bloquea la instancia (this) — dos threads pueden llamar procesar() en instancias distintas concurrentemente. (B) bloquea la clase — solo un thread en auditar() a la vez en toda la JVM. (C) bloquea el objeto custom — más granular, permite múltiples locks en la misma instancia.", explain:"Correcto. En banca: (B) para auditar() es peligroso si es lento — bloquea a toda la aplicación. (C) con lockCuenta por cuenta bancaria es el patrón correcto para transferencias: synchronized(lockCuenta.get(cuentaOrigen)) y synchronized(lockCuenta.get(cuentaDestino)) con orden consistente. Nunca usar synchronized(String) porque los strings son internados — dos clases distintas pueden compartir el mismo monitor inesperadamente."},
  {label:"(C) con objeto custom es un antipatrón; siempre usar synchronized en el método para claridad.", explain:"Incorrecto. El bloqueo con objeto custom es más flexible y recomendado cuando: se necesitan múltiples locks independientes en una clase, se quiere un lock privado que código externo no pueda interferir (un objeto this puede ser usado como lock por código externo), o se quiere granularidad fina."},
  {label:"synchronized en métodos estáticos fue deprecated en Java 11; usar ReentrantLock en su lugar.", explain:"Incorrecto. synchronized en métodos estáticos es completamente válido en todas las versiones de Java. No está deprecated."},
], correct:1},

{cat:"Sincronización & Memoria",
q:"¿Qué es el patrón double-checked locking, cuándo es necesario volatile y cuál es la alternativa más simple?",
options:[
  {label:"Double-checked locking no funciona en ninguna versión de Java; usar siempre enum Singleton.", explain:"Incorrecto. Double-checked locking con volatile funciona correctamente desde Java 5+. El enum Singleton es más simple pero ambos son válidos."},
  {label:"Sin volatile, el CPU puede publicar una referencia no-null a un objeto aún no completamente construido (reordenamiento de instrucciones). Otro thread lee la referencia, accede al objeto y lee campos null. Con volatile instance: se establece happens-before que previene el reordenamiento. Alternativa más simple: Holder pattern (inicialización por clase).", explain:"Correcto. El reordenamiento: (1) allocate, (2) assign reference, (3) initialize fields — el JIT puede reordenar steps 2 y 3. Thread B ve instance != null pero los campos aún no están inicializados. En banca: un Singleton de ConnectionPool mal implementado puede retornar un pool con maxConnections=0 o URL=null. Alternativa más simple: class Holder { static final Repo INSTANCE = new Repo(); } — la JVM garantiza thread-safe initialization de campos estáticos finales sin volatile."},
  {label:"volatile en el campo de instancia garantiza que el constructor es synchronized.", explain:"Incorrecto. volatile y synchronized son mecanismos distintos. volatile en el campo garantiza visibilidad y previene reordenamiento en la asignación, no sincroniza el constructor."},
  {label:"En Java 21 el JIT garantiza orden de construcción; double-checked locking ya no necesita volatile.", explain:"Incorrecto. volatile sigue siendo necesario. El JMM no cambió esta semántica en ninguna versión de Java incluyendo 21."},
], correct:1},

// ══════════ EXECUTORSERVICE & THREAD POOLS ══════════
{cat:"ExecutorService & Thread Pools",
q:"¿Por qué Executors.newFixedThreadPool() puede causar OutOfMemoryError en producción y cómo evitarlo?",
options:[
  {label:"newFixedThreadPool() no puede causar OOM porque tiene un número fijo de threads.", explain:"Incorrecto. El número fijo de threads no previene OOM. El problema es la cola interna de tareas, no el número de threads."},
  {label:"newFixedThreadPool(N) usa internamente una LinkedBlockingQueue SIN límite. Si las tareas llegan más rápido de lo que se procesan, la cola crece indefinidamente hasta llenar el heap. Solución: usar ThreadPoolExecutor con ArrayBlockingQueue acotada y RejectedExecutionHandler.", explain:"Correcto. En banca: servicio de validaciones con FixedThreadPool(10) y BD lenta. En un pico de tráfico, 10 threads procesan lentamente, pero 50,000 tareas se encolan en la LinkedBlockingQueue ilimitada → OutOfMemoryError. La aplicación cae sin procesar ninguna transacción pendiente. Solución: new ThreadPoolExecutor(10, 10, 0, SECONDS, new ArrayBlockingQueue<>(1000), new CallerRunsPolicy()). Con cola llena + CallerRunsPolicy: el thread que envía la tarea la ejecuta él mismo → backpressure natural que frena al productor."},
  {label:"CachedThreadPool es la alternativa segura porque libera threads automáticamente.", explain:"Incorrecto. CachedThreadPool es peor para cargas sostenidas: crea un thread por tarea sin límite → miles de threads → OOM o saturación de conexiones de BD."},
  {label:"El OOM se previene aumentando la memoria JVM con -Xmx; es un problema de configuración de hardware.", explain:"Incorrecto. Aumentar memoria solo retrasa el problema. La solución correcta es controlar el crecimiento de la cola con backpressure."},
], correct:1},

{cat:"ExecutorService & Thread Pools",
q:"¿Qué es CallerRunsPolicy vs AbortPolicy vs DiscardOldestPolicy y cuál es la más segura para pagos bancarios?",
options:[
  {label:"Las tres políticas son equivalentes en comportamiento; la elección es de preferencia del equipo.", explain:"Incorrecto. Tienen comportamientos radicalmente distintos ante saturación del pool, con implicaciones críticas para sistemas bancarios."},
  {label:"AbortPolicy: lanza RejectedExecutionException (default) — el llamante debe manejarla. CallerRunsPolicy: el thread llamante ejecuta la tarea → backpressure natural. DiscardOldestPolicy: descarta la tarea más antigua → pérdida silenciosa. Para pagos: CallerRunsPolicy o AbortPolicy con retry; NUNCA DiscardOldestPolicy.", explain:"Correcto. DiscardOldestPolicy en un sistema de pagos: cuando el pool está saturado, descarta silenciosamente el pago más antiguo en la cola. El cliente no recibe confirmación, el banco no procesa el pago, y no hay log de error. En auditoría, el pago simplemente no existe. AbortPolicy es más segura: la excepción sube al llamante que puede implementar retry con backoff o encolarlo en Kafka para procesamiento posterior. CallerRunsPolicy es buena para backpressure pero cuidado: si el thread llamante es el thread de Tomcat, las requests HTTP se bloquean hasta que termine la tarea."},
  {label:"DiscardOldestPolicy es la más segura porque procesa siempre las tareas más recientes (LIFO).", explain:"Incorrecto. Las tareas bancarias son FIFO por naturaleza — descartar las más antiguas significa descartar pagos ya encolados que el cliente está esperando. Además, la pérdida es silenciosa sin ningún log de error."},
  {label:"En Spring Boot, la RejectedExecutionHandler se configura automáticamente según el tipo de servicio; no es necesario configurarla manualmente.", explain:"Incorrecto. Spring Boot configura ThreadPoolTaskExecutor con AbortPolicy por defecto, pero la política debe evaluarse explícitamente según los requisitos del negocio. Para pagos bancarios, la política de rechazo es una decisión de arquitectura crítica."},
], correct:1},

{cat:"ExecutorService & Thread Pools",
q:"¿Cómo implementas shutdown graceful de un ExecutorService en Spring Boot al recibir SIGTERM?",
options:[
  {label:"Spring Boot destruye automáticamente todos los ExecutorService al recibir SIGTERM sin configuración adicional.", explain:"Incorrecto. Spring destruye beans que implementan DisposableBean o @PreDestroy. ExecutorService creados con Executors.newFixedThreadPool() NO son beans de Spring y no tienen shutdown automático."},
  {label:"Patrón correcto: @PreDestroy o implements DisposableBean → executor.shutdown() + executor.awaitTermination(30, SECONDS) + executor.shutdownNow() si timeout. En Spring Boot 2.3+: server.shutdown=graceful para el servlet container.", explain:"Correcto. En banca: el shutdown graceful de 30 segundos permite que las transacciones en curso terminen. executor.shutdown() deja de aceptar nuevas tareas. awaitTermination(30, SECONDS) espera que las actuales completen. Si después de 30s aún hay tareas activas (BD caída), shutdownNow() envía interrupt() — por eso los workers deben manejar InterruptedException. En Spring Boot 3: @Bean Executor taskExecutor() { var executor = new ThreadPoolTaskExecutor(); executor.setWaitForTasksToCompleteOnShutdown(true); executor.setAwaitTerminationSeconds(30); return executor; } — esto integra automáticamente con el graceful shutdown de Spring."},
  {label:"shutdownNow() es más seguro que shutdown() porque termina todas las tareas inmediatamente.", explain:"Incorrecto. shutdownNow() envía interrupt() a los threads en ejecución pero no garantiza que terminen. Para shutdown seguro, siempre shutdown() + awaitTermination() + shutdownNow() como último recurso."},
  {label:"Los threads de un ExecutorService terminan automáticamente cuando su Callable retorna; no es necesario llamar shutdown().", explain:"Incorrecto. El ExecutorService mantiene los threads vivos para reutilizarlos. Sin shutdown() explícito, los threads non-daemon impiden que la JVM termine tras un SIGTERM, colgando el proceso de deployment."},
], correct:1},

// ══════════ LOCKS AVANZADOS ══════════
{cat:"Locks Avanzados",
q:"¿Cuándo usar StampedLock en lugar de ReadWriteLock y cuáles son sus riesgos?",
options:[
  {label:"StampedLock es siempre superior a ReadWriteLock y debe reemplazarlo en todo código moderno.", explain:"Incorrecto. StampedLock es más eficiente pero NO es reentrant y no tiene soporte de Condition. ReadWriteLock sigue siendo preferible cuando se necesita reentrancy o Conditions."},
  {label:"StampedLock agrega optimistic read: tryOptimisticRead() no bloquea y retorna un stamp. Después de leer, validate(stamp) verifica que no hubo escrituras. Si validate() falla, releer con readLock(). Resuelve el writer starvation de ReadWriteLock y tiene mejor throughput.", explain:"Correcto. Caso bancario: caché de tipos de cambio. Con ReadWriteLock: bajo lecturas constantes el escritor puede estar bloqueado indefinidamente. Con StampedLock: long stamp = lock.tryOptimisticRead(); double tasa = this.tasa; if(!lock.validate(stamp)) { stamp = lock.readLock(); try { tasa = this.tasa; } finally { lock.unlockRead(stamp); } }. El optimistic read es O(1) sin bloqueo — en sistemas con 99% lecturas y 1% escrituras el beneficio es enorme. Riesgos: NO es reentrant (el mismo thread haciendo readLock() dos veces deadlock); si se pierde el stamp, hay un bug difícil de detectar; más complejo de usar correctamente."},
  {label:"StampedLock garantiza que validate(stamp) siempre retorna true si no hubo escrituras concurrentes.", explain:"Incorrecto. validate(stamp) puede retornar false incluso sin escrituras en algunos escenarios de reordenamiento de instrucciones. El código debe estar preparado para releer aunque sea poco frecuente."},
  {label:"StampedLock.readLock() y ReadWriteLock.readLock() son idénticos en comportamiento; solo difieren en sintaxis.", explain:"Incorrecto. StampedLock.readLock() retorna un long (stamp) que debe usarse para unlockRead(stamp). ReadWriteLock.readLock() retorna un Lock con unlock(). Además, StampedLock no es reentrant mientras ReadWriteLock sí (ReentrantReadWriteLock)."},
], correct:1},

{cat:"Locks Avanzados",
q:"¿Cómo prevenir deadlocks en un servicio de transferencias bancarias que necesita lockear dos cuentas?",
code:`// Thread A: transferir(cuenta001, cuenta002, 500)
// Thread B: transferir(cuenta002, cuenta001, 300)
// ¿Cómo evitar el deadlock?`,
options:[
  {label:"Usar synchronized en ambas cuentas en cualquier orden; la JVM detecta deadlocks y los resuelve automáticamente.", explain:"Incorrecto. La JVM detecta deadlocks (ThreadMXBean) pero NO los resuelve. El sistema queda bloqueado indefinidamente hasta reinicio."},
  {label:"Orden consistente de locks: siempre lockear la cuenta con menor ID primero. Así Thread A y B adquieren los locks en el mismo orden → no hay espera circular. Alternativa: tryLock(timeout) con abortar si no se obtiene el lock.", explain:"Correcto. Sin orden consistente: Thread A lock(cuenta001) espera lock(cuenta002). Thread B lock(cuenta002) espera lock(cuenta001) → deadlock clásico. Con orden consistente: ambos threads siempre intentan lock(minId) primero. Thread A: lock(001) luego lock(002). Thread B también: lock(001) luego lock(002). Thread B espera a que Thread A libere lock(001) → no hay deadlock, solo bloqueo temporal correcto. Con tryLock: if(!lock1.tryLock(100, MILLISECONDS)) { // abort y retry con backoff }. En banca: el patron de orden por ID es el estándar en servicios de transferencia de alto volumen como los de core banking systems."},
  {label:"La solución es usar una sola base de datos con SELECT FOR UPDATE; los locks de aplicación no son necesarios.", explain:"Incorrecto. SELECT FOR UPDATE resuelve el deadlock a nivel de BD, pero los locks de aplicación siguen siendo necesarios para coordinar operaciones en memoria antes de ir a BD, y para reducir la duración de las transacciones de BD."},
  {label:"Usar ConcurrentHashMap para el saldo de cada cuenta evita deadlocks porque ConcurrentHashMap es lock-free.", explain:"Incorrecto. ConcurrentHashMap garantiza operaciones individuales thread-safe, pero una transferencia requiere atomicidad de dos operaciones (débito + crédito). Con ConcurrentHashMap sin lock adicional, el débito puede aplicarse y el crédito fallar, dejando el sistema en estado inconsistente."},
], correct:1},

{cat:"Locks Avanzados",
q:"¿Qué es una Condition variable y cuándo es más eficiente que notifyAll()?",
options:[
  {label:"Condition es un alias de synchronized; ambos funcionan exactamente igual.", explain:"Incorrecto. Condition es parte de ReentrantLock y permite múltiples colas de espera independientes dentro del mismo lock, algo imposible con synchronized."},
  {label:"ReentrantLock permite crear múltiples Condition variables con lock.newCondition(). Cada Condition tiene su propia cola de threads en espera. Await()/signal() en una Condition solo afecta a threads en esa cola. notifyAll() con synchronized despierta TODOS los threads del monitor aunque no les corresponda actuar.", explain:"Correcto. Ejemplo bancario — sistema de transferencias con límite de concurrencia: Condition hayFondos = lock.newCondition(); Condition hayCapacidad = lock.newCondition(). El productor de pagos hace hayCapacidad.await() cuando el sistema está saturado. El consumidor hace hayFondos.signal() cuando hay saldo. Sin Conditions, notifyAll() despertaría tanto productores como consumidores innecesariamente, causando contención y potencial thundering herd. Con Conditions separados: signal() despierta solo el tipo de thread correcto → más eficiente bajo alta concurrencia."},
  {label:"notifyAll() es siempre más seguro que signal() y debe preferirse para evitar missed signals.", explain:"Incorrecto. notifyAll() es más seguro cuando el predicado de espera es el mismo para todos los threads. Con múltiples Conditions, signal() en la Condition correcta es más eficiente y no causa wakeups innecesarios."},
  {label:"Condition.await() no libera el lock; el thread espera reteniendo el lock hasta recibir signal().", explain:"Incorrecto. Condition.await() LIBERA el lock asociado mientras espera, exactamente como Object.wait() libera el monitor. Si no liberara el lock, ningún otro thread podría llamar signal() → deadlock."},
], correct:1},

// ══════════ ATOMIC & CAS ══════════
{cat:"Clases Atomic & CAS",
q:"¿Qué es el problema ABA en CAS y cómo lo resuelve AtomicStampedReference en banca?",
options:[
  {label:"ABA es cuando el valor pasa de A a B a A; CAS lo detecta automáticamente y reintenta.", explain:"Incorrecto. CAS NO detecta el problema ABA. Compara el valor actual con el esperado: si ambos son A, CAS tiene éxito aunque el valor haya pasado por B."},
  {label:"ABA: Thread A lee valor=100. Thread B lo cambia a 200 (B) y devuelve a 100 (A). Thread A hace CAS(esperado=100, nuevo=150) → éxito, aunque el estado intermedio invalida la lógica. AtomicStampedReference agrega un número de versión (stamp) que se incrementa en cada update.", explain:"Correcto. Ejemplo bancario: sistema de límite de crédito con CAS. saldo=1000. Thread A lee saldo=1000, aprueba un crédito de 500. Thread B: retiro de 500 (saldo=500), luego depósito de 500 (saldo=1000). Thread A hace CAS(1000, 500): tiene éxito aunque el saldo intermediario fue 500 — el crédito debería haberse evaluado con el saldo después de las operaciones de B. AtomicStampedReference: cada update incrementa el stamp. Thread A: CAS(valor=1000, stamp=1, nuevoValor=500, nuevoStamp=2). Thread B: ya cambió el stamp a 3. El CAS de A falla porque el stamp no coincide (1 ≠ 3). Solución: reevaluar con los datos actuales."},
  {label:"AtomicStampedReference es deprecated; usar AtomicMarkableReference que resuelve ABA más eficientemente.", explain:"Incorrecto. AtomicStampedReference no está deprecated. AtomicMarkableReference usa un boolean en lugar de un integer como stamp — es menos preciso (solo detecta 'fue modificado alguna vez', no cuántas veces)."},
  {label:"El problema ABA solo ocurre con tipos primitivos; con objetos, CAS compara referencias y siempre detecta cambios.", explain:"Incorrecto. AtomicReference también puede tener ABA: si se asigna un nuevo objeto con los mismos valores, CAS puede tener éxito inapropiadamente si se reutilizan objetos del pool."},
], correct:1},

{cat:"Clases Atomic & CAS",
q:"¿Cuándo usar AtomicReference.compareAndSet() para implementar operaciones condicionales thread-safe sin synchronized?",
code:`// Actualizar el límite de crédito solo si no cambió desde que lo leíste
// ¿Cómo hacerlo sin synchronized?`,
options:[
  {label:"AtomicReference.compareAndSet() no puede usarse para operaciones condicionales; solo sirve para actualizaciones simples.", explain:"Incorrecto. compareAndSet() es precisamente para operaciones condicionales: actualiza solo si el valor actual es el esperado."},
  {label:"AtomicReference<LimiteCredito> limite = new AtomicReference<>(actual); LimiteCredito viejo = limite.get(); LimiteCredito nuevo = calcularNuevo(viejo); if(!limite.compareAndSet(viejo, nuevo)) { // otro thread actualizó → reintentar }. Patrón optimistic: reintentar si CAS falla.", explain:"Correcto. En banca: actualización del límite de crédito de un cliente. Thread A lee límite=50,000, calcula nuevo límite=55,000 basado en scoring. Thread B también lee límite=50,000 y calcula 48,000 (riesgo detectado). Sin CAS: el último en escribir gana — potencialmente el de mayor riesgo se sobrescribe. Con CAS: Thread A hace CAS(50000ref, 55000ref) → éxito. Thread B hace CAS(50000ref, 48000ref) → FALLA (el ref ya no es 50000ref, es 55000ref). Thread B relee el nuevo valor y recalcula. Ventaja sobre synchronized: sin bloqueo, mejor throughput bajo baja-media contención. Usar AtomicStampedReference si hay riesgo de ABA."},
  {label:"En Java moderno es mejor usar synchronized con locks granulares; CAS tiene demasiada complejidad para código de producción.", explain:"Incorrecto. CAS (a través de clases Atomic*) es el mecanismo estándar de producción en alta concurrencia. Es la base de ConcurrentHashMap, LongAdder, y otros. La complejidad se encapsula en las clases de java.util.concurrent.atomic."},
  {label:"compareAndSet() siempre tiene éxito si los valores son iguales; el ABA problem solo afecta a tipos primitivos.", explain:"Incorrecto. compareAndSet() compara referencias en AtomicReference (identidad de objeto, no igualdad de valor). Dos objetos con los mismos campos son referencias distintas. Para tipos primitivos (AtomicInteger, AtomicLong), compara por valor."},
], correct:1},

// ══════════ COLECCIONES CONCURRENTES ══════════
{cat:"Colecciones Concurrentes",
q:"¿Qué operaciones de ConcurrentHashMap son atómicas y cuáles requieren sincronización adicional?",
options:[
  {label:"Todas las operaciones de ConcurrentHashMap son atómicas; no se necesita sincronización adicional en ningún caso.", explain:"Incorrecto. Las operaciones INDIVIDUALES son thread-safe, pero las operaciones COMPUESTAS (check-then-act) no son atómicas sin sincronización adicional o uso de métodos atómicos integrados."},
  {label:"get(), put(), remove() individuales son atómicos. Las operaciones compuestas NO son atómicas: if(!map.containsKey(k)) map.put(k,v) tiene race condition. Solución: map.putIfAbsent(k,v) o map.computeIfAbsent(k, fn) — estos SÍ son atómicos.", explain:"Correcto. Ejemplo bancario crítico — registro de sesiones de usuario: if(!sesiones.containsKey(userId)) { sesiones.put(userId, nuevaSesion); } — race condition: dos requests simultáneos del mismo usuario pueden crear dos sesiones. Con putIfAbsent: Sesion existente = sesiones.putIfAbsent(userId, nuevaSesion); if(existente != null) { usar existente; }. Métodos atómicos de ConcurrentHashMap: putIfAbsent(), computeIfAbsent(), computeIfPresent(), compute(), merge(). Todos ejecutan el lambda de forma atómica con lock de bucket. Para actualizar el saldo: map.compute(cuentaId, (k, saldoActual) -> saldoActual.add(monto)) — atómico sin locks externos."},
  {label:"ConcurrentHashMap.putIfAbsent() no es atómico; es equivalente a if(!containsKey()) put() sin sincronización.", explain:"Incorrecto. putIfAbsent() ES atómico — es exactamente por eso que existe. Adquiere el lock del bucket y ejecuta el check y el put como una sola operación atómica."},
  {label:"Para operaciones compuestas atómicas en ConcurrentHashMap, siempre usar synchronized(map) externamente.", explain:"Incorrecto. Usar synchronized(map) en ConcurrentHashMap es un antipatrón grave: anula su optimización de locks granulares. Los métodos compute/merge/putIfAbsent ya proveen atomicidad a nivel de bucket sin bloquear el mapa completo."},
], correct:1},

{cat:"Colecciones Concurrentes",
q:"¿Cuándo usar PriorityBlockingQueue vs ArrayBlockingQueue en un sistema de procesamiento de pagos?",
options:[
  {label:"Son equivalentes; la elección es solo de preferencia de API.", explain:"Incorrecto. Tienen semánticas completamente distintas: ArrayBlockingQueue es FIFO con capacidad acotada; PriorityBlockingQueue es ordenada por prioridad y sin límite de capacidad."},
  {label:"ArrayBlockingQueue: FIFO acotada, backpressure cuando está llena. PriorityBlockingQueue: prioridad definida por Comparable/Comparator, ilimitada. En banca: ArrayBlockingQueue para procesamiento equitativo con backpressure. PriorityBlockingQueue para pagos urgentes (transferencias BCRP, nóminas) que deben procesarse antes que pagos regulares.", explain:"Correcto. PriorityBlockingQueue en banca: class Pago implements Comparable<Pago> { int prioridad; // 1=urgente, 2=normal, 3=batch. @Override public int compareTo(Pago o) { return Integer.compare(this.prioridad, o.prioridad); } }. PriorityBlockingQueue<Pago> cola = new PriorityBlockingQueue<>();. Los pagos BCRP siempre se procesan antes que los pagos de batch nocturno. CUIDADO: PriorityBlockingQueue NO tiene límite de tamaño → puede causar OOM en picos. Mitigación: poll() con timeout en lugar de take() indefinido, y monitorear el tamaño de la cola."},
  {label:"PriorityBlockingQueue garantiza que todos los elementos de la misma prioridad se procesan en orden FIFO entre sí.", explain:"Incorrecto. PriorityBlockingQueue NO garantiza orden FIFO entre elementos de igual prioridad. Si el orden entre iguales importa, agregar un timestamp como desempate en el Comparator: compareTo ordena primero por prioridad, luego por timestamp de ingreso."},
  {label:"ArrayBlockingQueue es más rápida que PriorityBlockingQueue en todos los casos porque no necesita mantener el heap.", explain:"Incorrecto. La diferencia de rendimiento existe (O(1) vs O(log n) para offer/poll), pero es negligible para volúmenes bancarios normales. La elección debe basarse en el requisito de negocio (FIFO vs prioridad), no en diferencias de nanosegundos."},
], correct:1},

// ══════════ PROBLEMAS CLÁSICOS ══════════
{cat:"Problemas Clásicos de Concurrencia",
q:"¿Qué es livelock, cómo difiere de deadlock, y cuál es un escenario real en sistemas bancarios?",
options:[
  {label:"Livelock y deadlock son el mismo problema; la diferencia es solo conceptual.", explain:"Incorrecto. En deadlock: los threads están BLOQUEADOS sin hacer nada. En livelock: los threads están ACTIVOS y tomando acciones, pero esas acciones los mantienen en un ciclo que no progresa."},
  {label:"Livelock: los threads responden al estado del otro constantemente, pero ninguno avanza. Ambos están ACTIVOS (no bloqueados) pero el sistema no progresa. Ejemplo: dos threads que se ceden el lock mutuamente de forma indefinida.", explain:"Correcto. Escenario bancario real: servicio de conciliación con reintentos. Thread A intenta procesar Tx001, detecta que Thread B la está procesando, cede y espera. Thread B detecta que Thread A intentó procesarla, cede y espera. Ambos hacen Thread.sleep(random) y reintentan → livelock. Solución: backoff exponencial con jitter (espera aleatoria creciente) para romper la simetría: Thread.sleep(baseDelay * Math.pow(2, intentos) + random.nextInt(100)). Con jitter, los dos threads tienen tiempos de reintento distintos y uno inevitablemente avanza primero."},
  {label:"Livelock se resuelve automáticamente después de algunos segundos porque el scheduler de la JVM detecta el ciclo.", explain:"Incorrecto. La JVM no detecta ni resuelve livelocks. Solo detecta deadlocks (ThreadMXBean.findDeadlockedThreads()). El livelock debe resolverse en el diseño del algoritmo con backoff exponencial con jitter."},
  {label:"Livelock solo ocurre con synchronized; con ReentrantLock y tryLock() nunca hay livelock.", explain:"Incorrecto. tryLock() puede causar livelock si ambos threads liberan el lock y reintentan simultáneamente de forma indefinida. tryLock resuelve deadlocks pero no livelocks sin backoff."},
], correct:1},

{cat:"Problemas Clásicos de Concurrencia",
q:"¿Cómo usar ThreadLocal correctamente en un filtro de Spring para propagar contexto de usuario sin fugas?",
code:`@Component
public class UserContextFilter extends OncePerRequestFilter {
  static final ThreadLocal<UserContext> CTX = new ThreadLocal<>();

  protected void doFilterInternal(HttpServletRequest req, ...) {
    CTX.set(new UserContext(req.getHeader("X-User-Id")));
    filterChain.doFilter(req, res);
    // ¿qué falta?
  }
}`,
options:[
  {label:"No falta nada; ThreadLocal limpia automáticamente sus valores cuando el request termina.", explain:"Incorrecto. ThreadLocal no limpia sus valores automáticamente. En un server con thread pool (Tomcat), el thread se reutiliza para el siguiente request → el ThreadLocal del usuario anterior persiste."},
  {label:"Falta CTX.remove() en un bloque finally. Sin remove(), el thread reutilizado para el próximo request lleva el contexto del usuario anterior → fuga de datos de cliente: un usuario puede ver datos de otro.", explain:"Correcto. Bug de seguridad crítico: try { CTX.set(ctx); filterChain.doFilter(req, res); } finally { CTX.remove(); // OBLIGATORIO }. Sin finally: si filterChain.doFilter() lanza excepción, el remove() nunca se ejecuta. El thread vuelve al pool con el contexto del usuario A. El siguiente request (usuario B) en ese thread hereda el UserContext del usuario A → acceso a datos del cliente incorrecto, incidente de seguridad grave en banca. Spring Security resuelve esto en SecurityContextPersistenceFilter con clearContext() en finally. MDC de SLF4J también requiere MDC.clear() en finally para evitar que logs del usuario A aparezcan en el usuario B."},
  {label:"ThreadLocal debe ser de instancia (no static) para funcionar correctamente en filtros Spring.", explain:"Incorrecto. ThreadLocal DEBE ser static para que todos los threads accedan a la misma instancia del ThreadLocal (cada thread tendrá su propia copia del valor, pero la instancia del ThreadLocal debe ser compartida). Si fuera de instancia y el filtro es singleton, sería equivalente; pero la convención es static final."},
  {label:"El problema se resuelve usando InheritableThreadLocal en lugar de ThreadLocal.", explain:"Incorrecto. InheritableThreadLocal propaga el valor a threads hijos — no resuelve el problema de limpieza. El riesgo de fuga sigue siendo el mismo y además hay riesgos adicionales de propagación incorrecta a threads del pool."},
], correct:1},

{cat:"Problemas Clásicos de Concurrencia",
q:"¿Cómo diagnosticar un thread leak en producción cuando el número de threads crece indefinidamente?",
options:[
  {label:"Los thread leaks son imposibles en Java porque el GC destruye threads cuando no tienen referencias activas.", explain:"Incorrecto. Los threads en Java son GC roots — el GC no los destruye mientras estén en estado no-TERMINATED. Un thread en WAITING puede vivir indefinidamente aunque no haya referencias externas a él."},
  {label:"Síntomas: número de threads crece con el tiempo, eventual OOM o degradación. Diagnóstico: jstack/threaddump buscar threads WAITING o TIMED_WAITING en el mismo punto repetidamente. Causas: ExecutorService sin shutdown, threads que esperan en take() de una cola vacía que nunca recibe datos.", explain:"Correcto. Herramientas de diagnóstico: ManagementFactory.getThreadMXBean().getThreadCount() → monitorear crecimiento. jstack <pid> → buscar patrones repetidos de stack trace (indica threads iguales acumulándose). Micrometer/Actuator: management.metrics.threads.* para alertas automáticas. Causas comunes en banca: (1) ExecutorService creado por request en lugar de singleton → se crea pero nunca se destruye. (2) Thread en BlockingQueue.take() esperando mensajes de un producer que murió. (3) Thread en Object.wait() sin timeout esperando notify() que nunca llega. Solución: siempre usar take() con timeout, siempre shutdown() los executors, exponer métricas de thread count en dashboards de monitoreo."},
  {label:"Los thread leaks se resuelven aumentando el heap con -Xmx; más memoria = más threads soportados.", explain:"Incorrecto. Más memoria retrasa el problema pero no lo resuelve. Cada thread ocupa stack memory (fuera del heap, configurable con -Xss). El sistema operativo también tiene límites en el número de threads por proceso. La solución es eliminar el leak."},
  {label:"Reiniciar la aplicación periódicamente es la solución estándar para thread leaks en producción.", explain:"Incorrecto. El reinicio es una mitigación temporal, no una solución. Los thread leaks deben diagnosticarse y corregirse en el código. En sistemas bancarios de alta disponibilidad, reinicios frecuentes son inaceptables."},
], correct:1},

// ══════════ COMPLETABLEFUTURE AVANZADO ══════════
{cat:"CompletableFuture & Async",
q:"¿Cuál es la diferencia entre CompletableFuture.allOf() y anyOf(), y cuándo usar cada uno en banca?",
options:[
  {label:"allOf() y anyOf() son equivalentes; la elección es de preferencia.", explain:"Incorrecto. Tienen semánticas opuestas: allOf() completa cuando TODOS los futuros completan; anyOf() completa cuando CUALQUIERA completa."},
  {label:"allOf(f1,f2,f3): completa cuando TODOS terminan (éxito o error). anyOf(f1,f2,f3): completa con el resultado del PRIMERO que termina. allOf para: validaciones paralelas obligatorias. anyOf para: consultas a múltiples fuentes donde la primera respuesta es suficiente.", explain:"Correcto. allOf en banca: validar cliente contra RENIEC + SBS + score crediticio — TODAS deben completar antes de aprobar. CompletableFuture.allOf(reniec, sbs, score).thenRun(() -> aprobarCredito()). anyOf en banca: consultar precio de divisa a tres proveedores externos (Reuters, Bloomberg, interno) — usar la primera respuesta que llegue para minimizar latencia. CompletableFuture.anyOf(reuters, bloomberg, interno).thenAccept(precio -> procesar(precio)). CUIDADO con anyOf: los otros futuros siguen ejecutando aunque anyOf haya completado — si consumen recursos costosos, cancelarlos explícitamente. allOf no propaga excepciones automáticamente: si f1 falla, allOf sigue esperando f2 y f3. Para detectar errores: agregar .exceptionally() a cada futuro individual."},
  {label:"allOf() retorna el resultado del primer futuro que completa exitosamente.", explain:"Incorrecto. allOf() retorna CompletableFuture<Void> — no retorna el resultado de los futuros. Los resultados se obtienen con future.join() en cada CompletableFuture individual después de que allOf completa."},
  {label:"anyOf() espera a que todos los futuros terminen antes de retornar para comparar los resultados.", explain:"Incorrecto. anyOf() retorna inmediatamente cuando el PRIMER futuro completa, sin esperar a los demás."},
], correct:1},

{cat:"CompletableFuture & Async",
q:"¿Cómo propagar contexto de MDC (tracing) a threads de CompletableFuture.supplyAsync() en un entorno bancario?",
options:[
  {label:"MDC se propaga automáticamente a todos los threads de CompletableFuture; no requiere configuración adicional.", explain:"Incorrecto. MDC usa ThreadLocal internamente. Los threads de CompletableFuture son distintos al thread que creó el futuro, por lo que no heredan el MDC automáticamente."},
  {label:"El MDC (correlationId, userId) está en ThreadLocal del thread actual. supplyAsync() corre en otro thread del ForkJoinPool → MDC perdido. Solución: capturar el MDC antes de supplyAsync y restaurarlo dentro del lambda.", explain:"Correcto. Patrón correcto en banca: Map<String, String> mdcSnapshot = MDC.getCopyOfContextMap(); CompletableFuture.supplyAsync(() -> { Map<String, String> prev = MDC.getCopyOfContextMap(); MDC.setContextMap(mdcSnapshot); try { return consultarSUNAT(ruc); } finally { if(prev != null) MDC.setContextMap(prev); else MDC.clear(); } }, executor). Sin esto: el log de consultarSUNAT no tiene el correlationId del request original → imposible trazar una transacción end-to-end en producción. Alternativa: usar un Executor wrapper que propaga MDC automáticamente (Sleuth/Micrometer Tracing lo hacen por defecto en Spring Boot 3+). En sistemas bancarios con auditoría: la trazabilidad end-to-end es un requisito regulatorio, no opcional."},
  {label:"La solución es usar thenApplyAsync() en lugar de supplyAsync(); thenApplyAsync() propaga el MDC automáticamente.", explain:"Incorrecto. Ni supplyAsync() ni thenApplyAsync() propagan MDC automáticamente. Ambos ejecutan en threads distintos que no tienen el ThreadLocal del thread llamante."},
  {label:"MDC.put() establece el valor globalmente para todos los threads de la JVM; no hay problema de propagación.", explain:"Incorrecto. MDC usa ThreadLocal internamente — los valores son locales al thread que los estableció. No son globales."},
], correct:1},

// ══════════ VIRTUAL THREADS ══════════
{cat:"Virtual Threads & Project Loom",
q:"¿Qué es el 'pinning' de Virtual Threads y cómo impacta al rendimiento de un servicio bancario con JDBC?",
options:[
  {label:"Pinning es cuando un Virtual Thread está asignado permanentemente a un carrier thread específico; es el comportamiento normal y esperado.", explain:"Incorrecto. Pinning es un problema de rendimiento: ocurre cuando un Virtual Thread no puede liberar su carrier thread aunque esté bloqueado en I/O, anulando el beneficio de los Virtual Threads."},
  {label:"Pinning ocurre cuando un Virtual Thread ejecuta código dentro de synchronized o código nativo (JNI). El carrier thread queda bloqueado (no puede ejecutar otros Virtual Threads). Con JDBC en synchronized: el driver bloquea el carrier → no hay multiplex → performance similar a platform threads.", explain:"Correcto. Diagnóstico: JFR event jdk.VirtualThreadPinned → indica dónde ocurre pinning. En banca: un JDBC driver que usa synchronized internamente (muchos drivers legacy) causará pinning en cada query. Resultado: con 1000 Virtual Threads haciendo queries, si hay pinning, solo 200 carrier threads se ocupan → no hay beneficio vs FixedThreadPool(200). Solución: actualizar a drivers JDBC modernos (PostgreSQL 42.6+, Oracle 23c+, HikariCP 5.1+ que detecta pinning). Migración: synchronized → ReentrantLock en código propio elimina pinning. Verificar con -Djdk.tracePinnedThreads=full para ver stack traces de pinning en stdout."},
  {label:"El pinning solo afecta a Virtual Threads en operaciones de CPU; las operaciones I/O nunca causan pinning.", explain:"Incorrecto. El pinning es causado por synchronized blocks y código nativo, no por el tipo de operación (CPU o I/O). Una llamada JDBC dentro de synchronized causa pinning aunque JDBC sea I/O."},
  {label:"El pinning se resuelve aumentando el número de carrier threads con -Djdk.virtualThreadScheduler.parallelism.", explain:"Incorrecto. Aumentar carrier threads mitiga el impacto pero no elimina el pinning. La solución correcta es eliminar las causas del pinning (synchronized con I/O → ReentrantLock, drivers JDBC modernos)."},
], correct:1},

// ══════════ PATRONES ══════════
{cat:"Patrones & Use Cases",
q:"¿Cómo implementar el patrón 'bulkhead' con Semaphore para aislar fallas de servicios externos en banca?",
options:[
  {label:"Bulkhead con Semaphore es innecesario si se usa un timeout en cada llamada al servicio externo.", explain:"Incorrecto. Timeout y bulkhead son complementarios, no alternativos. El timeout previene esperas largas; el bulkhead limita la concurrencia para prevenir que un servicio lento agote todos los threads."},
  {label:"Semaphore actúa como bulkhead: limita el número de threads que acceden a un servicio externo. Si el servicio se lentifica, los threads en exceso esperan o fallan rápido (tryAcquire con timeout) en lugar de acumular → aísla la falla al servicio afectado.", explain:"Correcto. En banca: tres servicios externos (SUNAT, RENIEC, SBS) cada uno con su Semaphore independiente. Semaphore semSUNAT = new Semaphore(20); Semaphore semRENIEC = new Semaphore(10); Semaphore semSBS = new Semaphore(5);. Si SUNAT se lentifica, solo los 20 slots de semSUNAT se agotan. Las consultas a RENIEC y SBS siguen funcionando normalmente. Sin bulkhead: un thread pool de 50 threads, SUNAT lento → 50 threads bloqueados en SUNAT → RENIEC y SBS tampoco pueden procesarse → cascading failure. Con tryAcquire(100, MILLISECONDS): if(!semSUNAT.tryAcquire(100, MILLISECONDS)) { return RespuestaSUNAT.servicioDegradado(); // fail fast }. Resilience4j Bulkhead annotation hace esto automáticamente en Spring Boot."},
  {label:"El patrón bulkhead se implementa con synchronized; Semaphore es menos eficiente para este caso.", explain:"Incorrecto. synchronized permite solo 1 thread a la vez — es un mutex, no un bulkhead. Semaphore(N) permite N threads simultáneos, que es exactamente la semántica de bulkhead."},
  {label:"Los Circuit Breakers reemplazan completamente la necesidad de bulkheads; no es necesario implementar ambos.", explain:"Incorrecto. Circuit Breaker y Bulkhead son patrones complementarios: Circuit Breaker detecta fallos y abre el circuito. Bulkhead limita la concurrencia. Resilience4j soporta ambos independientemente. En producción bancaria, se usan juntos: bulkhead limita concurrencia, circuit breaker abre cuando la tasa de error supera el umbral."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Cómo testear correctamente código concurrente en Java para detectar race conditions?",
options:[
  {label:"Los tests unitarios estándar con JUnit son suficientes para detectar race conditions; no se necesitan herramientas especiales.", explain:"Incorrecto. Los tests unitarios estándar son deterministas (un thread). Las race conditions son no deterministas y raramente se manifiestan en tests de un solo thread."},
  {label:"Herramientas: @RepeatedTest(1000) en JUnit para aumentar probabilidad. CountDownLatch para sincronizar múltiples threads en el punto crítico. jcstress (Java Concurrency Stress Tests) para pruebas de modelo de memoria. Lincheck para verificar correctitud de estructuras concurrentes.", explain:"Correcto. Patrón de test con CountDownLatch: int N = 100; CountDownLatch inicio = new CountDownLatch(1); CountDownLatch fin = new CountDownLatch(N); AtomicInteger errores = new AtomicInteger(0); for(int i=0; i<N; i++) { executor.submit(() -> { inicio.await(); // todos esperan try { servicio.operacionCritica(); } catch(Exception e) { errores.incrementAndGet(); } finally { fin.countDown(); } }); } inicio.countDown(); // TODOS arrancan simultáneamente fin.await(); assertEquals(0, errores.get());. jcstress es la herramienta estándar de OpenJDK para tests de modelo de memoria — permite verificar garantías de visibilidad y ordenamiento que los tests JUnit no pueden testear. En banca: para el servicio de transferencias, es crítico testear con al menos 50 threads concurrentes sobre la misma cuenta."},
  {label:"Las race conditions no pueden testearse automáticamente; requieren revisión manual de código.", explain:"Incorrecto. Aunque la revisión manual es importante, existen herramientas automáticas efectivas: jcstress, Lincheck, y tests de stress con múltiples threads detectan muchas race conditions automáticamente."},
  {label:"Thread.sleep() entre operaciones es suficiente para simular concurrencia en tests.", explain:"Incorrecto. Thread.sleep() no simula concurrencia real. Es no determinista y poco confiable como método de test. CountDownLatch es el mecanismo correcto para sincronizar múltiples threads en el punto exacto de la race condition."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Qué es el patrón 'Immutable Value Object' y por qué elimina la necesidad de sincronización en objetos de dominio bancario?",
options:[
  {label:"Los objetos inmutables requieren más sincronización porque cada cambio crea una nueva instancia que debe comunicarse entre threads.", explain:"Incorrecto. Los objetos inmutables eliminan la necesidad de sincronización para acceso compartido: su estado no cambia después de la construcción, por lo que no hay condición de carrera posible."},
  {label:"Objeto inmutable: todos los campos final, sin setters, clase final (o métodos privados), copias defensivas en constructor y getters para colecciones mutables. Thread-safe sin synchronized. Records de Java 16+ son inmutables por defecto.", explain:"Correcto. En banca: record Transferencia(String origen, String destino, BigDecimal monto, Instant timestamp) {} — inmutable por diseño. Puede compartirse entre miles de threads sin locks. BigDecimal, LocalDate, Money son inmutables. Copias defensivas críticas: class Operacion { private final List<String> cuentasAfectadas; public Operacion(List<String> cuentas) { this.cuentasAfectadas = List.copyOf(cuentas); // copia inmutable } public List<String> getCuentas() { return cuentasAfectadas; // ya inmutable, seguro retornar } }. Sin copia defensiva: el llamante puede modificar la lista después de pasarla al constructor, mutando el estado del objeto supuestamente inmutable. Performance: los objetos inmutables son ideales para cachés — no necesitan copias al retornar, se pueden compartir libremente entre threads y capas."},
  {label:"Para ser inmutable, todos los campos deben ser private. Un campo public final rompe la inmutabilidad.", explain:"Incorrecto. Un campo public final es inmutable (la referencia no puede reasignarse). El problema surge si el campo referencia un objeto mutable (como ArrayList) — la referencia es inmutable pero el contenido del ArrayList no lo es. La solución son las copias defensivas."},
  {label:"BigDecimal no es inmutable; add() y multiply() modifican el objeto internamente.", explain:"Incorrecto. BigDecimal ES inmutable. add() y multiply() retornan un NUEVO BigDecimal sin modificar el original. Por eso siempre: total = total.add(monto); (reasignar), no total.add(monto); (resultado descartado silenciosamente)."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Cómo usar CompletableFuture.allOf() para paralelizar 5 validaciones bancarias y agregar los resultados correctamente?",
code:`// Validar cliente contra: RENIEC, SBS, score crediticio, lista negra, historial interno
// Todas deben completar. ¿Cómo agregar los resultados?`,
options:[
  {label:"Usar parallelStream() sobre una lista de validadores; es más simple que CompletableFuture.", explain:"Incorrecto. parallelStream() usa el ForkJoinPool común — en un servidor bancario esto puede interferir con otras operaciones. Además, el manejo de excepciones checked en parallelStream es torpe. CompletableFuture con executor propio es preferible."},
  {label:"Crear cada validación como CompletableFuture.supplyAsync(validator::validar, executor). Combinar con allOf(). Después de join(), recolectar resultados con .join() en cada futuro individual.", explain:"Correcto. Implementación: CompletableFuture<ValidacionRENIEC> cf1 = CompletableFuture.supplyAsync(() -> reniec.validar(cliente), executor); CompletableFuture<ValidacionSBS> cf2 = CompletableFuture.supplyAsync(() -> sbs.validar(cliente), executor); // ... CompletableFuture.allOf(cf1, cf2, cf3, cf4, cf5) .orTimeout(3, SECONDS) // timeout global .join(); // si falla alguno → ExecutionException ValidacionRENIEC r1 = cf1.join(); // ya completó. Si RENIEC falla, allOf propaga la excepción en join() del allOf. Para errores individuales: agregar .exceptionally(ex -> ValidacionRENIEC.noDisponible()) a cada cf antes de allOf → el allOf siempre completa exitosamente, con resultados de fallback para los servicios caídos. En banca: combinación orTimeout(3, SECONDS) + exceptionally por servicio = resiliente a fallas parciales con latencia garantizada."},
  {label:"allOf() retorna automáticamente una lista con todos los resultados; no es necesario llamar join() en cada futuro.", explain:"Incorrecto. allOf() retorna CompletableFuture<Void> — no agrega los resultados. Los resultados se obtienen llamando .join() en cada CompletableFuture original después de que allOf().join() completa."},
  {label:"Si alguna validación falla, allOf() ignora el error y retorna los resultados de las validaciones exitosas.", explain:"Incorrecto. Si algún futuro en allOf() completa con excepción, el allOf().join() lanza ExecutionException. Para manejo de errores parciales, agregar .exceptionally() a cada futuro individual antes de pasarlos a allOf()."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Qué es Structured Concurrency (Java 21) y qué problema resuelve que CompletableFuture no resuelve?",
options:[
  {label:"Structured Concurrency es el nuevo nombre de CompletableFuture en Java 21; son la misma API con diferente sintaxis.", explain:"Incorrecto. Son APIs distintas con propósitos distintos. CompletableFuture es para composición de futuros. StructuredTaskScope garantiza el ciclo de vida de tareas hijas respecto al scope padre."},
  {label:"StructuredTaskScope garantiza que las subtareas hijas NO sobreviven al scope padre. Si el scope sale (éxito o error), CANCELA las tareas pendientes. CompletableFuture no garantiza esto — una tarea puede seguir ejecutando aunque nadie espere su resultado ('orphan tasks').", explain:"Correcto. Problema que resuelve: con CompletableFuture.allOf(cf1, cf2), si cf1 falla, el allOf propaga la excepción pero cf2 SIGUE EJECUTANDO como orphan thread. Con StructuredTaskScope.ShutdownOnFailure: try (var scope = new StructuredTaskScope.ShutdownOnFailure()) { var f1 = scope.fork(() -> reniec.validar(cliente)); var f2 = scope.fork(() -> sbs.validar(cliente)); scope.join().throwIfFailed(); return new Resultado(f1.get(), f2.get()); } — si reniec falla, scope cancela automáticamente la tarea de sbs. En banca: validaciones de crédito costosas (llamadas a bureaus externos) se cancelan automáticamente si una validación obligatoria falla → ahorro de latencia y costos de API. Status en Java 21: preview feature — no apto para producción aún."},
  {label:"StructuredTaskScope es superior en rendimiento porque usa menos memoria que CompletableFuture.", explain:"Incorrecto. La ventaja principal es semántica (gestión del ciclo de vida de tareas), no de rendimiento. StructuredTaskScope está diseñado para usarse con Virtual Threads."},
  {label:"En Java 21, StructuredTaskScope reemplaza completamente a ExecutorService; ExecutorService está deprecated.", explain:"Incorrecto. ExecutorService no está deprecated. StructuredTaskScope es un nivel de abstracción diferente, diseñado para Virtual Threads y el patrón de scope/subtareas estructurado. ExecutorService sigue siendo válido para gestión de pools."},
], correct:1},

// ══════════ PREGUNTAS TRICKY ══════════
{cat:"Preguntas Tricky",
q:"¿Qué sucede con este código de inicialización de caché en un servicio bancario con múltiples threads?",
code:`public class CacheRatesCambio {
  private Map<String, BigDecimal> rates = new HashMap<>();

  public void inicializar() {
    rates.put("USD", new BigDecimal("3.72"));
    rates.put("EUR", new BigDecimal("4.10"));
    // llamado en el startup por el hilo principal
  }

  public BigDecimal getRate(String moneda) {
    return rates.get(moneda); // llamado por miles de threads
  }
}`,
options:[
  {label:"Es thread-safe porque HashMap es de solo lectura después de inicializar(); las lecturas concurrentes nunca causan problemas.", explain:"Incorrecto. Sin sincronización correcta, la inicialización y las lecturas concurrentes pueden no tener la relación happens-before necesaria. El JMM no garantiza visibilidad de las escrituras en inicializar() para los threads que llaman getRate() posteriormente."},
  {label:"El JMM no garantiza que los threads que llaman getRate() ven las escrituras de inicializar() sin sincronización. Solución: usar ConcurrentHashMap, o publicar rates como un campo volatile, o inicializar con un Map inmutable antes de que el objeto sea visible a otros threads.", explain:"Correcto. El bug sutil: el thread principal hace inicializar() y publica la referencia al CacheRatesCambio. Otros threads pueden leer rates antes de que la inicialización sea visible. Soluciones en orden de preferencia: (1) private final Map<String, BigDecimal> rates = Map.of('USD', new BigDecimal('3.72'), 'EUR', new BigDecimal('4.10')); — inmutable, publicación segura garantizada por final. (2) private volatile Map<String, BigDecimal> rates; — volatile garantiza visibilidad. (3) ConcurrentHashMap con inicialización en constructor — el constructor completa antes de que la referencia sea visible a otros threads. En producción bancaria, el tipo de cambio como Map.of() es la solución más elegante: inmutable + thread-safe sin costo de runtime."},
  {label:"El código es correcto porque HashMap.get() es thread-safe para lecturas concurrentes.", explain:"Incorrecto. HashMap NO es thread-safe para ningún escenario con escrituras. Y aunque la escritura ocurra antes, sin happens-before garantizado, los threads lectores pueden ver el estado anterior del mapa."},
  {label:"La solución es hacer getRate() synchronized; inicializar() no necesita sincronización porque solo escribe.", explain:"Incorrecto. Hacer getRate() synchronized sin sincronizar inicializar() no establece la relación happens-before necesaria. Además, sincronizar todas las lecturas elimina el rendimiento — para un caché de solo lectura, ConcurrentHashMap o Map inmutable son mejores."},
], correct:1},

{cat:"Preguntas Tricky",
q:"¿Cuál es el error en este código de transferencia bancaria con ReentrantLock?",
code:`ReentrantLock lockOrigen = locks.get(cuentaOrigen);
ReentrantLock lockDestino = locks.get(cuentaDestino);

lockOrigen.lock();
lockDestino.lock();
try {
  origen.debitar(monto);
  destino.acreditar(monto);
} finally {
  lockOrigen.unlock();
  lockDestino.unlock();
}`,
options:[
  {label:"No hay error; el código es correcto — adquiere ambos locks antes de la operación.", explain:"Incorrecto. El código tiene un bug crítico de deadlock: dos threads que transfieren entre las mismas cuentas en sentido opuesto adquirirán los locks en orden inverso."},
  {label:"Deadlock potencial: Thread A: lock(cuenta001), lock(cuenta002). Thread B: lock(cuenta002), lock(cuenta001). Thread A tiene 001, espera 002. Thread B tiene 002, espera 001 → deadlock. Además, si lockDestino.lock() falla (interrupt), lockOrigen queda bloqueado. Solución: orden consistente de locks por ID + tryLock con timeout.", explain:"Correcto. También hay otro bug: si lockDestino.lock() lanza InterruptedException, el finally ejecuta lockOrigen.unlock() pero lockDestino nunca fue adquirido → IllegalMonitorStateException. Código correcto: String idMenor = min(cuentaOrigen, cuentaDestino); String idMayor = max(cuentaOrigen, cuentaDestino); ReentrantLock primero = locks.get(idMenor); ReentrantLock segundo = locks.get(idMayor); if(!primero.tryLock(100, MILLISECONDS)) throw new TimeoutException(); try { if(!segundo.tryLock(100, MILLISECONDS)) { primero.unlock(); throw new TimeoutException(); } try { origen.debitar(monto); destino.acreditar(monto); } finally { segundo.unlock(); } } finally { primero.unlock(); }. En banca: el orden consistente de locks es el patrón estándar en core banking systems para transferencias."},
  {label:"El error es usar ReentrantLock en lugar de synchronized; synchronized resuelve el deadlock automáticamente.", explain:"Incorrecto. synchronized tiene el mismo problema de deadlock con el mismo orden de adquisición. La solución no es el tipo de lock sino el orden consistente de adquisición."},
  {label:"El finally debería liberar los locks en orden inverso (destino primero, luego origen) para prevenir deadlocks.", explain:"Incorrecto. El orden de release no previene deadlocks — el problema está en el orden de ADQUISICIÓN. El release puede hacerse en cualquier orden."},
], correct:1},

{cat:"Preguntas Tricky",
q:"¿Qué problema tiene este ExecutorService en una aplicación Spring Boot bancaria y cómo corregirlo?",
code:`@RestController
public class PagoController {

  @PostMapping("/pagar")
  public ResponseEntity<?> procesar(@RequestBody PagoRequest req) {
    ExecutorService exec = Executors.newFixedThreadPool(5);
    exec.submit(() -> validarConSUNAT(req));
    exec.submit(() -> procesarPago(req));
    // ...
    return ResponseEntity.ok().build();
  }
}`,
options:[
  {label:"No hay problema; crear un ExecutorService por request garantiza aislamiento entre pagos.", explain:"Incorrecto. Crear un ExecutorService por request es un antipatrón grave: cada request crea 5 threads nuevos que nunca se destruyen porque nunca se llama shutdown()."},
  {label:"El ExecutorService nunca se destruye (sin shutdown()). Con 1000 requests/segundo se crean 5000 threads/segundo → thread leak → OOM o agotamiento del límite de threads del OS. Solución: inyectar un ExecutorService singleton como bean de Spring.", explain:"Correcto. Thread leak en producción: después de 1 hora con 100 req/s → 500,000 threads acumulados (cada uno con ~512KB de stack = ~250GB de memoria → OOM catastrófico). Solución correcta: @Bean ExecutorService pagoExecutor() { return new ThreadPoolExecutor(10, 20, 60, SECONDS, new ArrayBlockingQueue<>(500), new CallerRunsPolicy()); }. @PreDestroy void shutdown() { pagoExecutor.shutdown(); }. Y en el controller: @Autowired ExecutorService pagoExecutor;. Un singleton por toda la aplicación, con shutdown graceful en el @PreDestroy. Alternativamente en Spring Boot: @EnableAsync + @Async en el método de servicio — Spring gestiona el pool automáticamente."},
  {label:"El problema se resuelve aumentando el pool a 50 threads por request para mayor paralelismo.", explain:"Incorrecto. Aumentar el pool empeora el problema — más threads por request y cada uno sigue sin destruirse. El problema fundamental es la creación de ExecutorService por request, no el tamaño del pool."},
  {label:"Los ExecutorService de Spring se destruyen automáticamente cuando el request termina; el código es correcto.", explain:"Incorrecto. Spring no destruye objetos creados dentro de métodos de controller. Los ExecutorService deben ser beans de Spring para que su ciclo de vida sea gestionado por el contenedor."},
], correct:1},
