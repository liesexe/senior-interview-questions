  {label:"a==b imprime true (Integer cachea -128 a 127 por defecto; 100 está en el rango); c==d imprime false (200 está fuera del caché, son objetos distintos en heap). Bug real: comparar montos de transacciones o códigos de cuenta con == funciona para valores pequeños y falla silenciosamente para valores mayores. Siempre usar equals() para Integer.", explain:"Correcto. El Integer Cache es una optimización de la JVM para el rango [-128, 127]. Fuera de ese rango, cada autoboxing crea un nuevo objeto. Este bug es especialmente peligroso porque pasa en todos los tests con valores de prueba pequeños y falla en producción con valores reales más grandes."},
  {label:"Ambos imprimen true porque Java cachea todos los Integer automáticamente", explain:"Incorrecto. El caché de Integer solo aplica para [-128, 127]. Fuera de ese rango, cada autoboxing crea un nuevo objeto."},
  {label:"El código no compila porque no se puede usar == con tipos wrapper", explain:"Incorrecto. El compilador permite == con Integer. El problema es semántico (compara referencias, no valores), no de compilación."},
], correct:1},

{cat:"Java – Trampas Comunes",
q:"¿Qué devuelve Integer.parseInt('') vs Integer.valueOf(''), y cuándo importa la diferencia?",
options:[
  {label:"Son idénticos; Integer.parseInt() e Integer.valueOf() retornan el mismo resultado en todos los casos", explain:"Incorrecto. El tipo de retorno es diferente, lo cual importa en ciertos contextos."},
  {label:"parseInt() retorna un int primitivo (nunca null); valueOf() retorna un Integer objeto (puede retornar null si el input es null lanzando NullPointerException, o beneficiarse del Integer Cache). Importa cuando: necesitas almacenar en Collection<Integer> (parseInt requiere autoboxing), necesitas null para indicar 'no valor', o quieres aprovechar el Integer Cache para valores frecuentes", explain:"Correcto. Ejemplo práctico: una lista List<Integer> requiere objetos, no primitivos, así que hay autoboxing de cualquier forma. Si el string puede ser null, ambos lanzan NumberFormatException o NPE respectivamente. La elección práctica: parseInt cuando claramente trabajas con primitivo, valueOf cuando trabajas con el tipo wrapper."},
  {label:"parseInt() es más lento que valueOf() por el autoboxing implícito", explain:"Incorrecto. parseInt() retorna un primitivo y no hace autoboxing; valueOf() puede evitar crear un objeto nuevo gracias al Integer Cache para valores en [-128, 127]."},
  {label:"parseInt() lanza NumberFormatException para strings vacíos; valueOf() retorna 0 para strings vacíos", explain:"Incorrecto. Ambos lanzan NumberFormatException para strings vacíos o strings que no son números válidos. No hay manejo especial para strings vacíos en ninguno de los dos."},
], correct:1},

// ══════════ IoC & DEPENDENCY INJECTION ══════════
{cat:"IoC & Dependency Injection",
q:"¿Por qué se prefiere la inyección por constructor sobre la inyección por campo (@Autowired en el campo) en Spring Boot?",
code:`// Opción A – campo (desaconsejado):
@Service
class TransferService {
    @Autowired
    private TransferRepository repo;
}

// Opción B – constructor (recomendado):
@Service
class TransferService {
    private final TransferRepository repo;
    TransferService(TransferRepository repo) { this.repo = repo; }
}`,
options:[
  {label:"No hay diferencia práctica; @Autowired en campo es la forma moderna y preferida de Spring Boot",explain:"Incorrecto. Spring Boot y la comunidad recomienda inyección por constructor. @Autowired en campo tiene desventajas concretas de testabilidad e inmutabilidad."},
  {label:"Constructor injection: permite campos final (inmutabilidad), facilita tests unitarios sin contexto Spring (new TransferService(mockRepo)), detecta dependencias circulares al iniciar, y documenta explícitamente las dependencias requeridas",explain:"Correcto. Con @Autowired en campo, para testear necesitas Reflection o levantar el contexto Spring. Con constructor injection, new TransferService(mockRepo) es suficiente. El campo final garantiza que la dependencia no cambia después de la construcción. IntelliJ/Spring incluso advierte sobre @Autowired en campo en versiones modernas."},
  {label:"La inyección por constructor es más lenta porque Spring debe invocar el constructor; @Autowired en campo es más eficiente",explain:"Incorrecto. La diferencia de rendimiento es completamente negligible. El criterio es de diseño y testabilidad, no de performance."},
  {label:"Constructor injection solo funciona con interfaces; para clases concretas siempre se usa @Autowired en campo",explain:"Incorrecto. Constructor injection funciona con cualquier tipo de dependencia: interfaces, clases abstractas y clases concretas."},
], correct:1},

{cat:"IoC & Dependency Injection",
q:"¿Qué es la diferencia entre @Component, @Service y @Repository en Spring, y qué funcionalidad adicional añade @Repository?",
options:[
  {label:"Son completamente idénticos; la diferencia es puramente semántica sin ningún comportamiento adicional",explain:"Incorrecto. @Repository tiene una diferencia funcional importante relacionada con el manejo de excepciones de la capa de datos."},
  {label:"@Component: bean genérico. @Service: bean de capa de negocio (semántico, sin behavior extra). @Repository: añade traducción automática de excepciones de BD a DataAccessException de Spring via PersistenceExceptionTranslationPostProcessor, desacoplando el código de excepciones específicas del driver",explain:"Correcto. Con @Repository, un SQLException o ConstraintViolationException de JDBC/JPA se convierte automáticamente en DataAccessException de Spring. El código que llama al repositorio no necesita conocer el driver específico (SQL Server vs PostgreSQL). En banca, esto facilita el manejo uniforme de errores de persistencia."},
  {label:"@Service puede tener múltiples instancias por contexto; @Component y @Repository son siempre Singleton",explain:"Incorrecto. Por defecto, todos los beans de Spring (independientemente del estereotipo) son Singleton. El scope se configura con @Scope, no con el tipo de estereotipo."},
  {label:"@Repository es obligatorio para usar Spring Data JPA; sin él los repositorios no son reconocidos por Spring",explain:"Incorrecto. Spring Data JPA reconoce repositorios por la extensión de JpaRepository/CrudRepository, no por la presencia de @Repository. Spring Data añade @Repository automáticamente a través de la implementación del proxy."},
], correct:1},

{cat:"IoC & Dependency Injection",
q:"¿Cuál es el bean scope Singleton vs Prototype y qué bug silencioso ocurre al inyectar un Prototype en un Singleton?",
options:[
  {label:"Singleton y Prototype son lo mismo; la diferencia es que Singleton puede inyectarse en cualquier bean y Prototype solo en otros Prototypes",explain:"Incorrecto. Tienen ciclos de vida completamente distintos e independientes del bean en que se inyectan."},
  {label:"Singleton: una instancia para toda la vida del ApplicationContext. Prototype: nueva instancia cada vez que se solicita. Bug: al inyectar un Prototype en un Singleton con @Autowired, Spring inyecta UNA sola instancia del Prototype al crear el Singleton, que luego nunca se renueva. Solución: usar ObjectProvider<T> o ApplicationContext.getBean()",explain:"Correcto. El Prototype inyectado en un Singleton se comporta como Singleton, anulando el propósito. Para obtener una instancia nueva de Prototype cada vez, se debe usar ObjectProvider<PrototypeBean> y llamar provider.getObject() en cada uso, que crea una instancia fresca."},
  {label:"Spring lanza BeanCreationException al iniciar si se detecta un Prototype inyectado en un Singleton",explain:"Incorrecto. Spring permite esta combinación sin error. El bug es silencioso: la aplicación arranca y parece funcionar, pero el Prototype nunca se renueva."},
  {label:"El scope Prototype fue eliminado en Spring Boot 3; todos los beans son ahora Singleton o Request-scoped",explain:"Incorrecto. Prototype sigue siendo un scope válido en Spring Boot 3. También existen Request, Session y Application para aplicaciones web."},
], correct:1},

{cat:"IoC & Dependency Injection",
q:"¿Cómo resuelve Spring una dependencia cuando hay múltiples beans del mismo tipo?",
code:`@Component class ValidadorSaldo implements Validador {}
@Component class ValidadorLimite implements Validador {}

@Service class TransferService {
    @Autowired
    private Validador validador; // ← ¿qué ocurre?
}`,
options:[
  {label:"Spring inyecta el primero que encuentra en el classpath; el orden es determinístico",explain:"Incorrecto. El orden de classpath scanning no es garantizado y no es el mecanismo de resolución de ambigüedad de Spring."},
  {label:"Spring lanza NoUniqueBeanDefinitionException. Se resuelve con: (1) @Primary en el bean preferido, (2) @Qualifier('validadorSaldo') en el punto de inyección, o (3) cambiar el nombre del parámetro para que coincida con el nombre del bean",explain:"Correcto. Spring no puede decidir cuál de los dos Validadores inyectar y lanza error al iniciar. @Primary marca el bean por defecto cuando hay ambigüedad. @Qualifier es más explícito y recomendado cuando se necesita una implementación específica en un contexto determinado."},
  {label:"Spring inyecta todos los beans del mismo tipo como una lista automáticamente",explain:"Incorrecto. Spring inyecta todos los beans del mismo tipo si el campo es List<Validador> o Collection<Validador>. Para un campo Validador (singular), lanza NoUniqueBeanDefinitionException."},
  {label:"@Autowired solo funciona con una implementación por tipo; tener múltiples implementaciones requiere siempre factory manual",explain:"Incorrecto. Spring tiene mecanismos integrados (@Primary, @Qualifier) para resolver exactamente esta situación."},
], correct:1},

// ══════════ TRANSACCIONES ══════════
{cat:"Transacciones",
q:"¿Qué ocurre si un método @Transactional llama a otro método @Transactional dentro de la misma clase?",
code:`@Service
class PagoService {
    @Transactional
    public void procesarLote(List<Pago> pagos) {
        pagos.forEach(this::procesarUno); // llamada interna
    }

    @Transactional(propagation = REQUIRES_NEW)
    public void procesarUno(Pago pago) { /* ... */ }
}`,
options:[
  {label:"procesarUno crea una nueva transacción independiente según REQUIRES_NEW",explain:"Incorrecto. REQUIRES_NEW crea nueva transacción solo si Spring AOP intercepta la llamada, lo cual no ocurre en llamadas internas."},
  {label:"La anotación de procesarUno es ignorada: Spring AOP usa proxies CGLIB/JDK que solo interceptan llamadas externas. La llamada this.procesarUno() va directo a la implementación sin pasar por el proxy. Solución: extraer procesarUno a otro bean, o usar self-injection con @Autowired PagoService self",explain:"Correcto. Este es el bug más frecuente con @Transactional. En producción significa que REQUIRES_NEW no crea transacciones independientes por pago; todos los pagos del lote participan en la misma transacción externa. Si uno falla, todos hacen rollback aunque se quería independencia por pago."},
  {label:"Spring detecta automáticamente las llamadas internas y aplica @Transactional correctamente si se usa @EnableTransactionManagement",explain:"Incorrecto. @EnableTransactionManagement habilita el soporte transaccional pero no cambia el comportamiento de los proxies AOP. Las llamadas internas siguen bypaseando el proxy."},
  {label:"Solo afecta a REQUIRES_NEW; la propagación REQUIRED funciona correctamente en llamadas internas",explain:"Incorrecto. El problema aplica a todas las propagaciones. La llamada interna bypasea el proxy independientemente de la propagación configurada."},
], correct:1},

{cat:"Transacciones",
q:"¿Qué tipos de excepción causan rollback automático en @Transactional y cuándo debes configurarlo explícitamente?",
options:[
  {label:"@Transactional hace rollback ante cualquier Exception, incluyendo checked exceptions",explain:"Incorrecto. El comportamiento por defecto es solo para unchecked exceptions (RuntimeException y sus subclases, más Error)."},
  {label:"Por defecto rollback solo ante unchecked exceptions (RuntimeException y Error). Las checked exceptions NO causan rollback. Si lanzas SaldoInsuficienteException extends Exception (checked), necesitas @Transactional(rollbackFor = SaldoInsuficienteException.class) para que haga rollback",explain:"Correcto. En código bancario este bug es crítico: se lanza una checked exception de negocio, la BD queda en estado parcialmente modificado, y el dinero puede quedar en un estado inconsistente. La solución es: usar unchecked exceptions para errores de negocio (extends RuntimeException) o configurar rollbackFor explícitamente."},
  {label:"Las checked exceptions siempre hacen rollback; solo las unchecked son ignoradas por @Transactional",explain:"Incorrecto. Es al revés. Las unchecked exceptions (RuntimeException) son las que hacen rollback por defecto."},
  {label:"El comportamiento de rollback se configura globalmente en application.properties y no en la anotación",explain:"Incorrecto. No existe configuración global de rollback en application.properties. Se configura directamente en cada @Transactional con rollbackFor o noRollbackFor."},
], correct:1},

{cat:"Transacciones",
q:"¿Cuál es la diferencia entre los niveles de propagación REQUIRED, REQUIRES_NEW y SUPPORTS?",
options:[
  {label:"REQUIRED y REQUIRES_NEW son equivalentes; solo difieren en el nombre",explain:"Incorrecto. Tienen comportamientos fundamentalmente distintos respecto a la creación y participación en transacciones."},
  {label:"REQUIRED (default): usa la transacción existente o crea una nueva si no hay ninguna. REQUIRES_NEW: suspende la transacción existente y crea siempre una nueva independiente (útil para auditoría que debe persistirse aunque falle la transacción principal). SUPPORTS: usa la transacción si existe, sino corre sin transacción",explain:"Correcto. Ejemplo bancario: el servicio de auditoría usa REQUIRES_NEW para que el registro de auditoría se persista aunque la transferencia principal haga rollback. Con REQUIRED, si la transferencia falla, el log de auditoría también se deshace, perdiendo la trazabilidad del intento."},
  {label:"SUPPORTS crea siempre una nueva transacción independiente; es el más seguro para operaciones críticas",explain:"Incorrecto. SUPPORTS solo usa la transacción existente si hay una; sino corre sin transacción. Para operaciones críticas bancarias, REQUIRED o REQUIRES_NEW son los apropiados."},
  {label:"La propagación solo aplica cuando se tienen múltiples bases de datos; con una sola BD todos son equivalentes",explain:"Incorrecto. La propagación gestiona cómo se participan y crean transacciones en la misma BD dentro de un call stack de métodos, no entre múltiples bases de datos."},
], correct:1},

// ══════════ SPRING MVC / REST ══════════
{cat:"Spring MVC / REST",
q:"¿Cuál es la diferencia entre @RestController y @Controller en Spring MVC?",
options:[

  {label:"@Controller retorna vistas (nombres de templates Thymeleaf/JSP). @RestController = @Controller + @ResponseBody en cada método: serializa el objeto retornado directamente a JSON/XML en el body de la respuesta, sin buscar una vista",explain:"Correcto. En APIs REST bancarias se usa @RestController. Si retornas un objeto Transaccion desde un método, Spring lo serializa automáticamente a JSON con Jackson. Con @Controller sin @ResponseBody, Spring buscaría una vista con el nombre igual al String retornado."},
  {label:"@RestController solo funciona con JSON; para XML se debe usar @Controller",explain:"Incorrecto. @RestController soporta tanto JSON como XML dependiendo del Content-Type del request y los HttpMessageConverters configurados (Jackson para JSON, JAXB para XML)."},
  {label:"@Controller es para microservicios; @RestController es para monolitos con templates HTML",explain:"Incorrecto. Es al revés: @RestController es el estándar para APIs REST (microservicios). @Controller con templates es para aplicaciones web server-side rendering."},
], correct:1},

{cat:"Spring MVC / REST",
q:"¿Cómo manejarías excepciones de forma centralizada en una API bancaria Spring Boot para retornar respuestas de error consistentes?",
code:`// ¿Cuál es el enfoque correcto?`,
options:[

  {label:"@ControllerAdvice + @ExceptionHandler: una clase centralizada que intercepta excepciones específicas de cualquier Controller y retorna ResponseEntity con el formato de error estándar (código, mensaje, timestamp). Todas las APIs del banco responden con el mismo contrato de error",explain:"Correcto. @ControllerAdvice es el patrón estándar de Spring para manejo centralizado de excepciones. Se define una clase con @ExceptionHandler(SaldoInsuficienteException.class) que retorna ResponseEntity<ErrorResponse> con HTTP 422. Todos los controllers automáticamente usan este handler sin código adicional."},

  {label:"Spring Boot maneja automáticamente todas las excepciones con mensajes descriptivos; no se necesita configuración adicional",explain:"Incorrecto. Spring Boot tiene un BasicErrorController por defecto que retorna un JSON genérico, pero no conoce las excepciones de tu dominio bancario ni puede retornar mensajes significativos para SaldoInsuficienteException o CuentaBloqueadaException."},
