{cat:"ExecutorService & Thread Pools",
q:"¿Cuál es la diferencia entre ExecutorService.submit() y execute(), y cuándo importa en banca?",
options:[
  {label:"submit() y execute() son equivalentes; submit() es simplemente un alias más moderno.", explain:"Incorrecto. Tienen diferencias importantes: el tipo de retorno y el manejo de excepciones."},
  {label:"execute(Runnable): no retorna nada, las excepciones no capturadas van al UncaughtExceptionHandler y pueden silenciarse. submit(Callable): retorna Future<V> que captura el resultado y las excepciones. submit(Runnable): retorna Future<?> para saber cuándo completó.", explain:"Correcto. Bug crítico en banca con execute(): executor.execute(() -> { procesarPago(pago); }); Si procesarPago() lanza RuntimeException, la excepción va al UncaughtExceptionHandler (normalmente solo logea) y el pago falla silenciosamente. Con submit(): Future<?> f = executor.submit(() -> procesarPago(pago)); f.get(); // lanza ExecutionException si procesarPago lanzó excepción. La excepción se propaga al llamante que puede tomar acción (retry, alerta, DLQ). En procesamiento de pagos: siempre usar submit() para capturar excepciones del worker y tener visibilidad de fallos."},
  {label:"submit() siempre bloquea el thread llamante hasta que la tarea completa; execute() es no bloqueante.", explain:"Incorrecto. submit() retorna un Future inmediatamente sin bloquear. Solo f.get() bloquea. execute() tampoco bloquea — envía la tarea al pool y retorna."},
  {label:"execute() es más eficiente que submit() porque no crea el objeto Future.", explain:"Incorrecto en la práctica. La diferencia de rendimiento es negligible. La elección debe basarse en si se necesita el resultado o capturar excepciones, no en la eficiencia marginal de no crear un Future."},
], correct:1},

{cat:"Clases Atomic & CAS",
q:"¿Cuándo usar LongAdder vs AtomicLong para métricas en un sistema bancario de alta concurrencia?",
options:[
  {label:"AtomicLong siempre es preferible; LongAdder es un wrapper innecesario.", explain:"Incorrecto. LongAdder fue introducido en Java 8 específicamente para superar las limitaciones de AtomicLong bajo alta contención."},
  {label:"LongAdder: celdas internas por thread reducen contención → 10-20x más rápido que AtomicLong bajo alta carga. sum() agrega celdas (puede ser ligeramente aproximado bajo escrituras concurrentes activas). Usar para: métricas de monitoreo (TPS, errores/segundo). AtomicLong para: valores de negocio que requieren exactitud (saldo, límite disponible).", explain:"Correcto. En banca: LongAdder transaccionesProcesadas = new LongAdder(); en cada procesamiento: transaccionesProcesadas.increment(); En reporte periódico: long total = transaccionesProcesadas.sum();. Con 200 threads concurrentes incrementando, LongAdder puede ser 15x más rápido que AtomicLong. Para saldo de cuenta: NUNCA LongAdder — la ligera imprecisión de sum() es inaceptable para datos financieros. Siempre AtomicLong o sincronización explícita con lectura de BD."},
  {label:"LongAdder y AtomicLong tienen idéntico rendimiento en Java 17+; las diferencias de versiones anteriores fueron resueltas.", explain:"Incorrecto. La ventaja de LongAdder viene de su arquitectura de celdas distribuidas, no de optimizaciones de versión. Sigue siendo significativamente más rápido que AtomicLong bajo alta contención en Java 21."},
  {label:"sum() de LongAdder siempre es exacto, incluso con escrituras concurrentes activas.", explain:"Incorrecto. sum() puede no ser exacto durante escrituras concurrentes activas: agrega las celdas secuencialmente y entre cada suma puede haber incrementos. Para auditorías financieras donde se necesita un snapshot exacto, usar AtomicLong con get() o synchronized."},
], correct:1},

{cat:"Locks Avanzados",
q:"¿Cuándo es apropiado usar ReadWriteLock vs un lock exclusivo (synchronized/ReentrantLock) en un caché bancario?",
options:[
  {label:"ReadWriteLock siempre tiene mejor rendimiento que synchronized; debe usarse en todos los casos.", explain:"Incorrecto. ReadWriteLock tiene más overhead que synchronized para gestionar los modos de lectura y escritura. Solo beneficia cuando el ratio de lecturas es muy alto (>80-90%)."},
  {label:"ReadWriteLock beneficia cuando hay muchas más lecturas que escrituras. Múltiples readers simultáneos sin bloqueo; un writer exclusivo. Si hay muchas escrituras, el overhead de ReadWriteLock puede ser mayor que synchronized.", explain:"Correcto. Caso bancario ideal: caché de límites de crédito por segmento de cliente. 10,000 transacciones/segundo leen el límite; 1 actualización/minuto cambia el límite de un segmento. Con synchronized: 10,000 transacciones se serializan en las lecturas. Con ReadWriteLock: 10,000 lecturas concurrentes, solo la actualización requiere exclusividad. Cuándo NO usar ReadWriteLock: si las escrituras son frecuentes (>20%), el overhead de gestionar el estado del lock ReadWrite supera el beneficio. ConcurrentHashMap es frecuentemente mejor: lock por bucket en lugar de lock global. Writer starvation: si hay lectores constantes en unfair mode, el writer puede esperar indefinidamente → usar fair mode o StampedLock."},
  {label:"ReadWriteLock no garantiza que el writer tenga exclusividad; múltiples writers pueden ejecutar simultáneamente.", explain:"Incorrecto. ReadWriteLock garantiza exclusividad total del writer: cuando hay un writer activo, no puede haber ningún reader ni otro writer simultáneamente."},
  {label:"ReadWriteLock está deprecated en Java 17 a favor de synchronized mejorado.", explain:"Incorrecto. ReadWriteLock no está deprecated en ninguna versión de Java. Sigue siendo válido y usado en código de producción."},
], correct:1},

{cat:"Colecciones Concurrentes",
q:"¿Cómo elegir entre ConcurrentLinkedQueue, ArrayBlockingQueue y LinkedBlockingQueue para un pipeline bancario?",
options:[
  {label:"Son equivalentes; cualquier cola funciona para cualquier caso de uso.", explain:"Incorrecto. Tienen propiedades críticas distintas: blocking vs non-blocking, bounded vs unbounded, que impactan el comportamiento del sistema bajo carga."},
  {label:"ConcurrentLinkedQueue: no bloqueante, unbounded, producer y consumer nunca esperan (si está vacía, poll() retorna null). ArrayBlockingQueue: bloqueante, bounded, backpressure cuando llena, FIFO estricto. LinkedBlockingQueue: bloqueante, puede ser bounded o unbounded, locks separados para head y tail (más throughput que Array).", explain:"Correcto. Elección en banca: ConcurrentLinkedQueue para: producers y consumers corriendo a velocidades similares, no se quiere bloquear nunca (el consumer debe manejar el caso de cola vacía). Riesgo: si producer supera al consumer, la cola crece sin límite → OOM. ArrayBlockingQueue para: backpressure crítico — el producer debe bloquearse cuando el sistema está saturado (procesamiento de pagos donde no se puede perder ninguno y la velocidad debe igualarse). LinkedBlockingQueue: similar a Array pero mejor throughput porque usa locks separados para head y tail — producers y consumers raramente compiten. Unbounded: peligroso en banca sin monitoreo del tamaño."},
  {label:"ArrayBlockingQueue siempre tiene mejor rendimiento porque usa un array contiguo en memoria.", explain:"Incorrecto. LinkedBlockingQueue frecuentemente tiene mejor throughput que ArrayBlockingQueue porque usa locks separados para head y tail — producers (que usan el tail) y consumers (que usan el head) raramente se bloquean entre sí. ArrayBlockingQueue usa un solo lock para ambas operaciones."},
  {label:"ConcurrentLinkedQueue garantiza que el producer nunca pierde elementos incluso si el consumer es lento.", explain:"Incorrecto. ConcurrentLinkedQueue es unbounded — no pierde elementos, pero puede crecer indefinidamente hasta OOM si el producer supera al consumer. El 'no perder elementos' viene a costa de potencial OOM sin backpressure."},
], correct:1},

{cat:"Problemas Clásicos de Concurrencia",
q:"¿Qué es el 'thundering herd' problem y cómo evitarlo en un sistema bancario con múltiples workers esperando?",
options:[
  {label:"Thundering herd es cuando muchos usuarios acceden simultáneamente al servidor; se resuelve con load balancing.", explain:"Incorrecto. En concurrencia, thundering herd es cuando muchos threads bloqueados son despertados simultáneamente pero solo uno puede proceder, causando contención masiva."},
  {label:"Thundering herd: notifyAll() despierta TODOS los threads en espera aunque solo uno puede actuar. Todos intentan adquirir el lock → contención masiva, context switches, y la mayoría vuelve a dormir. Solución: notify() (despierta solo uno) o Condition variables para despertar el tipo correcto de thread.", explain:"Correcto. Escenario bancario: 100 threads workers esperan mensajes en una cola interna con Object.wait(). Llega 1 mensaje. notifyAll() despierta los 100 threads. Todos intentan adquirir el lock de la cola. Solo 1 toma el mensaje. Los otros 99 vuelven a wait(). Resultado: 99 context switches innecesarios cada vez que llega un mensaje. Solución con BlockingQueue: take() usa internamente signal() (solo despierta un waiter) en lugar de signalAll(). Con Condition separadas para 'hay mensajes' y 'hay capacidad': signal() en lugar de signalAll() despierta exactamente un thread. En Java: usar BlockingQueue en lugar de wait/notifyAll manual → ya maneja esto correctamente internamente."},
  {label:"notifyAll() siempre es preferible a notify() porque garantiza que ningún thread quede esperando indefinidamente.", explain:"Incorrecto. notify() es correcto y más eficiente cuando todos los threads en espera son equivalentes (cualquiera puede proceder). notifyAll() es necesario cuando los threads esperan condiciones distintas y no sabes cuál puede proceder."},
  {label:"El thundering herd solo ocurre con más de 1000 threads; para menos threads notifyAll() es eficiente.", explain:"Incorrecto. El problema ocurre con cualquier número de threads. Con 10 threads y notifyAll(), 9 context switches innecesarios por mensaje. En sistemas bancarios de alta frecuencia, esto puede ser significativo."},
], correct:1},

{cat:"CompletableFuture & Async",
q:"¿Cuál es la diferencia entre exceptionally(), handle() y whenComplete() para manejo de errores en CompletableFuture?",
options:[
  {label:"Son equivalentes; cualquiera sirve para manejo de errores.", explain:"Incorrecto. Tienen semánticas distintas respecto a si transforman el resultado, si se ejecutan siempre, y si pueden recuperarse de errores."},
  {label:"exceptionally(fn): solo se ejecuta si hay excepción, retorna valor de recuperación (como catch). handle(fn): SIEMPRE se ejecuta (resultado o excepción), puede transformar ambos casos. whenComplete(fn): SIEMPRE se ejecuta como side-effect, NO cambia el resultado del pipeline.", explain:"Correcto. En banca: exceptionally para fallback: .exceptionally(ex -> RespuestaDefault.servicioDegradado()). handle() para lógica diferenciada: .handle((result, ex) -> { if(ex != null) { log.error('Fallo: {}', ex.getMessage()); return Resultado.fallback(); } return enriquecer(result); }). whenComplete() para auditoría: .whenComplete((result, ex) -> { auditLog.registrar(correlationId, result, ex); // siempre auditar, éxito o error }). CUIDADO con exceptionally: si el lambda dentro de exceptionally lanza excepción, el CompletableFuture falla con la nueva excepción. Para manejo robusto en banca: .handle((r, ex) -> { if(ex != null) { /* manejar */ } return r; }) es más seguro que exceptionally porque puede inspeccionar ambos casos."},
  {label:"whenComplete() puede recuperar el pipeline de un error retornando un valor por defecto.", explain:"Incorrecto. whenComplete() es un side-effect puro — no puede cambiar el resultado del pipeline. Si el CompletableFuture anterior falló, el pipeline sigue fallado después de whenComplete(). Solo exceptionally() y handle() pueden cambiar el resultado."},
  {label:"exceptionally() se ejecuta siempre (éxito y error) para garantizar cleanup de recursos.", explain:"Incorrecto. exceptionally() solo se ejecuta cuando hay una excepción. Para cleanup garantizado (siempre), usar whenComplete() o handle()."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Cómo usar CountDownLatch para el startup de un servicio bancario que depende de múltiples subsistemas?",
options:[
  {label:"CountDownLatch no es adecuado para startup de servicios; usar Thread.sleep() con tiempo suficiente para que los subsistemas inicien.", explain:"Incorrecto. Thread.sleep() con tiempo fijo es frágil — demasiado corto causa fallos, demasiado largo retrasa innecesariamente. CountDownLatch es precisamente para este caso de uso."},
  {label:"CountDownLatch(N): N subsistemas deben decrementar el latch. El thread principal llama latch.await(). Una vez que los N subsistemas llaman latch.countDown(), el servicio arranca. Solo se usa una vez (no reutilizable).", explain:"Correcto. En banca: CountDownLatch latch = new CountDownLatch(4); // BD, Kafka, caché Redis, servicio de tipos de cambio. Cada subsistema en su thread: subsistema.inicializar(); latch.countDown();. Thread principal: boolean ok = latch.await(30, TimeUnit.SECONDS); if(!ok) { throw new StartupException('Timeout esperando subsistemas'); }. Con timeout: garantiza que el startup no se cuelga indefinidamente si un subsistema falla. Diferencia vs CyclicBarrier: CountDownLatch es asimétrico (N threads decrementan, 1 o más esperan) y de un solo uso. CyclicBarrier: todos los threads se esperan mutuamente (simétrico) y es reutilizable."},
  {label:"CountDownLatch y CyclicBarrier son intercambiables; la elección es de preferencia.", explain:"Incorrecto. CountDownLatch: asimétrico (un grupo decrementa, otro espera), un solo uso, el counter va hacia abajo. CyclicBarrier: simétrico (todos los threads se esperan mutuamente), reutilizable para múltiples rondas."},
  {label:"await() de CountDownLatch bloquea permanentemente si el latch nunca llega a cero.", explain:"Incorrecto parcialmente. await() sin timeout sí bloquea permanentemente. Por eso siempre usar await(timeout, unit) en producción, que retorna false si el timeout expira sin que el count llegue a 0."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Para qué casos de uso de banca es apropiado el patrón Fork/Join y cuándo NO usarlo?",
options:[
  {label:"Fork/Join es el mejor framework para cualquier tipo de procesamiento paralelo en banca.", explain:"Incorrecto. Fork/Join está diseñado específicamente para tareas CPU-bound con divide-and-conquer. Para tareas I/O-bound, es inapropiado."},
  {label:"Fork/Join: ideal para tareas CPU-bound divisibles (calcular risk scores sobre millones de transacciones, análisis de cartera, generación de reportes batch). Inapropiado para I/O-bound (llamadas a BD, servicios externos) — el work-stealing no ayuda si los threads están bloqueados esperando I/O.", explain:"Correcto. Caso bancario ideal para Fork/Join: calculo de VaR (Value at Risk) sobre una cartera de 500,000 posiciones. Se divide el cálculo recursivamente: si posiciones > 1000, fork dos mitades; si <= 1000, calcular directamente. Work-stealing garantiza todos los cores ocupados. Para I/O-bound: usar CompletableFuture con executor propio o Virtual Threads. Antipatrón: usar ForkJoinPool.commonPool() para tareas I/O — bloquea el pool compartido de la JVM que usan parallelStream() y CompletableFuture → degradación global. Siempre crear un ForkJoinPool dedicado para cómputo pesado: new ForkJoinPool(Runtime.getRuntime().availableProcessors())."},
  {label:"Fork/Join solo funciona con arrays de primitivos; no puede usarse con objetos de dominio bancario.", explain:"Incorrecto. Fork/Join funciona con cualquier tipo de datos. RecursiveTask<T> puede retornar cualquier tipo T. La restricción de primitivos no existe."},
  {label:"parallelStream() es equivalente a Fork/Join pero más simple; siempre preferir parallelStream().", explain:"Incorrecto. parallelStream() usa ForkJoinPool.commonPool() — pool compartido con toda la JVM. Para cómputo bancario intensivo, crear un ForkJoinPool dedicado con el número correcto de threads previene interferir con otras operaciones. Además, Fork/Join permite control más granular sobre el threshold de división y la lógica de combinación."},
], correct:1},

{cat:"Virtual Threads & Project Loom",
q:"¿Por qué los Virtual Threads son más adecuados que un FixedThreadPool para un API gateway bancario con alta latencia de backends?",
options:[
  {label:"FixedThreadPool es más eficiente porque reutiliza threads; los Virtual Threads crean uno nuevo por request.", explain:"Incorrecto. Los Virtual Threads son extremadamente baratos de crear (~1KB stack). El costo de creación es negligible comparado con el beneficio de liberación del carrier thread durante I/O."},
  {label:"Con FixedThreadPool(200), si cada request espera 500ms por el backend, solo 200 requests concurrentes. Con Virtual Threads: cada request tiene su propio thread virtual que cede el carrier thread durante el wait de I/O → miles de requests concurrentes con los mismos 200 carrier threads (OS threads).", explain:"Correcto. Matemáticas concretas para un API gateway bancario: FixedThreadPool(200) + backends con 300ms latencia promedio = 200 / 0.3s = ~667 requests/segundo máximo. Con Virtual Threads: 200 carrier threads, cada uno multiplexando cientos de virtual threads que esperan respuestas → 200 carrier threads pueden manejar 10,000+ requests concurrentes. Si el backend responde en 300ms y el CPU processing es 5ms, el carrier thread está libre el 98% del tiempo para ejecutar otros virtual threads. En banca: esto permite manejar picos de tráfico (fin de mes, navidad) sin provisionar hardware adicional."},
  {label:"Virtual Threads consumen más CPU que FixedThreadPool porque el scheduler de la JVM tiene más trabajo.", explain:"Incorrecto. Para tareas I/O-bound, los Virtual Threads consumen MENOS CPU porque los carrier threads nunca esperan bloqueados — cuando un virtual thread espera I/O, el carrier ejecuta otro virtual thread. El overhead del scheduler es mínimo comparado con el beneficio."},
  {label:"FixedThreadPool y Virtual Threads tienen el mismo throughput para APIs que llaman a backends externos.", explain:"Incorrecto. La diferencia es sustancial para I/O-bound. FixedThreadPool limita la concurrencia al número de threads. Virtual Threads desacoplan la concurrencia del número de OS threads, permitiendo concurrencia masiva."},
], correct:1},

{cat:"Thread Lifecycle",
q:"¿Qué sucede con Thread.join() sin timeout y por qué es peligroso en sistemas bancarios de alta disponibilidad?",
options:[
  {label:"Thread.join() es siempre seguro; el thread objetivo siempre terminará eventualmente.", explain:"Incorrecto. No hay garantía de que un thread termine. Si el thread objetivo tiene un deadlock, una espera infinita en un recurso externo, o un bug de loop infinito, join() sin timeout espera por siempre."},
  {label:"join() sin timeout: bloquea el thread llamante indefinidamente si el objetivo no termina. En sistemas HA: el thread de monitoreo que hace join() al worker puede quedar colgado. join(timeoutMs) + isAlive() + interrupt() es el patrón seguro.", explain:"Correcto. En banca: sistema de healthcheck que lanza un thread para verificar conectividad con el core bancario y hace thread.join(). Si el core bancario está caído y la llamada TCP queda colgada (sin timeout configurado en el socket), el thread de healthcheck nunca termina → el healthcheck reporta estado desconocido en lugar de DOWN → el load balancer no detecta el fallo → tráfico sigue llegando a un nodo degradado. Patrón correcto: verificacionThread.join(5000); if(verificacionThread.isAlive()) { log.error('Timeout verificando core bancario'); verificacionThread.interrupt(); reportarEstado(DOWN); }. Con timeout en el join(), el healthcheck siempre responde en tiempo determinístico, incluso ante fallos del backend."},
  {label:"join(timeoutMs) lanza TimeoutException si el thread no termina en el tiempo indicado.", explain:"Incorrecto. join(timeoutMs) retorna normalmente (sin excepción) cuando expira el timeout. Se debe llamar isAlive() para verificar si el thread terminó o simplemente expiró el timeout."},
  {label:"Thread.join() libera los locks del thread llamante mientras espera, similar a Object.wait().", explain:"Incorrecto. Thread.join() no libera ningún lock del thread llamante. El thread queda bloqueado en WAITING sin liberar sus monitores. Si el thread llamante tiene locks adquiridos y el thread objetivo necesita esos locks → deadlock."},
], correct:1},

{cat:"Sincronización & Memoria",
q:"¿Cómo garantizar la publicación segura de un objeto mutable a múltiples threads en un contexto bancario?",
options:[
  {label:"En Java todos los objetos tienen publicación segura automática; no es necesario tomar ninguna acción especial.", explain:"Incorrecto. La publicación segura requiere sincronización explícita para garantizar la relación happens-before entre la escritura del objeto y las lecturas de otros threads."},
  {label:"Publicación segura: el objeto debe llegar a otros threads a través de: campo volatile, bloque synchronized, campo final inicializado en constructor, o estructuras de java.util.concurrent. Sin esto, otros threads pueden ver el objeto parcialmente inicializado.", explain:"Correcto. Antipatrón en banca: class ConfiguracionRiesgo { int limiteCredito; String segmento; } ConfiguracionRiesgo config = new ConfiguracionRiesgo(); // thread principal configura config.limiteCredito = 50000; config.segmento = 'premium'; referencia = config; // publicación sin sincronización. Otro thread puede leer referencia != null pero ver limiteCredito=0 o segmento=null. Solución: private volatile ConfiguracionRiesgo referencia; al asignar: referencia = config; la escritura volatile establece happens-before. Todos los campos de config escritos ANTES del volatile write son visibles para cualquier lectura DESPUÉS del volatile read. Alternativa: final field semantic (solo aplica a campos final del objeto, no a campos del objeto publicado). La forma más simple: usar un Record inmutable + volatile para la referencia."},
  {label:"Usar synchronized en el constructor del objeto garantiza que otros threads lo verán completamente inicializado.", explain:"Incorrecto. Sincronizar el constructor protege la construcción, pero no la publicación. Si la referencia al objeto se comparte sin sincronización, el happens-before no está garantizado."},
  {label:"El JVM garantiza que si un objeto se construye con new, todos sus campos son visibles inmediatamente a todos los threads.", explain:"Incorrecto. La construcción del objeto no garantiza publicación segura. La referencia al objeto debe llegar a otros threads a través de un mecanismo de sincronización para establecer happens-before."},
], correct:1},

{cat:"Preguntas Tricky",
q:"¿Qué imprime este código y por qué sorprende a la mayoría de developers Java?",
code:`public class ContadorBanco {
  private int saldo = 1000;

  public void depositar(int monto) {
    saldo += monto;
  }

  public int getSaldo() {
    return saldo;
  }
}
// Thread A y B: depositar(100) 1000 veces cada uno
// ¿saldo final esperado vs real?`,
options:[
  {label:"El saldo final siempre es 201,000. saldo += monto es una sola instrucción de bytecode y por tanto atómica.", explain:"Incorrecto. saldo += monto compila a múltiples instrucciones bytecode: getfield (leer), iadd (sumar), putfield (escribir). No es atómica."},
  {label:"El saldo final puede ser cualquier valor entre 101,000 y 201,000. saldo += monto es read-modify-write (3 pasos), no atómica. Dos threads leen el mismo saldo, suman 100, uno sobrescribe al otro → pérdida de incrementos.", explain:"Correcto. Race condition clásica: Thread A lee saldo=50,000. Thread B lee saldo=50,000. Thread A escribe saldo=50,100. Thread B escribe saldo=50,100 (debería ser 50,200). Se perdió un depósito. En sistemas bancarios, esto es inaceptable — cada centavo debe contarse. Soluciones: (1) synchronized en depositar/getSaldo. (2) private final AtomicInteger saldo = new AtomicInteger(1000); saldo.addAndGet(monto) — atómico sin lock. (3) Usar la BD como fuente de verdad con UPDATE saldo = saldo + monto WHERE id = ? — la BD maneja la atomicidad. En el mundo real, los core banking systems usan actualizaciones de BD con locking optimista o pesimista, no locks de aplicación."},
  {label:"El saldo final es siempre 201,000 en Java 17+ porque los accesos a int son atómicos en arquitecturas modernas.", explain:"Incorrecto. Aunque los accesos individuales a int de 32 bits son atómicos en cuanto a lectura/escritura en x86-64, la operación COMPUESTA saldo += monto (leer-sumar-escribir) sigue siendo no atómica. Java 17 no cambió esto."},
  {label:"El problema solo ocurre en producción con alta carga; en tests con pocos threads funciona correctamente.", explain:"Incorrecto. La race condition es no determinista pero puede ocurrir con 2 threads. Sin embargo, en tests con pocos threads y tiempos cortos puede no manifestarse, lo que hace que estos bugs pasen los tests y fallen en producción bajo alta carga."},
], correct:1},

{cat:"Preguntas Tricky",
q:"¿Qué problema tiene este código de caché lazy-loading en un servicio bancario compartido entre threads?",
code:`public class ClienteService {
  private Cliente cache = null;

  public Cliente getCliente(String id) {
    if (cache == null) {
      cache = bdRepository.findById(id); // costoso
    }
    return cache;
  }
}`,
options:[
  {label:"No hay problema; el if (cache == null) previene cargas duplicadas de BD.", explain:"Incorrecto. El if-null check no es atómico. Dos threads pueden ver cache == null simultáneamente y ambos llamar a bdRepository.findById(id)."},
  {label:"Race condition: dos threads leen cache == null, ambos consultan BD, uno sobrescribe el resultado del otro. Posiblemente también sirven datos de distintos clientes si el if no verifica el ID. Solución: synchronized o computeIfAbsent en un ConcurrentHashMap.", explain:"Correcto. Bugs concatenados: (1) Dos threads pueden hacer la consulta costosa a BD simultáneamente desperdiciando recursos. (2) El campo cache es compartido entre todos los clientes — si Thread A busca cliente 'AAA' y Thread B busca 'BBB', pueden interferirse y retornar el cliente incorrecto. (3) Sin volatile, un thread puede ver cache != null pero con un objeto parcialmente publicado. Solución correcta para caché por ID: private final ConcurrentHashMap<String, Cliente> cache = new ConcurrentHashMap<>(); return cache.computeIfAbsent(id, bdRepository::findById); — computeIfAbsent es atómico por key: si dos threads buscan el mismo id simultáneamente, solo uno llama a bdRepository::findById y el otro espera el resultado."},
  {label:"El problema se resuelve haciendo el campo cache volatile; volatile garantiza que todos los threads ven el valor actualizado.", explain:"Incorrecto. volatile garantiza visibilidad pero no atomicidad. Con cache volatile, dos threads aún pueden ver cache == null simultáneamente si la verificación y la asignación no son atómicas. Para lazy init thread-safe: synchronized o ConcurrentHashMap.computeIfAbsent()."},
  {label:"El código es correcto porque la consulta a BD es idempotente; múltiples llamadas retornan el mismo resultado.", explain:"Incorrecto. Aunque la consulta sea idempotente para el mismo ID, hay dos problemas: (1) costo de múltiples consultas innecesarias a BD en alta concurrencia. (2) El caché no es por ID — el campo cache es uno solo para la instancia de ClienteService, lo que hace que distintos IDs se sobrescriban mutuamente."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Cómo evitar que un procesador de pagos en Java pierda mensajes durante un reinicio de la aplicación (graceful drain)?",
options:[
  {label:"No es posible garantizar que no se pierdan mensajes durante un reinicio; es un trade-off aceptable.", explain:"Incorrecto. Con un diseño correcto de graceful shutdown, es posible garantizar que todos los mensajes en procesamiento completen antes de que la JVM termine."},
  {label:"Patrón: registrar un JVM shutdown hook o @PreDestroy que llama executor.shutdown() + awaitTermination(timeout). El source de mensajes (Kafka consumer, queue listener) debe pausarse antes del drain del executor.", explain:"Correcto. Secuencia correcta de graceful drain: (1) Detener la ingesta de nuevos mensajes: kafkaConsumer.pause() o listener.stop(). (2) executor.shutdown() — no acepta nuevas tareas. (3) awaitTermination(60, SECONDS) — espera que los workers activos completen. (4) Para mensajes en la BlockingQueue interna: drenar la cola y republicar a Kafka si no se procesaron. (5) Si el timeout expira: ejecutar.shutdownNow() y log de mensajes pendientes para reprocesamiento posterior. En Spring Boot: @KafkaListener con @PreDestroy que detiene el container + awaitTermination. El objetivo: cero pérdida de mensajes en reinicios planificados (rolling deployments en Kubernetes). Para reinicios no planificados (SIGKILL): la idempotencia del consumidor + offsets de Kafka garantizan reprocesamiento sin pérdida."},
  {label:"La forma correcta es usar Thread.sleep(5000) antes de cerrar la JVM para dar tiempo a los workers.", explain:"Incorrecto. Thread.sleep() con tiempo fijo es frágil — si los workers tardan más de 5 segundos, se pierden mensajes. Si tardan menos, se espera innecesariamente. awaitTermination() con timeout es la solución correcta porque espera exactamente hasta que los workers terminen o se agote el timeout."},
  {label:"Configurar Kafka con acks=0 garantiza que los mensajes nunca se pierden durante reinicios.", explain:"Incorrecto. acks=0 es fire-and-forget — la mayor probabilidad de pérdida de mensajes, no la menor. Para no perder mensajes: acks=all + idempotent producer + commits de offset correctos en el consumer."},
], correct:1},

{cat:"Sincronización & Memoria",
q:"¿Qué garantía de thread-safety ofrece la inicialización de campos static final en Java?",
options:[
  {label:"Los campos static final no tienen ninguna garantía especial de thread-safety; deben sincronizarse como cualquier campo.", explain:"Incorrecto. El JMM garantiza explícitamente que la inicialización de campos static final es segura: todos los threads ven el valor correcto sin sincronización adicional."},
  {label:"El JMM garantiza que la inicialización de static final ocurre antes de que cualquier thread acceda a la clase. La inicialización de la clase es atómica. Esto permite el Holder Pattern como alternativa thread-safe al double-checked locking.", explain:"Correcto. Holder Pattern para singleton thread-safe: class ConexionPool { private ConexionPool() { ... } private static class Holder { static final ConexionPool INSTANCE = new ConexionPool(); } public static ConexionPool getInstance() { return Holder.INSTANCE; } }. La clase Holder solo se inicializa cuando se accede a getInstance() por primera vez. La JVM garantiza que static final INSTANCE se inicializa exactamente una vez de forma thread-safe, sin synchronized ni volatile. En banca: este es el patrón más simple y correcto para singletons de inicialización perezosa. No requiere double-checked locking ni volatile. La JVM usa el class loading mechanism como mecanismo de sincronización implícito."},
  {label:"static final solo garantiza thread-safety para tipos primitivos; para objetos se necesita volatile adicional.", explain:"Incorrecto. La garantía del JMM aplica a cualquier tipo de campo static final, incluyendo referencias a objetos. La garantía es sobre la visibilidad de la referencia y que el objeto fue completamente construido antes de ser accedido."},
  {label:"Dos threads pueden ver distintos valores de un campo static final si acceden simultáneamente durante la inicialización.", explain:"Incorrecto. El JMM garantiza que la inicialización de una clase ocurre exactamente una vez y todos los threads ven el estado final. Si dos threads acceden simultáneamente durante la inicialización, uno espera a que el otro complete la inicialización."},
], correct:1},

{cat:"Preguntas Tricky",
q:"¿Qué ocurre cuando se usa synchronized sobre un objeto String como lock en un servicio bancario?",
code:`public void procesarCuenta(String numeroCuenta) {
  synchronized(numeroCuenta) {
    // operación crítica sobre la cuenta
  }
}`,
options:[
  {label:"Es thread-safe y correcto; synchronized sobre String lockea efectivamente por número de cuenta.", explain:"Incorrecto. Los Strings en Java son internados (String interning) — strings con el mismo contenido pueden compartir la misma instancia en el pool. Esto puede causar deadlocks inesperados."},
  {label:"Peligro: los Strings pueden ser internados (String.intern()) — dos strings '001-001' de distintos contextos pueden ser la misma instancia → synchronized sobre ambos usa el mismo monitor. Peor: código de terceros puede hacer synchronized sobre el mismo string literal y crear contención o deadlocks.", explain:"Correcto. Bug real: synchronized('account-001') en el servicio de pagos y synchronized('account-001') en el servicio de auditoría (hardcoded para tests) — ambos usan el mismo monitor sin saberlo → contención inesperada o deadlock en producción. Los string literals Java son internados automáticamente: 'abc' == 'abc' es true (misma instancia). Strings creados con new String('abc') no son internados automáticamente, pero String.intern() los interna explícitamente. Solución: usar un ConcurrentHashMap<String, Object> de locks dedicados: locks.computeIfAbsent(numeroCuenta, k -> new Object()). Cada cuenta tiene su propio Object lock, no compartido con ningún otro código. Limpiar el mapa de locks periódicamente para cuentas inactivas (WeakHashMap o Caffeine con expiración)."},
  {label:"synchronized sobre String es equivalente a synchronized sobre Integer; ambos son wrapper types y tienen el mismo comportamiento.", explain:"Incorrecto. Los String son objetos regulares (aunque internados). Los Integer del pool de la JVM (-128 a 127) tienen un problema similar: Integer.valueOf(1) siempre retorna la misma instancia → synchronized(Integer.valueOf(1)) puede causar contención global."},
  {label:"En Java 17+, synchronized sobre String usa una tabla de hash interna para garantizar que distintos Strings con el mismo contenido no comparten el lock.", explain:"Incorrecto. Java 17 no cambió este comportamiento. String interning es una característica fundamental del lenguaje y la JVM desde Java 1."},
], correct:1},

{cat:"Patrones & Use Cases",
q:"¿Qué es el patrón 'Thread Confinement' y cómo elimina la necesidad de sincronización en el procesamiento de transacciones bancarias?",
options:[
  {label:"Thread Confinement significa que cada thread tiene su propia instancia de la JVM; no aplica a aplicaciones Java estándar.", explain:"Incorrecto. Thread Confinement es un patrón de diseño donde los datos mutables son accedidos por un único thread — no requiere sincronización porque no hay acceso concurrente."},
  {label:"Thread Confinement: los datos mutables son accedidos por un único thread — sin acceso concurrente, sin necesidad de sincronización. Implementación: ThreadLocal, Stack confinement (variables locales), o diseño donde cada thread procesa su propio conjunto de datos.", explain:"Correcto. Ejemplo bancario: procesador de transacciones con N workers. Cada worker procesa exclusivamente las transacciones de un subconjunto de cuentas (particionado por hash del número de cuenta). Worker-1: cuentas cuyo hash % N == 0. Worker-2: cuentas cuyo hash % N == 1. Etc. Resultado: nunca hay dos workers accediendo a la misma cuenta simultáneamente → cero sincronización necesaria en el procesamiento. Este es el modelo de Kafka partitions + consumer group: cada partición es procesada por un único consumer — thread confinement a nivel de arquitectura. Stack confinement: variables locales dentro de un método son automáticamente confinadas al thread — no necesitan sincronización. ThreadLocal: confinement por thread para contexto de request (correlationId, userId, transacción activa)."},
  {label:"Thread Confinement solo aplica a tipos primitivos; para objetos siempre se necesita sincronización.", explain:"Incorrecto. Thread Confinement aplica a cualquier tipo de dato. Si un objeto mutable es accedido exclusivamente por un thread, no se necesita sincronización independientemente de si es primitivo u objeto complejo."},
  {label:"Thread Confinement y ThreadLocal son el mismo concepto; ThreadLocal es la única forma de implementarlo.", explain:"Incorrecto. ThreadLocal es una implementación de Thread Confinement, pero no la única. Stack confinement (variables locales), particionado de datos, y el modelo de actor también implementan Thread Confinement sin usar ThreadLocal."},
], correct:1}

// Build quiz card grid
function buildHome(){
  const grid=document.getElementById("quiz-grid");
  grid.innerHTML=QUIZZES.map(qz=>{
    const qs=ALL_QUESTIONS.filter(qz.filter);
    const tagHtml=qz.tags.map((t,i)=>{
      const style=i>0&&qz.tagStyle?` style="${qz.tagStyle}"`:'';
      const cls=i===0?` class="tag ${t.c}"`:` class="tag"`;
      const label=t.l==='preguntas'?`${qs.length} preguntas`:t.l;
      return `<span${cls}${style}>${label}</span>`;
    }).join("");
    return `<div class="quiz-card" style="--card-gradient:${qz.gradient}" onclick="startQuiz('${qz.id}')">
      <div class="card-icon">${qz.icon}</div>
      <div><div class="card-title">${qz.title}</div><div class="card-desc">${qz.desc}</div></div>
      <div class="card-meta">${tagHtml}</div>
      <div class="card-cta"><span class="cta-label" style="color:${qz.ctaColor}">Empezar quiz</span><span class="cta-arrow" style="color:${qz.ctaColor}">→</span></div>
    </div>`;
  }).join("");
  document.getElementById("total-count").textContent=ALL_QUESTIONS.length+"+";
}

// State
let questions=[],current=0,answered=false,correctCount=0,wrongCount=0,activeCategory="all";
let currentShuffled=[],currentShuffledCorrect=0,activeQuizId="";

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr;}

function showHome(){
  document.getElementById("home-screen").style.display="block";
  document.getElementById("quiz-screen").style.display="none";
}

function startQuiz(quizId){
  activeQuizId=quizId;
  const qz=QUIZZES.find(q=>q.id===quizId);
  document.getElementById("quiz-title").textContent=`${qz.icon} ${qz.title}`;
  document.getElementById("home-screen").style.display="none";
  document.getElementById("quiz-screen").style.display="block";
  const pool=ALL_QUESTIONS.filter(qz.filter);
  applyFilter("all",pool);
}

function getCategoriesFor(pool){
  return ["all",...new Set(pool.map(q=>q.cat))];
}

function applyFilter(cat,pool){
  if(pool===undefined) pool=ALL_QUESTIONS.filter(QUIZZES.find(q=>q.id===activeQuizId).filter);
  activeCategory=cat;
  questions=cat==="all"?shuffle([...pool]):shuffle(pool.filter(q=>q.cat===cat));
  current=0;answered=false;correctCount=0;wrongCount=0;
  updateHeader();renderQuestion();renderFilters(pool);
}

function renderFilters(pool){
  if(!pool) pool=ALL_QUESTIONS.filter(QUIZZES.find(q=>q.id===activeQuizId).filter);
  const cats=getCategoriesFor(pool);
  document.getElementById("filter-bar").innerHTML=cats.map(c=>{
    const label=c==="all"?"Todas":c;
    return `<button class="filter-btn ${activeCategory===c?'active':''}" onclick="applyFilter('${c}')">${label}</button>`;
  }).join("");
}

function updateHeader(){
  document.getElementById("hdr-current").textContent=Math.min(current+1,questions.length);
  document.getElementById("hdr-total").textContent=questions.length;
  document.getElementById("hdr-correct").textContent=correctCount;
  document.getElementById("hdr-wrong").textContent=wrongCount;
  document.getElementById("progress-bar").style.width=(questions.length?(current/questions.length)*100:0)+"%";
}

function renderQuestion(){
  const area=document.getElementById("quiz-area");
  if(current>=questions.length){renderFinal(area);return;}
  const q=questions[current];answered=false;
  const idx=[0,1,2,3];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  currentShuffled=idx.map(i=>q.options[i]);
  currentShuffledCorrect=idx.indexOf(q.correct);
  area.innerHTML=`
    <div class="nav top-nav">
      <button class="btn btn-outline" onclick="goBack()" ${current===0?'disabled':''}>← Anterior</button>
      <span class="nav-progress">
        <span class="prog-nums">${current+1} / ${questions.length}</span>
        <span class="prog-label">Pregunta</span>
      </span>
      <button class="btn btn-primary" id="next-btn" onclick="goNext()" disabled>Siguiente →</button>
    </div>
    <div class="category">${q.cat}</div>
    <div class="q-card">
      <div class="q-num">Pregunta ${current+1} de ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.code?`<pre class="q-code">${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`:''}
      <div class="options">
        ${currentShuffled.map((o,i)=>`
          <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
            <span class="letter">${String.fromCharCode(65+i)}</span>
            <span class="opt-body">
              <span class="opt-label">${o.label}</span>
              <span class="opt-explain">${o.explain}</span>
            </span>
          </button>`).join("")}
      </div>
      <div id="result-banner"></div>
    </div>`;
}

function selectOption(chosen){
  if(answered)return;answered=true;
  const isCorrect=chosen===currentShuffledCorrect;
  if(isCorrect)correctCount++;else wrongCount++;
  currentShuffled.forEach((_,i)=>{
    const btn=document.getElementById(`opt-${i}`);
    btn.classList.add("answered");
    if(i===currentShuffledCorrect)btn.classList.add("correct");
    else if(i===chosen)btn.classList.add("wrong");
    else btn.classList.add("neutral");
  });
  document.getElementById("result-banner").innerHTML=isCorrect
    ?`<div class="result-banner ok"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>¡Correcto!</div>`
    :`<div class="result-banner fail"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Incorrecto. Revisa la opción verde.</div>`;
  document.getElementById("next-btn").disabled=false;
  updateHeader();
}
function goNext(){current++;updateHeader();renderQuestion();document.getElementById('quiz-screen').scrollTo({top:0,behavior:'instant'});window.scrollTo({top:0,behavior:'instant'});}
function goBack(){if(current>0){current--;answered=false;updateHeader();renderQuestion();document.getElementById('quiz-screen').scrollTo({top:0,behavior:'instant'});window.scrollTo({top:0,behavior:'instant'});}}
function renderFinal(area){
  const total=questions.length,pct=Math.round((correctCount/total)*100);
  const emoji=pct>=80?"🏆":pct>=60?"👍":"📚";
  const msg=pct>=80?"¡Excelente! Estás listo para BCP.":pct>=60?"Buen progreso, repasa los temas débiles.":"Sigue practicando, lo lograrás.";
  document.getElementById("progress-bar").style.width="100%";
  area.innerHTML=`<div class="final"><div style="font-size:3rem">${emoji}</div><div class="score">${pct}%</div><div class="score-label">${correctCount} correctas de ${total}</div><h2>${msg}</h2><button class="restart-btn" onclick="applyFilter(activeCategory)">🔄 Reintentar</button><br><button class="restart-btn" style="background:var(--card2);color:var(--text);border:1px solid var(--border);margin-top:10px" onclick="showHome()">🏠 Ir al inicio</button></div>`;
}

// Randomize which array index holds the correct answer (display order already shuffled, but this
// ensures correct:1 doesn't dominate the raw data pattern either)
ALL_QUESTIONS.forEach(q => {
  const newPos = Math.floor(Math.random() * 4);
  if(newPos !== q.correct) {
    const tmp = q.options[q.correct];
    q.options[q.correct] = q.options[newPos];
    q.options[newPos] = tmp;
    q.correct = newPos;
  }
});
buildHome();
</script>
