  {label:"Para auditoría sin impacto en rendimiento, deshabilitar todas las auditorías en horas pico y habilitarlas en horarios de baja carga", explain:"Incorrecto. La auditoría en sistemas financieros regulados (SBS, SUNAT) debe ser continua y completa. Deshabilitar la auditoría viola regulaciones y puede resultar en sanciones. La solución correcta es implementarla de forma asíncrona para que no impacte el rendimiento transaccional."},
], correct:1},

{cat:"Seguridad & Operaciones BD",
q:"¿Cómo manejas datos sensibles (números de tarjeta, DNI) en logs y queries de BD en un sistema bancario?",
options:[
  {label:"Loguear toda la información posible incluyendo datos sensibles facilita el debugging en producción", explain:"Incorrecto. Loguear datos sensibles viola PCI-DSS (números de tarjeta), GDPR/LPDP peruana (datos personales), y crea vectores de ataque si los logs son comprometidos. Muchos incidentes de seguridad han expuesto datos sensibles vía logs."},
  {label:"Data Masking en logs: loguear solo los últimos 4 dígitos de tarjeta (**** **** **** 1234). Tokenización: almacenar un token irreversible en lugar del número real. Dynamic Data Masking en SQL Server: usuarios con menos privilegios ven datos enmascarados. Nunca loguear PINs, CVV, o contraseñas.", explain:"Correcto. Estrategias: Tokenización (Vault, AWS KMS): el número de tarjeta real se almacena en un sistema seguro; la BD guarda solo el token. Dynamic Data Masking SQL Server: @Column MASKED WITH FUNCTION=partial(0,'****',4) — DBA ve el número completo, aplicación ve ****. SLF4J MDC: no incluir datos sensibles en el contexto de logging. Logs estructurados JSON: configurar un sanitizador que remueve campos sensibles antes de escribir al log. Regulación SBS Perú: requiere auditoría de acceso a datos sensibles."},
  {label:"La solución es encriptar todos los logs con TDE; así aunque alguien acceda a los logs, los datos están protegidos", explain:"Incorrecto. TDE encripta archivos en disco, no los valores individuales dentro de los archivos de log. Si el log contiene '4532 1234 5678 9012' en texto plano y TDE encripta el archivo, alguien con acceso legítimo al sistema (un DBA) puede aún leer el número de tarjeta en el log."},
  {label:"Usar SHA-256 para hashear datos sensibles antes de guardarlos en BD; el hash es reversible si se necesita el dato original", explain:"Incorrecto. SHA-256 es una función hash unidireccional (no reversible). No es adecuado para datos que necesitan recuperarse (número de cuenta, DNI). Para datos que necesitan ser buscados sin revelarlos: tokenización. Para datos que solo se necesitan verificar (contraseñas): bcrypt/argon2."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Cómo configuras y monitorizas el connection pool en producción para detectar problemas tempranamente?",
options:[
  {label:"El connection pool no necesita monitorización; HikariCP maneja automáticamente todos los problemas", explain:"Incorrecto. Sin monitorización no sabrás cuándo el pool está cerca de la saturación, cuándo hay connection leaks, o cuándo la BD está respondiendo lentamente. Los problemas del pool a menudo aparecen antes de que el sistema colapse."},
  {label:"Métricas clave: pool size activo vs total (saturación), tiempo de espera por conexión (connectionTimeout), connection creation time (BD lenta), idle connections, pending threads. Exponer via Spring Boot Actuator + Prometheus + Grafana. Alertar cuando active connections > 80% del pool.", explain:"Correcto. Spring Boot Actuator con HikariCP: management.endpoints.web.exposure.include=health,metrics. Métricas en /actuator/metrics/hikaricp.connections.active, hikaricp.connections.pending, hikaricp.connections.timeout. En Grafana: alerta cuando hikaricp.connections.active/hikaricp.connections.max > 0.8 durante más de 30 segundos. También monitorear hikaricp.connections.creation (tiempo para crear conexión nueva) — si sube, la BD puede estar bajo presión."},
  {label:"Aumentar el connection pool size al máximo posible (1000+) para evitar que se sature", explain:"Incorrecto. Pools extremadamente grandes saturan la BD con demasiadas conexiones concurrentes, degradando el rendimiento del motor. Cada conexión en SQL Server consume memoria (~10MB de RAM). La clave es el tamaño correcto basado en la carga real, no el máximo posible."},
  {label:"La mejor forma de monitorizar el pool es revisar los logs de HikariCP manualmente cada hora", explain:"Incorrecto. La revisión manual de logs no escala y no detecta problemas en tiempo real. El monitoreo automatizado con alertas es esencial en sistemas bancarios donde los problemas deben detectarse en segundos, no horas."},
], correct:1},

{cat:"Arquitectura de BD",
q:"¿Qué consideraciones tienes al diseñar el esquema de una BD para un sistema de pagos de alta transaccionalidad?",
options:[
  {label:"Normalizar al máximo (5FN) para eliminar toda redundancia; la normalización siempre mejora el rendimiento", explain:"Incorrecto. Ultra-normalización puede empeorar el rendimiento en sistemas OLTP al requerir muchos JOINs para obtener datos relacionados. El balance entre normalización y desnormalización estratégica es clave."},
  {label:"Normalización adecuada para integridad (3FN para tablas de referencia). Desnormalización estratégica para tablas de alta lectura (ej: incluir monto_formateado en la tabla de transacciones para evitar cálculos repetidos). PKs numéricas secuenciales. Índices en columnas de búsqueda frecuente. Tipos de datos precisos (DECIMAL(18,2) para montos, nunca FLOAT).", explain:"Correcto. Para montos monetarios: DECIMAL(18,2) o NUMERIC(18,2) es obligatorio. FLOAT tiene errores de representación binaria (0.1 + 0.2 ≠ 0.3 en floating point). Fechas: DATETIME2 en SQL Server (más precisión, rango más amplio que DATETIME). PKs: INT IDENTITY o BIGINT IDENTITY para tablas de alta escritura (evitar GUID como clustered PK → fragmentación). Considerar: tablas de estados separadas (transacciones_estado) para evitar actualizaciones masivas en la tabla principal."},
  {label:"Para alta transaccionalidad, usar solo un índice por tabla (la PK) y hacer full scans; los índices adicionales degradan las escrituras en más de un 50%", explain:"Incorrecto. El overhead de índices adicionales en escrituras es real pero generalmente mucho menor que el costo de full scans para operaciones de lectura. Un sistema de pagos hace muchas más lecturas (consulta de saldo, historial) que escrituras."},
  {label:"Almacenar todos los montos como VARCHAR para flexibilidad; se convierten a número en la capa de aplicación", explain:"Incorrecto. Almacenar montos como VARCHAR es una práctica peligrosa: no garantiza que los valores sean numéricos, no permite cálculos directos en SQL (SUM, agregaciones), no tiene precisión garantizada, y ocupa más espacio. DECIMAL/NUMERIC es el tipo correcto para montos monetarios."},
], correct:1},

{cat:"BD con Kafka & CDC",
q:"¿Cómo manejas la consistencia eventual entre la BD transaccional y el índice de búsqueda (Elasticsearch) en un sistema bancario?",
options:[
  {label:"Escribir simultáneamente a SQL Server y Elasticsearch en la misma transacción para garantizar consistencia", explain:"Incorrecto. No existe transacción distribuida entre SQL Server y Elasticsearch. Si una escritura falla y la otra no, hay inconsistencia. Además, la latencia de Elasticsearch afectaría a todas las transacciones."},
  {label:"Outbox Pattern + Kafka: la transacción escribe en SQL Server + tabla outbox. Un relay publica a Kafka. Un consumer indexa en Elasticsearch. La consistencia es eventual: Elasticsearch puede estar levemente desactualizado, pero la BD SQL Server es siempre la fuente de verdad.", explain:"Correcto. Flujo: 1) Transacción → SQL Server (fuente de verdad) + outbox event. 2) Debezium/relay → topic Kafka. 3) Consumer → Elasticsearch index actualización. Latencia típica: 100ms-2s. Para búsquedas donde datos levemente desactualizados son aceptables (historial de transacciones de hace minutos), es perfecto. Para verificación de saldo antes de una transferencia: siempre leer de SQL Server. El sistema debe tener claridad sobre qué datos pueden ser eventuales y cuáles requieren consistencia fuerte."},
  {label:"Elasticsearch reemplaza completamente a SQL Server en sistemas bancarios modernos porque es más rápido para búsquedas", explain:"Incorrecto. Elasticsearch es excelente para búsqueda full-text y análisis. No tiene las garantías ACID de SQL Server y no está diseñado para operaciones transaccionales. Son sistemas complementarios con roles distintos."},
  {label:"La consistencia eventual es inaceptable en sistemas bancarios; siempre debe usarse consistencia fuerte en todos los sistemas", explain:"Incorrecto. La consistencia eventual es perfectamente aceptable para sistemas auxiliares (índices de búsqueda, cachés, reportes) donde los datos base (SQL Server transaccional) son la fuente de verdad. Exigir consistencia fuerte en todos los sistemas limitaría severamente la escalabilidad y disponibilidad."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Qué estrategia usarías para procesar 1 millón de registros diarios en un proceso batch sin afectar la BD transaccional?",
options:[
  {label:"Procesar el millón de registros en un único thread durante la noche; la BD puede manejarlo sin configuración especial", explain:"Incorrecto. Un único thread puede tardar horas para 1M registros. Sin límites de recursos, puede saturar la BD incluso en horario nocturno si hay operaciones de madrugada."},
  {label:"Procesamiento en chunks (Spring Batch): leer en lotes de 1000, procesar en paralelo con múltiples threads, escribir en batch. Usar réplica de lectura para el source data. Limitar el pool de conexiones del batch para no competir con transacciones online. Programar en horario de baja carga.", explain:"Correcto. Spring Batch: ItemReader (chunk=1000, réplica), ItemProcessor (lógica de transformación), ItemWriter (JDBC batch insert, primary). Paralelismo: TaskExecutor con 4-8 threads para el step. Controlar: spring.batch.job.enabled=false para no ejecutar al iniciar, usar @Scheduled o un disparador externo. Monitorear: tiempo total, registros procesados/fallidos, impacto en CPU/IO de la BD. Partition Step: dividir los 1M registros entre múltiples workers (por rango de ID) para paralelismo máximo."},
  {label:"La solución es usar Kafka para el batch: publicar 1M mensajes y que los consumers los procesen; Kafka elimina la presión en la BD", explain:"Incorrecto. Kafka puede ser parte de la solución pero no elimina la presión en la BD de destino. Si 1M consumers escriben a la BD simultáneamente desde Kafka, la presión en la BD es igual o mayor. Spring Batch con control de concurrencia es más apropiado para ETL/batch a BD."},
  {label:"Spring Batch está desactualizado; en sistemas modernos todo debe ser reactivo con WebFlux y R2DBC para batch", explain:"Incorrecto. Spring Batch sigue siendo el estándar para procesamiento batch en el ecosistema Spring. WebFlux/R2DBC son para APIs reactivas de alta concurrencia, no para orquestación de procesos batch con retry, skip, y gestión de jobs."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Qué es un índice parcial/filtrado y cuándo es más eficiente que un índice completo?",
options:[
  {label:"Un índice filtrado cubre solo una condición específica del WHERE. Más pequeño y eficiente para queries que siempre filtran por ese criterio. Ejemplo: índice en transacciones WHERE estado='PENDIENTE' — solo indexa el 2% de la tabla en vez del 100%.", explain:"Correcto. CREATE INDEX IX_trans_pendientes ON transacciones(fecha) WHERE estado='PENDIENTE'. Si el 98% de las transacciones están completadas, este índice tiene solo el 2% de las filas. Queries que siempre filtran por estado='PENDIENTE' lo usan eficientemente. El índice es mucho más pequeño: menos espacio, menos mantenimiento en escrituras, mejor cache hit rate. Muy útil en sistemas bancarios donde la mayoría de las operaciones son sobre registros activos/pendientes."},
  {label:"Los índices filtrados son inútiles porque SQL Server nunca los usa si hay un índice completo disponible", explain:"Incorrecto. El optimizador de SQL Server elige el índice más eficiente. Un índice filtrado que cubre exactamente la query (mismo filtro en el WHERE) será preferido sobre un índice completo porque es más pequeño y tiene mejor selectividad."},
  {label:"Un índice filtrado cubre solo las primeras N filas de la tabla ordenadas por la clave del índice", explain:"Incorrecto. Un índice filtrado incluye filas que cumplen una condición del WHERE (ej: WHERE activo=1), no las primeras N filas. No está relacionado con el orden o posición de las filas."},
  {label:"Los índices filtrados solo están disponibles en SQL Server Enterprise; en Standard Edition no se pueden crear", explain:"Incorrecto. Los índices filtrados están disponibles en todas las ediciones de SQL Server 2008 o posterior (Express, Standard, Enterprise). No es una característica exclusiva de Enterprise."},
], correct:0},

{cat:"Performance & Query Plans",
q:"¿Qué es la fragmentación de páginas de datos (heap fragmentation) vs la fragmentación de índices?",
options:[
  {label:"Heap fragmentation y fragmentación de índices son exactamente lo mismo; se tratan con las mismas operaciones", explain:"Incorrecto. Son problemas distintos en estructuras distintas. Heap es la tabla sin Clustered Index (datos desordenados en páginas). La fragmentación del índice es sobre la estructura del árbol B+ del índice."},
  {label:"Heap fragmentation: páginas de datos desordenadas en tablas sin Clustered Index (heap tables). Causa lecturas físicas no contiguas. Solución: ALTER TABLE REBUILD o crear un Clustered Index. Index fragmentation: desalineamiento lógico/físico del índice B+. Solución: REORGANIZE o REBUILD del índice.", explain:"Correcto. Las tablas heap (sin Clustered Index) acumulan páginas en cualquier orden físico. Con el tiempo, los datos se dispersan en el disco causando muchas lecturas físicas no contiguas. La solución más efectiva es agregar un Clustered Index (convierte la heap en una tabla organizada). Si la heap es intencional (por patrón de escritura), ALTER TABLE nombre REBUILD reorganiza las páginas físicamente."},
  {label:"Las tablas en SQL Server nunca son heaps; siempre tienen un Clustered Index creado automáticamente", explain:"Incorrecto. En SQL Server, una tabla sin Clustered Index explícito es una heap. La PK crea un índice pero no necesariamente Clustered (depende de si se especifica CLUSTERED). Solo con CREATE CLUSTERED INDEX o PRIMARY KEY con CLUSTERED se define el orden físico."},
  {label:"La fragmentación de datos solo importa en discos HDD; en discos SSD es irrelevante porque el acceso es aleatorio a igual velocidad", explain:"Incorrecto. Aunque los SSDs tienen menor penalización por acceso aleatorio que los HDDs, la fragmentación sigue importando en SSDs: más páginas leídas = más I/O, más datos en caché, más tiempo de procesamiento. La fragmentación impacta el rendimiento en cualquier tipo de almacenamiento, aunque menos en SSD."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Cómo implementas rate limiting a nivel de BD para proteger el sistema de consultas abusivas?",
options:[
  {label:"Rate limiting a nivel de BD se implementa con DENY en los permisos de usuario cuando hay abuso detectado", explain:"Incorrecto. DENY es una medida drástica y estática que bloquea el acceso completamente. Rate limiting es dinámico y throttlea gradualmente según el volumen de peticiones."},
  {label:"Resource Governor en SQL Server: clasifica conexiones en grupos de recursos con límites de CPU/memoria/IOPS. Para aplicaciones externas: implementar rate limiting en el API Gateway o en la capa de aplicación con Redis (contador por ventana de tiempo) antes de llegar a la BD.", explain:"Correcto. Resource Governor (SQL Server Enterprise): CREATE RESOURCE POOL pool_reportes WITH (MAX_CPU_PERCENT=20); — las queries de reportes nunca consumen más del 20% de CPU aunque la BD esté libre. Para APIs: Redis con INCR + EXPIRE implementa rate limiting: si usuario X supera 100 queries/minuto, retornar 429 sin llegar a la BD. Spring Cloud Gateway tiene rate limiting nativo con Redis. La capa correcta para rate limiting es generalmente antes de la BD, no dentro de ella."},
  {label:"La única forma de limitar el uso de BD es reducir el connection pool size; con menos conexiones hay menos queries concurrentes", explain:"Incorrecto. Reducir el pool size limita la concurrencia pero no el rate. Un solo usuario con una conexión puede ejecutar miles de queries en un minuto. Rate limiting requiere contar operaciones por unidad de tiempo, no solo limitar conexiones activas."},
  {label:"Rate limiting a nivel de BD no es necesario si se usa caché correctamente; todos los requests serán servidos por caché y la BD no recibirá carga", explain:"Incorrecto. El caché tiene tasa de aciertos (cache hit rate) típicamente del 70-90% en sistemas bien diseñados. El 10-30% restante llega a la BD. Además, las escrituras siempre llegan a la BD. El rate limiting protege contra el 100% de carga, no solo el cache miss."},
], correct:1},

// Build quiz card grid
function buildHome(){
  const grid=document.getElementById("quiz-grid");
  grid.innerHTML=QUIZZES.map(qz=>{
    const qs=ALL_QUESTIONS.filter(qz.filter);
    const tagHtml=qz.tags.map((t,i)=>{
      const style=i>0&&qz.tagStyle?` style="${qz.tagStyle}"`:'';
      const cls=i===0?` class="tag ${t.c}"`:` class="tag"`;
      const label=t.l==='preguntas'?`${qs.length} preguntas`:t.l;
      return `<span${cls}${style}>${label}</span>`;
    }).join("");
    return `<div class="quiz-card" style="--card-gradient:${qz.gradient}" onclick="startQuiz('${qz.id}')">
      <div class="card-icon">${qz.icon}</div>
      <div><div class="card-title">${qz.title}</div><div class="card-desc">${qz.desc}</div></div>
      <div class="card-meta">${tagHtml}</div>
      <div class="card-cta"><span class="cta-label" style="color:${qz.ctaColor}">Empezar quiz</span><span class="cta-arrow" style="color:${qz.ctaColor}">→</span></div>
    </div>`;
  }).join("");
  document.getElementById("total-count").textContent=ALL_QUESTIONS.length+"+";
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr;}

  document.getElementById("quiz-title").textContent=`${qz.icon} ${qz.title}`;
  document.getElementById("home-screen").style.display="none";
  document.getElementById("quiz-screen").style.display="block";
  const pool=ALL_QUESTIONS.filter(qz.filter);
  applyFilter("all",pool);
}

function getCategoriesFor(pool){
  return ["all",...new Set(pool.map(q=>q.cat))];
}

function applyFilter(cat,pool){
  if(pool===undefined) pool=ALL_QUESTIONS.filter(QUIZZES.find(q=>q.id===activeQuizId).filter);
  activeCategory=cat;
  questions=cat==="all"?shuffle([...pool]):shuffle(pool.filter(q=>q.cat===cat));
  current=0;answered=false;correctCount=0;wrongCount=0;
  updateHeader();renderQuestion();renderFilters(pool);
}

function renderFilters(pool){
  if(!pool) pool=ALL_QUESTIONS.filter(QUIZZES.find(q=>q.id===activeQuizId).filter);
  const cats=getCategoriesFor(pool);
  document.getElementById("filter-bar").innerHTML=cats.map(c=>{
    const label=c==="all"?"Todas":c;
    return `<button class="filter-btn ${activeCategory===c?'active':''}" onclick="applyFilter('${c}')">${label}</button>`;
  }).join("");
}

function updateHeader(){
  document.getElementById("hdr-current").textContent=Math.min(current+1,questions.length);
  document.getElementById("hdr-total").textContent=questions.length;
  document.getElementById("hdr-correct").textContent=correctCount;
  document.getElementById("hdr-wrong").textContent=wrongCount;
  document.getElementById("progress-bar").style.width=(questions.length?(current/questions.length)*100:0)+"%";
}

function renderQuestion(){
  const area=document.getElementById("quiz-area");
  if(current>=questions.length){renderFinal(area);return;}
  const q=questions[current];answered=false;
  const idx=[0,1,2,3];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  currentShuffled=idx.map(i=>q.options[i]);
  currentShuffledCorrect=idx.indexOf(q.correct);
  area.innerHTML=`
    <div class="nav top-nav">
      <button class="btn btn-outline" onclick="goBack()" ${current===0?'disabled':''}>← Anterior</button>
      <span class="nav-progress">
        <span class="prog-nums">${current+1} / ${questions.length}</span>
        <span class="prog-label">Pregunta</span>
      </span>
      <button class="btn btn-primary" id="next-btn" onclick="goNext()" disabled>Siguiente →</button>
    </div>
    <div class="category">${q.cat}</div>
    <div class="q-card">
      <div class="q-num">Pregunta ${current+1} de ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.code?`<pre class="q-code">${q.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`:''}
      <div class="options">
        ${currentShuffled.map((o,i)=>`
          <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
            <span class="letter">${String.fromCharCode(65+i)}</span>
            <span class="opt-body">
              <span class="opt-label">${o.label}</span>
              <span class="opt-explain">${o.explain}</span>
            </span>
          </button>`).join("")}
      </div>
      <div id="result-banner"></div>
    </div>`;
}

function selectOption(chosen){
  if(answered)return;answered=true;
  const isCorrect=chosen===currentShuffledCorrect;
  if(isCorrect)correctCount++;else wrongCount++;
  currentShuffled.forEach((_,i)=>{
    const btn=document.getElementById(`opt-${i}`);
    btn.classList.add("answered");
    if(i===currentShuffledCorrect)btn.classList.add("correct");
    else if(i===chosen)btn.classList.add("wrong");
    else btn.classList.add("neutral");
  });
  document.getElementById("result-banner").innerHTML=isCorrect
    ?`<div class="result-banner ok"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>¡Correcto!</div>`
    :`<div class="result-banner fail"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Incorrecto. Revisa la opción verde.</div>`;
  document.getElementById("next-btn").disabled=false;
  updateHeader();
}
function goNext(){current++;updateHeader();renderQuestion();document.getElementById('quiz-screen').scrollTo({top:0,behavior:'instant'});window.scrollTo({top:0,behavior:'instant'});}
function goBack(){if(current>0){current--;answered=false;updateHeader();renderQuestion();document.getElementById('quiz-screen').scrollTo({top:0,behavior:'instant'});window.scrollTo({top:0,behavior:'instant'});}}
function renderFinal(area){
  const total=questions.length,pct=Math.round((correctCount/total)*100);
  const emoji=pct>=80?"🏆":pct>=60?"👍":"📚";
  const msg=pct>=80?"¡Excelente! Estás listo para BCP.":pct>=60?"Buen progreso, repasa los temas débiles.":"Sigue practicando, lo lograrás.";
  document.getElementById("progress-bar").style.width="100%";
  area.innerHTML=`<div class="final"><div style="font-size:3rem">${emoji}</div><div class="score">${pct}%</div><div class="score-label">${correctCount} correctas de ${total}</div><h2>${msg}</h2><button class="restart-btn" onclick="applyFilter(activeCategory)">🔄 Reintentar</button><br><button class="restart-btn" style="background:var(--card2);color:var(--text);border:1px solid var(--border);margin-top:10px" onclick="showHome()">🏠 Ir al inicio</button></div>`;
}

buildHome();
</script>
</body>
</html>
