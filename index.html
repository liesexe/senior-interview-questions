  {label:"Un Covering Index cubre toda la tabla con un único índice para evitar múltiples índices", explain:"Incorrecto. Covering Index (índice cubriente) es un Non-Clustered Index que incluye todas las columnas que una query específica necesita, evitando un Key Lookup al Clustered Index."},
  {label:"Non-Clustered Index que incluye en su estructura todas las columnas que necesita una query (via INCLUDE), eliminando el Key Lookup. Ideal para queries críticas frecuentes: el motor lee solo el índice sin tocar la tabla base.", explain:"Correcto. Ejemplo: query frecuente SELECT numero_cuenta, saldo, estado FROM cuentas WHERE cliente_id = ?. Crear: CREATE INDEX IX_cuentas_cliente ON cuentas(cliente_id) INCLUDE (numero_cuenta, saldo, estado). El motor satisface la query leyendo solo el índice. Sin el INCLUDE, haría un Key Lookup por cada fila encontrada (costoso en alta concurrencia). Muy útil en tablas de transacciones con millones de registros."},
  {label:"Covering Index es lo mismo que un índice compuesto con múltiples columnas en la clave", explain:"Incorrecto. Un índice compuesto pone las columnas en la clave del índice (afecta el orden de búsqueda). INCLUDE agrega columnas solo a las páginas hoja del índice sin formar parte de la clave. Columnas en INCLUDE no mejoran búsquedas por esos campos pero sí eliminan Key Lookups."},
  {label:"Covering Index degrada el rendimiento de escrituras más que un índice normal y debe evitarse en tablas transaccionales", explain:"Incorrecto. Todo índice tiene costo de escritura (INSERT/UPDATE/DELETE deben actualizar el índice). El Covering Index tiene algo más de overhead que un índice simple por las columnas incluidas, pero en tablas con alta proporción de lecturas el beneficio supera ese costo."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Qué es la fragmentación de índices y cómo la resuelves en SQL Server en producción?",
options:[
  {label:"La fragmentación ocurre cuando hay demasiados índices en una tabla; se resuelve eliminando los menos usados", explain:"Incorrecto. La fragmentación es el desalineamiento de las páginas lógicas y físicas del índice, no la cantidad de índices."},
  {label:"La fragmentación ocurre con INSERTs/UPDATEs/DELETEs que desordenan las páginas del índice. <30% fragmentación: REORGANIZE (online, no bloquea). >30%: REBUILD (recrea el índice, más rápido pero bloquea en versiones sin ONLINE=ON). Ajustar Fill Factor para prevenir fragmentación futura.", explain:"Correcto. Fill Factor define qué porcentaje de cada página se llena al crear/reconstruir el índice (ej: 80% deja 20% libre para futuras inserciones). En tablas con muchos INSERTs, un Fill Factor de 70-80% reduce la frecuencia de fragmentación. REBUILD con ONLINE=ON en SQL Server Enterprise permite reconstruir sin bloquear lecturas, critical en BD bancarias 24/7."},
  {label:"La fragmentación solo afecta a Non-Clustered Indexes; el Clustered Index nunca se fragmenta", explain:"Incorrecto. Ambos tipos de índice se fragmentan. El Clustered Index se fragmenta con inserciones fuera de orden respecto a su clave (ej: GUID como PK genera fragmentación masiva vs INT IDENTITY secuencial)."},
  {label:"La única solución a la fragmentación es eliminar y recrear la tabla completa durante una ventana de mantenimiento", explain:"Incorrecto. REORGANIZE y REBUILD son las operaciones específicas para esto. Recrear la tabla completa es innecesariamente costoso y disruptivo cuando existen operaciones dedicadas."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Por qué aplicar una función sobre una columna indexada elimina la ventaja del índice?",
options:[
  {label:"Las funciones no afectan al uso del índice; el optimizador las maneja transparentemente", explain:"Incorrecto. Aplicar funciones sobre columnas indexadas impide que el optimizador use el índice eficientemente porque el valor transformado no está en el índice."},
  {label:"WHERE YEAR(fecha_transaccion) = 2025 impide usar el índice de fecha porque el optimizador no puede buscar en el índice con el valor transformado. Solución: WHERE fecha_transaccion >= '2025-01-01' AND fecha_transaccion < '2026-01-01' — permite Index Seek.", explain:"Correcto. El índice almacena los valores originales de fecha_transaccion. La función YEAR() transforma cada valor durante la evaluación, forzando un scan de todas las filas. Al usar BETWEEN o >= y <, el optimizador puede ir directamente al rango en el índice (Index Seek). Mismo problema con: UPPER(email) = 'USUARIO@BANCO.COM', CAST(id AS VARCHAR) = '123', LEFT(codigo, 3) = 'TRX'."},
  {label:"Solo las funciones de agregación (SUM, COUNT) afectan el uso de índices; las funciones escalares no", explain:"Incorrecto. Cualquier función aplicada sobre la columna indexada en el WHERE impide el Index Seek. Las funciones escalares (YEAR, UPPER, CAST, LEFT) son igual de problemáticas."},
  {label:"La solución es crear un índice funcional que indexe el resultado de la función", explain:"Incorrecto parcialmente. SQL Server no tiene índices funcionales como PostgreSQL, pero tiene Computed Columns persistidas sobre las que sí se puede indexar. Sin embargo, la solución más simple y eficiente es reescribir la query para evitar la función sobre la columna indexada."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Qué es un índice compuesto y cuál es la regla del prefijo izquierdo?",
options:[
  {label:"Un índice compuesto cubre automáticamente cualquier subconjunto de sus columnas en cualquier orden", explain:"Incorrecto. Solo funciona con el prefijo izquierdo: las columnas del índice en orden de izquierda a derecha. Saltar la primera columna invalida el uso del índice."},
  {label:"Índice en múltiples columnas. Regla del prefijo izquierdo: el índice IX(A,B,C) puede usarse para queries que filtran por A, por A+B, o por A+B+C, pero NO solo por B o solo por C. La primera columna siempre debe estar en el WHERE.", explain:"Correcto. CREATE INDEX IX_trans ON transacciones(cliente_id, fecha, estado). Úsable: WHERE cliente_id=1 (✓), WHERE cliente_id=1 AND fecha>'2025' (✓), WHERE cliente_id=1 AND fecha>'2025' AND estado='ACTIVO' (✓). No úsable eficientemente: WHERE fecha>'2025' sin cliente_id (✗), WHERE estado='ACTIVO' sin cliente_id (✗). El orden de columnas importa: columna con mayor cardinalidad y más usada en WHERE va primero."},
  {label:"El orden de columnas en un índice compuesto no importa; el optimizador reordena automáticamente", explain:"Incorrecto. El orden importa criticamente. El índice está físicamente ordenado por la primera columna, luego la segunda dentro de cada valor de la primera, etc. El optimizador solo puede usar el índice empezando desde la primera columna."},
  {label:"Un índice compuesto siempre es más lento que múltiples índices simples porque cubre más columnas", explain:"Incorrecto. Un índice compuesto bien diseñado es más eficiente que múltiples índices simples para queries que filtran por varias columnas. El optimizador debe elegir un índice por consulta (o hacer index intersect), mientras el compuesto satisface la query en un solo recorrido."},
], correct:1},

// ══════════ PERFORMANCE & QUERY PLANS ══════════
{cat:"Performance & Query Plans",
q:"¿Cómo usas un Execution Plan para diagnosticar una query lenta en SQL Server?",
options:[
  {label:"El Execution Plan muestra solo el tiempo total de ejecución; para detalles hay que usar SQL Profiler", explain:"Incorrecto. El Execution Plan muestra mucho más: tipo de operación por nodo (Scan, Seek, Hash Join), costo estimado vs real, número de filas, operaciones costosas, índices faltantes sugeridos."},
  {label:"Analizar: operaciones costosas (nodos con mayor porcentaje de costo), tipo de acceso (Table Scan vs Index Seek), Hash Join vs Nested Loop, filas estimadas vs reales (indica estadísticas desactualizadas), y sugerencias de índices faltantes (triángulo amarillo).", explain:"Correcto. Proceso práctico: 1) Identificar el nodo con mayor costo (%). 2) Si es Table Scan en tabla grande → crear índice. 3) Si filas estimadas difieren mucho de reales → UPDATE STATISTICS. 4) Si hay Hash Join en tablas pequeñas → puede ser mejor Nested Loop con índice. 5) Si hay Sort costoso → agregar la columna de ordenación al índice. La advertencia de índice faltante sugiere automáticamente la columna y el INCLUDE."},
  {label:"Para diagnosticar queries lentas solo se necesita revisar los locks activos; el Execution Plan no ayuda con problemas de rendimiento", explain:"Incorrecto. Los locks son una causa posible de lentitud pero el Execution Plan diagnostica la eficiencia del plan de acceso a datos: índices, joins, sorts. Ambos análisis son complementarios."},
  {label:"El Execution Plan es igual al EXPLAIN de PostgreSQL; la interpretación es idéntica en ambas bases de datos", explain:"Incorrecto. Son herramientas análogas pero con diferente formato y terminología. SQL Server muestra costos en porcentaje y usa términos como 'Clustered Index Scan', 'Key Lookup'. PostgreSQL usa 'Seq Scan', 'Index Scan' con costos en unidades arbitrarias. La interpretación requiere conocer el motor específico."},
], correct:1},

{cat:"Performance & Query Plans",
q:"En un sistema bancario de alta concurrencia, ¿qué estrategias aplicas para optimizar el rendimiento de la BD?",
options:[
  {label:"Aumentar el hardware (más RAM y CPU) es siempre la solución más efectiva y debe hacerse primero", explain:"Incorrecto. El hardware puede mitigar síntomas pero no resuelve problemas de diseño. Una query sin índice en una tabla de 100M registros seguirá siendo lenta con cualquier hardware si hace un full scan."},
  {label:"Combinación de: indexación correcta (alta cardinalidad, prefijo izquierdo, covering), optimización de queries (evitar SELECT *, funciones en WHERE, reducir subqueries), caché (Redis para datos frecuentes), pool de conexiones calibrado (HikariCP), separar carga OLTP de reportería (réplica de lectura), y particionamiento de tablas grandes.", explain:"Correcto. En producción el orden de impacto suele ser: 1) Índices correctos (mayor impacto, costo bajo). 2) Reescribir queries problemáticas. 3) Caché para datos estables (tipos de cambio, catálogos). 4) Réplica de lectura para reportes. 5) Particionamiento para tablas >100M registros. 6) Sharding si el volumen supera la capacidad de un nodo. El hardware es el último recurso."},
  {label:"La solución principal es usar NoSQL en lugar de SQL; las BDs relacionales no escalan en alta concurrencia", explain:"Incorrecto. SQL puede escalar masivamente con el diseño correcto. Los bancos más grandes del mundo usan BD relacionales para sus operaciones transaccionales. NoSQL tiene sus casos de uso pero no es la solución universal."},
  {label:"Deshabilitar los índices durante picos de carga para evitar el overhead de mantenimiento de índices en writes", explain:"Incorrecto. Deshabilitar índices elimina la capacidad de hacer búsquedas eficientes. El overhead de mantenimiento de índices en writes es real pero generalmente mucho menor que el costo de reads sin índice en sistemas con alta proporción de lecturas."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Qué son las estadísticas de SQL Server y cuándo se vuelven problemáticas?",
options:[
  {label:"Las estadísticas son metadatos de permisos de usuario; no afectan al rendimiento de las queries", explain:"Incorrecto. Las estadísticas son histogramas que describen la distribución de valores en columnas/índices. Son fundamentales para que el optimizador estime el número de filas y elija el plan correcto."},
  {label:"Histogramas que describen la distribución de datos en columnas. El optimizador las usa para estimar filas y elegir el plan. Se vuelven problemáticas cuando están desactualizadas (tras bulk inserts/deletes masivos): el optimizador elige planes subóptimos porque sus estimaciones son incorrectas.", explain:"Correcto. Señal de estadísticas desactualizadas en el Execution Plan: filas estimadas muy diferentes de las reales (ej: estimó 100 filas, procesó 1,000,000). Solución: UPDATE STATISTICS tabla (con fullscan en tablas críticas). En SQL Server, AUTO_UPDATE_STATISTICS está habilitado por defecto pero puede no ejecutarse con suficiente frecuencia en tablas que cambian rápidamente. Buena práctica: job nocturno que actualiza estadísticas de las tablas más activas."},
  {label:"Las estadísticas siempre están actualizadas en SQL Server porque se actualizan con cada INSERT/UPDATE/DELETE", explain:"Incorrecto. AUTO_UPDATE_STATISTICS se dispara cuando aproximadamente el 20% de las filas cambian (umbral configurable). En tablas grandes con cambios frecuentes, el 20% puede representar millones de cambios, y las estadísticas pueden quedar obsoletas por horas."},
  {label:"Actualizar estadísticas bloquea la tabla completamente y debe hacerse solo en ventanas de mantenimiento nocturnas", explain:"Incorrecto. UPDATE STATISTICS por defecto usa SAMPLE (muestra) que es rápido y no bloquea significativamente. FULLSCAN es más preciso pero más lento. En SQL Server, UPDATE STATISTICS no bloquea lecturas ni escrituras (usa snapshot aislado)."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Qué es el problema N+1 en ORM y cómo lo detectas y resuelves?",
options:[
  {label:"N+1 significa que la BD tiene N+1 tablas; se resuelve normalizando el esquema", explain:"Incorrecto. N+1 es un problema de queries generadas por ORM: 1 query para obtener N registros padre + N queries adicionales (una por cada padre) para obtener los hijos."},
  {label:"ORM hace 1 query para cargar N entidades padre y luego N queries adicionales para cargar las relaciones lazy de cada una. Detección: Hibernate Statistics, logs de SQL, Datadog. Solución: JOIN FETCH en JPQL, @EntityGraph, o Batch Size en la anotación.", explain:"Correcto. Ejemplo clásico: cargar 100 clientes y luego acceder a cliente.getCuentas() por cada uno → 101 queries. Solución JPQL: SELECT c FROM Cliente c JOIN FETCH c.cuentas WHERE c.activo = true → 1 sola query con JOIN. Para colecciones grandes: @BatchSize(size=20) hace queries de 20 en 20 en lugar de 1 por registro. En sistemas bancarios con reportes de cuentas por cliente, N+1 puede multiplicar el tiempo de respuesta por 100x."},
  {label:"N+1 solo ocurre con FetchType.EAGER; cambiando todas las relaciones a LAZY se resuelve automáticamente", explain:"Incorrecto. N+1 ocurre precisamente con LAZY cuando accedes a las relaciones dentro de un loop. Con EAGER también hay problemas (carga datos innecesarios). La solución real es controlar qué se carga con JOIN FETCH o @EntityGraph según la necesidad de cada query."},
  {label:"La solución siempre es usar SQL nativo en lugar de ORM; ORM es la causa de todos los problemas de N+1", explain:"Incorrecto. ORM tiene herramientas para resolver N+1 (JOIN FETCH, EntityGraph). SQL nativo también puede generar N+1 si el desarrollador lo implementa con un loop. El problema es la lógica de acceso a datos, no el ORM en sí."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Cómo configuras HikariCP para un microservicio transaccional de alto volumen?",
options:[
  {label:"Usar el máximo de conexiones posibles (ej: 500) para garantizar que nunca haya espera por conexión disponible", explain:"Incorrecto. Más conexiones no siempre es mejor. SQL Server tiene límite de conexiones concurrentes eficientes. Demasiadas conexiones generan overhead de context switching en el motor de BD y pueden degradar el rendimiento global."},
  {label:"Parámetros clave: maximumPoolSize = (núcleos_CPU_BD × 2) + spindles ≈ 10-20 para la mayoría de casos. minimumIdle para evitar overhead de creación. connectionTimeout para fallar rápido. maxLifetime para renovar conexiones y evitar conexiones muertas. Alinear con el thread pool de la aplicación.", explain:"Correcto. La fórmula de HikariCP: pool pequeño + cola de espera = mejor throughput que pool grande. Ejemplo para BD con 8 núcleos: maximumPoolSize=20, minimumIdle=10, connectionTimeout=30000, maxLifetime=1800000 (30min). Regla crítica: replicas × maximumPoolSize ≤ capacidad_conexiones_BD. Con 10 pods × 20 conexiones = 200 conexiones al pool de BD. Si BD soporta 300, hay margen. Si soporta 100, hay saturación."},
  {label:"HikariCP se configura igual en todos los ambientes; no hay diferencia entre desarrollo y producción", explain:"Incorrecto. En desarrollo: pool pequeño, timeouts largos para debugging. En producción: pool calibrado por carga real, timeouts ajustados al SLA, keepalive habilitado, métricas de pool monitoreadas. La configuración de producción debe validarse con pruebas de carga."},
  {label:"maximumPoolSize debe igualarse exactamente al número de threads de la aplicación para evitar timeouts", explain:"Incorrecto. No todas las operaciones necesitan conexión a BD simultáneamente. Un thread que procesa lógica de negocio pura no necesita conexión. El pool puede ser más pequeño que el thread pool si las operaciones de BD no son 100% concurrentes."},
], correct:1},

// ══════════ JDBC, JPA & SPRING BOOT ══════════
{cat:"JDBC, JPA & Spring Boot",
q:"¿Cuál es la diferencia entre Statement y PreparedStatement y por qué es crítica en banca?",
options:[
  {label:"PreparedStatement es más lento que Statement porque tiene overhead de precompilación", explain:"Incorrecto. PreparedStatement es más rápido en ejecuciones repetidas porque el plan de ejecución se compila una sola vez y se reutiliza. Statement compila el plan en cada ejecución."},
  {label:"Statement: concatena strings directamente → vulnerable a SQL Injection + recompila el plan en cada ejecución. PreparedStatement: parámetros separados del SQL (?) → inmune a SQL Injection + plan precompilado reutilizable. En banca es crítico por seguridad y rendimiento.", explain:"Correcto. SQL Injection con Statement: String sql = 'SELECT * FROM cuentas WHERE id = ' + input; si input = '1 OR 1=1', retorna todas las cuentas. PreparedStatement: ps = conn.prepareStatement('SELECT * FROM cuentas WHERE id = ?'); ps.setLong(1, id); — el input se trata siempre como dato, nunca como SQL. Además, en sistemas con miles de queries/segundo, reutilizar el plan de ejecución reduce significativamente la carga de CPU en el motor de BD."},
  {label:"La diferencia entre Statement y PreparedStatement solo importa en queries con más de 3 parámetros", explain:"Incorrecto. La vulnerabilidad a SQL Injection y la falta de reutilización del plan existen con cualquier número de parámetros, incluso con cero si hay concatenación dinámica."},
  {label:"Spring Data JPA usa Statement internamente para mejor rendimiento; PreparedStatement es solo para JDBC puro", explain:"Incorrecto. Spring Data JPA (Hibernate) usa PreparedStatement para todas las queries, tanto las generadas automáticamente como las definidas con @Query. Esto garantiza seguridad y reutilización del plan por defecto."},
], correct:1},

{cat:"JDBC, JPA & Spring Boot",
q:"¿Qué anotaciones JPA son esenciales para mapear una entidad bancaria y qué hace cada una?",
options:[
  {label:"Solo @Entity es necesaria; el resto de anotaciones son opcionales y JPA infiere todo automáticamente", explain:"Incorrecto. Sin @Id no hay clave primaria definida y la entidad no es válida. Sin @Table, JPA usa el nombre de la clase como nombre de tabla (puede no coincidir). Sin @Column, usa el nombre del campo (sensible a mayúsculas según el motor)."},
  {label:"@Entity (marca la clase como entidad JPA), @Table (nombre de tabla en BD), @Id (clave primaria), @GeneratedValue (estrategia de generación: IDENTITY para auto-increment SQL Server), @Column (nombre y constraints), @OneToMany/@ManyToOne con @JoinColumn para relaciones.", explain:"Correcto. Ejemplo completo: @Entity @Table(name='transacciones') class Transaccion { @Id @GeneratedValue(strategy=IDENTITY) @Column(name='id_transaccion') Long id; @Column(name='monto', nullable=false, precision=18, scale=2) BigDecimal monto; @ManyToOne @JoinColumn(name='id_cuenta_fk') Cuenta cuenta; }. IDENTITY en SQL Server usa la columna IDENTITY del motor. Usar precision y scale en BigDecimal para montos monetarios es crítico."},
  {label:"@ManyToOne siempre debe usarse con FetchType.EAGER para garantizar que los datos relacionados estén disponibles", explain:"Incorrecto. FetchType.EAGER en @ManyToOne carga la entidad relacionada siempre, incluso cuando no se necesita. En transacciones que se procesan en bulk, esto puede generar carga innecesaria. La recomendación general de Hibernate es LAZY para todas las relaciones y usar JOIN FETCH cuando se necesiten."},
  {label:"@GeneratedValue con estrategia UUID es siempre preferible a IDENTITY en sistemas bancarios por mayor unicidad", explain:"Incorrecto. UUID como PK genera fragmentación masiva de Clustered Index (los UUIDs son aleatorios, no secuenciales). En tablas de transacciones de alto volumen, esto es muy perjudicial. Usar NEWSEQUENTIALID() de SQL Server o IDENTITY (secuencial) para la PK. UUID puede usarse como identificador de negocio adicional (columna separada)."},
], correct:1},

{cat:"JDBC, JPA & Spring Boot",
q:"¿Cuándo deshabilitas el auto-commit en JDBC y qué riesgos conlleva no hacerlo?",
options:[
  {label:"El auto-commit debe estar siempre habilitado en sistemas de alta concurrencia para maximizar el throughput", explain:"Incorrecto. Auto-commit habilitado significa que cada statement es una transacción separada. En operaciones que requieren atomicidad (débito + crédito en una transferencia), auto-commit puede dejar la BD en estado inconsistente si falla el segundo statement."},
  {label:"Deshabilitar auto-commit cuando necesitas atomicidad entre múltiples statements (ej: débito de cuenta origen + crédito de cuenta destino en una transferencia). Sin control manual: si el débito se ejecuta pero el crédito falla, el dinero desaparece. Con transacción manual: rollback deshace ambos.", explain:"Correcto. conn.setAutoCommit(false); try { debitarCuenta(conn, origen, monto); acreditarCuenta(conn, destino, monto); conn.commit(); } catch(Exception e) { conn.rollback(); }. En Spring Boot, @Transactional hace esto automáticamente: deshabilita auto-commit al inicio del método y hace commit/rollback al final. Sin @Transactional en operaciones multi-step, el riesgo de inconsistencia es real."},
  {label:"Auto-commit solo afecta a operaciones SELECT; para INSERT/UPDATE/DELETE siempre hay una transacción implícita independientemente", explain:"Incorrecto. Con auto-commit=true, cada DML (INSERT, UPDATE, DELETE) es inmediatamente visible y no puede deshacerse. El commit es automático e implícito después de cada statement."},
  {label:"En Spring Boot con @Transactional no es necesario preocuparse por auto-commit; el framework lo maneja de forma diferente al JDBC estándar", explain:"Incorrecto parcialmente. @Transactional sí gestiona las transacciones automáticamente (incluyendo auto-commit), pero entender el mecanismo subyacente es esencial para diagnosticar problemas como transacciones anidadas, propagación incorrecta, o el problema de auto-commit en queries fuera de un contexto transaccional."},
], correct:1},

{cat:"JDBC, JPA & Spring Boot",
q:"¿Qué es R2DBC y cuándo lo usarías en lugar de JDBC en un sistema bancario?",
options:[
  {label:"R2DBC es una versión más nueva de JDBC con mejor rendimiento; siempre debe preferirse en proyectos nuevos", explain:"Incorrecto. R2DBC es para programación reactiva (no bloqueante). No es una versión mejorada de JDBC para todos los casos; es para un paradigma de programación diferente."},
  {label:"R2DBC es el driver de BD no bloqueante para programación reactiva (WebFlux/Project Reactor). Usar cuando la aplicación es completamente reactiva y se necesita que las queries de BD no bloqueen hilos. JDBC bloquea el hilo mientras espera respuesta de BD, rompiendo la reactividad.", explain:"Correcto. Con WebFlux, si usas JDBC, cada query de BD bloquea un thread del event loop, anulando las ventajas del modelo reactivo. R2DBC mantiene el pipeline reactivo hasta la BD: Mono<Cuenta> findByNumeroCuenta(String numero) retorna un Mono que se resuelve de forma no bloqueante. Limitación: R2DBC tiene soporte más limitado que JPA (no hay caché de segundo nivel, no todas las features de Hibernate). Contexto bancario: si el flujo de pagos es reactivo de punta a punta, R2DBC es necesario; si hay partes síncronas, JDBC puede coexistir usando subscribeOn(boundedElastic())."},
  {label:"R2DBC es mejor que JDBC en todos los casos porque usa menos memoria al no bloquear hilos", explain:"Incorrecto. R2DBC es óptimo en sistemas I/O-bound totalmente reactivos. En sistemas sincrónicos tradicionales, R2DBC añade complejidad sin beneficio real. El uso de memoria depende del número de operaciones concurrentes, no solo del driver."},
  {label:"R2DBC no soporta transacciones; por eso JDBC sigue siendo necesario para operaciones críticas en banca", explain:"Incorrecto. R2DBC soporta transacciones a través de la interfaz ReactiveTransactionManager de Spring. @Transactional funciona con R2DBC en aplicaciones WebFlux correctamente configuradas."},
], correct:1},

{cat:"JDBC, JPA & Spring Boot",
q:"¿Cómo implementas paginación eficiente en una tabla de transacciones con 100 millones de registros?",
options:[
  {label:"OFFSET/LIMIT es siempre la solución correcta para paginación; es la más simple y compatible con todos los motores", explain:"Incorrecto. OFFSET/LIMIT (o OFFSET/FETCH en SQL Server) se vuelve extremadamente lento en páginas altas porque el motor debe recorrer y descartar todos los registros anteriores. OFFSET 5000000 ROWS FETCH NEXT 20 ROWS lee 5M registros para retornar 20."},
  {label:"Keyset Pagination (Seek Method) sobre el índice de la PK o una columna ordenada: WHERE id > :lastSeenId ORDER BY id FETCH NEXT 20 ROWS ONLY. Rendimiento constante O(1) independientemente de la página. OFFSET/LIMIT se vuelve O(n) en páginas profundas.", explain:"Correcto. Keyset: SELECT * FROM transacciones WHERE id > 5000000 ORDER BY id FETCH NEXT 20 ROWS ONLY. El índice de la PK permite ir directamente al punto de inicio sin recorrer registros previos. Limitación: no permite saltar a página arbitraria (página 5000). Para interfaces tipo 'scroll infinito' o APIs paginadas secuencialmente, es la solución ideal. Spring Data JPA: @Query('SELECT t FROM Transaccion t WHERE t.id > :cursor ORDER BY t.id') Page<Transaccion> findNextPage(Long cursor, Pageable pageable)."},
  {label:"Para tablas grandes la solución es siempre cachear todos los datos en Redis y paginar en memoria", explain:"Incorrecto. Una tabla de 100M transacciones puede ocupar decenas de GB. Cachear todo es inviable. La paginación eficiente en BD es la solución correcta, no transferir todos los datos a memoria."},
  {label:"La paginación no es necesaria en sistemas modernos con JSON streaming; se envían todos los registros al cliente", explain:"Incorrecto. Enviar millones de registros al cliente es inviable en términos de memoria, ancho de banda y tiempo de respuesta. La paginación es esencial para cualquier consulta que pueda retornar muchos resultados."},
], correct:1},

// ══════════ ALTA CONCURRENCIA & TRANSACCIONES ══════════
{cat:"Alta Concurrencia & Transacciones",
q:"¿Cuáles son los niveles de aislamiento de transacciones y cuándo usarías cada uno en banca?",
options:[
  {label:"Hay solo dos niveles: READ COMMITTED y SERIALIZABLE. SERIALIZABLE siempre debe usarse en banca por seguridad", explain:"Incorrecto. Hay cuatro niveles estándar. SERIALIZABLE garantiza máxima consistencia pero es el más costoso en concurrencia; usarlo para todo genera bloqueos excesivos."},
  {label:"READ UNCOMMITTED (dirty reads, nunca en banca), READ COMMITTED (default SQL Server, lee solo commits), REPEATABLE READ (misma query retorna mismos resultados en la transacción), SERIALIZABLE (máximo aislamiento, sin phantom reads, más bloqueos). READ COMMITTED con Snapshot Isolation (RCSI) es óptimo para banca.", explain:"Correcto. SQL Server tiene READ COMMITTED SNAPSHOT ISOLATION (RCSI): los readers no bloquean writers (usa versioning en tempdb). Ideal para sistemas bancarios de alta concurrencia donde lecturas no deben bloquear escrituras. SERIALIZABLE para operaciones críticas específicas (verificar y actualizar saldo en una sola transacción). Nunca READ UNCOMMITTED en operaciones financieras: podrías leer un débito que luego se revierte."},
  {label:"El nivel de aislamiento no afecta al rendimiento; solo afecta la consistencia de los datos", explain:"Incorrecto. SERIALIZABLE genera lock ranges que pueden bloquear miles de transacciones concurrentes. READ UNCOMMITTED es el más rápido pero menos seguro. Hay un trade-off directo entre consistencia y concurrencia que impacta directamente el rendimiento."},
  {label:"En Spring Boot @Transactional, el nivel de aislamiento siempre es SERIALIZABLE por defecto para garantizar seguridad", explain:"Incorrecto. El default de @Transactional en Spring es Isolation.DEFAULT, que usa el nivel por defecto del motor de BD. Para SQL Server, ese default es READ COMMITTED. Para cambiar: @Transactional(isolation = Isolation.SERIALIZABLE)."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Qué son los deadlocks en BD y cómo los previenes en operaciones de transferencia bancaria?",
options:[
  {label:"Los deadlocks son transacciones que tardan demasiado; se previenen con timeout en todas las queries", explain:"Incorrecto. Los deadlocks son situaciones donde dos o más transacciones se bloquean mutuamente esperando locks que la otra tiene. No tienen relación directa con el tiempo de ejecución."},
  {label:"Deadlock: Tx1 tiene lock de CuentaA y espera CuentaB; Tx2 tiene lock de CuentaB y espera CuentaA. SQL Server mata la víctima (menor costo). Prevención: acceder siempre a recursos en el mismo orden (siempre lockear la cuenta con menor ID primero), transacciones cortas, índices para reducir granularidad de locks.", explain:"Correcto. Regla del orden consistente: en transferencia A→B, siempre lockear min(A,B) primero, luego max(A,B). Así no hay espera circular. Transacciones cortas reducen la ventana de tiempo en que se mantienen los locks. Índices adecuados reducen la cantidad de registros lockeados (row-level locks vs page locks vs table locks). SQL Server con RCSI reduce drasticamente deadlocks entre readers y writers."},
  {label:"Los deadlocks solo ocurren con cursores explícitos; usando queries normales SELECT/INSERT/UPDATE no hay deadlocks", explain:"Incorrecto. Los deadlocks ocurren con cualquier operación que adquiera locks: UPDATE, DELETE, INSERT en tabla con FK. Son especialmente comunes en tablas con alta concurrencia y muchas relaciones."},
  {label:"La solución definitiva a los deadlocks es usar READ UNCOMMITTED en todas las transacciones", explain:"Incorrecto. READ UNCOMMITTED resuelve deadlocks entre readers y writers porque los readers no adquieren locks compartidos. Pero los escritores siguen bloqueándose entre sí, y READ UNCOMMITTED introduce riesgo de datos sucios. En banca, no es una solución aceptable."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Cómo funcionan los distributed locks con Redis para proteger operaciones críticas entre microservicios?",
options:[
  {label:"Los distributed locks de Redis son innecesarios si usas transacciones de BD; la BD ya maneja el locking", explain:"Incorrecto. Los locks de BD protegen datos dentro de una sola BD. En microservicios con múltiples servicios e instancias, necesitas coordinar acceso a recursos compartidos fuera del alcance de una sola transacción de BD."},
  {label:"Redisson o SET NX EX implementan un mutex distribuido: el primer servicio que adquiere el lock (SET transaccion:123 locked NX EX 30) procede; los demás esperan o fallan rápido. Previene procesamiento duplicado de la misma transacción en múltiples instancias.", explain:"Correcto. Escenario: 3 pods del servicio de pagos reciben el mismo mensaje Kafka (retry). Sin distributed lock, los 3 procesan el mismo pago. Con Redisson RLock: el primer pod adquiere el lock (llave: 'pago:TRX-001'), los otros detectan que el lock está tomado y evitan procesar. El TTL (EX 30s) garantiza que el lock se libere aunque el pod falle. Complementa el Idempotent Consumer: el lock previene el procesamiento concurrente; la tabla de eventos procesados previene el procesamiento duplicado secuencial."},
  {label:"Distributed locks con Redis son más seguros que los locks de BD porque Redis nunca pierde datos", explain:"Incorrecto. Redis es in-memory y puede perder datos ante fallos sin persistencia configurada. Los locks de BD son más duraderos pero más lentos. Los distributed locks de Redis se usan por velocidad y alcance distribuido, no por mayor durabilidad."},
  {label:"SET NX EX en Redis garantiza exactamente-una-vez (exactly-once) para cualquier operación distribuida", explain:"Incorrecto. El distributed lock reduce la probabilidad de procesamiento duplicado pero no garantiza exactly-once absoluto (hay edge cases con particiones de red). Para exactly-once garantizado, se combina con el patrón Idempotent Consumer que verifica si la operación ya fue procesada."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Qué es el Optimistic Locking vs Pessimistic Locking y cuándo aplicar cada uno en banca?",
options:[
  {label:"Pessimistic Locking siempre debe usarse en sistemas bancarios porque garantiza consistencia total", explain:"Incorrecto. Pessimistic Locking bloquea registros desde el inicio de la transacción (SELECT FOR UPDATE). En alta concurrencia, esto crea cuellos de botella severos en cuentas populares (como una cuenta de empresa con miles de transacciones simultáneas)."},
  {label:"Optimistic: asume que no habrá conflicto, usa un campo @Version que incrementa en cada UPDATE. Si dos transacciones modifican el mismo registro, la segunda falla con OptimisticLockException y hace retry. Mejor para baja tasa de conflictos. Pessimistic: usa SELECT FOR UPDATE, bloquea desde el inicio. Mejor cuando los conflictos son frecuentes.", explain:"Correcto. JPA Optimistic: @Version Long version en la entidad. Si Tx1 y Tx2 leen version=5 y ambas intentan actualizar, la primera hace version=6, la segunda falla con StaleObjectStateException porque la version ya no es 5. En banca: Optimistic para actualizaciones de datos de cliente (conflictos raros). Pessimistic para operaciones de saldo donde los conflictos son frecuentes y el costo del retry es alto."},
  {label:"Optimistic Locking en JPA requiere configuración externa; no hay soporte nativo en Hibernate", explain:"Incorrecto. Hibernate tiene soporte nativo para Optimistic Locking con @Version. Simplemente agregar el campo anotado y Hibernate gestiona automáticamente la validación y el incremento de versión."},
  {label:"Pessimistic Locking nunca genera deadlocks; es más seguro que Optimistic Locking por eso", explain:"Incorrecto. Pessimistic Locking es precisamente la causa más común de deadlocks cuando dos transacciones adquieren locks en orden diferente. Optimistic Locking no genera deadlocks porque no bloquea nada durante la lectura."},
], correct:1},

// ══════════ BD CON KAFKA & SPRING BOOT ══════════
{cat:"BD con Kafka & CDC",
q:"¿Qué es Change Data Capture (CDC) y cómo sincronizas dos bases de datos sin Kafka en un sistema bancario?",
options:[
  {label:"CDC es una técnica de backup incremental; no tiene relación con sincronización entre sistemas", explain:"Incorrecto. CDC captura y transmite los cambios (INSERT/UPDATE/DELETE) en una BD para ser procesados por otros sistemas. Es fundamentalmente diferente al backup."},
  {label:"CDC lee el transaction log de la BD y captura cada cambio como un evento. Sin Kafka, alternativas: CDC nativo de SQL Server (Change Tracking/CDC feature) + jobs ETL que leen la tabla de cambios, replicación de BD (mirroring/Always On), o jobs programados con MERGE para sincronización periódica.", explain:"Correcto. SQL Server CDC feature: habilitar a nivel de tabla → SQL Server mantiene una tabla shadow con todos los cambios (cdc.schema_tablename). Un job de sincronización lee esta tabla periódicamente y aplica los cambios en la BD destino. Debezium es el conector CDC más popular para Kafka: lee el transaction log de SQL Server/PostgreSQL y emite eventos a topics Kafka. Para near-real-time sin Kafka: CDC + Azure Service Bus o un job que corre cada 30 segundos."},
  {label:"CDC en SQL Server requiere deshabilitar las transacciones ACID; por eso no es recomendable en BD bancarias", explain:"Incorrecto. CDC en SQL Server funciona leyendo el transaction log después de que las transacciones se completan. No interfiere con el procesamiento ACID de las transacciones activas."},
  {label:"La única forma de sincronizar dos BDs en tiempo real es que ambas compartan la misma conexión de Spring Boot", explain:"Incorrecto. Compartir una sola conexión entre dos BDs no es ni posible ni deseable. Las técnicas de sincronización (replicación, CDC, ETL) operan a nivel de datos, no de conexiones de aplicación."},
], correct:1},

{cat:"BD con Kafka & CDC",
q:"¿Cómo garantizas consistencia entre una transacción de BD y la publicación de un evento a Kafka?",
options:[
  {label:"Publicar el evento a Kafka antes de hacer el commit de BD; así Kafka siempre tiene el evento", explain:"Incorrecto. Si el commit de BD falla después de publicar a Kafka, el evento quedó publicado pero la transacción no se guardó. Inconsistencia en dirección contraria."},
  {label:"Patrón Transactional Outbox: en la misma transacción ACID, escribir el registro de negocio Y el evento en una tabla 'outbox'. Un proceso separado (o Debezium CDC) lee la outbox y publica a Kafka. Si Kafka falla, el evento queda en la outbox y se reintenta.", explain:"Correcto. El problema: Tx de BD y publicación a Kafka son dos sistemas distintos, no hay 2PC entre ellos. Publicar a Kafka después del commit: si Kafka falla en ese instante, el evento se pierde. Outbox soluciona esto: INSERT INTO pagos + INSERT INTO outbox_events en una transacción → ambos se commitean o ninguno. El relay process lee outbox y publica a Kafka con at-least-once. El consumidor usa Idempotent Consumer para manejar duplicados. Debezium puede leer el transaction log directamente (CDC) para publicar automáticamente."},
  {label:"@Transactional de Spring sincroniza automáticamente BD y Kafka si usas KafkaTemplate dentro de la transacción", explain:"Incorrecto. @Transactional de Spring no incluye Kafka por defecto. Para transaccionalidad con Kafka se necesita KafkaTransactionManager configurado explícitamente, pero aún así no es un 2PC real con la BD. El Outbox Pattern es la solución más robusta."},
  {label:"La solución es usar two-phase commit (XA) entre SQL Server y Kafka", explain:"Incorrecto. Kafka no soporta XA (2PC) como participante transaccional estándar. Además, 2PC tiene problemas de disponibilidad y rendimiento. El Outbox Pattern es la alternativa práctica y ampliamente adoptada."},
], correct:1},

{cat:"BD con Kafka & CDC",
q:"¿Cómo usas Kafka Connect para sincronizar datos entre una BD SQL Server y un sistema downstream?",
options:[
  {label:"Kafka Connect es una herramienta de monitoreo de Kafka; no tiene relación con bases de datos", explain:"Incorrecto. Kafka Connect es un framework para conectar Kafka con sistemas externos (BDs, sistemas de archivos, APIs) mediante conectores Source (ingesta hacia Kafka) y Sink (exportación desde Kafka)."},
  {label:"Kafka Connect con JDBC Source Connector: lee nuevos/modificados registros de SQL Server y los publica como eventos en topics Kafka. CDC Source Connector (Debezium): captura cambios del transaction log. Sink Connectors: consumen topics y escriben en destino (otra BD, Elasticsearch, S3).", explain:"Correcto. Arquitectura típica: SQL Server → Debezium Source Connector → Topic Kafka 'pagos.cambios' → JDBC Sink Connector → BD de reportería. El JDBC Source puede usar polling (consulta por timestamp/id) o Debezium usa CDC (transaction log), que es más eficiente y captura DELETEs que el polling no puede ver. Configuración en JSON: connector.class, connection.url, table.whitelist, topic.prefix. No requiere código Java; es configuración declarativa."},
  {label:"Kafka Connect requiere modificar el código fuente de SQL Server para activar los hooks de cambio", explain:"Incorrecto. Kafka Connect opera externamente a SQL Server. El conector JDBC usa queries estándar; Debezium accede al transaction log mediante permisos de SQL Server Agent sin modificar el motor."},
  {label:"Kafka Connect solo soporta bases de datos open source; para SQL Server se necesita código personalizado", explain:"Incorrecto. Debezium tiene soporte oficial para SQL Server, Oracle, MySQL, PostgreSQL y otros. El conector JDBC de Confluent también soporta SQL Server a través del driver JDBC estándar."},
], correct:1},

{cat:"BD con Kafka & CDC",
q:"¿Cómo diseñas el particionamiento de un topic Kafka para que los eventos de una misma cuenta siempre lleguen en orden?",
options:[
  {label:"El orden en Kafka está garantizado globalmente a nivel de topic; no se necesita particionamiento especial", explain:"Incorrecto. Kafka garantiza orden dentro de una partición, no a nivel de topic completo. Con múltiples particiones, eventos de la misma cuenta pueden llegar a particiones distintas y procesarse en diferente orden."},
  {label:"Usar el número de cuenta (o cliente_id) como partition key: producer.send(new ProducerRecord('transacciones', numeroCuenta, evento)). Kafka hace hash del key para asignar partición. Todas las transacciones de la misma cuenta van a la misma partición → orden garantizado.", explain:"Correcto. Con partition key por cuenta: todas las transacciones de la cuenta '001-12345' siempre van a la partición 3 (por ejemplo). El consumer que procesa la partición 3 las recibe en orden cronológico. Sin partition key: round-robin, transacciones de la misma cuenta pueden procesarse en cualquier orden. Importante: número de particiones define el máximo de consumers en paralelo. Más particiones = más paralelismo pero más overhead."},
  {label:"El orden dentro de una cuenta se garantiza configurando acks=all en el producer; la clave de partición no afecta el orden", explain:"Incorrecto. acks=all garantiza durabilidad (el mensaje no se pierde), no orden. El orden depende exclusivamente de que los mensajes relacionados vayan a la misma partición."},
  {label:"Para garantizar orden se debe usar un solo consumer por topic, independientemente del número de particiones", explain:"Incorrecto. Un solo consumer por topic elimina el paralelismo. La solución correcta es asegurar que eventos que necesitan estar ordenados entre sí compartan partición (mismo key), mientras que eventos independientes pueden ir a distintas particiones y ser procesados en paralelo."},
], correct:1},

// ══════════ ARQUITECTURA DE BD ══════════
{cat:"Arquitectura de BD",
q:"¿Cuándo usarías una base de datos NoSQL en lugar de SQL relacional en un sistema bancario?",
options:[
  {label:"NoSQL es siempre mejor que SQL para sistemas bancarios modernos porque escala horizontalmente", explain:"Incorrecto. NoSQL y SQL tienen trade-offs distintos. Los sistemas bancarios requieren ACID para operaciones transaccionales; NoSQL renuncia a parte de esa garantía. La elección depende del caso de uso específico."},
  {label:"SQL para transacciones financieras (requieren ACID, relaciones complejas, integridad referencial). NoSQL para: datos de sesión y caché (Redis), perfiles de usuario con esquema variable (MongoDB), logs y eventos de auditoría masivos (Elasticsearch/Cassandra), datos de alta escritura y lectura eventual.", explain:"Correcto. Híbrido bancario típico: SQL Server para cuentas, transacciones, transferencias (ACID). Redis para caché de saldo, sesiones, rate limiting. MongoDB para documentos de onboarding (KYC con campos variables por tipo de cliente). Elasticsearch para búsqueda full-text de transacciones y auditoría. Cassandra para métricas de fraude en tiempo real (alta escritura). No hay un único tipo de BD para todo."},
  {label:"La diferencia principal entre SQL y NoSQL es el lenguaje de consulta; SQL usa SQL y NoSQL usa JSON", explain:"Incorrecto. La diferencia fundamental es el modelo de datos (relacional vs documentos/columnas/grafo), el modelo de consistencia (ACID vs BASE), y el modelo de escalabilidad (vertical vs horizontal). El lenguaje de consulta es una consecuencia, no la causa."},
  {label:"NoSQL no soporta transacciones; por eso SQL es obligatorio para cualquier operación que involucre dinero", explain:"Incorrecto. MongoDB 4.0+ soporta transacciones ACID multi-documento. CosmosDB soporta transacciones. Redis con Lua scripts ofrece atomicidad. Sin embargo, el soporte transaccional en NoSQL es más limitado y tiene más overhead que en SQL relacional."},
], correct:1},

{cat:"Arquitectura de BD",
q:"¿Qué es el sharding de base de datos y qué problemas introduce que debes resolver?",
options:[
  {label:"Sharding es lo mismo que replicación; ambos distribuyen datos entre múltiples servidores para alta disponibilidad", explain:"Incorrecto. Replicación copia los mismos datos en múltiples nodos (para disponibilidad/lecturas). Sharding distribuye particiones disjuntas de los datos (para escala de escritura). Son técnicas complementarias con propósitos distintos."},
  {label:"Sharding distribuye datos horizontalmente entre múltiples instancias de BD según una shard key (ej: cliente_id % N_shards). Escala escrituras y almacenamiento. Problemas: queries cross-shard (JOIN entre shards es costoso), transacciones distribuidas (no hay 2PC cross-shard), rebalanceo al agregar shards.", explain:"Correcto. Ejemplo: 10 shards con shard_key=cliente_id % 10. El cliente 1234 siempre va al shard 4. Queries del cliente 1234 van solo al shard 4 (eficiente). Reportes de todos los clientes requieren query a los 10 shards y agregar resultados (fan-out query, costoso). Solución para reportes: BD de reportería separada que agrega todos los shards via CDC/ETL. Sharding solo se justifica cuando un único nodo no puede manejar la carga."},
  {label:"Sharding es automático en SQL Server; simplemente se activa con una opción de configuración sin cambios en la aplicación", explain:"Incorrecto. SQL Server no tiene sharding automático nativo como Cassandra o MongoDB. En SQL Server se implementa con Elastic Database (Azure SQL) o manualmente en la capa de aplicación. Siempre requiere cambios en la lógica de routing de queries."},
  {label:"Con sharding, las transacciones ACID se mantienen igual que en una BD no-sharded", explain:"Incorrecto. Las transacciones ACID cross-shard son el mayor desafío del sharding. Requieren 2PC distribuido (costoso e inestable) o SAGA. Por eso el diseño del shard key debe garantizar que transacciones atómicas operen dentro de un solo shard (ej: todos los movimientos de una cuenta en el mismo shard)."},
], correct:1},

{cat:"Arquitectura de BD",
q:"¿Cómo diseñas una arquitectura de réplicas de lectura para separar carga OLTP de reportería?",
options:[
  {label:"La réplica de lectura es idéntica a la BD principal en todos los aspectos; se usa indistintamente para cualquier operación", explain:"Incorrecto. La réplica tiene latencia de replicación (puede ser segundos). Usar réplica para operaciones que requieren datos fresquísimos (verificar saldo antes de una transferencia) puede ser riesgoso."},
  {label:"BD principal (Primary): escrituras y lecturas críticas que requieren consistencia inmediata. Réplica de lectura (Read Replica/Always On Secondary): queries de reportería, dashboards, consultas históricas. Spring Boot: DataSource routing para enviar writes a primary y reads a réplica con @Transactional(readOnly=true).", explain:"Correcto. AbstractRoutingDataSource en Spring: determina dinámicamente qué datasource usar según el contexto transaccional. @Transactional(readOnly=true) en métodos de consulta → réplica. @Transactional → primary. Monitorear: replication lag (cuánto se tarda la réplica en recibir los cambios del primary). Si el lag es alto, reportes pueden mostrar datos desactualizados. En SQL Server: Always On Availability Groups con readable secondaries. En Azure: Azure SQL Database con read scale-out."},
  {label:"La separación primary/réplica solo es necesaria con más de 10,000 usuarios concurrentes; para menos es innecesaria", explain:"Incorrecto. La separación es necesaria cuando las queries de reportería degradan el rendimiento de las transacciones, independientemente del número de usuarios. Una sola query de reporte que hace full scan de 100M registros puede impactar seriamente las transacciones en producción."},
  {label:"Con CQRS no se necesitan réplicas de lectura; el modelo de lectura de CQRS reemplaza completamente la necesidad de réplicas", explain:"Incorrecto. CQRS y réplicas de lectura son complementarios. CQRS separa los modelos de datos de lectura y escritura (potencialmente en BDs distintas). Una réplica de lectura puede ser la BD del modelo de consulta en CQRS. Son patrones que pueden coexistir."},
], correct:1},

{cat:"Arquitectura de BD",
q:"¿Qué es el particionamiento de tablas y cuándo lo aplicarías en una tabla de transacciones bancarias?",
options:[
  {label:"El particionamiento de tablas es lo mismo que el sharding; ambos dividen datos entre múltiples servidores", explain:"Incorrecto. El particionamiento divide una tabla en segmentos dentro del mismo servidor de BD (particionamiento horizontal interno). El sharding distribuye datos entre múltiples servidores independientes."},
  {label:"Particionamiento divide lógicamente una tabla grande en segmentos según un criterio (fecha, rango de ID) mantenida en el mismo servidor. Beneficios: partition elimination (queries solo acceden a particiones relevantes), mantenimiento por partición (rebuild index solo en la partición del mes anterior), archivado eficiente.", explain:"Correcto. Ejemplo: tabla transacciones particionada por año-mes. Query por el mes actual solo accede a 1 de 60 particiones. REBUILD INDEX de la partición del mes anterior no bloquea transacciones del mes actual. Para archivar datos de 2020: mover la partición a una tabla histórica (switch partition) es casi instantáneo vs DELETE de millones de registros. En SQL Server: PARTITION FUNCTION + PARTITION SCHEME. Aplicar en tablas >50M registros con patrones de acceso por rango de tiempo."},
  {label:"El particionamiento siempre mejora el rendimiento de cualquier query independientemente de si usa la clave de partición", explain:"Incorrecto. El particionamiento solo beneficia queries que filtran por la clave de partición (partition elimination). Queries sin filtro por fecha en el ejemplo anterior seguirán accediendo a todas las particiones (partition scan), sin beneficio y con overhead adicional."},
  {label:"SQL Server no soporta particionamiento nativo; se necesita una herramienta de terceros para implementarlo", explain:"Incorrecto. SQL Server tiene soporte nativo de particionamiento de tablas desde la versión 2005. Se implementa con PARTITION FUNCTION (define los rangos) y PARTITION SCHEME (mapea rangos a filegroups). Enterprise Edition tiene más opciones, pero Standard también lo soporta."},
], correct:1},

// ══════════ SEGURIDAD & OPERACIONES ══════════
{cat:"Seguridad & Operaciones BD",
q:"¿Qué es TDE (Transparent Data Encryption) en SQL Server y qué protege realmente?",
options:[
  {label:"TDE encripta todas las comunicaciones entre la aplicación y SQL Server; es equivalente a SSL/TLS", explain:"Incorrecto. Eso es la encriptación en tránsito (SSL/TLS para conexiones). TDE encripta los datos en reposo: los archivos físicos en disco."},
  {label:"TDE encripta los archivos de datos (.mdf), logs (.ldf) y backups en disco. Protege contra robo físico del disco o acceso no autorizado a los archivos. No protege queries desde conexiones autorizadas (los datos se desencriptan transparentemente en memoria para usuarios legítimos).", explain:"Correcto. TDE es transparente para las aplicaciones: la query funciona exactamente igual, SQL Server desencripta automáticamente al leer y encripta al escribir. Protege el escenario: 'un atacante robó el disco duro del servidor' → los archivos .mdf son ilegibles sin la Database Encryption Key. No protege: usuario con permisos de BD puede hacer SELECT * FROM cuentas normalmente. Para eso existe Row-Level Security, Dynamic Data Masking, y Always Encrypted."},
  {label:"TDE protege contra SQL Injection encriptando todas las queries antes de ejecutarlas", explain:"Incorrecto. SQL Injection es una vulnerabilidad en cómo se construyen las queries. TDE no tiene ninguna relación con la prevención de SQL Injection. PreparedStatement y validación de inputs son las defensas contra SQL Injection."},
  {label:"TDE degrada el rendimiento de SQL Server en un 30-40%; por eso solo se usa en datos no críticos", explain:"Incorrecto. El impacto de TDE en rendimiento es aproximadamente 3-5% en la mayoría de los casos. La encriptación/desencriptación se realiza a nivel de página en memoria y está optimizada. Para datos bancarios sensibles, es una medida de seguridad estándar con overhead justificado."},
], correct:1},

{cat:"Seguridad & Operaciones BD",
q:"¿Qué es Always Encrypted en SQL Server y cuándo lo usarías sobre TDE?",
options:[
  {label:"Always Encrypted es simplemente el nombre de TDE en versiones nuevas de SQL Server; son la misma función", explain:"Incorrecto. Son características distintas. TDE: encriptación en reposo (archivos en disco). Always Encrypted: encriptación end-to-end donde los datos están encriptados incluso dentro de SQL Server en memoria."},
  {label:"Always Encrypted: los datos se encriptan en el cliente (aplicación) antes de enviarse a SQL Server. SQL Server almacena y opera sobre datos encriptados sin poder verlos. Solo el cliente con la clave puede desencriptar. Ideal para datos ultra-sensibles (números de tarjeta, DNI, datos biométricos) que ni el DBA debe ver.", explain:"Correcto. Diferencia clave vs TDE: con TDE el DBA puede hacer SELECT y ver los datos en claro. Con Always Encrypted, el DBA solo ve bytes encriptados. La clave de desencriptación nunca sale del cliente. Limitación: SQL Server no puede hacer operaciones sobre columnas encriptadas (no puede filtrar, ordenar, agregar) sin cliente siempre encriptado. Para números de tarjeta de crédito (PCI-DSS) y datos biométricos, Always Encrypted es el estándar."},
  {label:"Always Encrypted es más lento que TDE porque encripta cada registro individualmente en lugar de a nivel de página", explain:"Incorrecto. Aunque Always Encrypted sí tiene más overhead que TDE (encriptación a nivel de columna en el cliente vs a nivel de página en el motor), la comparación no es sobre velocidad sino sobre el modelo de seguridad. Se elige Always Encrypted cuando la garantía de que ni el DBA puede ver los datos es un requerimiento de negocio o regulatorio."},
  {label:"Always Encrypted reemplaza completamente la necesidad de roles y permisos de BD; con encriptación no se necesita control de acceso", explain:"Incorrecto. Always Encrypted y los controles de acceso son capas de seguridad complementarias (defensa en profundidad). Roles y permisos controlan qué operaciones puede ejecutar cada usuario. Always Encrypted garantiza que ciertos datos sean ilegibles incluso para usuarios con permisos de SELECT."},
], correct:1},

{cat:"Seguridad & Operaciones BD",
q:"¿Cómo implementas Row-Level Security (RLS) en SQL Server para un sistema multi-tenant bancario?",
options:[
  {label:"Row-Level Security en SQL Server se implementa con una cláusula WHERE en cada query de la aplicación; no hay soporte nativo", explain:"Incorrecto. SQL Server tiene Row-Level Security nativo desde 2016. Se implementa con Security Policies que se aplican automáticamente a nivel de motor, sin necesidad de modificar cada query."},
  {label:"RLS filtra filas automáticamente según el contexto del usuario. Se crea: (1) Función de predicado que determina qué filas puede ver el usuario, (2) Security Policy que vincula la función a la tabla. Todas las queries a esa tabla tienen el filtro aplicado transparentemente.", explain:"Correcto. Ejemplo multi-tenant: CREATE FUNCTION dbo.fn_filtro_tenant(@tenant_id INT) RETURNS TABLE AS RETURN SELECT 1 WHERE @tenant_id = CAST(SESSION_CONTEXT(N'tenant_id') AS INT); CREATE SECURITY POLICY pol_cuentas ADD FILTER PREDICATE dbo.fn_filtro_tenant(tenant_id) ON dbo.cuentas. La aplicación establece: EXEC sp_set_session_context N'tenant_id', @tenant_id al conectarse. Todas las queries a cuentas automáticamente filtran por tenant_id, incluso si el desarrollador olvida el WHERE."},
  {label:"RLS degrada el rendimiento al 50% porque agrega un JOIN extra a cada query; solo debe usarse cuando es obligatorio por regulación", explain:"Incorrecto. RLS bien implementado tiene impacto de rendimiento de ~5-10%. El predicado de filtro se integra en el plan de ejecución y puede aprovechar índices en la columna del filtro. Es una capa de seguridad eficiente para multi-tenant."},
  {label:"RLS en SQL Server solo funciona con Azure SQL Database; en SQL Server on-premise no está disponible", explain:"Incorrecto. RLS está disponible en SQL Server 2016+ on-premise y en Azure SQL Database. Es una característica del motor, no de la plataforma de hosting."},
], correct:1},

{cat:"Seguridad & Operaciones BD",
q:"¿Cómo previene SQL Injection en Spring Boot y qué va más allá de PreparedStatement?",
options:[
  {label:"SQL Injection es imposible en Spring Boot porque el framework sanitiza automáticamente todos los inputs", explain:"Incorrecto. Spring Boot no sanitiza automáticamente todos los inputs. Si el desarrollador usa concatenación de strings para construir queries, Spring Boot no lo previene."},
  {label:"PreparedStatement (y Spring Data JPA que lo usa internamente) es la defensa principal. Adicional: validación de inputs (@Valid, @NotNull, @Size en DTOs), nunca confiar en datos del cliente, usar @Query con parámetros nombrados (:param), auditar queries con logs estructurados, y limitar permisos del usuario de BD (solo SELECT/INSERT/UPDATE en tablas necesarias).", explain:"Correcto. Spring Data @Query: @Query('SELECT c FROM Cuenta c WHERE c.numeroCuenta = :numero') — Spring usa PreparedStatement automáticamente con el parámetro :numero. Si alguien pasa '001 OR 1=1', se trata como el literal de cadena, no como SQL. Defensa en profundidad: incluso si hay un vector de SQL Injection no detectado, un usuario de BD con solo SELECT en cuentas no puede hacer DROP TABLE o acceder a otras tablas. Principio de mínimo privilegio a nivel de BD."},
  {label:"La única defensa efectiva contra SQL Injection es encriptar la BD completa con TDE", explain:"Incorrecto. TDE protege archivos en disco. SQL Injection explota la conexión legítima de la aplicación para ejecutar SQL arbitrario. Una BD encriptada con TDE sigue siendo vulnerable a SQL Injection si las queries se construyen con concatenación."},
  {label:"SQL Injection solo afecta a queries escritas en SQL nativo; JPA/Hibernate es inmune por definición", explain:"Incorrecto. Si usas @Query con concatenación de strings en lugar de parámetros nombrados en JPA, sigues siendo vulnerable. entityManager.createQuery('SELECT c FROM Cuenta WHERE numero = ' + input) en JPA es igual de vulnerable que en JDBC puro."},
], correct:1},

{cat:"Seguridad & Operaciones BD",
q:"¿Cómo manejas las migraciones de esquema de BD en un microservicio bancario en producción?",
options:[
  {label:"Modificar el esquema directamente en producción con scripts SQL manuales durante ventanas de mantenimiento es la práctica estándar", explain:"Incorrecto. Scripts manuales son propensos a errores humanos, inconsistencias entre entornos y no tienen trazabilidad automática. Flyway o Liquibase son el estándar para gestión automatizada."},
  {label:"Flyway o Liquibase: migraciones versionadas (V1__initial.sql, V2__add_index.sql) que se aplican automáticamente al iniciar la aplicación. Integradas en el CI/CD pipeline. Compatibilidad con zero-downtime: additive changes (ADD COLUMN nullable), evitar DROP y RENAME sin migración de datos previa.", explain:"Correcto. Flyway en Spring Boot: spring.flyway.enabled=true. Al iniciar, Flyway compara los scripts en classpath:db/migration con la tabla flyway_schema_history y aplica los pendientes. Estrategia zero-downtime: V1=ADD COLUMN nuevo_campo NULL (compatible con versión anterior), desplegar nueva versión, V2=fill datos, V3=NOT NULL constraint. Nunca hacer un ALTER TABLE que requiera lock en tabla de millones de registros en horario pico. SQL Server: usar ONLINE=ON para operaciones de índice sin bloqueo."},
  {label:"Spring Boot con JPA genera automáticamente el esquema desde las entidades con spring.jpa.hibernate.ddl-auto=update; no se necesitan herramientas adicionales", explain:"Incorrecto. ddl-auto=update es peligroso en producción: Hibernate puede tomar decisiones incorrectas sobre el esquema, no puede ejecutar migraciones complejas con transformaciones de datos, y no hay trazabilidad de cambios. Solo usar en desarrollo. En producción: validate (solo valida que el esquema coincide con las entidades) o none."},
  {label:"Las migraciones de BD deben aplicarse manualmente antes de cada deploy; automatizarlas es riesgoso en producción", explain:"Incorrecto. La automatización (Flyway/Liquibase en el pipeline CI/CD) es más segura que las migraciones manuales porque son reproducibles, versionadas, testeadas en ambientes anteriores y no dependen de la memoria de un DBA."},
], correct:1},

{cat:"JDBC, JPA & Spring Boot",
q:"¿Qué diferencia hay entre FetchType.LAZY y FetchType.EAGER en JPA y cuál es la recomendación en sistemas de alta carga?",
options:[
  {label:"EAGER es siempre mejor porque garantiza que los datos estén disponibles cuando se necesiten", explain:"Incorrecto. EAGER puede cargar datos innecesarios en la mayoría de los casos, desperdiciando queries y memoria. Por eso Hibernate recomienda LAZY como default."},
  {label:"LAZY: carga la relación solo cuando se accede explícitamente (proxy, se dispara una query adicional). EAGER: carga siempre con la entidad padre. Recomendación en alta carga: LAZY por defecto + JOIN FETCH explícito cuando se necesitan los datos relacionados.", explain:"Correcto. El problema con EAGER en alta carga: cargar 1000 transacciones con EAGER en sus cuentas asociadas → 1000 queries adicionales a la tabla cuentas, aunque el código nunca use esa información. LAZY + JOIN FETCH selectivo: solo carga relaciones cuando se necesitan explícitamente. Spring Data @EntityGraph permite definir qué relaciones cargar por método de repositorio sin modificar la entidad."},
  {label:"FetchType solo aplica a relaciones @OneToMany; en @ManyToOne siempre es EAGER y no se puede cambiar", explain:"Incorrecto. FetchType aplica a todas las anotaciones de relación: @OneToMany, @ManyToOne, @OneToOne, @ManyToMany. Todas pueden configurarse como LAZY o EAGER. De hecho, @ManyToOne es EAGER por defecto en JPA, pero la recomendación es cambiarlo a LAZY."},
  {label:"En sistemas de alta carga, la solución es siempre usar EAGER para todas las relaciones y cachear todo en Redis", explain:"Incorrecto. EAGER aumenta el volumen de datos cargados en cada query. Redis caché es útil para datos consultados frecuentemente, pero no reemplaza la necesidad de una estrategia de fetching adecuada a nivel de JPA."},
], correct:1},

{cat:"JDBC, JPA & Spring Boot",
q:"¿Cómo funciona el caché de segundo nivel de Hibernate y cuándo lo habilitarías?",
options:[
  {label:"El caché de segundo nivel de Hibernate es automático y siempre está activo; no requiere configuración", explain:"Incorrecto. El caché de segundo nivel está deshabilitado por defecto. Requiere configuración explícita: proveedor de caché (EhCache, Hazelcast, Redis), habilitar en persistence.xml o application.properties, y anotar entidades con @Cache."},
  {label:"Caché de segundo nivel: comparte entidades entre sesiones (SessionFactory scope). Útil para entidades que se leen frecuentemente y cambian poco (catálogos de tipos de transacción, monedas, configuraciones). Evitar para entidades que cambian frecuentemente (saldos, transacciones activas).", explain:"Correcto. @Cache(usage=CacheConcurrencyStrategy.READ_WRITE) en la entidad. Configuración: spring.jpa.properties.hibernate.cache.use_second_level_cache=true. Proveedor: EhCache o Hazelcast. Ejemplo en banca: TipoTransaccion (débito, crédito, transferencia) tiene solo 10 registros y se lee en cada operación → perfecto para caché de segundo nivel. Cuenta con saldo en movimiento constante → nunca cachear, se leerían datos desactualizados."},
  {label:"El caché de segundo nivel es mejor que Redis porque está integrado con Hibernate y no requiere infraestructura adicional", explain:"Incorrecto. El caché de segundo nivel de Hibernate y Redis tienen diferentes scopes. Hibernate L2 cache está acoplado a las entidades JPA. Redis es más flexible: puede cachear DTOs, resultados de queries complejas, y datos de cualquier tipo. No son mutuamente excluyentes."},
  {label:"El caché de segundo nivel funciona automáticamente para todas las queries JPQL; no se necesita configuración por entidad", explain:"Incorrecto. El caché de segundo nivel funciona para entidades anotadas con @Cache cuando se accede por ID. Para queries JPQL, existe el Query Cache separado (hibernate.cache.use_query_cache=true) que cachea resultados de queries específicas marcadas con setCacheable(true)."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Qué son las Materialized Views y cuándo las usarías en un sistema bancario?",
options:[
  {label:"Las Materialized Views son exactamente iguales a las Views normales; la diferencia es solo el nombre", explain:"Incorrecto. Una View normal ejecuta la query subyacente cada vez que se consulta (virtual). Una Materialized View almacena el resultado físicamente en disco (precalculado), como una tabla, con capacidad de tener índices propios."},
  {label:"Materialized View almacena el resultado de una query compleja físicamente en disco. Útil para: reportes de saldos consolidados por producto, resúmenes diarios de transacciones, dashboards de métricas de negocio. La query pesada se ejecuta una vez (refresh); las consultas sobre la vista son rápidas.", explain:"Correcto. Escenario bancario: reporte de saldo total por tipo de cuenta requiere SUM sobre 100M transacciones. Sin Materialized View: cada consulta tarda 30 segundos. Con Materialized View refrescada cada hora: la consulta al reporte tarda milisegundos. SQL Server: Indexed Views (similar a Materialized View). PostgreSQL: MATERIALIZED VIEW con REFRESH MATERIALIZED VIEW CONCURRENTLY. Trade-off: los datos pueden tener latencia (tiempo desde el último refresh)."},
  {label:"Las Materialized Views son automáticamente consistentes con la tabla base en tiempo real; siempre tienen datos actualizados", explain:"Incorrecto. Las Materialized Views necesitan refresh explícito (manual o programado). Hasta el próximo refresh, los datos pueden estar desactualizados. Algunas BDs ofrecen refresh incremental pero con limitaciones. El diseño debe aceptar datos con cierta latencia."},
  {label:"SQL Server no soporta Materialized Views; solo están disponibles en PostgreSQL y Oracle", explain:"Incorrecto. SQL Server tiene Indexed Views que son funcionalmente equivalentes a Materialized Views: almacenan el resultado de la view con un índice clustered, y SQL Server las mantiene actualizadas automáticamente (con restricciones en la query de la view). Sin embargo, el mantenimiento automático tiene costo de escritura."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Cómo manejas el problema de hot spots en una tabla de transacciones de alta concurrencia?",
options:[
  {label:"Hot spots no es un problema real en SQL Server moderno; el motor lo maneja automáticamente con page-level locking", explain:"Incorrecto. Hot spots son un problema real: cuando muchas transacciones concurrentes modifican la misma página de datos (ej: la última página en una tabla con IDENTITY PK), se genera contención severa."},
  {label:"Hot spot en tabla IDENTITY: todas las inserciones van a la última página → contención. Soluciones: GUID secuencial (NEWSEQUENTIALID()) para distribuir inserciones, particionamiento por hash para distribuir en múltiples páginas, o usar SEQUENCE con cache (reduce round-trips al generador).", explain:"Correcto. Con INT IDENTITY puro, todas las inserciones van a la última página del Clustered Index. Con 1000 TPS concurrentes, hay contención de lock en esa última página. NEWSEQUENTIALID() genera GUIDs secuenciales que distribuyen mejor que GUID aleatorio y reducen fragmentación vs INSERT ordenado. Alternativa: particionar la tabla y distribuir inserciones entre particiones por hash del cliente_id."},
  {label:"La solución a hot spots siempre es cambiar de SQL a NoSQL porque NoSQL distribuye naturalmente las escrituras", explain:"Incorrecto. NoSQL puede tener hot spots igualmente si el shard key no está bien diseñado (ej: Cassandra con timestamp como partition key concentra todas las escrituras recientes en la misma partición). El problema es de diseño de clave, no del tipo de BD."},
  {label:"Hot spots se resuelven aumentando el número de índices en la tabla para distribuir las escrituras", explain:"Incorrecto. Más índices no distribuyen las escrituras; al contrario, cada índice adicional debe actualizarse en cada INSERT/UPDATE/DELETE, aumentando la contención. Los índices adicionales agravan el problema de hot spots."},
], correct:1},

{cat:"Alta Concurrencia & Transacciones",
q:"¿Qué es un connection leak y cómo lo detectas y prevenes con HikariCP?",
options:[
  {label:"Connection leak ocurre cuando hay demasiadas conexiones abiertas simultáneamente; se previene limitando el pool size", explain:"Incorrecto. Connection leak es cuando una conexión se obtiene del pool pero no se devuelve (por excepción no manejada o bug en el código). Pool size limita el número de conexiones, no evita que se pierdan."},
  {label:"Connection leak: una conexión se toma del pool pero nunca se devuelve (falta de close() en el finally, o excepción que bypasea el return). El pool se agota gradualmente. Detección: HikariCP leakDetectionThreshold (loguea stack trace si una conexión se retiene más de N ms). Prevención: try-with-resources.", explain:"Correcto. HikariCP config: spring.datasource.hikari.leak-detection-threshold=2000 (2 segundos). Si una conexión no se devuelve en 2 segundos, HikariCP loguea el stack trace del código que la tomó. En Spring con @Transactional, las conexiones se gestionan automáticamente. El riesgo es en código JDBC manual sin try-with-resources: Connection conn = ds.getConnection(); // si aquí hay una excepción y no hay finally { conn.close(); }, la conexión se pierde."},
  {label:"Connection leaks son imposibles con Spring Boot porque el framework cierra automáticamente todas las conexiones al terminar cada request HTTP", explain:"Incorrecto. Spring cierra transacciones y conexiones al finalizar métodos @Transactional. Pero conexiones obtenidas directamente con DataSource.getConnection() sin Spring managing el ciclo de vida pueden tener leaks si el developer no las cierra correctamente."},
  {label:"La solución a connection leaks es aumentar el maximumPoolSize para compensar las conexiones perdidas", explain:"Incorrecto. Aumentar el pool size enmascara temporalmente el leak pero no lo resuelve. Eventualmente el pool más grande también se agota. La solución es encontrar y corregir el código que no devuelve las conexiones."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Cómo afectan los índices al rendimiento de escrituras (INSERT/UPDATE/DELETE) en una tabla transaccional?",
options:[
  {label:"Los índices no afectan el rendimiento de escrituras; solo impactan las lecturas", explain:"Incorrecto. Cada índice debe actualizarse en cada operación de escritura. Una tabla con 10 índices hace 10 actualizaciones de índice por cada INSERT/UPDATE/DELETE."},
  {label:"Cada índice en la tabla debe actualizarse en cada escritura: INSERT agrega entradas, UPDATE puede mover entradas, DELETE elimina entradas. En tablas de alta concurrencia: demasiados índices = alta latencia en escrituras. Balance: solo índices que se usan realmente en queries de producción.", explain:"Correcto. Estrategia: identificar índices no usados con sys.dm_db_index_usage_stats (SQL Server), eliminar los que tienen 0 seeks/scans en los últimos 30 días. En tablas de ingesta masiva (logs, transacciones): considerar desactivar índices, cargar datos, y reconstruir índices (para batch processing). Para OLTP: mantener índices necesarios, aceptar el overhead como costo de las lecturas eficientes."},
  {label:"La solución es usar índices filtrados (WHERE activo=1) para reducir el tamaño y por ende el overhead de escritura", explain:"Incorrecto. Los índices filtrados sí reducen el tamaño del índice (solo indexan un subconjunto), lo que puede reducir levemente el overhead de mantenimiento. Sin embargo, solo son útiles si la mayoría de queries filtran exactamente por esa condición. No es la estrategia general para reducir overhead de escritura."},
  {label:"En SQL Server Enterprise, los índices se actualizan de forma asíncrona y no bloquean las escrituras", explain:"Incorrecto. Los índices se actualizan sincrónicamente dentro de la misma transacción que modifica los datos. Si el UPDATE de la tabla falla, las actualizaciones de índice también se revierten. No hay actualización asíncrona de índices en SQL Server (a diferencia de algunos NoSQL)."},
], correct:1},

{cat:"Performance & Query Plans",
q:"¿Qué es el patrón de acceso por lotes (batch processing) y cómo lo configuras en JPA para alto volumen?",
options:[
  {label:"Batch processing en JPA se logra automáticamente con cualquier operación save() en un bucle; no requiere configuración especial", explain:"Incorrecto. Por defecto, JPA hace un INSERT por registro en el bucle. Para batch real se necesita configuración específica y flush/clear periódico."},
  {label:"Configurar hibernate.jdbc.batch_size=50 para que Hibernate agrupe 50 INSERTs en una sola llamada JDBC. Hacer entityManager.flush() + entityManager.clear() cada N registros para liberar memoria. Evitar @GeneratedValue(IDENTITY) que desactiva el batching.", explain:"Correcto. Sin batching: 10,000 INSERTs = 10,000 round-trips a BD. Con batch_size=50: 200 round-trips. Ahorro significativo en latencia de red y procesamiento del motor. Problema con IDENTITY: SQL Server necesita el ID generado para retornar al ORM, lo que fuerza ejecución de cada INSERT inmediatamente, rompiendo el batch. Solución: usar SEQUENCE en lugar de IDENTITY para generar IDs en bloque. Spring Batch para procesos ETL masivos maneja esto automáticamente."},
  {label:"Batch processing con JPA siempre requiere deshabilitar las transacciones para mejor rendimiento", explain:"Incorrecto. Las transacciones son esenciales incluso en batch: garantizan que en caso de error, el lote se revierte completamente. Deshabilitar transacciones en batch puede dejar datos parcialmente procesados."},
  {label:"La única forma de hacer batch eficiente en Spring Boot es con JDBC puro; JPA/Hibernate no soporta batching real", explain:"Incorrecto. Hibernate soporta JDBC batching nativo con hibernate.jdbc.batch_size. Spring Data JPA saveAll() con configuración de batch hace batch automáticamente. Spring Batch es el framework dedicado para procesos masivos con JPA o JDBC."},
], correct:1},

{cat:"Arquitectura de BD",
q:"¿Cuál es la diferencia entre consistencia eventual y consistencia fuerte en el contexto de réplicas de BD bancarias?",
options:[
  {label:"Consistencia fuerte es imposible en sistemas distribuidos; siempre hay que aceptar consistencia eventual", explain:"Incorrecto. El teorema CAP describe trade-offs, no imposibilidades absolutas. Es posible tener consistencia fuerte en sistemas distribuidos (ej: Google Spanner, sistemas con sincronous replication), aunque con mayor latencia."},
  {label:"Consistencia fuerte: todas las réplicas tienen los mismos datos inmediatamente después de una escritura (replicación síncrona). Mayor latencia. Consistencia eventual: la réplica puede estar temporalmente desactualizada (replicación asíncrona). Menor latencia. En banca: saldo → fuerte. Historial de transacciones → eventual es aceptable.", explain:"Correcto. Replicación síncrona (fuerte): el commit no completa hasta que todas las réplicas confirmaron la escritura. Garantiza que leer de cualquier réplica da el dato más reciente. Costo: la latencia del commit incluye el round-trip a todas las réplicas. Replicación asíncrona (eventual): el commit completa en el primary; las réplicas se actualizan después. Riesgo: si el primary falla antes de replicar, puede haber pérdida de datos. En SQL Server Always On: puede configurarse en síncrono (fuerte) o asíncrono (eventual) por grupo de disponibilidad."},
  {label:"Consistencia eventual es siempre preferible en banca porque es más rápida y el negocio puede tolerar datos desactualizados", explain:"Incorrecto. Para datos críticos de negocio (saldo disponible, límites de crédito, estado de cuenta), consistencia eventual puede causar problemas graves: aprobación de una transacción basada en saldo desactualizado, sobregirar una cuenta. La elección debe ser cuidadosa por tipo de dato."},
  {label:"En Spring Boot con @Transactional, todas las réplicas siempre tienen consistencia fuerte automáticamente", explain:"Incorrecto. @Transactional gestiona la transacción en la BD primaria. La consistencia de las réplicas depende de la configuración de replicación del motor de BD, no de Spring. Spring no puede cambiar si la replicación es síncrona o asíncrona."},
], correct:1},

{cat:"BD con Kafka & CDC",
q:"¿Cómo implementarías un sistema de auditoría de cambios de BD sin impactar el rendimiento de las transacciones?",
options:[
  {label:"Agregar triggers de BD en cada tabla que inserten en una tabla de auditoría dentro de la misma transacción", explain:"Incorrecto. Los triggers de auditoría ejecutan dentro de la misma transacción: si la auditoría es lenta o falla, impacta o revierte la transacción principal. También son difíciles de mantener y pueden crecer en complejidad."},
  {label:"CDC (Debezium + Kafka): captura cambios del transaction log de SQL Server sin intervenir en las transacciones. Los eventos de cambio se publican a un topic Kafka, un consumer los procesa y escribe en la tabla de auditoría de forma asíncrona. La transacción principal no espera la auditoría.", explain:"Correcto. Debezium lee el transaction log de SQL Server (SQL Server CDC habilitado) y emite eventos change data. Estos eventos incluyen: antes y después del cambio, timestamp, usuario, tipo de operación. Consumer escribe en tabla de auditoría o Elasticsearch para búsqueda. Ventaja: la transacción original no se ve afectada por la velocidad o disponibilidad del sistema de auditoría. Otra opción: Spring Data JPA @EntityListeners con auditoría asíncrona via @Async + @TransactionalEventListener(phase=AFTER_COMMIT)."},
  {label:"La única forma confiable de auditoría es @Transactional con REQUIRES_NEW en el método de auditoría para que tenga su propia transacción", explain:"Incorrecto. REQUIRES_NEW crea una transacción separada, pero sigue siendo síncrona: la transacción principal espera que la auditoría complete. Si hay muchas escrituras concurrentes, el sistema de auditoría puede convertirse en un cuello de botella."},
