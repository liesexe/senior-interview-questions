<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BCP Interview Prep – Quiz Completo</title>
<style>
  :root {
    --bg:#0f1117;--card:#1a1d27;--card2:#22263a;
    --accent:#6c63ff;--accent2:#a78bfa;
    --green:#22c55e;--red:#ef4444;
    --text:#e2e8f0;--muted:#94a3b8;--border:#2e3347;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  header h1{font-size:1.05rem;font-weight:700;color:var(--accent2)}
  .home-btn{text-decoration:none;background:transparent;color:var(--muted);font-size:.85rem;border:1px solid var(--border);padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .home-btn:hover{border-color:var(--accent);color:var(--accent2)}
  .stats{display:flex;gap:18px;font-size:.82rem;color:var(--muted)}
  .stats span b{color:var(--text)}
  .progress-wrap{height:4px;background:var(--border)}
  .progress-bar{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}
  .container{max-width:820px;margin:0 auto;padding:32px 16px 80px}

  /* Home screen */
  .home{display:block}
  .quiz-screen{display:none}
  .hero{background:linear-gradient(135deg,#1a1d27 0%,#12153d 100%);border-bottom:1px solid var(--border);padding:48px 24px 40px;text-align:center}
  .bcp-badge{display:inline-flex;align-items:center;gap:10px;background:#1e2240;border:1px solid #3b45a0;border-radius:99px;padding:8px 18px;margin-bottom:24px;font-size:.8rem;font-weight:700;letter-spacing:.08em;color:#a78bfa;text-transform:uppercase}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
  .hero h1{font-size:2rem;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,#e2e8f0,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero p{color:var(--muted);font-size:.95rem;max-width:520px;margin:0 auto 28px;line-height:1.7}
  .stats-row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
  .stat .num{font-size:1.6rem;font-weight:800;color:var(--accent2)}
  .stat .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .home-container{max-width:900px;margin:0 auto;padding:40px 16px 80px}
  .section-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-left:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:40px}
  .quiz-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:14px;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
  .quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-gradient,linear-gradient(90deg,var(--accent),var(--accent2)))}
  .quiz-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 32px rgba(108,99,255,.18)}
  .card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:var(--card2)}
  .card-title{font-size:1.05rem;font-weight:700}
  .card-desc{font-size:.84rem;color:var(--muted);line-height:1.55}
  .card-meta{display:flex;gap:8px;flex-wrap:wrap}
  .tag{background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:3px 9px;font-size:.7rem;font-weight:600;color:var(--muted)}
  .tag.green{color:var(--green);border-color:#1a4d2e;background:#0d2b1a}
  .tag.purple{color:var(--accent2);border-color:#2e2a5a;background:#1a1d3a}
  .card-cta{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
  .cta-label{font-size:.78rem;font-weight:700;color:var(--accent2)}
  .cta-arrow{color:var(--accent2);font-size:1.1rem;transition:transform .2s}
  .quiz-card:hover .cta-arrow{transform:translateX(4px)}

  /* Quiz */
  .category{display:inline-block;background:var(--card2);color:var(--accent2);font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:99px;margin-bottom:14px;border:1px solid var(--border)}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px}
  .q-num{font-size:.78rem;color:var(--muted);margin-bottom:8px}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.6}
  .q-code{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-family:'Menlo','Consolas',monospace;font-size:.82rem;line-height:1.7;color:#c9d1d9;margin-top:14px;white-space:pre-wrap;overflow-x:auto}
  .options{display:flex;flex-direction:column;gap:10px;margin-top:22px}
  .option-btn{display:flex;align-items:flex-start;gap:14px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;text-align:left;transition:border-color .18s,background .18s;font-size:.95rem;line-height:1.5;color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation;width:100%}
  .option-btn:not(.answered):hover{border-color:var(--accent);background:#1e2035}
  .option-btn .letter{min-width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:var(--accent2);flex-shrink:0;margin-top:1px}
  .option-btn .opt-body{flex:1}
  .option-btn .opt-label{font-weight:500}
  .option-btn .opt-explain{font-size:.82rem;color:var(--muted);margin-top:6px;display:none}
  .option-btn.correct{border-color:var(--green);background:#0d2b1a}
  .option-btn.correct .letter{background:var(--green);color:#fff}
  .option-btn.wrong{border-color:var(--red);background:#2a1010}
  .option-btn.wrong .letter{background:var(--red);color:#fff}
  .option-btn.neutral{border-color:var(--border);opacity:.6;cursor:default}
  .option-btn.answered{cursor:default}
  .option-btn.correct .opt-explain,.option-btn.wrong .opt-explain,.option-btn.neutral .opt-explain{display:block}
  .result-banner{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:10px;margin-top:18px;font-weight:600;font-size:.95rem}
  .result-banner.ok{background:#0d2b1a;color:var(--green);border:1px solid var(--green)}
  .result-banner.fail{background:#2a1010;color:var(--red);border:1px solid var(--red)}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:12px}
  .btn{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
  .btn:disabled{opacity:.35;cursor:default}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
  .btn-outline:not(:disabled):hover{border-color:var(--accent)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:not(:disabled):hover{opacity:.85}
  .filter-bar{display:flex;flex-wrap:nowrap;gap:8px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent2);background:#1a1d3a}
  .final{text-align:center;padding:60px 20px}
  .final .score{font-size:4rem;font-weight:800;color:var(--accent2)}
  .final .score-label{color:var(--muted);margin-bottom:24px}
  .final h2{font-size:1.3rem;margin-bottom:10px}
  .restart-btn{margin-top:20px;padding:13px 32px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:.95rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}

  @media(max-width:640px){
    .hero{padding:28px 16px 24px}
    .hero h1{font-size:1.45rem}
    .hero p{font-size:.84rem}
    .bcp-badge{font-size:.68rem;padding:5px 12px}
    .stats-row{gap:14px}
    .stat .num{font-size:1.3rem}
    .home-container{padding:22px 12px 60px}
    .grid{grid-template-columns:1fr;gap:12px}
    .quiz-card{padding:18px}
    .card-title{font-size:.98rem}
    .card-desc{font-size:.8rem}
    header{padding:10px 12px;flex-wrap:wrap;gap:6px}
    header>div:first-child{flex:1;min-width:0}
    header h1{font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .home-btn{font-size:.72rem;padding:4px 9px}
    .stats{font-size:.72rem;gap:10px;width:100%;justify-content:flex-end}
    .container{padding:14px 10px 60px}
    .q-card{padding:16px}
    .q-text{font-size:.9rem;line-height:1.55}
    .q-code{font-size:.74rem;padding:10px 11px}
    .options{gap:8px;margin-top:16px}
    .option-btn{padding:11px 11px;font-size:.86rem;gap:10px}
    .option-btn .letter{min-width:23px;height:23px;font-size:.74rem}
    .option-btn .opt-explain{font-size:.76rem}
    .result-banner{padding:10px 13px;font-size:.86rem}
    .nav{flex-direction:column-reverse;gap:8px;margin-top:8px}
    .btn{width:100%;padding:13px;font-size:.9rem;text-align:center}
    .final{padding:32px 10px}
    .final .score{font-size:2.8rem}
  }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="home" id="home-screen">
<div class="hero">
  <div class="bcp-badge"><span class="dot"></span>Interview Prep · BCP Senior Engineer</div>
  <h1>Centro de Práctica<br>BCP Senior Backend</h1>
  <p>Todas las preguntas en un solo lugar. Elige un quiz o estudia por categoría.</p>
  <div class="stats-row">
    <div class="stat"><div class="num" id="total-count">0</div><div class="lbl">Preguntas</div></div>
    <div class="stat"><div class="num">4</div><div class="lbl">Quizzes</div></div>
    <div class="stat"><div class="num">100%</div><div class="lbl">Nivel Senior</div></div>
  </div>
</div>
<div class="home-container">
  <p class="section-title">Elige tu quiz</p>
  <div class="grid" id="quiz-grid"></div>
</div>
</div>

<!-- QUIZ SCREEN -->
<div class="quiz-screen" id="quiz-screen">
<header>
  <div style="display:flex;align-items:center;gap:14px">
    <button class="home-btn" onclick="showHome()">← Inicio</button>
    <h1 id="quiz-title">Quiz</h1>
  </div>
  <div class="stats">
    <span>P <b id="hdr-current">1</b>/<b id="hdr-total">0</b></span>
    <span>✅ <b id="hdr-correct">0</b></span>
    <span>❌ <b id="hdr-wrong">0</b></span>
  </div>
</header>
<div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div class="container" id="app">
  <div class="filter-bar" id="filter-bar"></div>
  <div id="quiz-area"></div>
</div>
</div>

<script>

const JAVA_QUESTIONS = (function(){
const qs=[

// ══════════════ COLLECTIONS ══════════════
{cat:"Collections",
q:"¿Por qué es peligroso usar HashMap en un entorno multihilo donde al menos un thread escribe, y cuál es la alternativa correcta?",
options:[
  {label:"No es peligroso; HashMap es thread-safe para lecturas concurrentes aunque haya escrituras simultáneas", explain:"Incorrecto. HashMap no es thread-safe en ningún escenario con escrituras concurrentes. Las lecturas concurrentes junto con escrituras pueden causar comportamientos impredecibles."},
  {label:"Puede causar pérdida silenciosa de datos, corrupción de estado interno o bucles infinitos (Java 7); usar ConcurrentHashMap que permite lecturas sin bloqueo y escrituras concurrentes seguras por bucket", explain:"Correcto. HashMap no sincroniza ninguna operación. Bajo escrituras concurrentes el rehashing puede dejar la estructura interna corrompida. ConcurrentHashMap resuelve esto con granularidad fina de bloqueo y operaciones CAS, siendo la alternativa estándar en código bancario."},
  {label:"Solo es peligroso si se usa con más de 16 threads; para menos threads HashMap es seguro", explain:"Incorrecto. El número de threads no tiene un umbral de seguridad. Con 2 threads escribiendo simultáneamente ya puede haber corrupción."},
  {label:"Usar Collections.synchronizedMap() es la alternativa moderna recomendada sobre ConcurrentHashMap", explain:"Incorrecto. synchronizedMap() bloquea el mapa completo en cada operación (incluyendo lecturas). ConcurrentHashMap permite lecturas concurrentes sin bloqueo, siendo mucho más eficiente bajo alta concurrencia."},
], correct:1},

{cat:"Collections",
q:"Tienes una lista de transacciones y necesitas agruparlas por tipo. ¿Cuál es la forma más idiomática en Java 8+?",
code:`List<Transaccion> transacciones = repo.findAll();
// Quieres: Map<TipoTransaccion, List<Transaccion>>`,
options:[
  {label:"Iterar con for-each y hacer map.put() manualmente para cada transacción", explain:"Incorrecto. Es el enfoque imperativo pre-Java 8. Funciona pero es verboso y propenso a errores con el manejo manual del caso 'key no existe'."},
  {label:"transacciones.stream().collect(Collectors.groupingBy(Transaccion::getTipo))", explain:"Correcto. groupingBy es exactamente para esto: agrupa elementos de un Stream por una función clasificadora. Produce Map<TipoTransaccion, List<Transaccion>>. También se puede combinar con downstream collectors: groupingBy(getTipo, counting()) para contar por tipo."},
  {label:"transacciones.stream().sorted(Comparator.comparing(Transaccion::getTipo)).collect(Collectors.toList())", explain:"Incorrecto. Esto ordena la lista por tipo pero no la agrupa en un Map. El resultado sigue siendo una lista plana."},
  {label:"transacciones.stream().distinct().collect(Collectors.toMap(Transaccion::getTipo, t -> t))", explain:"Incorrecto. toMap lanzaría IllegalStateException si hay más de una transacción del mismo tipo (duplicate key). Tampoco agrupa, solo mapea el último valor por clave."},
], correct:1},

{cat:"Collections",
q:"¿Cuándo elegirías LinkedList sobre ArrayList en un proyecto bancario real?",
options:[
  {label:"Siempre que necesites una lista; LinkedList es más eficiente en memoria que ArrayList", explain:"Incorrecto. LinkedList usa más memoria porque cada nodo almacena el dato más dos punteros (prev/next). ArrayList usa un array continuo más eficiente en memoria por elemento."},
  {label:"Cuando haces inserciones/eliminaciones frecuentes al inicio o en medio de la lista, ya que ArrayList desplaza todos los elementos siguientes (O(n)). En la práctica, ArrayList es preferido en la mayoría de casos bancarios por mejor rendimiento de acceso y menor overhead de memoria", explain:"Correcto. El caso de uso real de LinkedList es una cola (Queue) o deque de operaciones donde agregas/quitas por los extremos. Para acceso aleatorio o iteración, ArrayList es siempre más rápido (cache locality). En banca, ArrayList es el default y LinkedList rara vez se justifica."},
  {label:"Cuando la lista tiene más de 1000 elementos; para listas pequeñas ArrayList es suficiente", explain:"Incorrecto. El tamaño no es el criterio. El criterio es el patrón de acceso: acceso aleatorio vs. inserciones/eliminaciones frecuentes en posiciones arbitrarias."},
  {label:"LinkedList tiene mejor rendimiento que ArrayList en todos los escenarios desde Java 11", explain:"Incorrecto. ArrayList supera a LinkedList en la mayoría de operaciones reales gracias a la localidad de caché del array contiguo en memoria."},
], correct:1},

{cat:"Collections",
q:"¿Qué problema tiene este código y cómo lo corriges?",
code:`List<String> cuentas = Arrays.asList("001", "002", "003");
cuentas.add("004"); // ¿qué ocurre?`,
options:[
  {label:"Funciona correctamente; Arrays.asList() devuelve una ArrayList normal", explain:"Incorrecto. Arrays.asList() devuelve una lista de tamaño fijo (backed by an array). Intentar agregar elementos lanza UnsupportedOperationException."},
  {label:"Lanza UnsupportedOperationException porque Arrays.asList() devuelve una lista de tamaño fijo que no soporta add/remove. Se corrige con new ArrayList<>(Arrays.asList(...)) o List.of() si no se necesita mutar, o List.copyOf() para una copia inmutable", explain:"Correcto. Arrays.asList() es una vista del array original: puedes modificar elementos existentes (set()) pero no cambiar el tamaño. En código bancario es un bug frecuente cuando se convierte un array a lista esperando una lista mutable. La solución es envolver en new ArrayList<>()."},
  {label:"Lanza ConcurrentModificationException porque la lista está siendo modificada durante la iteración", explain:"Incorrecto. ConcurrentModificationException ocurre durante la iteración concurrente. Aquí simplemente se está añadiendo a la lista; el error es UnsupportedOperationException."},
  {label:"Funciona en Java 11+ porque Arrays.asList() fue actualizado para ser mutable", explain:"Incorrecto. Arrays.asList() sigue devolviendo una lista de tamaño fijo en todas las versiones de Java."},
], correct:1},

{cat:"Collections",
q:"¿Cuál es el contrato equals/hashCode y qué bug concreto ocurre si sobrescribes equals() sin hashCode() en una entidad bancaria?",
options:[
  {label:"No hay contrato formal entre equals y hashCode; son métodos independientes", explain:"Incorrecto. El contrato es parte de la especificación de Java: si a.equals(b) es true, entonces a.hashCode() == b.hashCode() debe ser true."},
  {label:"Si sobrescribes equals() sin hashCode(), dos objetos 'iguales' por equals() tendrán hashCodes distintos y serán almacenados en diferentes buckets de HashSet/HashMap, causando duplicados lógicos o que la búsqueda por clave no encuentre el objeto", explain:"Correcto. Ejemplo real: clase Cuenta con equals() por numeroCuenta pero sin hashCode(). Un HashSet<Cuenta> puede contener la misma cuenta dos veces. Un HashMap<Cuenta, Saldo> no encontrará el saldo al buscar con una instancia 'igual'. En banca esto puede causar validaciones incorrectas de duplicados."},
  {label:"Solo afecta el rendimiento de HashMap; la lógica sigue siendo correcta aunque más lenta", explain:"Incorrecto. La lógica es incorrecta, no solo más lenta. Las búsquedas por clave fallan porque el bucket incorrecto es consultado."},
  {label:"Lombok @Data resuelve este problema automáticamente, por lo que no es relevante conocer el contrato manualmente", explain:"Incorrecto. Lombok @Data genera equals/hashCode automáticamente, pero un senior debe entender el contrato para saber cuándo @Data puede ser problemático (ej: incluir campos mutables en equals/hashCode puede romper colecciones)."},
], correct:1},

{cat:"Collections",
q:"¿Qué diferencia hay entre Iterator fail-fast y fail-safe, y cuál usa ArrayList?",
options:[
  {label:"ArrayList usa fail-safe; no lanza excepciones ante modificaciones concurrentes", explain:"Incorrecto. ArrayList usa un iterator fail-fast."},
  {label:"ArrayList usa fail-fast: lanza ConcurrentModificationException si la lista se modifica mientras se itera (detectado vía modCount). CopyOnWriteArrayList usa fail-safe: itera sobre una copia snapshot y nunca lanza CME, aunque puede no ver modificaciones recientes", explain:"Correcto. En código bancario: si iteras una lista de transacciones con for-each y dentro del loop llamas a list.remove(), obtendrás CME con ArrayList. Para modificar durante iteración, usa iterator.remove() o CopyOnWriteArrayList si la modificación es concurrente."},
  {label:"El tipo de iterator depende del número de threads; con 1 thread siempre es fail-safe", explain:"Incorrecto. El tipo de iterator es propiedad de la colección, no del número de threads. ArrayList siempre usa fail-fast independientemente de cuántos threads haya."},
  {label:"Fail-fast es más eficiente; fail-safe es más seguro pero deprecated desde Java 9", explain:"Incorrecto. Ninguno está deprecated. Son herramientas para escenarios distintos: fail-fast para detección rápida de bugs, fail-safe para iteración concurrente."},
], correct:1},

// ══════════════ CONCURRENCIA PRÁCTICA ══════════════
{cat:"Concurrencia",
q:"¿Cuándo usarías synchronized vs AtomicInteger para un contador de transacciones procesadas?",
options:[
  {label:"synchronized es siempre preferible porque es más explícito y fácil de entender", explain:"Incorrecto. synchronized para un simple contador es excesivo. Adquirir y liberar un monitor tiene overhead mayor que las operaciones CAS de AtomicInteger."},
  {label:"AtomicInteger es la opción correcta para un contador simple: sus operaciones (incrementAndGet, addAndGet) son atómicas mediante CAS sin bloquear el thread. synchronized se usa cuando necesitas atomicidad de múltiples operaciones compuestas que no se pueden expresar con un solo CAS", explain:"Correcto. AtomicInteger.incrementAndGet() es atómico, no bloqueante y más eficiente que synchronized para contadores. Si necesitas 'leer el valor Y luego actualizar basándose en él como operación atómica compuesta', ahí sí se necesita synchronized o AtomicInteger.compareAndSet()."},
  {label:"volatile int es suficiente para un contador; garantiza atomicidad en todas las operaciones", explain:"Incorrecto. volatile garantiza visibilidad pero no atomicidad de operaciones compuestas. counter++ con volatile no es atómico (es read-modify-write en tres pasos). Puedes leer un valor, que otro thread lo incremente, y luego sobrescribir con un valor incorrecto."},
  {label:"Para contadores siempre usar Long en lugar de int; Long es thread-safe por defecto en Java 64-bit", explain:"Incorrecto. Ni int ni long son thread-safe por defecto. Las operaciones sobre long no son atómicas en sistemas de 32 bits (dos operaciones de 32 bits). Usar AtomicLong."},
], correct:1},

{cat:"Concurrencia",
q:"Un servicio bancario usa ThreadLocal para almacenar el contexto del usuario (ID, roles). ¿Qué bug crítico puede ocurrir en un servidor de aplicaciones?",
options:[
  {label:"ThreadLocal consume demasiada memoria en producción; debe reemplazarse por una variable estática compartida", explain:"Incorrecto. Una variable estática compartida entre threads es exactamente lo contrario de thread-safe. ThreadLocal existe para evitar ese problema."},
  {label:"En un thread pool, el thread se reutiliza para múltiples requests. Si no se llama a ThreadLocal.remove() al final de cada request, el siguiente usuario que use ese thread verá el contexto del usuario anterior, exponiendo datos privados", explain:"Correcto. Este es un bug de seguridad real. Spring Security usa ThreadLocal para SecurityContext y siempre hace cleanup en el filter. Si implementas tu propio ThreadLocal en un OncePerRequestFilter, el cleanup en finally es obligatorio. En banca, filtrar datos de un cliente a otro es un incidente grave."},
  {label:"ThreadLocal no funciona con thread pools; solo funciona con threads creados manualmente con new Thread()", explain:"Incorrecto. ThreadLocal funciona con cualquier thread, incluyendo los de un pool. El problema no es que no funcione, sino que funciona demasiado bien: el valor persiste entre requests en el mismo thread."},
  {label:"El problema solo ocurre con más de 100 threads concurrentes; para pools pequeños es seguro", explain:"Incorrecto. Con 1 solo thread en el pool y 2 requests consecutivos ya ocurre el problema si no se hace cleanup."},
], correct:1},

{cat:"Concurrencia",
q:"¿Cuál es la diferencia entre Runnable y Callable, y cuándo usar cada uno en un servicio de procesamiento de pagos?",
options:[
  {label:"Son idénticos; Callable es solo un alias más moderno de Runnable", explain:"Incorrecto. Tienen firmas distintas con diferencias funcionales importantes."},
  {label:"Runnable: no retorna valor ni lanza checked exceptions (void run()); Callable: retorna un resultado y puede lanzar checked exceptions (V call() throws Exception). Usar Callable cuando necesitas el resultado del procesamiento (ej: ID de transacción generado) o manejar excepciones chequeadas de la tarea", explain:"Correcto. En procesamiento de pagos: Callable es el correcto cuando cada tarea genera un resultado (confirmación de pago, ID de operación) que necesitas recolectar. Con ExecutorService.submit(Callable), obtienes un Future<V> para recuperar el resultado o capturar excepciones con future.get()."},
  {label:"Callable es para tareas de larga duración; Runnable para tareas cortas", explain:"Incorrecto. La duración de la tarea no determina cuál usar. La diferencia es si necesitas un valor de retorno y/o manejar checked exceptions."},
  {label:"Runnable es más rápido que Callable porque no tiene overhead de retorno de valor", explain:"Incorrecto. El overhead de retornar un valor es completamente negligible. La elección es sobre la semántica del diseño, no de rendimiento."},
], correct:1},

{cat:"Concurrencia",
q:"¿Cómo procesan concurrentemente 5 llamadas a servicios externos (SUNAT, RENIEC, etc.) y agregan los resultados en Java 8+?",
code:`// Necesitas llamar a 5 servicios y esperar todos los resultados
// ¿Cuál es la forma correcta?`,
options:[
  {label:"Usar 5 threads manuales con new Thread() y sincronizar con join()", explain:"Incorrecto. Crear threads manuales es un antipatrón en código moderno. No reutiliza threads, es verboso y el manejo de errores es complejo."},
  {label:"Usar CompletableFuture.allOf() con un ExecutorService: lanzar cada llamada como CompletableFuture.supplyAsync(service::call, executor), combinar con allOf(), y recolectar resultados cuando todos completen", explain:"Correcto. CompletableFuture.allOf(f1, f2, f3, f4, f5).join() espera que todos completen. Con un executor personalizado controlas el pool de threads. El resultado de cada futuro se recupera con futuro.join() después del allOf. Es la forma idiomática moderna para paralelismo I/O."},
  {label:"Usar parallelStream() sobre una lista de servicios: servicios.parallelStream().map(Service::call).collect(toList())", explain:"Incorrecto. parallelStream() usa el ForkJoinPool común, compartido con todo el proceso. En un servidor bancario esto puede interferir con otras operaciones paralelas. Además, el manejo de excepciones checked en parallelStream es torpe. CompletableFuture con executor propio es preferible."},
  {label:"Hacer las 5 llamadas en secuencia con un for loop; la sincronización no vale la complejidad añadida", explain:"Incorrecto. Si cada llamada tarda 200ms, secuencial toma 1000ms. En paralelo toma ~200ms (el más lento). Para SLAs bancarios la diferencia es crítica."},
], correct:1},

{cat:"Concurrencia",
q:"¿Qué es un deadlock y cómo lo evitarías en un servicio bancario que maneja locks sobre cuentas para transferencias?",
options:[
  {label:"Deadlock es cuando un thread usa demasiada CPU; se evita con Thread.sleep() entre operaciones", explain:"Incorrecto. Deadlock es bloqueo mutuo entre threads esperando locks. No tiene relación con uso de CPU."},
  {label:"Deadlock: Thread A tiene lock de Cuenta001 y espera lock de Cuenta002; Thread B tiene lock de Cuenta002 y espera lock de Cuenta001. Se evita imponiendo orden consistente de adquisición de locks (siempre lockear la cuenta con menor ID primero) o usando tryLock() con timeout para abortar si no se obtiene el lock", explain:"Correcto. El orden consistente de locks es la solución clásica. Para transferencia de Cuenta A a Cuenta B, siempre adquirir primero el lock de la cuenta con menor numeroCuenta, independientemente de la dirección de la transferencia. Así nunca hay espera circular."},
  {label:"Deadlock solo ocurre con synchronized; usando ReentrantLock nunca hay deadlock", explain:"Incorrecto. ReentrantLock también puede crear deadlocks si se adquieren en orden inconsistente. La ventaja de ReentrantLock es tryLock() que permite detectar y romper el deadlock, pero no lo previene automáticamente."},
  {label:"La solución es usar una sola base de datos con transacciones ACID; los locks de aplicación no son necesarios en sistemas bancarios modernos", explain:"Incorrecto. Los locks de BD (SELECT FOR UPDATE, SERIALIZABLE) pueden resolver el problema a nivel de BD, pero los locks de aplicación siguen siendo necesarios para coordinar operaciones en memoria antes de llegar a la BD."},
], correct:1},

// ══════════════ OOP & BUENAS PRÁCTICAS ══════════════
{cat:"OOP & Buenas Prácticas",
q:"¿Cuál es la diferencia entre composición y herencia, y cuándo preferir composición en un proyecto bancario?",
options:[
  {label:"Herencia es siempre mejor porque reutiliza código sin duplicación", explain:"Incorrecto. La herencia crea acoplamiento fuerte: cambios en la superclase rompen subclases inesperadamente, y la subclase hereda todos los métodos aunque no los necesite."},
  {label:"Preferir composición ('tiene un') sobre herencia ('es un') cuando la relación no es genuinamente 'es un', cuando quieres cambiar comportamiento en runtime, o cuando la clase padre tiene métodos que la subclase no debería exponer. En banca: TransferService composición con Validator, Repository, NotificationService es mejor que heredar de AbstractService", explain:"Correcto. El principio 'favor composition over inheritance' (GoF, Effective Java) se aplica cuando el acoplamiento de herencia es costoso. Con composición puedes inyectar distintas implementaciones (mock en tests, distinto validator por tipo de cuenta) sin tocar TransferService."},
  {label:"Composición y herencia son equivalentes; la elección es solo de estilo de código del equipo", explain:"Incorrecto. Tienen implicaciones muy distintas en acoplamiento, testabilidad, y flexibilidad. No son equivalentes."},
  {label:"En Java moderno con interfaces y default methods, la herencia es obsoleta; todo debe hacerse con composición e interfaces", explain:"Incorrecto. La herencia sigue siendo válida para relaciones genuinas 'es-un'. El punto es no abusar de ella para reutilización de código cuando la composición es más apropiada."},
], correct:1},

{cat:"OOP & Buenas Prácticas",
q:"¿Qué garantías ofrece una clase inmutable en Java y qué pasos son necesarios para crearla correctamente?",
options:[
  {label:"Basta con declarar todos los campos como final para que la clase sea inmutable", explain:"Incorrecto. final en un campo de referencia solo previene reasignar la referencia, no modificar el objeto al que apunta. Un final List<> puede tener elementos añadidos."},
  {label:"Pasos: clase final (o métodos privados), campos private final, sin setters, inicialización completa en constructor, y copias defensivas para campos mutables (Date, List). Garantía: thread-safe sin synchronized, hashCode cacheable, segura como clave en HashMap", explain:"Correcto. En banca: MontoTransferencia, IBAN, FechaValor son buenos candidatos a inmutables. El punto crítico de las copias defensivas: si recibes un Date en el constructor, guarda new Date(fecha.getTime()), no la referencia original. Al retornar, devuelve también una copia."},
  {label:"Inmutabilidad solo aplica a String y tipos primitivos; las clases personalizadas no pueden ser verdaderamente inmutables", explain:"Incorrecto. Cualquier clase puede diseñarse como inmutable siguiendo los pasos correctos. BigDecimal, LocalDate, los Records de Java 16+ son ejemplos de inmutables de la librería estándar."},
  {label:"Una clase inmutable no puede implementar interfaces porque las interfaces podrían añadir métodos mutables", explain:"Incorrecto. Una clase inmutable puede implementar interfaces sin ningún problema. La inmutabilidad es sobre el estado de la instancia, no sobre qué interfaces implementa."},
], correct:1},

{cat:"OOP & Buenas Prácticas",
q:"¿Cuál es la diferencia entre Comparable y Comparator, y cuándo usarías cada uno para ordenar transacciones bancarias?",
options:[
  {label:"Comparable define múltiples criterios de ordenación; Comparator define uno solo", explain:"Incorrecto. Es al revés: Comparable define un único orden natural en la clase misma; Comparator define criterios externos y reutilizables."},
  {label:"Comparable: implementado en la clase, define el orden natural (una sola forma). Comparator: externo a la clase, permite múltiples criterios de ordenación. En banca: Transaccion implementa Comparable por fecha (orden natural para extractos); se crean Comparators externos para ordenar por monto, por cuenta destino, o combinados con thenComparing()", explain:"Correcto. La forma moderna: Comparator.comparing(Transaccion::getMonto).reversed().thenComparing(Transaccion::getFecha). Esto es más flexible que Comparable porque no modifica la clase y permite diferentes ordenaciones según el contexto (extracto vs. análisis de riesgo)."},
  {label:"Comparator fue deprecated en Java 8; se debe usar Comparable para todo junto con Streams", explain:"Incorrecto. Comparator es una functional interface fundamental en Java 8+ con métodos estáticos y default muy útiles (comparing, thenComparing, reversed). No está deprecated."},
  {label:"Para ordenar en bases de datos siempre usar ORDER BY SQL; Comparable y Comparator solo para ordenaciones en memoria sin relevancia práctica", explain:"Incorrecto. Ordenar en SQL es correcto cuando se puede, pero en memoria (listas ya cargadas, resultados de APIs externas, procesamiento batch) Comparator es la herramienta correcta."},
], correct:1},

{cat:"OOP & Buenas Prácticas",
q:"¿Qué es el principio 'tell, don't ask' y cómo evita código anémico en un dominio bancario?",
options:[
  {label:"Significa que los métodos deben tener nombre descriptivo y no usar abreviaturas", explain:"Incorrecto. 'Tell, don't ask' es sobre dónde se ubica la lógica, no sobre nomenclatura."},
  {label:"En lugar de preguntar el estado de un objeto para tomar decisiones fuera de él, decirle al objeto que ejecute la operación. Ejemplo: en lugar de if (cuenta.getSaldo() >= monto) { cuenta.setSaldo(cuenta.getSaldo() - monto); }, usar directamente cuenta.debitar(monto) donde la validación y el cambio de estado viven en Cuenta", explain:"Correcto. El modelo anémico (objetos que solo tienen getters/setters, lógica en Services) viola encapsulamiento. 'Tell, don't ask' pone la lógica de negocio en el objeto que tiene el estado, haciendo el código más cohesivo, testeable y representativo del dominio bancario."},
  {label:"Significa que los logs deben ser descriptivos y no usar códigos numéricos crípticos", explain:"Incorrecto. Ese es un principio de observabilidad. 'Tell, don't ask' es un principio de diseño orientado a objetos."},
  {label:"Es un principio de UI: mostrar mensajes claros al usuario en lugar de pedir que consulte manuales", explain:"Incorrecto. Es un principio de diseño de software OOP, no de UX."},
], correct:1},

// ══════════════ JAVA 8+ ══════════════
{cat:"Java 8+ – Uso Real",
q:"¿Cuál es la forma correcta de manejar un Optional que puede estar vacío para retornar un valor por defecto?",
code:`Optional<Cliente> cliente = repo.findById(id);
// Necesitas retornar el nombre o "DESCONOCIDO" si no existe`,
options:[
  {label:`if (cliente.isPresent()) { return cliente.get().getNombre(); } else { return "DESCONOCIDO"; }`, explain:"Incorrecto. Funciona pero es el antipatrón de Optional: reproduce el patrón if-null que Optional busca eliminar. Pierde el beneficio de la API funcional."},
  {label:`cliente.map(Cliente::getNombre).orElse("DESCONOCIDO")`, explain:"Correcto. map() transforma el valor si está presente; orElse() provee el default si está vacío. Es la forma idiomática y legible. Si el default es costoso de calcular, usar orElseGet(() -> calcularDefault()) para evaluación lazy."},
  {label:`cliente.get().getNombre()`, explain:"Incorrecto. get() sin isPresent() previo lanza NoSuchElementException si el Optional está vacío. Es el error más común con Optional."},
  {label:`cliente.orElse(new Cliente("DESCONOCIDO")).getNombre()`, explain:"Incorrecto. Funciona pero crea un objeto Cliente innecesario como default. Si solo necesitas el nombre, map().orElse() es más limpio y eficiente."},
], correct:1},

{cat:"Java 8+ – Uso Real",
q:"¿Qué problema tiene este Stream y cómo lo corriges?",
code:`List<String> cuentas = new ArrayList<>();
transacciones.stream()
    .filter(t -> t.getMonto() > 1000)
    .forEach(t -> cuentas.add(t.getNumeroCuenta())); // ¿problema?`,
options:[
  {label:"No hay problema; forEach con una lambda es la forma correcta de recolectar resultados de un Stream", explain:"Incorrecto. Modificar una lista externa desde un forEach de Stream es un efecto secundario que viola las especificaciones de Streams y puede causar bugs en streams paralelos."},
  {label:"Modifica una lista mutable externa desde el Stream (efecto secundario), lo que es incorrecto y falla en streams paralelos. La forma correcta es .filter(t -> t.getMonto() > 1000).map(Transaccion::getNumeroCuenta).collect(Collectors.toList())", explain:"Correcto. Los Streams deben ser stateless y sin efectos secundarios para funcionar correctamente, especialmente en modo paralelo. Usar collect() es la forma correcta de materializar resultados: es thread-safe y expresa la intención claramente."},
  {label:"El problema es que filter() debería ir después de forEach(); el orden de las operaciones es incorrecto", explain:"Incorrecto. El orden filter() → forEach() es correcto (primero filtra, luego actúa). El problema es el efecto secundario, no el orden."},
  {label:"Streams no pueden usarse con objetos complejos como Transaccion; solo funcionan con tipos primitivos", explain:"Incorrecto. Los Streams de Java trabajan con cualquier tipo de objeto. Stream<T>, Stream<Transaccion>, etc. son perfectamente válidos."},
], correct:1},

{cat:"Java 8+ – Uso Real",
q:"¿Cuál es la diferencia entre map() y flatMap() en Streams, con un ejemplo bancario?",
options:[
  {label:"map() es para transformaciones simples; flatMap() es más eficiente para transformaciones complejas", explain:"Incorrecto. La diferencia no es de eficiencia sino de cardinalidad: 1:1 vs 1:N."},
  {label:"map() transforma cada elemento a otro elemento (1:1). flatMap() transforma cada elemento a un Stream y los concatena (1:N). Ejemplo bancario: clientes.stream().flatMap(c -> c.getCuentas().stream()) da un Stream plano de todas las cuentas de todos los clientes", explain:"Correcto. Si usaras map() en lugar de flatMap(), obtendrías Stream<List<Cuenta>> (stream de listas). flatMap() aplana ese nivel, dando Stream<Cuenta> que puedes filtrar, ordenar o agrupar directamente."},
  {label:"flatMap() solo funciona con Optional; para colecciones siempre se usa map()", explain:"Incorrecto. flatMap() existe tanto en Stream como en Optional con la misma semántica de aplanamiento. Con colecciones es donde más se usa en práctica."},
  {label:"map() y flatMap() producen el mismo resultado; la elección es de preferencia del equipo", explain:"Incorrecto. Producen tipos de retorno distintos: map() con función A→List<B> da Stream<List<B>>; flatMap() con la misma función da Stream<B>. No son intercambiables."},
], correct:1},

{cat:"Java 8+ – Uso Real",
q:"¿Qué hace Collectors.toUnmodifiableList() versus Collectors.toList(), y cuándo importa la diferencia?",
options:[
  {label:"Son idénticos desde Java 10; toList() fue actualizado para ser inmutable", explain:"Incorrecto. toList() de Collectors sigue devolviendo una lista mutable. En Java 16+ existe Stream.toList() (método de instancia) que sí devuelve una lista no modificable."},
  {label:"toList() devuelve una lista mutable (puede hacer add/remove). toUnmodifiableList() devuelve una lista que lanza UnsupportedOperationException ante mutaciones. Usar toUnmodifiableList() (o Stream.toList() en Java 16+) cuando el resultado no debe ser modificado, comunicando la intención y previniendo bugs", explain:"Correcto. En APIs bancarias: si un método retorna una lista de transacciones para consulta, retornar Collections.unmodifiableList o usar toUnmodifiableList() previene que el llamante modifique accidentalmente la lista. Es una buena práctica defensiva de encapsulamiento."},
  {label:"toUnmodifiableList() es más rápido que toList() porque no necesita crear una copia al devolver la lista", explain:"Incorrecto. El rendimiento es similar; la diferencia es semántica (mutabilidad), no de performance."},
  {label:"toUnmodifiableList() es obligatorio en métodos public para cumplir con el principio de encapsulamiento", explain:"Incorrecto. No es obligatorio, pero es una buena práctica. La decisión depende del contexto: si el llamante necesita modificar la lista, toList() es correcto."},
], correct:1},

{cat:"Java 8+ – Uso Real",
q:"¿Cuándo usarías orElse() vs orElseGet() en Optional, y cuál es el error de rendimiento común?",
options:[
  {label:"Son equivalentes; orElseGet() es solo sintaxis alternativa de orElse()", explain:"Incorrecto. Tienen una diferencia crucial de evaluación: eager vs lazy."},
  {label:"orElse(valor) evalúa el argumento siempre (eager), aunque Optional tenga valor. orElseGet(() -> calcularValor()) evalúa el Supplier solo si Optional está vacío (lazy). Error común: orElse(servicio.buscarEnBD()) ejecuta la query a BD aunque el Optional tenga valor", explain:"Correcto. Ejemplo real: optional.orElse(generarReporteComplejo()) siempre genera el reporte, aunque no se use. Si generarReporteComplejo() es costoso (query SQL, llamada HTTP), debe ser orElseGet(() -> generarReporteComplejo()). En banca con reportes o consultas costosas, este bug puede degradar el rendimiento significativamente."},
  {label:"orElse() es para tipos primitivos; orElseGet() para objetos complejos", explain:"Incorrecto. La diferencia no tiene relación con el tipo del valor. Es sobre cuándo se evalúa el argumento."},
  {label:"orElseGet() es deprecated desde Java 11; usar solo orElse()", explain:"Incorrecto. orElseGet() sigue siendo válido y recomendado en Java 21. Es el método preferido cuando el default requiere computación."},
], correct:1},

// ══════════════ STRING & CLASES ÚTILES ══════════════
{cat:"String & Clases Útiles",
q:"¿Por qué concatenar Strings con + dentro de un loop es un problema de rendimiento y cuál es la solución?",
code:`// ¿Qué problema tiene este código?
String reporte = "";
for (Transaccion t : transacciones) {
    reporte += t.getDescripcion() + ", ";
}`,
options:[
  {label:"No hay problema; el compilador de Java optimiza automáticamente las concatenaciones en loops",explain:"Incorrecto. El compilador optimiza concatenaciones simples en una sola línea, pero no dentro de un loop porque no puede predeterminar cuántas iteraciones habrá."},
  {label:"Cada += crea un nuevo objeto String en memoria (String es inmutable), generando N objetos temporales para N iteraciones. Solución: usar StringBuilder que modifica el buffer interno sin crear objetos nuevos",explain:"Correcto. Con 10.000 transacciones son 10.000 objetos String temporales que el GC debe recolectar. StringBuilder.append() modifica el mismo buffer y es O(1) amortizado. Para concatenaciones fuera de loops, + es perfectamente válido porque el compilador lo optimiza con StringBuilder automáticamente."},
  {label:"El problema es que String no soporta el operador +=; hay que usar concat()",explain:"Incorrecto. String sí soporta += en Java. Es syntactic sugar para str = str + nuevaPartte. El problema es de rendimiento por inmutabilidad, no de compilación."},
  {label:"StringBuffer es siempre preferible a StringBuilder porque es thread-safe",explain:"Incorrecto. StringBuffer es thread-safe (synchronized) pero más lento. En un loop single-thread (el 99% de los casos), StringBuilder es la elección correcta. StringBuffer solo cuando múltiples threads comparten el mismo builder."},
], correct:1},

{cat:"String & Clases Útiles",
q:"¿Qué imprime este código y qué trampa de Java ilustra?",
code:`String a = "BCP";
String b = "BCP";
String c = new String("BCP");

System.out.println(a == b);        // ?
System.out.println(a == c);        // ?
System.out.println(a.equals(c));   // ?`,
options:[
  {label:"true, true, true — los tres Strings tienen el mismo valor",explain:"Incorrecto. == compara referencias, no valores. new String() crea siempre un objeto nuevo en el heap, diferente del String Pool."},
  {label:"true, false, true — a y b comparten referencia del String Pool; c es un objeto nuevo en heap; equals() compara el contenido",explain:"Correcto. Literales String con el mismo valor comparten la misma referencia del String Pool. new String() siempre crea un objeto nuevo aunque el contenido sea igual. Por eso la regla en Java es: nunca comparar Strings con ==, siempre usar equals(). En producción, los Strings vienen de BD o HTTP y son objetos nuevos, por lo que == fallaría silenciosamente."},
  {label:"false, false, true — Java nunca comparte referencias entre variables distintas",explain:"Incorrecto. El String Pool garantiza que literales con el mismo valor comparten referencia. a == b es true."},
  {label:"El código no compila porque no se puede usar == con String",explain:"Incorrecto. Java permite == con cualquier tipo de referencia. Compila sin problemas, pero el comportamiento es inesperado para quienes no conocen el String Pool."},
], correct:1},

{cat:"String & Clases Útiles",
q:"¿Cuáles son las ventajas prácticas de usar var (Java 10+) y cuándo NO usarlo?",
code:`// ¿En cuál de estos usos es problemático var?
var lista = new ArrayList<Transaccion>();         // A
var resultado = transacciones.stream()
    .filter(t -> t.getMonto() > 1000)
    .collect(Collectors.toList());                 // B
var x = calcularComision(monto, tipo, cliente);   // C`,
options:[
  {label:"var nunca debe usarse en código de producción; solo es válido en código de prueba",explain:"Incorrecto. var es una feature oficial de Java 10+ perfectamente válida en producción. IntelliJ y otros IDEs lo soportan completamente."},
  {label:"var es problemático cuando el tipo no es obvio por el contexto (C): 'x' no revela si calcularComision retorna BigDecimal, double, ComisionResult, etc., reduciendo la legibilidad. Es apropiado cuando el tipo es obvio (A: ArrayList) o el nombre de la variable es suficientemente descriptivo",explain:"Correcto. var es excelente para reducir verbosidad cuando el tipo es claro: var map = new HashMap<String, List<Transaccion>>() evita repetición. Problemático cuando el tipo no se infiere del contexto. La regla: si quien lee el código no puede inferir el tipo sin ver la declaración de calcularComision(), mejor declarar el tipo explícitamente."},
  {label:"var siempre es mejor que declarar el tipo explícito; reduce el código y mejora la legibilidad en todos los casos",explain:"Incorrecto. var reduce legibilidad cuando el tipo no es obvio por el contexto. En código bancario que otros deben leer y auditar, claridad sobre brevedad."},
  {label:"var solo funciona con tipos primitivos; para objetos hay que declarar el tipo completo",explain:"Incorrecto. var funciona con cualquier tipo local (primitivos y objetos). No funciona para campos de clase, parámetros de método o tipos de retorno."},
], correct:1},

{cat:"String & Clases Útiles",
q:"¿Qué son los Records en Java 16+ y para qué sirven en un contexto bancario?",
code:`// Definición de un Record:
record TransferenciaDTO(String cuentaOrigen,
                        String cuentaDestino,
                        BigDecimal monto,
                        String moneda) {}

// Uso:
var dto = new TransferenciaDTO("001", "002", new BigDecimal("500"), "PEN");
dto.monto();         // getter automático
dto.equals(otro);    // comparación por valor automática`,
options:[
  {label:"Records son clases normales con sintaxis más corta; son mutables igual que cualquier POJO",explain:"Incorrecto. Los Records son inmutables por diseño. Sus campos son final y no tienen setters. Es una característica fundamental, no solo sintaxis."},
  {label:"Records generan automáticamente constructor canónico, getters (por nombre del campo, sin 'get'), equals(), hashCode() y toString(). Son inmutables y perfectos para DTOs de request/response, Value Objects y datos de configuración en banca",explain:"Correcto. En banca: TransferenciaDTO como Record evita escribir 50 líneas de boilerplate (o depender de Lombok). Son especialmente buenos para DTOs de API que no deben mutar. Limitación: no pueden extender clases (sí implementar interfaces), no pueden tener campos adicionales no declarados en el header."},
  {label:"Records reemplazan a las interfaces en Java 16+; ya no se necesitan interfaces para definir contratos",explain:"Incorrecto. Records son una forma concisa de clases de datos inmutables. No reemplazan interfaces. Pueden implementar interfaces."},
  {label:"Records solo se pueden usar con Lombok; sin Lombok el compilador no los soporta",explain:"Incorrecto. Records son una feature nativa del lenguaje Java desde la versión 16. No requieren ninguna librería externa como Lombok."},
], correct:1},

{cat:"String & Clases Útiles",
q:"¿Cuáles son las características prácticas de los Enums en Java que van más allá de simples constantes?",
code:`enum TipoCuenta {
    AHORRO("Cuenta de Ahorro", 0.04),
    CORRIENTE("Cuenta Corriente", 0.0),
    PLAZO_FIJO("Depósito a Plazo", 0.06);

    private final String descripcion;
    private final double tasaInteres;

    TipoCuenta(String descripcion, double tasaInteres) {
        this.descripcion = descripcion;
        this.tasaInteres = tasaInteres;
    }
    public double getTasaInteres() { return tasaInteres; }
}`,
options:[
  {label:"Los Enums en Java son solo constantes enteras como en C; no pueden tener campos ni métodos",explain:"Incorrecto. Los Enums de Java son clases completas. Pueden tener constructores, campos, métodos, e incluso implementar interfaces."},
  {label:"Los Enums pueden tener constructores, campos y métodos, haciendo la lógica asociada coubicada con el tipo. Esto evita switches dispersos por el código: en lugar de if/switch sobre el tipo para obtener la tasa, TipoCuenta.AHORRO.getTasaInteres() es directo. También son thread-safe y el mejor Singleton por diseño",explain:"Correcto. En banca: TipoCuenta con sus reglas (tasa, descripción, límites) en el mismo Enum es más mantenible que una tabla de configuración externa para datos estables. Los Enums son implícitamente serializables, thread-safe, y el compilador verifica exhaustividad en switch expressions (Java 14+)."},
  {label:"Los Enums con campos son un antipatrón; la lógica siempre debe estar en Services separados",explain:"Incorrecto. Para datos y comportamiento intrínseco al tipo (la tasa de interés ES una propiedad del tipo de cuenta), ponerlo en el Enum es cohesivo y correcto. Para lógica compleja o dependencias externas, sí se prefiere un Service."},
  {label:"Los Enums no pueden usarse en switch en Java 17+; se debe usar if/else",explain:"Incorrecto. Los Enums funcionan perfectamente en switch statements y switch expressions en todas las versiones de Java, incluyendo Java 21."},
], correct:1},

// ══════════════ JAVA MODERNO ══════════════
{cat:"Java Moderno (14-21)",
q:"¿Cuál es la ventaja del switch expression de Java 14+ sobre el switch statement tradicional?",
code:`// Switch statement tradicional:
String categoria;
switch (riesgo) {
    case ALTO: categoria = "A"; break;
    case MEDIO: categoria = "B"; break;
    case BAJO: categoria = "C"; break;
    default: throw new IllegalArgumentException();
}

// Switch expression Java 14+:
String categoria = switch (riesgo) {
    case ALTO   -> "A";
    case MEDIO  -> "B";
    case BAJO   -> "C";
};`,
options:[
  {label:"El switch expression es solo cosmético; el compilador genera el mismo bytecode que el switch statement",explain:"Incorrecto. El switch expression añade verificación de exhaustividad en compilación (con sealed types/enums), elimina fall-through accidental, y es una expresión (produce un valor), no una sentencia."},
  {label:"El switch expression: elimina el fall-through accidental (no hay break), es una expresión que retorna valor directamente, y con sealed types o enums el compilador verifica exhaustividad sin necesitar default. Reduce errores sutiles como olvidar un break",explain:"Correcto. El fall-through (olvidar un break en un case) es un bug clásico de Java. Switch expression con -> elimina ese riesgo. En banca, una categorización de riesgo con un case sin break podría pasar por múltiples categorías silenciosamente."},
  {label:"El switch expression solo funciona con String; para enums y números se debe seguir usando switch statement",explain:"Incorrecto. Switch expression funciona con cualquier tipo que funciona en switch: int, String, Enum, y desde Java 21 con pattern matching para cualquier tipo de referencia."},
  {label:"El switch expression es más lento que el statement porque evalúa todos los casos antes de decidir",explain:"Incorrecto. El switch expression genera bytecode similar o idéntico al statement. No hay diferencia de rendimiento."},
], correct:1},

{cat:"Java Moderno (14-21)",
q:"¿Qué es el pattern matching con instanceof (Java 16+) y cómo simplifica el código bancario con jerarquías de tipos?",
code:`// Antes de Java 16:
if (operacion instanceof Transferencia) {
    Transferencia t = (Transferencia) operacion; // cast manual
    log.info("Monto: " + t.getMonto());
}

// Java 16+:
if (operacion instanceof Transferencia t) {
    log.info("Monto: " + t.getMonto()); // t ya está disponible
}`,
options:[
  {label:"No hay diferencia funcional; el pattern matching es solo syntactic sugar sin impacto real",explain:"Incorrecto. Elimina el cast explícito (que puede lanzar ClassCastException si se escribe mal), reduce boilerplate y el scope de la variable es restringido al bloque donde el patrón aplica."},
  {label:"Combina el check de tipo y el cast en una sola operación: si operacion es Transferencia, el compilador crea la variable t (del tipo correcto) disponible en el scope del if. Elimina el cast manual propenso a errores y hace el código más conciso",explain:"Correcto. En código bancario con jerarquías de operaciones (Transferencia, Deposito, Retiro), el pattern matching reduce significativamente el boilerplate. Combinado con switch expressions de Java 21 y sealed types, permite manejar todas las variantes de forma exhaustiva y segura en compilación."},
  {label:"Pattern matching con instanceof solo funciona cuando la variable es final",explain:"Incorrecto. No hay restricción de final para usar pattern matching con instanceof. La variable t es simplemente una nueva variable local del tipo inferido."},
  {label:"Este feature fue deprecado en Java 17 y eliminado en Java 21",explain:"Incorrecto. Pattern matching para instanceof fue finalizado (GA) en Java 16 y es una feature estable y activa en Java 21."},
], correct:1},

{cat:"Java Moderno (14-21)",
q:"¿Cuál es el resultado de este código con Stream.collect() y qué hace Collectors.partitioningBy()?",
code:`List<Transaccion> txns = obtenerTransacciones();

Map<Boolean, List<Transaccion>> resultado =
    txns.stream()
        .collect(Collectors.partitioningBy(
            t -> t.getMonto().compareTo(new BigDecimal("10000")) > 0
        ));

List<Transaccion> grandes = resultado.get(true);
List<Transaccion> normales = resultado.get(false);`,
options:[
  {label:"partitioningBy lanza excepción si algún elemento es null; debe usarse filter() primero",explain:"Incorrecto. partitioningBy acepta un Predicate y agrupa por true/false. No lanza excepción por elementos null (aunque el Predicate sí podría si accede a un campo null)."},
  {label:"partitioningBy divide el stream en dos grupos según un Predicate: true (monto > 10.000) y false (el resto). Siempre retorna un Map con exactamente dos entradas (true y false), nunca vacío. Es más eficiente que dos filter() separados porque itera la lista una sola vez",explain:"Correcto. En banca, partitioningBy es útil para separar transacciones que requieren verificación adicional de las normales, clientes activos vs inactivos, pagos aprobados vs rechazados. Una sola iteración vs dos filter() separados es una optimización relevante con grandes volúmenes."},
  {label:"partitioningBy es equivalente a groupingBy con dos grupos; se puede reemplazar siempre con groupingBy",explain:"Incorrecto. Aunque funcionalmente similar, partitioningBy siempre garantiza ambas claves (true y false) en el resultado, incluso si un grupo está vacío. groupingBy solo incluye claves que tienen al menos un elemento."},
  {label:"El resultado es un Map<String, List<Transaccion>> con claves 'true' y 'false' como Strings",explain:"Incorrecto. El tipo de retorno es Map<Boolean, List<Transaccion>>, donde las claves son los booleanos Boolean.TRUE y Boolean.FALSE, no Strings."},
], correct:1},

{cat:"Java Moderno (14-21)",
q:"¿Qué es Collectors.joining() y cómo lo usarías para generar un log estructurado de IDs de transacción?",
code:`List<String> ids = List.of("TX001", "TX002", "TX003");

// ¿Qué produce cada opción?
String a = ids.stream().collect(Collectors.joining());
String b = ids.stream().collect(Collectors.joining(", "));
String c = ids.stream().collect(Collectors.joining(", ", "[", "]"));`,
options:[
  {label:"a = 'TX001 TX002 TX003', b = 'TX001, TX002, TX003', c = '[TX001, TX002, TX003]'",explain:"Incorrecto. joining() sin argumentos no añade espacios entre elementos."},
  {label:"a = 'TX001TX002TX003' (sin separador), b = 'TX001, TX002, TX003' (con separador), c = '[TX001, TX002, TX003]' (con separador, prefijo y sufijo)",explain:"Correcto. Collectors.joining() tiene tres sobrecargas: sin args (concatenación directa), con separador, y con separador+prefijo+sufijo. Para logs bancarios, la opción c genera un formato limpio y legible: '[TX001, TX002, TX003] procesadas exitosamente'."},
  {label:"joining() no funciona con Stream<String>; solo con Stream de tipos primitivos",explain:"Incorrecto. Collectors.joining() está diseñado específicamente para Stream<String> o streams donde los elementos son CharSequence."},
  {label:"Las tres opciones producen el mismo resultado porque joining() ignora los argumentos opcionales",explain:"Incorrecto. Los argumentos de joining() son significativos: el separador va entre elementos, el prefijo al inicio, y el sufijo al final del resultado."},
], correct:1},

// ══════════════ EXCEPCIONES & TESTING ══════════════
{cat:"Excepciones & Testing",
q:"¿Cuándo crear una excepción de dominio propia checked vs unchecked en un sistema bancario?",
options:[
  {label:"Siempre crear checked exceptions en banca para que el compilador fuerce el manejo de todos los errores", explain:"Incorrecto. Forzar checked exceptions en todas partes lleva a catch vacíos o wrapping innecesario que degrada la calidad del código."},
  {label:"Unchecked (extends RuntimeException): para errores de negocio que el flujo normal no debe recuperar en el mismo punto (SaldoInsuficienteException, LimiteSuperadoException). Checked (extends Exception): cuando el llamante DEBE manejar la condición en el mismo punto. La tendencia moderna (Spring, JPA) es preferir unchecked para claridad de código", explain:"Correcto. En Spring y la mayoría de frameworks modernos, las excepciones de negocio son unchecked. Esto evita el problema del 'swallow': catch(Exception e) {} que silencia errores. Las unchecked salen naturalmente hacia un @ControllerAdvice o @ExceptionHandler donde se manejan uniformemente."},
  {label:"La elección entre checked y unchecked no importa; lo que importa es tener un buen mensaje de error", explain:"Incorrecto. La diferencia afecta directamente la API del método (throws en la firma), la facilidad de propagación, y el riesgo de swallow de excepciones."},
  {label:"Las checked exceptions son obligatorias para cumplimiento PCI-DSS en sistemas de pago", explain:"Incorrecto. PCI-DSS es un estándar de seguridad de datos de tarjetas y no especifica cómo manejar excepciones en Java."},
], correct:1},

{cat:"Excepciones & Testing",
q:"¿Qué garantiza try-with-resources y qué resuelve comparado con un finally manual?",
code:`// Antes de Java 7 (finally manual):
Connection conn = null;
try {
    conn = ds.getConnection();
    // usar conn
} finally {
    if (conn != null) conn.close(); // Si lanza excepción aquí...
}

// Java 7+ (try-with-resources):
try (Connection conn = ds.getConnection()) {
    // usar conn
} // conn.close() siempre llamado`,
options:[
  {label:"try-with-resources es solo syntactic sugar; el compilador genera exactamente el mismo bytecode que el finally manual", explain:"Incorrecto. Genera bytecode diferente con una mejora importante: gestiona el caso donde tanto el bloque try como close() lanzan excepciones simultáneamente, usando suppressed exceptions."},
  {label:"Garantiza que close() se llama siempre al salir del bloque. La mejora sobre finally manual: si tanto el try como close() lanzan excepción, la excepción de close() se adjunta como 'suppressed' a la principal (Throwable.getSuppressed()), en lugar de silenciar la excepción original", explain:"Correcto. Con finally manual, si el bloque try lanza ExcepcionPrincipal y dentro del finally conn.close() también lanza IOException, la IOException sobrescribe la ExcepcionPrincipal y se pierde el error original. try-with-resources preserva ambas excepciones."},
  {label:"try-with-resources solo funciona con Connection de JDBC; para otros recursos se necesita finally manual", explain:"Incorrecto. Funciona con cualquier clase que implemente AutoCloseable (Connection, InputStream, OutputStream, FileReader, cualquier clase propia que implemente AutoCloseable)."},
  {label:"try-with-resources cierra los recursos en un thread separado para no impactar el rendimiento", explain:"Incorrecto. close() se llama en el mismo thread, sincronamente, al salir del bloque try. No hay threads adicionales."},
], correct:1},

{cat:"Excepciones & Testing",
q:"¿Qué prueba este test y qué está mal en su diseño?",
code:`@Test
void testProcesarTransaccion() {
    TransferService service = new TransferService();
    service.procesarTransaccion(new Transaccion(100.0, "001", "002"));
    // sin assertions
}`,
options:[
  {label:"El test está bien; si no lanza excepción significa que el código funciona correctamente", explain:"Incorrecto. Un test sin assertions no valida nada. Solo verifica que el código no lanza excepción, lo que es condición necesaria pero no suficiente para garantizar corrección."},
  {label:"El test no tiene assertions: no verifica el resultado de la operación ni el estado del sistema después. Un buen test debe verificar: resultado retornado, estado del objeto después de la operación, o interacciones con dependencias (verify con Mockito)", explain:"Correcto. Un test sin assertions es un 'smoke test' que solo verifica que el código no explota. Para una transferencia bancaria, el test debe verificar: ¿se debitó el monto correcto?, ¿se acreditó en la cuenta destino?, ¿se registró el movimiento?, ¿se llamó al servicio de notificación?"},
  {label:"El problema es que no usa @SpringBootTest; los tests sin contexto Spring no son válidos", explain:"Incorrecto. Los tests unitarios sin Spring son perfectamente válidos y preferibles por su velocidad. El problema es la falta de assertions, no el contexto."},
  {label:"El test instancia TransferService directamente con new; siempre debe inyectarse con @Autowired", explain:"Incorrecto. En tests unitarios, instanciar la clase directamente con new y usar @Mock para las dependencias es el patrón correcto. @Autowired es para tests de integración con contexto Spring."},
], correct:1},

// ══════════════ REST & APIs ══════════════
{cat:"REST & APIs",
q:"¿Cuál es el código de respuesta HTTP correcto para cada situación en una API bancaria?",
options:[
  {label:"200 para todo lo que funciona; 500 cuando algo falla; 404 para recursos que no existen", explain:"Incorrecto. HTTP tiene una semántica rica. Usar solo 200/404/500 pierde información valiosa para el cliente de la API."},
  {label:"201 Created al crear un recurso (POST con recurso creado), 400 Bad Request para validación de input, 404 Not Found para recurso inexistente, 409 Conflict para operación inválida por estado (cuenta ya cerrada), 422 Unprocessable Entity para regla de negocio violada (saldo insuficiente), 500 Internal Server Error para errores inesperados", explain:"Correcto. La semántica HTTP correcta hace que los clientes puedan manejar cada caso apropiadamente. 400 vs 422: 400 es para request malformado (falta campo requerido), 422 para request sintácticamente correcto pero semánticamente inválido (monto negativo). 409 para conflicto de estado (intentar transferir de una cuenta bloqueada)."},
  {label:"Siempre retornar 200 con un campo 'success: false' en el body; los status codes HTTP son para errores del servidor, no de negocio", explain:"Incorrecto. Este antipatrón (siempre 200) impide que los clientes usen los mecanismos estándar HTTP (circuit breakers, logging, reintentos) que se basan en status codes."},
  {label:"401 para cualquier error de validación; el cliente debe autenticarse nuevamente ante cualquier error", explain:"Incorrecto. 401 Unauthorized es específicamente para falta o expiración de credenciales de autenticación. Usarlo para errores de validación de negocio confunde al cliente."},
], correct:1},

{cat:"REST & APIs",
q:"¿Por qué es importante que una API de transferencia bancaria sea idempotente, y cómo se implementa?",
options:[
  {label:"La idempotencia no es relevante en REST; solo importa para operaciones de base de datos", explain:"Incorrecto. La idempotencia es fundamental en APIs distribuidas donde los reintentos son inevitables (timeouts de red, fallos parciales)."},
  {label:"Si el cliente reintenta una petición (por timeout), una API no idempotente puede crear una transferencia duplicada. Se implementa con un Idempotency-Key en el header: el servidor almacena el resultado por esa clave y si recibe la misma clave, retorna el resultado anterior sin reprocesar", explain:"Correcto. Ejemplo: el cliente hace POST /transferencias con Idempotency-Key: uuid-123. Si hay timeout y reintenta, el servidor detecta que uuid-123 ya fue procesado y retorna el mismo resultado sin crear una segunda transferencia. Es el estándar de APIs de pago como Stripe y Visa."},
  {label:"La idempotencia se logra usando GET en lugar de POST para todas las operaciones; GET es idempotente por definición REST", explain:"Incorrecto. GET es idempotente pero semánticamente incorrecto para crear recursos. POST puede ser idempotente si se implementa con Idempotency-Key. No se debe usar GET para operaciones que modifican estado."},
  {label:"Las operaciones bancarias no deben ser reinventables por seguridad; cada intento debe ser una nueva transacción", explain:"Incorrecto. El cliente no puede saber si una petición llegó al servidor ante un timeout. Sin idempotencia, el cliente está ante un dilema: ¿reintentar y arriesgar duplicado, o no reintentar y arriesgar no procesar? La Idempotency-Key resuelve esto con seguridad."},
], correct:1},

{cat:"REST & APIs",
q:"¿Cuál es la diferencia entre autenticación y autorización, y cómo se implementan en Spring Security?",
options:[
  {label:"Son sinónimos; autenticación y autorización significan lo mismo en seguridad", explain:"Incorrecto. Son conceptos distintos y complementarios: autenticación verifica identidad, autorización verifica permisos."},
  {label:"Autenticación: verificar quién es el usuario (JWT, OAuth2 token). Autorización: verificar qué puede hacer (roles, scopes). En Spring Security: autenticación mediante filtros (JwtAuthenticationFilter), autorización mediante @PreAuthorize('hasRole(\"GERENTE\")') o SecurityFilterChain con .authorizeHttpRequests()", explain:"Correcto. En banca: la autenticación verifica que el token JWT es válido y pertenece a un usuario real. La autorización verifica que ese usuario tiene el rol OPERADOR_PAGOS o el scope transferencias:write para realizar la operación específica que solicita."},
  {label:"Spring Security maneja solo autorización; la autenticación debe implementarse manualmente con filtros propios", explain:"Incorrecto. Spring Security tiene mecanismos completos tanto para autenticación (UsernamePasswordAuthenticationFilter, BearerTokenAuthenticationFilter para JWT/OAuth2) como para autorización."},
  {label:"En microservicios, la autorización se hace en el API Gateway; los microservicios individuales no necesitan @PreAuthorize", explain:"Incorrecto. La defensa en profundidad (defense in depth) recomienda validar tanto en el API Gateway (para requests externos) como en el microservicio (para llamadas internas entre servicios). Un microservicio no debe confiar ciegamente en que el Gateway verificó todo."},
], correct:1},

{cat:"REST & APIs",
q:"¿Cuál es la diferencia entre @PathVariable, @RequestParam y @RequestBody en Spring MVC?",
code:`// ¿Cuál endpoint es correcto para cada caso?
// A: GET /cuentas/{id}
// B: GET /cuentas?tipo=AHORRO&estado=ACTIVA
// C: POST /transferencias (con body JSON)`,
options:[
  {label:"No hay diferencia funcional; las tres anotaciones son intercambiables", explain:"Incorrecto. Son para partes distintas del request HTTP y no son intercambiables."},
  {label:"@PathVariable para A (parte de la URL: /cuentas/{id}); @RequestParam para B (query parameters: ?tipo=AHORRO); @RequestBody para C (cuerpo JSON del request). Usar el incorrecto es un error semántico: datos de identificación en path, filtros/opciones en params, datos de creación/acción en body", explain:"Correcto. La distinción es estándar REST: los identificadores de recursos van en el path (/cuentas/123), los parámetros de filtrado/búsqueda en query params (?estado=ACTIVA), y los datos de la operación en el body. Mezclarlos viola las convenciones REST y puede causar problemas de caching y logging."},
  {label:"@RequestParam solo funciona con GET; para POST siempre usar @RequestBody", explain:"Incorrecto. @RequestParam puede usarse con cualquier método HTTP para parámetros de query (?param=valor) o parámetros de formulario. La restricción es semántica (qué tiene sentido), no técnica."},
  {label:"@PathVariable no es seguro para IDs bancarios; siempre usar @RequestParam para evitar exponer IDs en la URL", explain:"Incorrecto. Exponer IDs en la URL es práctica estándar REST (GET /cuentas/12345). La seguridad se implementa con autenticación/autorización, no ocultando IDs en la URL."},
], correct:1},

// ══════════════ PATRONES PRÁCTICOS ══════════════
{cat:"Patrones Prácticos",
q:"¿Cuándo usarías el patrón Builder en lugar del constructor con múltiples parámetros?",
code:`// Constructor con muchos parámetros (¿qué problema tiene?):
new Transferencia("001", "002", new BigDecimal("5000"),
    "PEN", "BCP", LocalDate.now(), null, null, false, true);`,
options:[
  {label:"Builder es siempre obligatorio cuando hay más de 3 parámetros en el constructor", explain:"Incorrecto. No hay un número mágico. El criterio es si el código es legible y si hay parámetros opcionales o del mismo tipo que pueden confundirse."},
  {label:"Builder resuelve: (1) múltiples parámetros del mismo tipo que pueden intercambiarse sin error de compilación (cuenta origen/destino son ambas String), (2) parámetros opcionales con defaults, (3) legibilidad. Con Builder: Transferencia.builder().cuentaOrigen('001').cuentaDestino('002').monto(...).build()", explain:"Correcto. El constructor del ejemplo tiene dos Strings seguidos, varios nulls, y dos booleans: es fácil intercambiarlos sin que el compilador lo detecte. Builder hace el código autodocumentado y previene errores de orden de parámetros. Lombok @Builder genera esto automáticamente."},
  {label:"Builder es solo útil cuando se usa con Lombok; implementarlo manualmente no vale la pena", explain:"Incorrecto. El patrón Builder tiene valor independientemente de si se usa Lombok o no. Lombok @Builder solo reduce el boilerplate de la implementación manual."},
  {label:"El problema del constructor se resuelve mejor con setters; Builder es over-engineering para la mayoría de casos", explain:"Incorrecto. Los setters hacen el objeto mutable, lo cual es un problema para objetos que deberían ser inmutables (como una Transferencia ya creada). Builder permite objetos inmutables con construcción flexible."},
], correct:1},

{cat:"Patrones Prácticos",
q:"¿Qué problema resuelve el patrón Repository y por qué es importante en una arquitectura limpia bancaria?",
options:[
  {label:"Repository es solo otro nombre para DAO (Data Access Object); son idénticos sin diferencia conceptual", explain:"Incorrecto. DAO es un patrón de acceso a datos genérico centrado en tablas/operaciones CRUD. Repository es un patrón de dominio que habla en términos del modelo de negocio y colecciones de Aggregates."},
  {label:"Abstrae el acceso a datos detrás de una interfaz que habla en términos del dominio (findTransferenciasActivasPorCliente()) en lugar de SQL. Permite: cambiar la implementación de acceso a datos sin modificar la lógica de negocio, testear el dominio con mocks del Repository, y mantener el dominio libre de detalles de infraestructura", explain:"Correcto. En Clean/Hexagonal Architecture, la interfaz ClienteRepository está en el dominio y la implementación JpaClienteRepository está en infraestructura. El servicio de negocio solo conoce la interfaz. En tests, se inyecta un mock o implementación en memoria. Si se cambia de JPA a MongoDB, solo cambia la implementación, no el dominio."},
  {label:"Repository es obligatorio para que Spring Data JPA funcione; sin extender JpaRepository no se puede persistir nada", explain:"Incorrecto. Spring Data JPA con JpaRepository es una implementación conveniente del patrón Repository, pero el patrón en sí es independiente de Spring Data. Se puede tener Repository sin Spring Data."},
  {label:"Repository solo aplica a bases de datos relacionales; para NoSQL o APIs externas se usan otras abstracciones", explain:"Incorrecto. El patrón Repository aplica a cualquier fuente de datos: BD relacional, NoSQL, API REST externa, caché. La abstracción es 'colección de objetos de dominio'; la implementación puede ser cualquier fuente."},
], correct:1},

{cat:"Patrones Prácticos",
q:"¿Cuándo el patrón Strategy es más apropiado que múltiples if/else en un servicio de validación de pagos?",
options:[
  {label:"if/else es siempre preferible a Strategy porque es más simple y directo de leer", explain:"Incorrecto. Para 2-3 condiciones if/else es razonable. Para 5+ tipos con lógica diferente por tipo, Strategy es más mantenible y extensible."},
  {label:"Strategy es apropiado cuando hay múltiples variantes de un algoritmo que cambian independientemente del código que las usa. Ejemplo: ValidadorPagoStrategy con implementaciones ValidadorPagoInterno, ValidadorPagoSUNAT, ValidadorPagoCriptomoneda. Añadir un nuevo tipo de pago = nueva clase, sin modificar el código existente (OCP)", explain:"Correcto. Con if/else, cada nuevo tipo de pago requiere modificar la clase de validación (violando OCP). Con Strategy, se añade una nueva implementación de la interfaz sin tocar el código existente. En banca, los tipos de pago cambian con regulaciones y productos nuevos; Strategy facilita la extensión."},
  {label:"Strategy debe reemplazar todos los if/else en el código; los condicionales son un antipatrón en OOP", explain:"Incorrecto. Los condicionales simples son perfectamente válidos. Strategy aplica cuando la lógica varía significativamente por tipo y hay necesidad de extensión frecuente. No todo if/else necesita refactorizarse a Strategy."},
  {label:"Strategy y Factory son el mismo patrón; elegir uno u otro es preferencia personal", explain:"Incorrecto. Son patrones distintos: Strategy encapsula algoritmos intercambiables en runtime. Factory encapsula la creación de objetos. Se pueden usar juntos (Factory crea la Strategy apropiada)."},
], correct:1},

// ══════════════ JAVA TRAPS ══════════════
{cat:"Java – Trampas Comunes",
q:"¿Por qué comparar Strings con == puede causar bugs en producción aunque funcione en tests?",
code:`String cuenta1 = "BCP-001";      // literal
String cuenta2 = "BCP-001";      // literal
String cuenta3 = new String("BCP-001"); // heap

System.out.println(cuenta1 == cuenta2); // true (String Pool)
System.out.println(cuenta1 == cuenta3); // false (heap)
System.out.println(cuenta1 == getCuentaFromDB()); // ¿?`,
options:[
  {label:"== siempre funciona para comparar Strings; la diferencia entre Pool y heap es solo interna a la JVM", explain:"Incorrecto. == compara referencias (direcciones de memoria), no valores. Dos Strings con el mismo contenido pueden estar en diferentes ubicaciones de memoria."},
  {label:"Los String literals comparten referencia del Pool (== funciona), pero Strings de BD, HTTP responses, o construidos dinámicamente son objetos nuevos en heap (== falla). En tests se usan literales (== funciona), en producción llegan de la BD (== falla). Siempre usar equals()", explain:"Correcto. Este bug clásico pasa todos los tests porque los tests usan literales. En producción, los valores vienen de la BD como new String() y == falla silenciosamente. La regla es simple: para comparar valores de Strings, siempre equals() o equalsIgnoreCase(). Nunca ==."},
  {label:"El comportamiento de == con Strings es igual en tests y producción; si pasa en tests, pasa en producción", explain:"Incorrecto. Los tests tipicamente usan literales hardcodeados que van al String Pool. Los valores de producción vienen de la BD, APIs o se construyen dinámicamente, creando objetos en heap que no comparten referencia con los literales."},
  {label:"String.intern() resuelve el problema; hay que llamarlo en todos los Strings antes de comparar con ==", explain:"Incorrecto. intern() es una optimización de memoria para strings repetitivos, no una práctica recomendada para comparaciones. Internar strings dinámicos (IDs de BD) llenaría el String Pool con millones de entradas. La solución correcta es usar equals()."},
], correct:1},

{cat:"Java – Trampas Comunes",
q:"¿Qué imprime este código y por qué es una trampa común en código bancario?",
code:`Integer a = 100;
Integer b = 100;
Integer c = 200;
Integer d = 200;

System.out.println(a == b); // ?
System.out.println(c == d); // ?`,
options:[
  {label:"Ambos imprimen false porque Integer es un objeto y == compara referencias", explain:"Incorrecto. Para el rango [-128, 127], Integer usa un caché de instancias. a y b apuntan a la misma instancia cacheada."},
  {label:"a==b imprime true (Integer cachea -128 a 127 por defecto; 100 está en el rango); c==d imprime false (200 está fuera del caché, son objetos distintos en heap). Bug real: comparar montos de transacciones o códigos de cuenta con == funciona para valores pequeños y falla silenciosamente para valores mayores. Siempre usar equals() para Integer.", explain:"Correcto. El Integer Cache es una optimización de la JVM para el rango [-128, 127]. Fuera de ese rango, cada autoboxing crea un nuevo objeto. Este bug es especialmente peligroso porque pasa en todos los tests con valores de prueba pequeños y falla en producción con valores reales más grandes."},
  {label:"Ambos imprimen true porque Java cachea todos los Integer automáticamente", explain:"Incorrecto. El caché de Integer solo aplica para [-128, 127]. Fuera de ese rango, cada autoboxing crea un nuevo objeto."},
  {label:"El código no compila porque no se puede usar == con tipos wrapper", explain:"Incorrecto. El compilador permite == con Integer. El problema es semántico (compara referencias, no valores), no de compilación."},
], correct:1},

{cat:"Java – Trampas Comunes",
