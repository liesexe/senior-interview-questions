  {label:"ISP dice que las interfaces deben segregarse por paquetes o módulos, no por funcionalidad", explain:"Incorrecto. ISP es sobre segregación funcional: agrupar métodos según quién los usa, no según en qué paquete están."},
  {label:"ISP solo aplica en lenguajes con herencia múltiple como C++; en Java no es relevante", explain:"Incorrecto. Java tiene implementación múltiple de interfaces, lo que hace ISP muy relevante. Una clase puede implementar múltiples interfaces pequeñas en lugar de una grande, lo cual es un patrón Java idiomático."},
], correct:1},

{cat:"SOLID Principles",
q:"¿Qué establece el Principio de Inversión de Dependencias (DIP) y cómo lo implementa Spring Boot?",
options:[
  {label:"Las clases de alto nivel no deben depender de clases de bajo nivel; ambas deben depender de abstracciones. Spring lo implementa con IoC: en lugar de new Repository(), se inyecta la interfaz IRepository, y Spring decide qué implementación proveer.", explain:"Correcto. DIP es la base del IoC/DI de Spring. Alto nivel (OrderService) depende de IOrderRepository (abstracción), no de JpaOrderRepository (implementación concreta). Esto permite cambiar la implementación de BD sin modificar el servicio, y facilita el mockeo en tests."},
  {label:"Las dependencias deben inyectarse desde los módulos de bajo nivel hacia los de alto nivel", explain:"Incorrecto. Es al revés: los módulos de alto nivel definen las abstracciones (interfaces), y los de bajo nivel las implementan. La dirección de dependencia se invierte respecto al flujo de control."},
  {label:"DIP significa que no se deben usar campos privados; todo debe ser public para facilitar la inyección", explain:"Incorrecto. DIP no tiene relación con visibilidad de campos. La inyección en Spring se hace en campos privados con @Autowired o en constructores, manteniendo encapsulamiento."},
  {label:"DIP solo aplica a la capa de base de datos; las capas de negocio pueden depender de implementaciones concretas", explain:"Incorrecto. DIP aplica a todas las capas. El servicio de negocio no debe depender de clases concretas de infraestructura (JPA, HTTP clients, etc.) sino de interfaces definidas en el dominio."},
], correct:0},

// ══════════ CREATIONAL PATTERNS ══════════
{cat:"Patrones Creacionales",
q:"¿Cuál es el problema principal del patrón Singleton y cómo lo haces thread-safe en Java?",
options:[
  {label:"El problema de Singleton es que consume demasiada memoria; se resuelve con WeakReference", explain:"Incorrecto. El problema principal de Singleton es la seguridad en entornos multihilo y el acoplamiento global, no el consumo de memoria."},
  {label:"Sin sincronización, dos threads pueden crear dos instancias simultáneamente. Solución thread-safe: double-checked locking con volatile, o mejor, usar un enum (garantizado thread-safe por la JVM) o un holder estático (Initialization-on-demand). En Spring, @Component es Singleton por defecto y thread-safe.", explain:"Correcto. El enum Singleton es la forma más idiomática en Java moderno: 'enum Config { INSTANCE; }'. La JVM garantiza que los enums se inicializan una sola vez. En Spring, los beans singleton son gestionados por el contenedor y son thread-safe en cuanto a su creación, aunque el estado mutable compartido sigue siendo responsabilidad del programador."},
  {label:"Singleton es siempre thread-safe en Java porque la JVM sincroniza automáticamente los campos estáticos", explain:"Incorrecto. Los campos estáticos no son thread-safe automáticamente. Sin volatile o sincronización, la creación lazy de un Singleton puede fallar con múltiples threads."},
  {label:"La solución es usar synchronized en todos los métodos de la clase Singleton", explain:"Incorrecto. Sincronizar todos los métodos es excesivo y degrada rendimiento. El problema solo está en la creación de la instancia; una vez creada, el acceso a una referencia es seguro. Double-checked locking o enum son las soluciones precisas."},
], correct:1},

{cat:"Patrones Creacionales",
q:"¿Cuál es la diferencia entre Factory Method y Abstract Factory?",
options:[
  {label:"Factory Method crea familias de objetos relacionados; Abstract Factory crea un solo tipo de objeto", explain:"Incorrecto. Es al revés: Factory Method crea un tipo de objeto (deja la decisión a subclases); Abstract Factory crea familias de objetos relacionados."},
  {label:"Factory Method: define una interfaz para crear un objeto, las subclases deciden qué instanciar (un solo producto). Abstract Factory: crea familias de objetos relacionados sin especificar clases concretas (múltiples productos coordinados). Ejemplo: Abstract Factory para UI: crea Button + Checkbox + TextField consistentes para Windows o Mac.", explain:"Correcto. En banca: Abstract Factory para crear conectores de pago coordinados (HttpClient + Serializer + ErrorHandler) para SUNAT vs para VISA, garantizando que todos los componentes sean compatibles entre sí. Factory Method para crear el tipo correcto de Transaccion según el canal."},
  {label:"Son el mismo patrón con nombres distintos según el libro de GoF y el de Martin Fowler", explain:"Incorrecto. Son patrones distintos en el mismo libro GoF. Factory Method es un patrón de herencia; Abstract Factory es un patrón de composición."},
  {label:"Abstract Factory es obsoleto en Java moderno; se reemplaza completamente con Spring @Bean", explain:"Incorrecto. Abstract Factory sigue siendo relevante como patrón de diseño. Spring @Bean puede implementar el patrón, pero el concepto de crear familias coordinadas de objetos es independiente del framework."},
], correct:1},

{cat:"Patrones Creacionales",
q:"¿Cuándo usarías el patrón Prototype en lugar de new o Builder?",
options:[
  {label:"Prototype se usa cuando la clase tiene solo un constructor; Builder cuando tiene múltiples", explain:"Incorrecto. La elección no depende del número de constructores. Prototype es para clonar objetos existentes con estado."},
  {label:"Prototype cuando necesitas crear copias de objetos complejos con estado ya inicializado, y la creación desde cero es costosa. Ejemplo: clonar una configuración de transacción con muchos parámetros predefinidos para reutilizar como plantilla, modificando solo los campos que cambian.", explain:"Correcto. Prototype implementa Cloneable o un método clone() personalizado. Es útil cuando tienes un objeto 'prototipo' configurado y quieres variantes de él. En banca: una configuración de producto financiero compleja que sirve como plantilla para nuevos productos similares. Cuidado con deep vs shallow copy para campos mutables."},
  {label:"Prototype siempre es más eficiente que new porque evita el constructor", explain:"Incorrecto. Prototype puede ser más eficiente si la inicialización es costosa, pero si el constructor es simple, new puede ser igual o más eficiente. La eficiencia depende del caso específico."},
  {label:"Prototype en Java es el mismo que clonar con SerializationUtils; no hay diferencia", explain:"Incorrecto. Son implementaciones distintas del mismo concepto. Clonar via serialización es más lento pero hace deep copy automático. Cloneable es más rápido pero requiere implementación manual de deep copy para objetos complejos."},
], correct:1},

{cat:"Patrones Creacionales",
q:"¿Qué problema resuelve el patrón Object Pool y cuándo lo aplicarías en Java?",
options:[
  {label:"Object Pool resuelve el problema de objetos inmutables compartidos entre threads", explain:"Incorrecto. Eso describe el patrón Flyweight. Object Pool mantiene objetos reutilizables para evitar creación/destrucción costosa repetida."},
  {label:"Reutiliza objetos costosos de crear en lugar de crearlos/destruirlos repetidamente. Aplicar cuando la creación del objeto es cara (conexiones a BD, threads, parsers XML) y los objetos son reutilizables. HikariCP es un Object Pool de conexiones JDBC.", explain:"Correcto. En banca: el connection pool de HikariCP es la implementación más crítica de Object Pool. Cada conexión a BD tarda ~50-100ms en crearse (handshake TCP, autenticación). Con pool de 20 conexiones reutilizadas, miles de queries las comparten sin overhead de creación. También aplica a pools de threads (ExecutorService) y objetos parser."},
  {label:"Object Pool es lo mismo que caché; ambos almacenan objetos para reutilización futura sin diferencia conceptual", explain:"Incorrecto. La caché almacena resultados de operaciones anteriores para evitar recalcularlos. Object Pool gestiona instancias de objetos costosos de crear, independientemente del resultado que produzcan."},
  {label:"Object Pool no es necesario en Java moderno porque el GC gestiona la memoria automáticamente", explain:"Incorrecto. El GC gestiona la memoria, pero no elimina el overhead de creación de objetos costosos. El tiempo de creación de una conexión a BD es un costo de I/O, no de memoria, que el GC no puede optimizar."},
], correct:1},

// ══════════ STRUCTURAL PATTERNS ══════════
{cat:"Patrones Estructurales",
q:"¿Cuál es la diferencia entre los patrones Adapter y Facade?",
options:[
  {label:"Adapter y Facade son el mismo patrón; solo difieren en el nombre según la capa donde se aplican", explain:"Incorrecto. Son patrones con propósitos distintos: Adapter convierte interfaces incompatibles; Facade simplifica interfaces complejas."},
  {label:"Adapter: convierte la interfaz de una clase en otra que el cliente espera (integración de sistemas incompatibles). Facade: proporciona una interfaz simplificada a un subsistema complejo. Adapter resuelve incompatibilidad; Facade resuelve complejidad.", explain:"Correcto. Ejemplo Adapter: integrar una librería de pagos externa con interfaz diferente a la que tu sistema espera, creando un adaptador que traduce. Ejemplo Facade: PaymentFacade.procesarPago() que internamente coordina validación, cargo, notificación y auditoría, ocultando esa complejidad al llamante."},
  {label:"Facade agrega funcionalidad nueva al objeto adaptado; Adapter solo cambia la interfaz sin agregar lógica", explain:"Incorrecto. Facade generalmente no agrega funcionalidad nueva, solo simplifica el acceso a la existente. Adapter tampoco agrega funcionalidad, solo traduce la interfaz."},
  {label:"Adapter funciona solo en tiempo de compilación; Facade puede usarse en tiempo de ejecución", explain:"Incorrecto. Ambos patrones son decisiones de diseño que operan en tiempo de ejecución. La distinción no es compilación vs ejecución."},
], correct:1},

{cat:"Patrones Estructurales",
q:"¿Cómo funciona el patrón Decorator y en qué se diferencia de la herencia?",
options:[
  {label:"Decorator es equivalente a la herencia pero con mejor sintaxis; son intercambiables en la práctica", explain:"Incorrecto. Decorator y herencia tienen diferencias fundamentales. Decorator permite composición dinámica en runtime; la herencia es estática en tiempo de compilación."},
  {label:"Decorator envuelve un objeto para agregar comportamiento dinámicamente sin modificar la clase original. Ventaja sobre herencia: composición en runtime (puedes aplicar múltiples decoradores en cualquier orden), sin explosión de subclases. Ejemplo: Java I/O Streams usa Decorator extensivamente.", explain:"Correcto. Java I/O: new BufferedReader(new InputStreamReader(new FileInputStream(path))). Cada capa agrega comportamiento (buffering, encoding, file access) sin modificar las clases base. En banca: LoggingDecorator y AuditDecorator sobre cualquier Service sin modificarlos. Con herencia necesitarías LoggingAuditingService, LoggingService, AuditingService... explosión combinatoria."},
  {label:"Decorator solo funciona con interfaces; no puede decorar clases concretas", explain:"Incorrecto. Decorator funciona implementando la misma interfaz que el objeto decorado, o heredando de él. Puede trabajar con clases concretas aunque el patrón es más limpio con interfaces."},
  {label:"El patrón Decorator en Java es solo para Stream de I/O; no tiene otros casos de uso prácticos", explain:"Incorrecto. Decorator tiene amplios casos de uso: Spring Security (cadena de filtros), logging, caching, métricas, validación, transacciones... cualquier comportamiento transversal que quieras agregar dinámicamente."},
], correct:1},

{cat:"Patrones Estructurales",
q:"¿Qué es el patrón Proxy y cuáles son sus principales tipos de uso?",
options:[
  {label:"Proxy es un sinónimo de Facade; ambos proporcionan una interfaz simplificada al objeto real", explain:"Incorrecto. Proxy y Facade tienen propósitos distintos. Facade simplifica acceso a un subsistema complejo. Proxy controla el acceso a un objeto específico, pudiendo agregar lógica antes/después sin simplificar necesariamente."},
  {label:"Proxy controla el acceso a un objeto real, interponiendo lógica sin que el cliente lo sepa. Tipos: Virtual Proxy (lazy loading), Protection Proxy (control de acceso/seguridad), Remote Proxy (acceso a objetos remotos), Caching Proxy. Spring AOP usa Dynamic Proxy para @Transactional y @Cacheable.", explain:"Correcto. Spring @Transactional funciona via Proxy: Spring genera un proxy dinámico de tu servicio que intercepta las llamadas a métodos anotados, abre/cierra transacciones, y delega al objeto real. El llamante no sabe que está hablando con un proxy. Esto es por qué llamar a un método @Transactional desde otro método de la misma clase no funciona: la llamada interna bypasea el proxy."},
  {label:"Proxy solo se usa para llamadas a servicios remotos (REST, gRPC); para objetos locales se usa Decorator", explain:"Incorrecto. Aunque Remote Proxy es un uso común, Proxy tiene múltiples aplicaciones locales: lazy loading, seguridad, logging, caching. Spring AOP usa proxies locales extensivamente."},
  {label:"El patrón Proxy siempre degrada rendimiento y debe evitarse en sistemas de alta concurrencia", explain:"Incorrecto. El overhead de un Dynamic Proxy de Java es mínimo (microsegundos). Los beneficios (separación de concerns, seguridad, transacciones) superan ampliamente ese costo en la mayoría de sistemas."},
], correct:1},

{cat:"Patrones Estructurales",
q:"¿Cuándo usarías el patrón Composite y cuál es su estructura básica?",
options:[
  {label:"Composite se usa cuando necesitas combinar dos objetos de diferente tipo en uno solo", explain:"Incorrecto. Composite es para estructuras de árbol donde los nodos individuales y los grupos se tratan de forma uniforme."},
  {label:"Composite permite tratar objetos individuales y composiciones de objetos de forma uniforme. Estructura: interfaz Component, clase Leaf (nodo hoja), clase Composite (nodo que contiene otros Component). Ejemplo: árbol de categorías de productos bancarios donde una categoría puede contener subcategorías o productos.", explain:"Correcto. Ejemplo clásico: sistema de archivos donde Archivo y Carpeta implementan la misma interfaz FileSystemItem. Carpeta contiene una lista de FileSystemItem (que pueden ser Archivos u otras Carpetas). El cliente llama tamanio() en cualquier nodo sin saber si es hoja o compuesto. En banca: estructura jerárquica de cuentas, grupos de validaciones, menús de permisos."},
  {label:"Composite es lo mismo que una lista (List<T>); Java Collections ya implementa este patrón completamente", explain:"Incorrecto. List<T> es una colección plana. Composite es una estructura de árbol donde los nodos pueden ser hojas o compuestos que contienen otros nodos. La recursividad es la clave del patrón."},
  {label:"Composite solo funciona con herencia; no puede implementarse con interfaces en Java", explain:"Incorrecto. Composite se implementa idealmente con interfaces. El Component es típicamente una interfaz, y tanto Leaf como Composite la implementan."},
], correct:1},

{cat:"Patrones Estructurales",
q:"¿Qué problema resuelve el patrón Flyweight y cuándo lo aplicarías en un sistema bancario?",
options:[
  {label:"Flyweight resuelve problemas de threading compartiendo objetos entre hilos de forma segura", explain:"Incorrecto. Flyweight es sobre eficiencia de memoria, no sobre threading. Comparte el estado intrínseco entre objetos similares para reducir consumo de memoria."},
  {label:"Flyweight reduce uso de memoria compartiendo estado intrínseco (inmutable, independiente del contexto) entre múltiples objetos. El estado extrínseco (específico del contexto) se pasa como parámetro. Ejemplo: tipos de transacción o divisas como objetos Flyweight compartidos entre millones de transacciones.", explain:"Correcto. En un sistema con millones de transacciones, si cada una tiene su propio objeto TipoCambio con todos los datos de la divisa, el consumo de memoria es enorme. Con Flyweight: un pool de objetos Divisa (USD, PEN, EUR) compartidos por todas las transacciones. La transacción almacena solo la referencia al Flyweight + el monto específico. Java usa Flyweight en String Pool y en el Integer Cache."},
  {label:"Flyweight es útil solo cuando tienes menos de 100 objetos; para más objetos usar Prototype", explain:"Incorrecto. Flyweight es especialmente útil cuando tienes MUCHOS objetos del mismo tipo con estado repetido. Con pocos objetos, el patrón no aporta beneficio significativo."},
  {label:"Flyweight y Singleton son el mismo patrón porque ambos garantizan una sola instancia de un objeto", explain:"Incorrecto. Singleton garantiza exactamente una instancia de una clase. Flyweight gestiona un pool de instancias reutilizables; puede haber varios Flyweights distintos (uno por divisa, por ejemplo), no solo uno."},
], correct:1},

{cat:"Patrones Estructurales",
q:"¿Qué es el patrón Bridge y cuándo elegirías Bridge sobre herencia múltiple?",
options:[
  {label:"Bridge es equivalente a herencia múltiple en lenguajes que la soportan; en Java se usa como sustituto", explain:"Incorrecto. Bridge no emula herencia múltiple. Desacopla abstracción de implementación para que ambas puedan variar independientemente."},
  {label:"Bridge desacopla una abstracción de su implementación permitiendo que ambas varíen independientemente. Evita la explosión de subclases cuando tienes dos dimensiones de variación. Ejemplo: Forma (Círculo, Cuadrado) × Color (Rojo, Azul) → sin Bridge: 4 clases; con Bridge: 2+2=4 clases más flexibles.", explain:"Correcto. Sin Bridge: CírculoRojo, CírculoAzul, CuadradoRojo, CuadradoAzul. Con Bridge: Círculo y Cuadrado tienen una referencia a Color (interface). Agregar un nuevo color solo requiere una nueva implementación de Color, no tocar las formas. En banca: Canal (Web, Móvil, API) × TipoPago (Transferencia, Débito) → Bridge evita la explosión combinatoria."},
  {label:"Bridge se usa exclusivamente para conectar dos bases de datos distintas en una misma aplicación", explain:"Incorrecto. Bridge es un patrón de diseño de objetos que no tiene relación específica con bases de datos. El nombre no hace referencia a puentes de datos sino al concepto de tender un puente entre abstracción e implementación."},
  {label:"Bridge y Adapter son idénticos; la diferencia es solo intencional: Bridge se diseña desde el inicio, Adapter arregla código existente", explain:"Incorrecto parcialmente. Aunque hay similitud estructural, Bridge se diseña para que dos jerarquías varíen independientemente. Adapter hace que interfaces incompatibles colaboren. La intención y la estructura difieren."},
], correct:1},

// ══════════ BEHAVIORAL PATTERNS ══════════
{cat:"Patrones de Comportamiento",
q:"¿Cómo funciona el patrón Observer y cuál es la diferencia con el patrón Event Bus?",
options:[
  {label:"Observer y Event Bus son idénticos; Event Bus es solo el nombre moderno de Observer en frameworks", explain:"Incorrecto. Tienen diferencias importantes en el acoplamiento. Observer típicamente acopla observers al subject directamente. Event Bus desacopla completamente publicadores y suscriptores."},
  {label:"Observer: el Subject conoce sus Observers y los notifica directamente (acoplamiento directo). Event Bus: publicadores y suscriptores no se conocen, se comunican vía un mediador central (Guava EventBus, Spring ApplicationEvent). Event Bus es más desacoplado pero más difícil de trazar.", explain:"Correcto. En Spring: ApplicationEventPublisher y @EventListener implementan el patrón de forma desacoplada. El servicio que publica TransactionCompletedEvent no sabe qué clases lo escuchan. Ventaja: agregar nuevos listeners sin modificar el publicador. Desventaja: flujo de control menos obvio, puede dificultar el debugging."},
  {label:"Observer require que los Observers implementen una interfaz; Event Bus no tiene restricciones de tipo", explain:"Incorrecto. Esta es una diferencia de implementación, no conceptual. Ambos pueden implementarse con o sin interfaces. Spring @EventListener no requiere implementar ninguna interfaz."},
  {label:"Observer es solo para cambios de estado en UI (patrón MVC); no aplica en el backend", explain:"Incorrecto. Observer es un patrón general aplicable en cualquier capa. En backend: notificaciones de cambio de estado de transacciones, invalidación de caché, auditoría de eventos de negocio."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Cuándo el patrón Command es más apropiado que llamar métodos directamente?",
options:[
  {label:"Command es siempre más apropiado que los métodos directos porque agrega flexibilidad", explain:"Incorrecto. Command agrega indirección y complejidad. Solo vale la pena cuando necesitas sus ventajas específicas: undo/redo, queuing, logging de operaciones."},
  {label:"Command encapsula una acción como objeto, permitiendo: undo/redo (guardar el comando), queuing (ejecutar más tarde), logging de operaciones (auditoría), y macro-comandos (secuencias). Ejemplo: operaciones bancarias con posibilidad de reversión o cola de transacciones.", explain:"Correcto. En banca: un TransferenciaCommand puede encolarse, reintenarse, revertirse (compensating transaction) e inspeccionarse en auditoría. Si se implementa solo como método transferir(), perderías esas capacidades. Sistemas de trading usan Command extensivamente para audit trail de todas las operaciones."},
  {label:"Command solo aplica cuando se necesita multi-threading; para ejecución sincrónica los métodos directos son suficientes", explain:"Incorrecto. Command tiene valor en ejecución sincrónica: undo/redo en editores, macros, auditoría de operaciones. El multi-threading es uno de los casos pero no el único."},
  {label:"Command y Strategy son el mismo patrón; solo difieren en si se pasa el objeto antes o después de la ejecución", explain:"Incorrecto. Strategy encapsula algoritmos intercambiables (cómo hacer algo). Command encapsula acciones con su contexto (qué hacer y cuándo). Strategy no tiene mecanismo de undo; Command sí puede tenerlo."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Cuál es la diferencia entre Template Method y Strategy para definir algoritmos variables?",
options:[
  {label:"Template Method usa herencia; Strategy usa composición. Template Method define el esqueleto del algoritmo en la superclase con pasos que las subclases sobreescriben. Strategy delega el algoritmo completo a un objeto separado inyectado en runtime.", explain:"Correcto. Template Method: clase abstracta ProcessadorPago con procesarPago() que llama validar() (hook que subclases implementan), cobrar(), notificar(). Strategy: ProcessadorPago recibe una ValidacionStrategy en el constructor. Template Method es menos flexible (herencia estática); Strategy permite cambiar el algoritmo en runtime. GoF dice: 'Template Method usa herencia para variar parte del algoritmo; Strategy usa delegación para variar el algoritmo completo'."},
  {label:"Template Method es más moderno que Strategy; en Java 8+ Template Method se reemplaza con Strategy siempre", explain:"Incorrecto. Ambos tienen casos de uso válidos en Java moderno. Template Method sigue siendo útil cuando tienes un algoritmo con pasos fijos y pasos variables claros. Strategy es mejor cuando el algoritmo completo varía."},
  {label:"Template Method y Strategy son equivalentes; la diferencia es solo si el algoritmo está en la clase o en una interfaz funcional", explain:"Incorrecto. La diferencia es estructural y de acoplamiento: Template Method usa herencia (acoplamiento estático), Strategy usa composición (acoplamiento dinámico). No son equivalentes."},
  {label:"Template Method nunca debe usarse en Java moderno porque promueve la herencia que está considerada un antipatrón", explain:"Incorrecto. La herencia no es un antipatrón; el abuso de la herencia sí lo es. Template Method tiene casos de uso legítimos donde la relación 'es-un' con pasos variables es el modelo correcto."},
], correct:0},

{cat:"Patrones de Comportamiento",
q:"¿Cómo funciona el patrón Chain of Responsibility y cuál es un ejemplo en el ecosistema Java/Spring?",
options:[
  {label:"Chain of Responsibility crea una cadena donde todos los manejadores procesan siempre la solicitud en paralelo", explain:"Incorrecto. En CoR, cada manejador decide si procesa la solicitud o la pasa al siguiente. No es procesamiento paralelo ni garantiza que todos la procesen."},
  {label:"Pasa una solicitud a lo largo de una cadena de manejadores; cada uno decide si la procesa o la pasa al siguiente. Ejemplo: Spring Security FilterChain donde cada filtro procesa autenticación, autorización, logging, y pasa al siguiente o corta la cadena si hay error.", explain:"Correcto. Spring Security es Chain of Responsibility puro: UsernamePasswordAuthenticationFilter → JwtAuthenticationFilter → AuthorizationFilter → ... Cada filtro puede procesar y continuar, o detener la cadena. Servlet FilterChain usa el mismo patrón. En banca: cadena de validaciones de transacción donde cada regla puede aprobar o rechazar."},
  {label:"Chain of Responsibility requiere que el mismo objeto maneje todos los pasos de la cadena", explain:"Incorrecto. Es precisamente lo opuesto: cada paso de la cadena es un manejador diferente con responsabilidad específica. La cadena desacopla el emisor de la solicitud de sus manejadores."},
  {label:"Chain of Responsibility solo sirve para manejo de errores/excepciones; no aplica a flujos normales", explain:"Incorrecto. CoR aplica a cualquier flujo donde múltiples manejadores potenciales procesan una solicitud. El manejo de excepciones de Java (multicatch, jerarquía de excepciones) tiene similitudes pero CoR es más general."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Qué problema resuelve el patrón State y cuándo lo preferirías sobre múltiples if/else?",
options:[
  {label:"State y Strategy son el mismo patrón; solo el nombre cambia según si modelamos comportamiento o estado", explain:"Incorrecto. Aunque son estructuralmente similares, Strategy encapsula algoritmos intercambiables por el cliente. State permite que un objeto cambie su comportamiento según su estado interno, y las transiciones pueden ser automáticas."},
  {label:"State permite que un objeto cambie su comportamiento cuando cambia su estado interno. Preferible a if/else cuando: hay muchos estados con comportamiento diferente, los estados tienen transiciones definidas, la lógica de estado crece y el if/else se vuelve inmanejable. Ejemplo: estados de una Transacción (PENDIENTE, PROCESANDO, COMPLETADA, FALLIDA, REVERTIDA).", explain:"Correcto. Con if/else, cada nuevo estado requiere modificar todos los métodos que preguntan por el estado. Con State: cada estado es una clase que implementa el comportamiento específico. Agregar estado SUSPENDIDA = nueva clase, sin tocar las existentes. En banca los procesos tienen ciclos de vida complejos perfectos para State."},
  {label:"State solo aplica a máquinas de estados finitos teóricas; los sistemas reales son demasiado complejos para usar State", explain:"Incorrecto. Muchos sistemas reales usan State: carritos de compra, pedidos, transacciones, aprobaciones, contratos. La complejidad real es precisamente el argumento para usar State en lugar de if/else que se vuelve inmanejable."},
  {label:"State es menos eficiente que if/else porque crea muchos objetos adicionales", explain:"Incorrecto. El overhead de objetos es negligible frente a los beneficios de mantenibilidad. Si los estados se implementan como singletons (estados sin estado mutable), el overhead es aún menor."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Qué es el patrón Iterator y por qué es importante para el encapsulamiento en colecciones?",
options:[
  {label:"Iterator es redundante en Java moderno porque for-each hace exactamente lo mismo sin necesidad del patrón", explain:"Incorrecto. for-each en Java usa Iterator internamente. El patrón es la base que permite iterar colecciones sin exponer su implementación interna."},
  {label:"Iterator proporciona una forma de acceder secuencialmente a los elementos de una colección sin exponer su representación interna. Permite iterar listas, árboles, grafos con la misma interfaz. Java Iterable/Iterator es la implementación estándar que habilita el for-each.", explain:"Correcto. La clave es el encapsulamiento: el cliente no sabe si itera un ArrayList, LinkedList, TreeSet o una colección personalizada. Todos se comportan igual con Iterator. Permite cambiar la estructura interna sin modificar el código que itera. En banca: iterar resultados paginados de BD como si fueran una colección continua (lazy loading por chunks)."},
  {label:"Iterator solo funciona con listas (List); para Sets y Maps se necesitan otros patrones", explain:"Incorrecto. Iterator funciona con cualquier colección que implemente Iterable. Set, Map.entrySet(), Queue, incluso estructuras personalizadas como árboles pueden implementar Iterator."},
  {label:"El patrón Iterator fue superado por los Streams de Java 8 y ya no debería usarse directamente", explain:"Incorrecto. Streams son una abstracción de nivel superior que usan Iterator internamente. El patrón Iterator sigue siendo relevante para estructuras que no son naturalmente un Stream, para iteración con estado, y como base del sistema de colecciones de Java."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Cuándo usarías el patrón Mediator en lugar de comunicación directa entre objetos?",
options:[
  {label:"Mediator siempre es mejor que la comunicación directa; reduce cualquier tipo de dependencia", explain:"Incorrecto. Mediator centraliza la comunicación pero crea un objeto 'God' que conoce todo. Si se abusa, el Mediator se convierte en el antipatrón God Object."},
  {label:"Mediator reduce la comunicación 'todos con todos' centralizando la interacción en un objeto mediador. Usar cuando: muchos objetos se comunican causando acoplamiento alto, quieres desacoplar remitente y receptor. Ejemplo: Kafka o un Event Bus como mediadores de microservicios.", explain:"Correcto. Sin mediador, en un sistema con 5 microservicios que se llaman entre sí: hasta 20 dependencias directas. Con Kafka como mediador: cada servicio solo conoce Kafka, no a los otros. Facilita agregar nuevos servicios sin modificar los existentes. También aplica a nivel de objetos: un ChatRoom (mediador) entre Users que no se conocen directamente."},
  {label:"Mediator solo aplica a sistemas de mensajería; para objetos Java regulares la comunicación directa es siempre preferible", explain:"Incorrecto. Mediator aplica a cualquier nivel: objetos, clases, módulos, servicios. A nivel de objetos: un EventManager que coordina Form components (fields, buttons) sin que se conozcan directamente."},
  {label:"Mediator y Observer son equivalentes porque ambos desacoplan emisores y receptores", explain:"Incorrecto. Observer tiene un Subject que conoce sus Observers (acoplamiento unidireccional). Mediator centraliza TODA la comunicación; los colegas no se conocen entre sí ni conocen al mediador directamente (solo a través de su interfaz)."},
], correct:1},

// ══════════ ADVANCED & ENTERPRISE PATTERNS ══════════
{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón CQRS y cuándo lo aplicarías en un sistema bancario?",
options:[
  {label:"CQRS significa que los métodos Command deben ser void y los Query deben retornar valor; es solo una convención de nomenclatura", explain:"Incorrecto. CQRS (Command Query Responsibility Segregation) va mucho más allá de una convención. Separa físicamente el modelo de escritura del modelo de lectura, potencialmente con diferentes bases de datos."},
  {label:"CQRS separa el modelo de escritura (Commands: crean/modifican estado) del modelo de lectura (Queries: consultan sin modificar). Beneficio: cada lado puede optimizarse independientemente. En banca: writes en BD transaccional normalizada, reads en réplica desnormalizada o caché optimizada para reportes.", explain:"Correcto. En sistemas bancarios de alto volumen: las transferencias (Commands) necesitan consistencia ACID en BD relacional. Los reportes y consultas de saldo (Queries) pueden servirse desde una réplica desnormalizada o Elasticsearch optimizado para búsqueda. CQRS también facilita Event Sourcing y escala independiente de lecturas vs escrituras."},
  {label:"CQRS solo aplica en arquitecturas serverless; para microservicios tradicionales el patrón Repository es suficiente", explain:"Incorrecto. CQRS aplica en cualquier arquitectura donde lecturas y escrituras tienen requisitos de rendimiento, consistencia o escala diferentes. Es especialmente valioso en microservicios con alto volumen de lecturas."},
  {label:"CQRS es un antipatrón porque duplica el modelo de datos y aumenta la complejidad innecesariamente", explain:"Incorrecto. CQRS añade complejidad deliberadamente a cambio de beneficios claros. Para sistemas simples puede ser over-engineering. Para sistemas con lecturas masivas o modelos de lectura/escritura muy diferentes, los beneficios superan la complejidad."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Outbox y qué problema de consistencia resuelve en microservicios?",
options:[
  {label:"Outbox es un patrón de correo electrónico para gestionar notificaciones asíncronas en microservicios", explain:"Incorrecto. Outbox Pattern (Transactional Outbox) resuelve el problema de garantizar consistencia entre una transacción de BD y el envío de un evento a Kafka/mensajería."},
  {label:"Resuelve el problema de publicar eventos a Kafka ATÓMICAMENTE con la transacción de BD. En lugar de publicar a Kafka directamente (puede fallar después del commit de BD), se escribe el evento en una tabla 'outbox' dentro de la misma transacción. Un proceso separado lee la outbox y publica a Kafka.", explain:"Correcto. Sin Outbox: si el pago se registra en BD y luego el envío a Kafka falla, el evento se pierde. Con Outbox: pago + evento_outbox en la misma transacción ACID. Si Kafka falla, el registro en outbox persiste y se reintenta. Garantiza 'at-least-once delivery'. Debezium es una implementación popular via CDC."},
  {label:"Outbox Pattern requiere dos bases de datos separadas: una para los datos y otra para los eventos", explain:"Incorrecto. La clave del Outbox es que la tabla outbox está en la MISMA base de datos que los datos de negocio, lo que permite incluirla en la misma transacción ACID."},
  {label:"Outbox es lo mismo que Inbox Pattern; son sinónimos que describen el mismo mecanismo de mensajería", explain:"Incorrecto. Son patrones complementarios pero distintos. Outbox garantiza que el productor envía el evento consistentemente. Inbox (idempotent consumer) garantiza que el consumidor procesa el evento exactamente una vez."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es Event Sourcing y cómo difiere del modelo de datos CRUD tradicional?",
options:[
  {label:"Event Sourcing es simplemente loguear todos los cambios de BD en un archivo de log para auditoría", explain:"Incorrecto. Event Sourcing es el modelo de datos principal, no un sistema de auditoría secundario. El estado actual se deriva de la secuencia de eventos, no se almacena directamente."},
  {label:"Event Sourcing almacena secuencias de eventos inmutables en lugar del estado actual. El estado se reconstruye reproduciendo los eventos. Ventajas: audit trail completo, posibilidad de reconstruir estado en cualquier punto del tiempo, base natural para CQRS. En banca: ideal para el libro mayor (ledger).", explain:"Correcto. CRUD: tabla Cuenta con columna saldo=1000 (el estado actual). Event Sourcing: eventos [DepósitoRealizado(500), TransferenciaEnviada(200), CargoCuota(50)] → saldo=250. Ventajas: nunca se pierde historia, se puede auditar cada centavo, se puede 'rebobinar' el tiempo. La banca tradicional siempre usó event sourcing en el sentido contable: el saldo es la suma de todos los movimientos."},
  {label:"Event Sourcing y CRUD son igualmente eficientes; la elección es solo de preferencia del equipo", explain:"Incorrecto. Event Sourcing tiene trade-offs reales: reconstruir estado leyendo todos los eventos es más lento que consultar el estado actual en CRUD. Se mitiga con snapshots. La elección debe basarse en los requisitos de auditoría y consistencia."},
  {label:"Event Sourcing solo funciona con bases de datos NoSQL; SQL Server no puede implementarlo", explain:"Incorrecto. Event Sourcing puede implementarse en cualquier base de datos que permita escrituras inmutables (append-only). SQL Server puede usarse perfectamente con una tabla de eventos con inserts y sin updates/deletes."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Bulkhead y cómo previene la propagación de fallos en microservicios?",
options:[
  {label:"Bulkhead es un sinónimo de Circuit Breaker; ambos patrones hacen lo mismo con diferentes nombres", explain:"Incorrecto. Son patrones complementarios. Circuit Breaker corta la comunicación con un servicio que falla. Bulkhead aisla los recursos para que un fallo en un área no consuma los recursos de otras áreas."},
  {label:"Bulkhead aísla partes del sistema en 'compartimentos estancos' para que el fallo de uno no agote los recursos del total. Ejemplo: usar pools de threads separados para llamadas a SUNAT, RENIEC y el core bancario. Si SUNAT se vuelve lento, solo su pool se satura, no afecta a RENIEC.", explain:"Correcto. Sin Bulkhead: un único ThreadPool para todas las llamadas externas. Si SUNAT se vuelve lento (200 requests esperando), agota el pool y las llamadas a RENIEC también se bloquean. Con Bulkhead: pool separado con límite de 20 threads para SUNAT. Si se satura, SUNAT falla rápido pero RENIEC sigue operando con su propio pool. Resilience4j implementa Bulkhead."},
  {label:"Bulkhead solo aplica a bases de datos; para servicios HTTP se usa Circuit Breaker exclusivamente", explain:"Incorrecto. Bulkhead aplica a cualquier recurso limitado: threads, conexiones, memoria. El concepto es universal: aislar el consumo de recursos para prevenir cascada de fallos."},
  {label:"Bulkhead es un patrón de Kubernetes para aislar namespaces; no aplica al diseño de aplicaciones Java", explain:"Incorrecto. Bulkhead es un patrón de diseño de aplicaciones. Resilience4j, Hystrix e Istio lo implementan a nivel de aplicación. Kubernetes tiene conceptos similares (resource quotas) pero son independientes."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Cuáles son los anti-patrones más comunes en microservicios y cómo los identificas?",
options:[
  {label:"Los microservicios no tienen anti-patrones porque su naturaleza distribuida resuelve todos los problemas de arquitectura monolítica", explain:"Incorrecto. Los microservicios introducen su propia categoría de anti-patrones además de preservar algunos del monolito."},
  {label:"Principales anti-patrones: Distributed Monolith (microservicios acoplados que deben desplegarse juntos), Shared Database (múltiples servicios acceden a la misma BD), Chatty Services (demasiadas llamadas HTTP entre servicios), God Service (un servicio hace demasiado), y Nano-services (servicios demasiado pequeños sin valor propio).", explain:"Correcto. Distributed Monolith: tienes la complejidad de los microservicios sin sus beneficios. Shared Database: elimina la autonomía del servicio (cambiar el esquema afecta a todos). Chatty Services: N+1 queries a nivel de servicios (resolver con API composition o BFF). God Service: viola SRP a nivel de servicio. En banca, el 'servicio de clientes' que hace validación, scoring, KYC y reporting es un God Service."},
  {label:"El único anti-patrón real en microservicios es usar una base de datos SQL en lugar de NoSQL", explain:"Incorrecto. La elección SQL vs NoSQL no define si es un anti-patrón. Los anti-patrones son problemas de diseño arquitectural independientes del motor de base de datos."},
  {label:"Los anti-patrones de microservicios solo aplican a sistemas con más de 50 servicios; para sistemas pequeños cualquier diseño es válido", explain:"Incorrecto. Los anti-patrones pueden aparecer desde el primer servicio. Un Shared Database entre 3 servicios es tan problemático como entre 50. La escala no define si es un anti-patrón."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Saga y cuándo elegirías Orquestación vs Coreografía?",
options:[
  {label:"Saga es un patrón de Kubernetes para orquestar pods; no está relacionado con transacciones de aplicación", explain:"Incorrecto. Saga es un patrón de diseño para transacciones distribuidas que abarca múltiples microservicios con bases de datos independientes."},
  {label:"Saga maneja transacciones distribuidas como secuencia de transacciones locales con compensaciones en caso de fallo. Orquestación: un coordinador central (Saga Orchestrator) dirige los pasos. Coreografía: cada servicio reacciona a eventos y emite los suyos. Orquestación: más control y trazabilidad. Coreografía: más desacoplado pero difícil de trazar.", explain:"Correcto. Orquestación es mejor para: flujos complejos con muchas reglas de negocio, cuando necesitas trazabilidad clara, equipos que prefieren control centralizado. Coreografía para: flujos simples, cuando el desacoplamiento es prioritario. En banca: el proceso de apertura de cuenta (validar identidad → verificar score crediticio → crear cuenta → notificar) se beneficia de Orquestación por su complejidad y necesidad de auditoría."},
  {label:"Orquestación y Coreografía son igualmente complejas; la elección es solo estética", explain:"Incorrecto. Tienen trade-offs distintos: Orquestación crea acoplamiento al orquestador pero simplifica el debugging. Coreografía desacopla pero complica la trazabilidad (¿qué pasó exactamente?). La elección tiene implicaciones reales en mantenibilidad."},
  {label:"Saga solo funciona con Kafka; sin Kafka no es posible implementar transacciones distribuidas", explain:"Incorrecto. Saga puede implementarse con cualquier mecanismo de mensajería o incluso llamadas síncronas. Kafka es popular para Saga pero no es requisito. Axon Framework, Temporal, o implementaciones custom con Spring Events también funcionan."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Repository vs DAO (Data Access Object) y cuándo preferirías cada uno?",
options:[
  {label:"Repository y DAO son idénticos; Repository es simplemente el nombre moderno de DAO en arquitecturas DDD", explain:"Incorrecto. Tienen diferencias conceptuales importantes en abstracción y el lenguaje que usan."},
  {label:"DAO: abstracción centrada en la tabla/fuente de datos, habla en términos de CRUD genérico. Repository: abstracción centrada en el dominio, habla en términos de colecciones de Aggregates de negocio (findClientesPorRiesgoAlto()). Repository oculta completamente la fuente de datos; DAO tiende a exponerla.", explain:"Correcto. DAO típico: getById(Long id), save(Entity e), delete(Long id). Repository de dominio: findTransaccionesSospechosasPorPeriodo(), obtenerClientesConSaldoNegativo(). El repositorio habla el lenguaje del negocio. En Clean/Hexagonal Architecture, Repository vive en el dominio como interfaz; DAO/JPA es la implementación de infraestructura."},
  {label:"DAO es preferible a Repository porque es más genérico y reutilizable entre proyectos", explain:"Incorrecto. La genericidad de DAO es precisamente su limitación: obliga a la lógica de negocio a conocer detalles de persistencia. Repository específico del dominio encapsula mejor esa lógica."},
  {label:"Repository solo puede usarse con Spring Data JPA; para otras tecnologías de acceso a datos se debe usar DAO", explain:"Incorrecto. Repository es un patrón de diseño independiente del framework. Puedes implementar un Repository usando JDBC puro, MyBatis, MongoDB, o cualquier tecnología de acceso a datos."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Circuit Breaker y cómo funcionan sus tres estados?",
options:[
  {label:"Circuit Breaker tiene dos estados: Encendido (acepta llamadas) y Apagado (rechaza todo); no hay estado intermedio", explain:"Incorrecto. Circuit Breaker tiene tres estados. El estado intermedio (Half-Open) es crucial para la recuperación gradual del servicio."},
  {label:"Closed (normal, acepta llamadas y monitorea fallos) → Open (demasiados fallos, rechaza llamadas sin intentarlas, devuelve fallback) → Half-Open (después de timeout, permite algunas llamadas de prueba) → vuelve a Closed si tienen éxito o a Open si fallan.", explain:"Correcto. El Circuit Breaker evita llamar a un servicio que sabemos que está fallando (fail fast). Sin él: cada request espera el timeout completo (ej: 5s) → todos los threads bloqueados → cascada de fallos. Con Circuit Breaker abierto: respuesta inmediata con fallback, liberando threads para otras operaciones. Resilience4j y Spring Cloud Circuit Breaker lo implementan."},
  {label:"Circuit Breaker solo aplica para llamadas a bases de datos; para servicios HTTP se usa Rate Limiting", explain:"Incorrecto. Circuit Breaker aplica a cualquier llamada que puede fallar: HTTP, BD, colas de mensajes, cualquier I/O. Es especialmente importante para servicios externos lentos o inestables."},
  {label:"El estado Half-Open es temporal y ocurre durante el proceso de actualización del microservicio; no es parte del patrón Circuit Breaker", explain:"Incorrecto. Half-Open es un estado formal del patrón, no relacionado con deployments. Es el mecanismo de 'sonda' que permite al Circuit Breaker determinar si el servicio se ha recuperado antes de volver al estado Closed."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es Clean Architecture y cómo se relacionan sus capas con la Arquitectura Hexagonal?",
options:[
  {label:"Clean Architecture y Hexagonal Architecture son nombres distintos para exactamente el mismo patrón sin ninguna diferencia", explain:"Incorrecto. Son similares en principios pero con diferente terminología y énfasis. Clean Architecture (Uncle Bob) tiene capas concéntricas explícitas. Hexagonal (Ports & Adapters, Alistair Cockburn) tiene el concepto de puertos y adaptadores."},
  {label:"Ambas ponen el dominio en el centro aislado de infraestructura. Clean Architecture: Entities → Use Cases → Interface Adapters → Frameworks. Hexagonal: Domain ↔ Ports (interfaces) ↔ Adapters (implementaciones). La Regla de Dependencia: las capas externas dependen de las internas, nunca al revés.", explain:"Correcto. La Regla de Dependencia es el corazón: el dominio no importa nada de Spring, JPA, o HTTP. En código: PaymentService (dominio) usa IPaymentRepository (puerto/interfaz), no JpaPaymentRepository (adaptador). Esto permite: cambiar JPA por MongoDB sin tocar el dominio, testear el dominio sin BD, deployar el dominio como microservicio o monolito sin cambios."},
  {label:"Clean Architecture requiere exactamente 4 capas; usar más o menos capas viola el patrón", explain:"Incorrecto. Clean Architecture es un principio (la Regla de Dependencia y separación de concerns), no un número exacto de capas. Los proyectos pueden adaptar la cantidad de capas según la complejidad."},
  {label:"En Clean Architecture, el dominio puede importar directamente clases de Spring para facilitar el desarrollo", explain:"Incorrecto. El dominio es la capa más interna y no debe depender de frameworks externos como Spring. Las anotaciones de Spring (@Entity, @Transactional) en el dominio violan la independencia de frameworks que define Clean Architecture."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué patrón usarías para implementar auditoría automática en todos los endpoints de un sistema bancario sin duplicar código?",
options:[
  {label:"Copiar y pegar el código de auditoría en cada método que lo necesite; es la forma más explícita y controlable", explain:"Incorrecto. Duplicar código de auditoría viola DRY y SRP. Con cientos de endpoints, es inmanejable y propenso a errores (endpoints que se olvidan de auditar)."},
  {label:"AOP (Aspect-Oriented Programming) con @Around advice en Spring: un aspecto intercepta todos los métodos anotados o en paquetes específicos, registra la auditoría sin que los métodos sepan que están siendo auditados. Decorator Pattern es la alternativa sin AOP.", explain:"Correcto. Spring AOP: @Aspect + @Around('@annotation(Auditable)') captura el método, el usuario autenticado del SecurityContext, los parámetros, el resultado, y persiste el registro de auditoría. Los servicios de negocio solo llevan @Auditable en los métodos críticos. Alternativa: Decorator que envuelve cada servicio con lógica de auditoría, inyectando el decorador en lugar del servicio original."},
  {label:"Usar herencia: crear una clase BaseService con el método de auditoría y heredar todos los servicios de ella", explain:"Incorrecto. Esto viola SRP (BaseService mezcla negocio con auditoría), crea acoplamiento fuerte por herencia, y no funciona si los servicios ya heredan de otra clase. AOP es más flexible y menos invasivo."},
  {label:"Un filter HTTP que intercepta todos los requests; es la única forma de auditar sin modificar los servicios", explain:"Incorrecto. Un filter HTTP audita a nivel de HTTP request (URL, headers, status code) pero no tiene acceso a los objetos de dominio ni al contexto de negocio que AOP puede capturar. Ambos son complementarios, no excluyentes."},
], correct:1},


// ══════════ MORE CREATIONAL ══════════
{cat:"Patrones Creacionales",
q:"¿Cuál es la diferencia entre Builder y el uso de setters para construir objetos complejos?",
options:[
  {label:"Builder y setters son equivalentes; la elección es solo estilo de código", explain:"Incorrecto. Builder permite objetos inmutables una vez construidos; los setters mantienen el objeto mutable."},
  {label:"Builder garantiza que el objeto esté completamente inicializado antes de usarse y permite inmutabilidad (sin setters post-construcción). Los setters permiten construcción incremental pero el objeto puede estar en estado inválido entre llamadas. Builder también previene mezclar parámetros del mismo tipo.", explain:"Correcto. Ejemplo: new Transferencia.Builder().origen('001').destino('002').monto(BigDecimal.TEN).build(). Objeto inmutable después del build(). Con setters: si se olvida setMonto(), el objeto queda en estado inválido."},
  {label:"Builder siempre es más lento que setters porque crea un objeto Builder adicional en memoria", explain:"Incorrecto. El overhead del Builder es mínimo. La elección debe basarse en inmutabilidad y claridad, no en micro-optimizaciones."},
  {label:"Builder solo es útil con Lombok; implementarlo manualmente no tiene sentido en proyectos modernos", explain:"Incorrecto. Entender el patrón Builder es esencial incluso si Lombok lo genera, para saber cuándo y por qué usarlo."},
], correct:1},

{cat:"Patrones Creacionales",
q:"¿Qué es el anti-patrón Service Locator y por qué se prefiere Dependency Injection?",
options:[
  {label:"Service Locator es el patrón base de Spring IoC; es la mejor práctica para obtener dependencias", explain:"Incorrecto. Spring usa Dependency Injection. Service Locator es cuando el objeto busca activamente sus dependencias, lo opuesto a DI."},
  {label:"Service Locator: los objetos llaman a un registro central para obtener sus dependencias. Es anti-patrón porque oculta dependencias (no visibles en el constructor), dificulta el testing y crea acoplamiento oculto al localizador. DI hace las dependencias explícitas.", explain:"Correcto. Con Service Locator las dependencias son invisibles. En tests debes configurar el localizador antes de instanciar (setup oculto). Con DI por constructor: dependencias explícitas, se inyectan directamente en tests. Usar ApplicationContext.getBean() desde código de negocio es el anti-patrón."},
  {label:"Service Locator es obligatorio para obtener beans de Spring en clases no gestionadas por el contenedor", explain:"Incorrecto. La necesidad indica un problema de diseño. La solución es rediseñar para que esas clases sean gestionadas por Spring o reciban dependencias por constructor."},
  {label:"Service Locator y Dependency Injection son equivalentes; Spring usa ambos internamente", explain:"Incorrecto. Son enfoques opuestos: DI el contenedor inyecta (pasivo), Service Locator el objeto busca activamente sus dependencias."},
], correct:1},

// ══════════ MORE STRUCTURAL ══════════
{cat:"Patrones Estructurales",
q:"¿Cuándo usarías Decorator vs configurar comportamiento en el constructor?",
options:[
  {label:"Decorator es siempre mejor que el constructor porque agrega comportamiento sin modificar la clase", explain:"Incorrecto. Para comportamiento fijo en tiempo de compilación, el constructor puede ser más simple. Decorator brilla cuando el comportamiento debe componerse dinámicamente."},
  {label:"Decorator cuando necesitas combinar comportamientos dinámicamente en runtime (logging + caching + retry en cualquier orden). Constructor cuando el comportamiento es fijo y conocido en tiempo de diseño.", explain:"Correcto. Ejemplo: CachingPaymentRepository decorando JpaPaymentRepository, decorado por LoggingPaymentRepository. En producción: Logging+Caching. En tests: implementación base sin decoradores. La composición es flexible y reversible."},
  {label:"Decorator no puede usarse con clases final; para clases finales siempre usar herencia", explain:"Incorrecto. Las clases final no pueden heredarse, precisamente por eso Decorator (composición) es la alternativa: se envuelve la instancia en un wrapper que implementa la misma interfaz."},
  {label:"Decorator y AOP hacen lo mismo; en proyectos Spring siempre usar AOP y evitar Decorator", explain:"Incorrecto. Son complementarios. AOP es mejor para concerns transversales transparentes. Decorator cuando quieres control explícito sobre la composición y el orden de las capas."},
], correct:1},

// ══════════ MORE BEHAVIORAL ══════════
{cat:"Patrones de Comportamiento",
q:"¿Qué es el patrón Visitor y cuándo lo aplicarías en reportes bancarios?",
options:[
  {label:"Visitor es un anti-patrón que viola el encapsulamiento; nunca debe usarse en producción", explain:"Incorrecto. Visitor es un patrón GoF válido. Viola encapsulamiento deliberadamente para agregar operaciones a estructuras de objetos sin modificarlas."},
  {label:"Visitor permite agregar nuevas operaciones a una estructura de objetos sin modificar las clases elemento. Útil cuando la estructura es estable pero las operaciones cambian. Ejemplo: PdfReportVisitor, ExcelReportVisitor, JsonReportVisitor para jerarquía de transacciones bancarias.", explain:"Correcto. Sin Visitor: cada formato de reporte requiere modificar todas las clases de transacción (viola OCP). Con Visitor: agregar nuevo formato = nueva clase Visitor sin tocar las transacciones. Trade-off: agregar nuevo tipo de transacción requiere modificar todos los Visitors."},
  {label:"Visitor es lo mismo que Iterator; ambos recorren colecciones aplicando operaciones", explain:"Incorrecto. Iterator recorre colecciones elemento por elemento. Visitor aplica operaciones a estructuras heterogéneas con lógica específica por tipo de elemento."},
  {label:"Visitor solo funciona con árboles; para listas usar Strategy o Command", explain:"Incorrecto. Visitor funciona con cualquier estructura de objetos con tipos distintos: árboles, grafos, colecciones heterogéneas."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Qué es el patrón Memento y su caso de uso principal?",
options:[
  {label:"Memento es lo mismo que Serialization de Java; ambos guardan el estado para recuperarlo después", explain:"Incorrecto. Serialization es un mecanismo. Memento es un patrón que puede usar serialización pero su propósito específico es undo/redo manteniendo encapsulamiento."},
  {label:"Memento captura el estado interno de un objeto sin violar encapsulamiento para poder restaurarlo. Caso principal: undo/redo. Ejemplo: historial de ediciones de una solicitud de crédito con posibilidad de deshacer cambios.", explain:"Correcto. El Originator crea el Memento y puede restaurarlo; el Caretaker lo almacena sin poder inspeccionar su contenido (encapsulamiento preservado). En banca: undo en formularios de solicitud de préstamo, snapshots de configuraciones antes de cambios."},
  {label:"Memento es obsoleto porque los Records inmutables reemplazan su funcionalidad", explain:"Incorrecto. Records son inmutables por definición. Memento aplica a objetos con estado mutable que necesita ser capturado en puntos específicos para posible restauración."},
  {label:"Memento viola el encapsulamiento porque expone el estado interno al Caretaker", explain:"Incorrecto. El diseño del Memento preserva el encapsulamiento: el Caretaker almacena el Memento como objeto opaco sin acceder a su contenido."},
], correct:1},

// ══════════ DESIGN PRINCIPLES ══════════
{cat:"SOLID Principles",
q:"¿Cuáles son los principios DRY, KISS y YAGNI y cómo los aplicas en código bancario?",
options:[
  {label:"DRY, KISS y YAGNI son solo convenciones de nomenclatura; no son principios de diseño", explain:"Incorrecto. Son principios fundamentales de ingeniería de software que guían decisiones de diseño y arquitectura."},
  {label:"DRY: cada pieza de conocimiento con una única representación. KISS: prefiere la solución más simple. YAGNI: no implementes funcionalidad hasta que sea necesaria. En banca: extraer validación de monto (DRY), evitar abstracciones prematuras (KISS), no agregar caché hasta que el performance lo requiera (YAGNI).", explain:"Correcto. DRY: la regla de validación de límite de transferencia repetida en 3 controladores → extraer a ValidadorTransferencia. KISS: un if/else simple vs cadena de responsabilidad para 2 casos. YAGNI: no implementar multi-tenant desde el inicio si solo hay un cliente."},
  {label:"YAGNI dice que debes implementar todas las funcionalidades posibles desde el inicio para evitar refactoring futuro", explain:"Incorrecto. YAGNI dice lo contrario: no implementes lo que no necesitas ahora. El código no escrito no tiene bugs y no requiere mantenimiento."},
  {label:"DRY significa que cada clase debe tener un solo archivo; no aplica a la lógica de negocio", explain:"Incorrecto. DRY es sobre conocimiento y lógica, no sobre archivos."},
], correct:1},

{cat:"SOLID Principles",
q:"¿Cómo identificas y corriges una violación del Principio de Inversión de Dependencias en Spring?",
options:[
  {label:"Una violación de DIP es siempre un error de compilación; el compilador lo detecta", explain:"Incorrecto. Las violaciones de DIP son errores de diseño, no de compilación. El código compila y funciona pero es difícil de testear y mantener."},
  {label:"Violación: OrderService crea new JpaOrderRepository() internamente. Corrección: interfaz IOrderRepository en el dominio, inyectarla por constructor. Spring inyecta JpaOrderRepository en producción, MockOrderRepository en tests, sin cambiar OrderService.", explain:"Correcto. Señales de violación: new ConcreteClass() en el código de negocio, importar clases de infraestructura (javax.persistence) en la capa de dominio. El dominio debe ser independiente del framework."},
  {label:"DIP se viola solo cuando usas @Autowired en lugar de constructor injection", explain:"Incorrecto. La forma de inyección no define la violación. El problema es depender de implementaciones concretas en lugar de abstracciones."},
  {label:"DIP no aplica en Spring Boot porque el framework gestiona todas las dependencias", explain:"Incorrecto. Spring gestiona la inyección pero el desarrollador define de qué depende cada clase. Depender de clase concreta en lugar de interfaz viola DIP aunque Spring lo inyecte."},
], correct:1},

// ══════════ ENTERPRISE PATTERNS ══════════
{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Strangler Fig y cuándo lo aplicarías en migración de monolito a microservicios?",
options:[
  {label:"Strangler Fig es una técnica de testing donde se reemplaza el código antiguo con mocks progresivamente", explain:"Incorrecto. Strangler Fig es un patrón de migración de sistemas legacy, no de testing."},
  {label:"Strangler Fig migra gradualmente un monolito envolviendo funcionalidades con nuevos microservicios. El API Gateway enruta: funcionalidades migradas al microservicio nuevo, el resto al monolito. Migración incremental y reversible sin big bang rewrite.", explain:"Correcto. Proceso: 1) Poner proxy delante del monolito. 2) Implementar módulo (ej: pagos) como microservicio. 3) Redirigir /pagos al nuevo servicio. 4) Verificar. 5) Repetir. En banca: migrar el módulo de transferencias sin dejar de operar el sistema core."},
  {label:"Strangler Fig requiere reescribir todo el sistema antes de hacer el switch a producción", explain:"Incorrecto. La característica principal de Strangler Fig es precisamente evitar el 'big bang rewrite'. La migración es incremental, módulo por módulo."},
  {label:"Strangler Fig solo aplica para migrar de Java a otro lenguaje", explain:"Incorrecto. Aplica a cualquier migración incremental: cambio de arquitectura, lenguaje o plataforma."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón API Gateway y qué funciones cumple en microservicios bancarios?",
options:[
  {label:"API Gateway es solo un load balancer que distribuye tráfico entre instancias", explain:"Incorrecto. Un load balancer distribuye carga entre instancias del mismo servicio. API Gateway es mucho más rico."},
  {label:"Punto de entrada único. Funciones: autenticación/autorización centralizada, rate limiting, routing, transformación de requests/responses, SSL termination, logging, circuit breaking y agregación (BFF). En banca: verifica JWT, aplica rate limiting, enruta a microservicios, loguea con Correlation ID.", explain:"Correcto. Sin gateway: cada microservicio implementaría autenticación por separado. AWS API Gateway, Azure APIM, Kong y Spring Cloud Gateway son implementaciones comunes."},
  {label:"API Gateway aumenta la latencia significativamente y no debe usarse en sistemas bancarios", explain:"Incorrecto. El overhead de un API Gateway bien configurado es ~1-5ms. Los beneficios superan ese costo mínimo."},
  {label:"API Gateway reemplaza completamente a los microservicios", explain:"Incorrecto. Es una capa de entrada que enruta a los microservicios backend. No contiene lógica de negocio."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Idempotent Consumer y por qué es crítico en sistemas de pagos con Kafka?",
options:[
  {label:"Idempotent Consumer significa que Kafka descarta automáticamente mensajes duplicados", explain:"Incorrecto. Kafka no garantiza exactly-once por defecto. El Idempotent Consumer es implementado en el consumidor para manejar mensajes duplicados."},
  {label:"Garantiza que procesar el mismo mensaje múltiples veces produce el mismo resultado que procesarlo una vez. Implementación: tabla de IDs procesados; antes de procesar verificar si el eventId ya existe. Si sí, descartar. Si no, procesar y registrar. Atómico en la misma transacción de BD.", explain:"Correcto. Con Kafka at-least-once delivery, un pago podría procesarse dos veces. La tabla 'processed_events' registra el eventId de cada pago. El segundo intento encuentra el ID y se descarta sin cobrar. La verificación y registro deben ser atómicos."},
  {label:"La solución es siempre usar exactly-once semantics (EOS); el Idempotent Consumer es un workaround innecesario", explain:"Incorrecto. EOS tiene overhead y requiere configuración compleja. Idempotent Consumer es más simple y funciona con cualquier sistema de mensajería."},
  {label:"Idempotent Consumer solo aplica a Kafka; para REST APIs los duplicados no son problema", explain:"Incorrecto. Los duplicados son problema en cualquier comunicación distribuida. La Idempotency-Key en REST APIs es el equivalente para HTTP."},
], correct:1},


{cat:"Patrones de Comportamiento",
q:"¿Cuál es la diferencia entre Strategy y State, aunque sean estructuralmente similares?",
options:[
  {label:"Son idénticos; el nombre depende del libro de referencia", explain:"Incorrecto. Son estructuralmente similares pero con intenciones y dinámicas muy distintas."},
  {label:"Strategy: el cliente elige y controla el algoritmo externamente. State: el objeto gestiona sus propias transiciones internamente de forma automática. Strategy = algoritmo intercambiable por el cliente; State = máquina de estados interna.", explain:"Correcto. Strategy: el cliente inyecta ValidacionFraudeStrategy; el servicio no sabe cuál tiene. State: Transaccion en estado PENDIENTE transiciona a PROCESANDO internamente al llamar procesar(). La diferencia clave: quién controla el cambio y si hay transiciones automáticas."},
  {label:"Strategy permite múltiples estrategias activas simultáneamente; State solo permite un estado a la vez", explain:"Incorrecto. Aunque es cierto que hay un estado activo a la vez, esta no es la distinción conceptual principal."},
  {label:"State requiere interfaces; Strategy puede implementarse con lambdas. Esa es la única diferencia en Java moderno", explain:"Incorrecto. Ambos pueden implementarse con interfaces o lambdas. La diferencia es conceptual: quién controla el cambio."},
], correct:1},

{cat:"Patrones de Comportamiento",
q:"¿Qué es el patrón Specification y cómo lo usas para filtros dinámicos en JPA?",
options:[
  {label:"Specification es solo el nombre de Spring Data para los métodos de JpaRepository", explain:"Incorrecto. Specification es un patrón de dominio (DDD) para encapsular reglas de negocio combinables. Spring Data JPA lo implementa pero el concepto es independiente del framework."},
  {label:"Encapsula un criterio de negocio como objeto combinable (AND, OR, NOT). En JPA: implementar Specification<T> por criterio (PorMonto, PorFecha, PorEstado), combinarlos dinámicamente según los filtros del request sin if/else anidados.", explain:"Correcto. Sin Specification: método findByMontoAndFechaAndEstado() o if/else gigante. Con Specification: repo.findAll(where(montoMayorA(1000)).and(fechaEntre(ini,fin)).and(estadoActivo())). Agregar criterio = nueva clase Specification sin modificar el repositorio."},
  {label:"Specification solo funciona con NoSQL; para SQL Server usar stored procedures", explain:"Incorrecto. Spring Data JPA Specification genera SQL dinámico para cualquier base de datos relacional."},
  {label:"Specification siempre genera SQL subóptimo comparado con queries nativas", explain:"Incorrecto. Genera SQL estándar optimizable. El rendimiento depende de los índices, no del mecanismo de construcción."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es el patrón Backend for Frontend (BFF) y cuándo lo necesitas?",
options:[
  {label:"BFF elimina el frontend por completo; todo se procesa en el servidor", explain:"Incorrecto. BFF crea backends especializados para cada tipo de frontend, no los elimina."},
  {label:"BFF crea un backend dedicado para cada cliente: BFF-Móvil (respuestas compactas), BFF-Web (respuestas ricas), BFF-B2B (formato estándar). Evita múltiples llamadas del cliente a microservicios para construir una vista.", explain:"Correcto. Sin BFF: la app móvil hace 5 llamadas para mostrar el dashboard. Con BFF-Móvil: una sola llamada que agrega exactamente lo que la app necesita. En banca: app móvil, banca web, cajeros y POS tienen necesidades de datos muy distintas."},
  {label:"BFF es lo mismo que API Gateway; ambos agregan respuestas de múltiples microservicios", explain:"Incorrecto. API Gateway es infraestructura de entrada (autenticación, routing). BFF es un servicio de aplicación que agrega y transforma datos para un cliente específico."},
  {label:"BFF solo es necesario cuando tienes más de 10 microservicios", explain:"Incorrecto. La necesidad de BFF depende de la diversidad de clientes y sus requisitos, no del número de microservicios."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Qué es Event Sourcing y cómo difiere del modelo CRUD tradicional?",
options:[
  {label:"Event Sourcing es simplemente loguear cambios de BD en un archivo de log para auditoría", explain:"Incorrecto. Event Sourcing es el modelo de datos principal, no un sistema secundario. El estado actual se deriva de la secuencia de eventos."},
  {label:"Event Sourcing almacena secuencias de eventos inmutables en lugar del estado actual. El estado se reconstruye reproduciendo los eventos. Ventajas: audit trail completo, reconstrucción en cualquier punto del tiempo. En banca: ideal para el libro mayor (ledger).", explain:"Correcto. CRUD: tabla Cuenta con saldo=1000. Event Sourcing: [Depósito(500), Transferencia(-200), Cargo(-50)] → saldo=250. Nunca se pierde historia; se puede auditar cada centavo. La banca tradicional siempre usó event sourcing en el sentido contable."},
  {label:"Event Sourcing y CRUD son igualmente eficientes; la elección es solo preferencia del equipo", explain:"Incorrecto. Event Sourcing tiene trade-offs reales: reconstruir estado leyendo todos los eventos es más lento que consultar estado actual. Se mitiga con snapshots."},
  {label:"Event Sourcing solo funciona con bases de datos NoSQL; SQL Server no puede implementarlo", explain:"Incorrecto. Event Sourcing puede implementarse en cualquier base de datos que permita escrituras append-only. SQL Server funciona perfectamente."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Cómo funciona el patrón Bulkhead para prevenir cascada de fallos en microservicios?",
options:[
  {label:"Bulkhead es sinónimo de Circuit Breaker; hacen lo mismo con diferentes nombres", explain:"Incorrecto. Son complementarios pero distintos. Circuit Breaker corta comunicación con servicio fallido. Bulkhead aísla recursos para que el fallo de un área no agote los de otras."},
  {label:"Aísla partes del sistema en compartimentos estancos. Ejemplo: pools de threads separados para SUNAT, RENIEC y core bancario. Si SUNAT se vuelve lento, solo su pool se satura; RENIEC sigue operando con su propio pool.", explain:"Correcto. Sin Bulkhead: un ThreadPool único para todas las llamadas externas. Si SUNAT se vuelve lento y 200 requests quedan esperando, agota el pool y bloquea también las llamadas a RENIEC. Resilience4j implementa Bulkhead."},
  {label:"Bulkhead solo aplica a bases de datos; para servicios HTTP usar Circuit Breaker exclusivamente", explain:"Incorrecto. Bulkhead aplica a cualquier recurso limitado: threads, conexiones, memoria. El concepto es universal."},
  {label:"Bulkhead es un patrón de Kubernetes para aislar namespaces; no aplica al diseño de aplicaciones Java", explain:"Incorrecto. Bulkhead es un patrón de diseño de aplicaciones. Resilience4j lo implementa a nivel de aplicación Java."},
], correct:1},

{cat:"Patrones Enterprise & Arquitectura",
q:"¿Cuáles son los anti-patrones más comunes en microservicios y cómo los identificas?",
options:[
  {label:"Los microservicios no tienen anti-patrones porque su naturaleza distribuida resuelve todos los problemas del monolito", explain:"Incorrecto. Los microservicios introducen su propia categoría de anti-patrones además de preservar algunos del monolito."},
  {label:"Distributed Monolith (microservicios acoplados que deben desplegarse juntos), Shared Database (múltiples servicios en la misma BD), Chatty Services (demasiadas llamadas HTTP), God Service (un servicio hace demasiado), Nano-services (servicios demasiado pequeños sin valor propio).", explain:"Correcto. Distributed Monolith: tienes la complejidad de microservicios sin sus beneficios. Shared Database: elimina autonomía del servicio. Chatty Services: N+1 queries a nivel de servicios. En banca, el 'servicio de clientes' que hace validación, scoring, KYC y reporting es un God Service."},
  {label:"El único anti-patrón real es usar SQL en lugar de NoSQL", explain:"Incorrecto. La elección SQL/NoSQL no define si es un anti-patrón. Son problemas de diseño arquitectural independientes del motor de base de datos."},
  {label:"Los anti-patrones de microservicios solo aplican a sistemas con más de 50 servicios", explain:"Incorrecto. Los anti-patrones aparecen desde el primer servicio. Un Shared Database entre 3 servicios es tan problemático como entre 50."},
], correct:1},

{cat:"Patrones Estructurales",
q:"¿Qué es el patrón Flyweight vs Singleton: en qué se diferencian?",
options:[
  {label:"Son idénticos porque ambos garantizan una sola instancia de un objeto por clase", explain:"Incorrecto. Singleton garantiza exactamente UNA instancia de una clase. Flyweight gestiona un POOL de instancias reutilizables; puede haber varios Flyweights distintos."},
  {label:"Singleton: una única instancia global por clase. Flyweight: pool de instancias compartidas para reducir memoria, donde hay múltiples instancias distintas pero reutilizadas. Ejemplo Flyweight: una instancia por divisa (USD, PEN, EUR) compartida entre millones de transacciones.", explain:"Correcto. Singleton = una instancia de Config. Flyweight = 3 instancias de Divisa (una por moneda) compartidas por millones de transacciones. El objetivo de Flyweight es eficiencia de memoria, no unicidad global. Java usa Flyweight en String Pool (una instancia por literal) e Integer Cache."},
  {label:"Flyweight es mejor que Singleton en todos los casos; Singleton es un anti-patrón en Java moderno", explain:"Incorrecto. Tienen propósitos distintos. Singleton tiene casos de uso válidos (configuración global, conexión única). Anti-patrón no es Singleton en sí, sino el abuso de estado global mutable."},
  {label:"Flyweight requiere herencia de una clase base; Singleton puede implementarse con cualquier clase", explain:"Incorrecto. Flyweight no requiere herencia. Se implementa con una fábrica que devuelve instancias del pool, independientemente de la jerarquía de clases."},
], correct:1},

{cat:"Patrones Creacionales",
q:"¿Cuándo usarías Abstract Factory vs inyección de dependencias de Spring para crear familias de objetos?",
options:[
  {label:"Abstract Factory es obsoleto cuando se usa Spring; el contenedor IoC reemplaza completamente este patrón", explain:"Incorrecto. Abstract Factory y Spring DI tienen propósitos distintos. Spring gestiona beans singleton; Abstract Factory crea familias de objetos nuevos con cada llamada."},
  {label:"Abstract Factory cuando necesitas crear familias coordinadas de objetos en runtime (no beans singleton): instancias nuevas por request, objetos con estado específico del contexto, o cuando la familia varía por tenant/configuración sin que el código cliente sepa cuál familia usa.", explain:"Correcto. Ejemplo: AbstractPaymentFactory con implementaciones SUNATPaymentFactory y VISAPaymentFactory, cada una crea HttpClient + RequestSerializer + ErrorHandler compatibles entre sí. Spring gestiona qué factory inyectar; la factory crea los objetos coordinados. Combinación ideal: Spring para la factory, Abstract Factory para los productos."},
  {label:"Abstract Factory solo funciona con objetos sin estado (stateless); para objetos con estado usar Builder", explain:"Incorrecto. Abstract Factory puede crear objetos con cualquier tipo de estado. La elección entre Abstract Factory y Builder depende de si creas familias coordinadas vs un objeto complejo con muchos parámetros opcionales."},
  {label:"La diferencia es solo de nomenclatura; Spring @Configuration con múltiples @Bean métodos es exactamente Abstract Factory", explain:"Incorrecto. @Configuration puede implementar el patrón Abstract Factory, pero no son equivalentes. @Bean methods en Spring crean singletons por defecto; Abstract Factory típicamente crea instancias nuevas."},
], correct:1},

// ══════════ ÍNDICES & CARDINALITY ══════════
{cat:"Índices & Cardinality",
q:"¿Qué es la cardinalidad de un índice y por qué impacta directamente en su efectividad?",
options:[
  {label:"La cardinalidad es el número de columnas que tiene un índice compuesto; más columnas = más efectivo siempre", explain:"Incorrecto. Eso es el grado del índice (número de columnas). La cardinalidad es la cantidad de valores únicos en una columna."},
  {label:"La cardinalidad mide cuántos valores distintos tiene una columna. Alta cardinalidad (ej: DNI, email) = índice muy efectivo porque el optimizador puede reducir el resultado a pocos registros. Baja cardinalidad (ej: columna género con 2 valores) = índice ineficiente; un full scan puede ser más rápido.", explain:"Correcto. Ejemplo real: índice en columna 'activo' (true/false, cardinalidad=2) en una tabla de 10M clientes donde el 95% está activo. Al buscar activo=true el índice retorna 9.5M registros — menos eficiente que un full scan. Regla práctica: si el índice no puede descartar al menos el 80-90% de los registros, el optimizador lo ignorará."},
  {label:"Alta cardinalidad siempre es mala porque genera más entradas en el índice y ocupa más espacio", explain:"Incorrecto. Alta cardinalidad es exactamente lo que hace a un índice eficiente. El espacio adicional es una compensación justificada por la selectividad que permite."},
  {label:"La cardinalidad no afecta al optimizador SQL; este siempre usa el índice disponible independientemente", explain:"Incorrecto. El optimizador evalúa la cardinalidad (a través de las estadísticas) para decidir si usar el índice o un full scan. Es una de las métricas más importantes en la toma de decisión del query plan."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Cuál es la diferencia entre Clustered Index y Non-Clustered Index en SQL Server?",
options:[
  {label:"Clustered Index es más lento porque ordena físicamente los datos; Non-Clustered es siempre preferible", explain:"Incorrecto. No hay una opción 'siempre preferible'. Cada tipo tiene su caso de uso. El Clustered Index es muy eficiente para rangos de valores ya que los datos están físicamente ordenados."},
  {label:"Clustered Index: determina el orden físico de los datos en disco (solo puede haber uno por tabla). Non-Clustered: estructura separada con punteros a los datos (pueden haber varios). Reads en rango: Clustered gana. Búsquedas puntuales por columnas no-PK: Non-Clustered.", explain:"Correcto. La PK genera automáticamente un Clustered Index en SQL Server. Un Clustered Index en fecha_transaccion hace que todas las consultas por rango de fechas sean muy eficientes (los datos están físicamente contiguos). Non-Clustered en numero_cuenta permite búsquedas rápidas por cuenta sin reorganizar los datos físicos."},
  {label:"SQL Server permite múltiples Clustered Indexes por tabla para optimizar distintos patrones de acceso", explain:"Incorrecto. Solo puede existir un Clustered Index por tabla porque determina el orden físico de almacenamiento, y los datos físicos solo pueden estar ordenados de una manera."},
  {label:"Non-Clustered Index almacena una copia completa de la tabla ordenada; por eso ocupa el doble de espacio", explain:"Incorrecto. Non-Clustered almacena las columnas del índice más un puntero (RID o la clave del Clustered Index) al registro. Un Covering Index puede incluir columnas adicionales pero no es una copia completa de la tabla."},
], correct:1},

{cat:"Índices & Cardinality",
q:"¿Qué es un Covering Index y cuándo lo crearías en un sistema bancario de alto volumen?",
options:[
