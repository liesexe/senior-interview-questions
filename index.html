  {label:"Con unclean.leader.election.enable=true: si todas las réplicas ISR fallan, cualquier réplica puede ser líder (incluyendo las atrasadas). Mensajes commiteados al ISR anterior pueden perderse. Con false (recomendado en banca): la partición queda unavailable hasta que un ISR se recupere.", explain:"Correcto. Escenario: RF=3, ISR=[Broker1, Broker2]. Broker1 y Broker2 fallan simultáneamente. Solo queda Broker3 que estaba fuera del ISR (500 mensajes atrasado). Con unclean=true: Broker3 se convierte en líder, los 500 mensajes que nunca llegaron a Broker3 se pierden permanentemente. Los producers que recibieron ACK por esos 500 mensajes creen que se guardaron. En finanzas: 500 transacciones perdidas es inaceptable. Por eso unclean.leader.election.enable=false (default en Kafka 3.x) sacrifica disponibilidad pero garantiza durabilidad."},
  {label:"unclean.leader.election.enable=true es la configuración recomendada para todos los sistemas porque garantiza máxima disponibilidad", explain:"Incorrecto. Puede ser aceptable en sistemas donde la pérdida de algunos mensajes es tolerable (métricas, logs de telemetría). En sistemas financieros donde cada mensaje representa una transacción, la durabilidad es no negociable. La configuración correcta para banca es false."},
  {label:"Unclean leader election solo ocurre en versiones antiguas de Kafka; en versiones modernas el ISR siempre tiene réplicas disponibles", explain:"Incorrecto. El escenario de unclean leader election puede ocurrir en cualquier versión si múltiples brokers fallan simultáneamente. No es un bug de versiones antiguas; es un trade-off de diseño que existe en todas las versiones."},
], correct:1},

{cat:"Kafka – Preguntas Tricky & Senior",
q:"¿Qué problema puede ocurrir si topic.partitions se aumenta mientras hay consumers con partition-key ordering?",
options:[
  {label:"Aumentar particiones nunca afecta a consumers existentes; los mensajes se redistribuyen automáticamente preservando el orden", explain:"Incorrecto. Al aumentar particiones, el hash(key) % nuevo_num_particiones cambia para muchas keys. Los mensajes con la misma key que ya estaban en la partición X pueden ir ahora a la partición Y."},
  {label:"Al aumentar particiones de P a P+N, el hash(key) % P cambia para muchas keys. Mensajes de la misma key que estaban en la partición 3 (con P particiones) podrían ir a la partición 7 (con P+N particiones). Los consumers pueden recibir mensajes de la misma key fuera de orden.", explain:"Correcto. Ejemplo: cuenta='001' con P=6 particiones → partición 3 (hash('001')%6=3). Con P=12 → partición 9 (hash('001')%12=9). Mensajes viejos de '001' están en partición 3, mensajes nuevos en partición 9. Un consumer que procesa la partición 3 no ve los nuevos mensajes de '001'. Un consumer que procesa la partición 9 no ve los viejos. La garantía de orden por key se rompe. Solución: asegurarse de que los consumers sean idempotentes antes de aumentar particiones, o hacer el cambio durante una ventana de mantenimiento cuando todos los mensajes viejos ya fueron procesados."},
  {label:"Aumentar particiones de 6 a 12 duplica exactamente el throughput porque hay el doble de particiones para procesar en paralelo", explain:"Incorrecto. El throughput depende de cuántos consumers se pueden asignar a las nuevas particiones. Si no hay consumers adicionales para las nuevas particiones, el throughput no aumenta automáticamente. También hay overhead de rebalanceo al agregar particiones."},
  {label:"Las particiones de Kafka no se pueden aumentar una vez creado el topic; hay que recrearlo", explain:"Incorrecto. Las particiones solo se pueden AUMENTAR (no reducir) en un topic existente con kafka-topics.sh --alter --partitions. Sin embargo, aumentarlas tiene las implicaciones de orden descritas, por lo que debe hacerse con cuidado."},
], correct:1},

// ══════════ USE CASES & ARCHITECTURE ══════════
{cat:"Kafka – Use Cases & Arquitectura",
q:"¿Cuándo elegirías Kafka sobre RabbitMQ o ActiveMQ para un sistema bancario?",
options:[
  {label:"Kafka siempre es mejor que RabbitMQ; RabbitMQ es obsoleto y no debe usarse en sistemas modernos", explain:"Incorrecto. RabbitMQ y ActiveMQ tienen casos de uso válidos. Son más simples para routing complejo, tienen mejor soporte para RPC/request-reply, y tienen menor overhead para bajo volumen. Kafka brilla en escenarios específicos."},
  {label:"Kafka para: alto throughput (millones de msgs/s), replay de eventos, múltiples consumers independientes, event sourcing, procesamiento en tiempo real con retención. RabbitMQ para: routing complejo, RPC, bajo volumen con routing inteligente, TTL por mensaje.", explain:"Correcto. Kafka ventajas en banca: retención de mensajes (replay para nuevos microservicios, debugging, compliance), múltiples consumer groups independientes (auditoría, notificaciones, reportes leen el mismo evento), procesamiento en tiempo real (Kafka Streams/ksqlDB), CDC con Debezium. RabbitMQ ventajas: routing complejo (exchanges, bindings), dead-letter con TTL por mensaje, plugins de protocolos (AMQP, STOMP, MQTT), mejor soporte para colas de trabajo con prioridad."},
  {label:"La única diferencia entre Kafka y RabbitMQ es el rendimiento; Kafka es simplemente más rápido para el mismo caso de uso", explain:"Incorrecto. Las diferencias son arquitecturales: Kafka es un log distribuido con semántica pub-sub y retención. RabbitMQ es un message broker con routing flexible. El rendimiento es una consecuencia de la arquitectura, no la única diferencia."},
  {label:"Kafka no puede ser usado en sistemas financieros porque no tiene encriptación de mensajes integrada", explain:"Incorrecto. Kafka soporta SSL/TLS para encriptación en tránsito y SASL para autenticación. Los mensajes pueden encriptarse a nivel de aplicación. Kafka es ampliamente usado en grandes bancos e instituciones financieras globalmente."},
], correct:1},

{cat:"Kafka – Use Cases & Arquitectura",
q:"¿Cómo implementarías el patrón Event Sourcing completo con Kafka en un sistema bancario?",
options:[
  {label:"Event Sourcing con Kafka es imposible porque Kafka no garantiza el orden global de eventos entre distintos topics", explain:"Incorrecto. Para Event Sourcing, el orden relevante es por aggregate (ej: por cuenta), que se garantiza con partition key. El orden global entre topics distintos no es necesario."},
  {label:"Cada aggregate (Cuenta) tiene un stream de eventos en Kafka con partition key=cuentaId. Los eventos son inmutables (DepositoRealizado, TransferenciaEnviada). El estado actual se reconstruye reproduciendo los eventos. Snapshots periódicos aceleran la reconstrucción.", explain:"Correcto. Arquitectura: topic 'cuenta-eventos' (RF=3, particiones=50, cleanup.policy=compact+delete). Cada evento de cuenta va con key=cuentaId → misma partición → orden garantizado. Para reconstruir estado de cuenta '001': replay de todos los eventos con key='001' desde el inicio. Snapshot cada 1000 eventos: almacenar el estado actual en una BD o en Kafka mismo → reconstrucción solo necesita el snapshot + eventos posteriores. Desafío: si Kafka tiene retention.ms finito, eventos muy antiguos se eliminan. Solución: cleanup.policy=compact para retener el último evento de cada tipo de operación (o usar retención infinita para el topic de eventos)."},
  {label:"Para Event Sourcing con Kafka se necesita una sola partición por topic para garantizar orden global", explain:"Incorrecto. Una sola partición elimina el paralelismo. Para Event Sourcing, el orden se necesita por aggregate (por account), no globalmente. Usar partition key=accountId garantiza que todos los eventos de una cuenta van a la misma partición, manteniendo el orden necesario."},
  {label:"Event Sourcing requiere que Kafka tenga retención infinita habilitada; de lo contrario no funciona", explain:"Incorrecto. Event Sourcing idealmente tiene retención infinita, pero puede funcionar con retención finita + snapshots periódicos. Los snapshots capturan el estado hasta un punto en el tiempo, y solo se necesitan los eventos posteriores al último snapshot para reconstruir el estado actual."},
], correct:1},

{cat:"Kafka – Use Cases & Arquitectura",
q:"¿Cuáles son las principales desventajas de Kafka que debes considerar antes de adoptarlo?",
options:[
  {label:"Kafka no tiene desventajas; es la solución óptima para cualquier problema de mensajería o procesamiento de datos", explain:"Incorrecto. Kafka tiene trade-offs reales que hacen que no sea la mejor opción para todos los casos de uso."},
  {label:"Complejidad operacional (cluster de brokers, ZooKeeper/KRaft, Schema Registry, Connect), no soporta routing inteligente de mensajes, latencia más alta que RabbitMQ para bajo volumen, curva de aprendizaje pronunciada, y no tiene garantía de orden global entre particiones.", explain:"Correcto. Desventajas reales: 1) Operacional: requiere cluster de 3+ brokers, monitoreo de ISR, consumer lag, retención. 2) Sin routing: no puede dirigir el mismo mensaje a diferentes destinos según el contenido (RabbitMQ tiene exchanges/bindings). 3) No es RPC-friendly: request-reply es torpe en Kafka (requiere ReplyingKafkaTemplate). 4) Overhead para bajo volumen: para 100 msgs/día, Kafka es overkill vs una cola simple. 5) Curva de aprendizaje: particiones, consumer groups, offsets, rebalanceos, ISR son conceptos que el equipo debe dominar."},
  {label:"La principal desventaja de Kafka es que no puede escalar horizontalmente para alto volumen", explain:"Incorrecto. El escalado horizontal es precisamente una de las fortalezas de Kafka. Se escala agregando brokers al cluster y particiones a los topics."},
  {label:"Kafka no soporta SSL/TLS; por eso no puede usarse en sistemas bancarios que requieren comunicación segura", explain:"Incorrecto. Kafka tiene soporte completo para SSL/TLS (encriptación en tránsito), SASL (autenticación: PLAIN, SCRAM, GSSAPI/Kerberos), y ACLs (autorización). La seguridad es una característica de primera clase en Kafka empresarial."},
], correct:1},

{cat:"Kafka – Use Cases & Arquitectura",
q:"¿Cómo garantizas exactamente-una-vez (exactly-once) end-to-end en un pipeline Kafka bancario?",
options:[
  {label:"Exactly-once en Kafka es imposible; solo se puede garantizar at-least-once con idempotencia en el consumer", explain:"Incorrecto. Exactly-once end-to-end es posible con la combinación correcta de configuraciones, aunque requiere coordinación entre producer, Kafka, y consumer."},
  {label:"Combinación necesaria: (1) Producer idempotente (enable.idempotence=true) → no duplicados producer→broker. (2) Transacciones Kafka para read-process-write atómico. (3) Idempotent Consumer → verificar si el eventId ya fue procesado antes de actuar.", explain:"Correcto. Para un pipeline Kafka→proceso→Kafka: usar Kafka Streams con processing.guarantee=exactly_once_v2 gestiona todo automáticamente. Para consumer→BD: las transacciones Kafka no incluyen la BD. Solución: Outbox Pattern (Transaccional) + Idempotent Consumer. Flujo completo: producer idempotente envía PagoCreado → consumer lee, verifica si pago ya fue procesado (tabla processed_events) → si no, procesa y escribe en BD + outbox en una transacción ACID → relay publica outbox a Kafka → commit offset del consumer. Si falla en cualquier punto: al reiniciar, el Idempotent Consumer detecta el eventId en la tabla y lo descarta."},
  {label:"enable.idempotence=true en el producer es suficiente para garantizar exactly-once en todo el pipeline", explain:"Incorrecto. enable.idempotence=true solo garantiza exactly-once en el segmento producer→broker. No garantiza que el consumer procese el mensaje exactamente una vez ni que los efectos secundarios (escribir en BD, enviar emails) ocurran exactamente una vez."},
  {label:"Exactly-once end-to-end se logra configurando acks=all en el producer; garantiza que cada mensaje llega exactamente una vez", explain:"Incorrecto. acks=all garantiza durabilidad (el mensaje se escribe en todas las réplicas ISR), no exactly-once. El producer puede recibir un ACK, y el consumer puede procesar el mensaje múltiples veces en caso de rebalanceos o reinicios."},
], correct:1},

{cat:"Kafka – Use Cases & Arquitectura",
q:"¿Qué es KRaft (Kafka sin ZooKeeper) y qué mejoras trae en Kafka 3.x?",
options:[
  {label:"KRaft es el nuevo nombre de ZooKeeper en el ecosistema Kafka; reemplaza el software pero hace lo mismo", explain:"Incorrecto. KRaft elimina la dependencia de ZooKeeper completamente. Es un consenso distribuido basado en Raft integrado dentro del propio Kafka."},
  {label:"KRaft reemplaza ZooKeeper con un quorum de Raft interno en los propios brokers de Kafka. Beneficios: elimina componente externo (ZooKeeper), startup más rápido, manejo de millones de particiones (ZooKeeper tenía limitaciones), y arquitectura simplificada.", explain:"Correcto. Problemas de ZooKeeper: componente separado con su propio monitoreo, limitación de ~200K particiones por cluster (metadata en ZooKeeper), sincronización entre ZooKeeper y Kafka controller podía ser lenta. KRaft: metadata del cluster almacenada en un topic interno de Kafka (__cluster_metadata), un quorum de controllers (3 o 5) usa Raft para consenso, startup de cluster mucho más rápido (segundos vs minutos), escala a millones de particiones. KRaft es production-ready desde Kafka 3.3 y default en Kafka 3.5+. En nuevos proyectos (2024+): usar KRaft siempre."},
  {label:"KRaft es opcional en Kafka 3.x y ZooKeeper sigue siendo la opción recomendada para producción por mayor estabilidad", explain:"Incorrecto. KRaft es la dirección estratégica de Kafka. ZooKeeper está deprecated en Kafka 3.x y será eliminado en Kafka 4.0. Para nuevos deployments, KRaft es la opción recomendada y más estable en versiones recientes."},
  {label:"KRaft solo está disponible en Confluent Platform (versión comercial); Apache Kafka open-source sigue requiriendo ZooKeeper", explain:"Incorrecto. KRaft es una característica de Apache Kafka open-source, no exclusiva de Confluent Platform. Confluent Platform también lo adopta, pero se origina en Apache Kafka community."},
], correct:1},

{cat:"Kafka – Use Cases & Arquitectura",
q:"¿Cómo implementarías un sistema de auditoría regulatoria bancaria completo con Kafka?",
options:[
  {label:"Para auditoría regulatoria, Kafka no es apropiado porque los mensajes pueden perderse; usar una BD relacional directamente", explain:"Incorrecto. Con la configuración correcta (acks=all, RF=3, unclean.leader.election=false), Kafka ofrece durabilidad muy alta. Además, su capacidad de retención a largo plazo y replay de eventos lo hace ideal para auditoría."},
  {label:"Topic de auditoría con: acks=all, RF=3, retención larga (1 año+), cleanup.policy=delete, unclean.leader.election=false. Cada operación crítica publica un AuditEvent con: usuario, timestamp, acción, entidad afectada, IP, correlation ID. Consumer escribe en Elasticsearch para búsqueda.", explain:"Correcto. Arquitectura de auditoría en banca: AOP interceptor (@Around) captura todas las operaciones de negocio → publica AuditEvent a topic 'auditoria' con los datos del contexto de seguridad (Spring SecurityContext: usuario, roles). Topic con retención de 7 años (requerimiento SBS Perú). Consumer de baja latencia escribe en Elasticsearch para búsqueda full-text. Consumer de backup escribe en S3/Azure Blob para cold storage. El Correlation ID permite trazar toda la cadena de eventos de una operación. Schema Registry con FULL_TRANSITIVE compatibility garantiza que el schema de auditoría no rompe lectura de registros históricos."},
  {label:"Para auditoría regulatoria, solo se necesita loguear en archivos de texto; Kafka es innecesariamente complejo", explain:"Incorrecto. Los archivos de log son difíciles de buscar, auditar, proteger contra modificación, y escalar. Kafka + Elasticsearch ofrece búsqueda en tiempo real, inmutabilidad (el log de Kafka no se puede modificar retroactivamente), alta disponibilidad, y capacidad de replay para investigaciones."},
  {label:"Un topic de auditoría debe tener solo 1 partición para garantizar el orden cronológico global de todos los eventos", explain:"Incorrecto. Una sola partición es un bottleneck para alto volumen de auditoría. El orden relevante para investigaciones es por entidad (por cliente, por cuenta), no global. Usar partition key=entidadId garantiza orden por entidad con múltiples particiones para escalar."},
], correct:1},

{cat:"Kafka – Preguntas Tricky & Senior",
q:"¿Qué es el 'thundering herd' problem en Kafka y cómo lo evitas al reiniciar múltiples consumers simultáneamente?",
options:[
  {label:"Thundering herd es cuando todos los brokers fallan al mismo tiempo; se previene con replicación", explain:"Incorrecto. Thundering herd (manada tronante) en el contexto de Kafka consumers se refiere a cuando múltiples consumers reinician simultáneamente y todos intentan reconectarse y hacer rebalanceo al mismo tiempo."},
  {label:"Cuando múltiples consumers de un grupo se unen simultáneamente al reiniciar, generan múltiples rebalanceos consecutivos que sobrecargan el Group Coordinator. Solución: staggered restart (reiniciar de a uno), o configurar group.initial.rebalance.delay.ms para dar tiempo a que todos los consumers se unan antes del primer rebalanceo.", explain:"Correcto. Escenario: 20 pods se reinician simultáneamente (deploy en Kubernetes). Cada pod que se reconecta dispara un rebalanceo. Con 20 pods: potencialmente 20 rebalanceos consecutivos, cada uno parando el procesamiento. Solución 1: group.initial.rebalance.delay.ms=3000 → el Group Coordinator espera 3 segundos antes del primer rebalanceo, dando tiempo a que todos se unan en un solo rebalanceo. Solución 2: PodDisruptionBudget en Kubernetes para limitar cuántos pods se reinician simultáneamente. Solución 3: Cooperative Sticky Assignor minimiza el impacto de cada rebalanceo."},
  {label:"El thundering herd problem en Kafka se resuelve aumentando el número de particiones del topic", explain:"Incorrecto. Más particiones no resuelven el problema de múltiples rebalanceos por reconexiones simultáneas. El problema es de coordinación de reconexión, no de capacidad de procesamiento."},
  {label:"group.initial.rebalance.delay.ms no existe en Kafka; es una configuración inventada", explain:"Incorrecto. group.initial.rebalance.delay.ms es una configuración real del broker (o del Group Coordinator). Controla cuánto tiempo espera el coordinator antes de hacer el primer rebalanceo cuando el grupo se está formando, permitiendo que más consumers se unan antes de la primera asignación de particiones."},
], correct:1},

{cat:"Kafka – Producers",
q:"¿Qué es la compresión de mensajes en Kafka y cuándo usar snappy vs lz4 vs gzip?",
options:[
  {label:"La compresión en Kafka ocurre siempre en el broker; los producers no pueden configurarla", explain:"Incorrecto. La compresión se configura en el producer (compression.type). El broker puede recomprimir si su configuración difiere, pero el producer es quien comprime por defecto."},
  {label:"snappy: balance entre velocidad y ratio de compresión, bajo uso de CPU. lz4: el más rápido, ideal para alta frecuencia. gzip: mejor ratio de compresión pero más CPU. Para banca de alto volumen: lz4. Para mensajes grandes (documentos, JSONs grandes): gzip.", explain:"Correcto. compression.type=lz4 en el producer reduce el tamaño del batch antes de enviarlo al broker, disminuyendo uso de red y almacenamiento. Los datos se descomprimen en el consumer. La compresión actúa a nivel de batch, no por mensaje individual, por eso se beneficia del batching. Con linger.ms=5 + batch.size=65536 + compression.type=lz4: excelente throughput para sistemas de pagos de alto volumen."},
  {label:"La compresión de Kafka solo funciona con mensajes de tipo String; los objetos serializados con Avro no se pueden comprimir", explain:"Incorrecto. Kafka comprime los bytes del batch independientemente del formato de serialización. Avro, JSON, Protobuf, String — todos se comprimen igual de bien (Avro a menudo produce mensajes más pequeños antes de la compresión)."},
  {label:"Habilitar compresión siempre degrada el throughput porque el CPU de compresión supera el beneficio de red", explain:"Incorrecto. En la mayoría de los casos, la reducción de I/O de red y disco supera el overhead de CPU de compresión. Los algoritmos modernos (lz4, snappy) son extremadamente rápidos. Solo en casos donde el CPU es el bottleneck y la red no lo es podría no valer la pena."},
], correct:1},

{cat:"Kafka – Core Concepts",
q:"¿Qué es el retention.ms y cómo se diferencia entre topics de eventos y topics de estado (changelog)?",
options:[
  {label:"retention.ms debe ser siempre el mismo para todos los topics de Kafka; no hay razón para diferenciar", explain:"Incorrecto. Diferentes topics tienen diferentes requisitos de retención según su propósito: eventos transitorios vs estado permanente."},
  {label:"Topics de eventos (pagos, transferencias): retención por tiempo de negocio (30-90 días) o por regulación (7 años en banca). Topics de estado/changelog (Kafka Streams state stores): retención alta o log compaction (cleanup.policy=compact) para poder reconstruir el estado completo.", explain:"Correcto. retention.ms=-1 significa retención infinita. retention.bytes limita el tamaño. Para auditoría bancaria regulatoria (SBS Perú requiere 7 años): retention.ms=220752000000 (7 años en ms). Para changelog de Kafka Streams: cleanup.policy=compact garantiza que siempre haya el último valor de cada key disponible para reconstruir state stores ante fallos. Para topics de métricas/telemetría: retención corta (24 horas) ya que los datos son procesados y almacenados en otra parte."},
  {label:"retention.ms=0 significa retención infinita en Kafka; los mensajes nunca se eliminan", explain:"Incorrecto. retention.ms=-1 es retención indefinida. retention.ms=0 eliminaría los mensajes inmediatamente (o casi) lo cual haría el topic inutilizable. Un valor de 0 no es un valor válido práctico."},
  {label:"Log compaction y retention.ms son mutuamente excluyentes; no se pueden combinar en el mismo topic", explain:"Incorrecto. cleanup.policy=[compact,delete] combina ambos: compaction retiene el último valor de cada key, y delete elimina segmentos más antiguos que retention.ms. Útil para topics de estado donde quieres el último valor de cada key pero también eliminar keys que no han sido actualizadas en mucho tiempo (delete.retention.ms)."},
], correct:1},

{cat:"Kafka – Consumers & Consumer Groups",
q:"¿Qué es el 'poison pill' message y cómo lo manejas en un consumer de producción?",
options:[
  {label:"Poison pill es un mensaje que se usa para detener voluntariamente un consumer; es una técnica de shutdown graceful", explain:"Hay una definición de 'poison pill' para shutdown graceful, pero en el contexto de manejo de errores en producción se refiere a mensajes que no pueden ser procesados y bloquean el consumer."},
  {label:"Mensaje que el consumer no puede procesar (schema inválido, datos corruptos, bug en lógica). Sin manejo: el consumer falla en loop infinito en ese mensaje. Solución: skipear después de N retries + enviar al DLQ (Dead Letter Topic) + alertar.", explain:"Correcto. Sin manejo del poison pill: consumer intenta procesar mensaje → excepción → reintenta → excepción → loop infinito, consumer lag crece, partición bloqueada. Con DefaultErrorHandler en Spring Kafka: configurable máximo N reintentos con backoff, luego DeadLetterPublishingRecoverer publica el mensaje al DLT con headers de error. El consumer continúa con el siguiente mensaje. Monitorear el DLT en producción: si crece, indica un problema sistemático (cambio de schema, bug de negocio) que debe resolverse, no solo ignorarse."},
  {label:"La solución al poison pill es siempre aumentar el número de retries; eventualmente el mensaje se procesará correctamente", explain:"Incorrecto. Si el mensaje tiene datos fundamentalmente inválidos (schema incorrecto, campo requerido nulo, violación de regla de negocio), ningún número de retries lo resolverá. Retries infinitos bloquean la partición indefinidamente. La solución es un número finito de retries + DLQ."},
  {label:"Los poison pill messages no ocurren en sistemas bien diseñados; son un problema de inexperiencia en el equipo de desarrollo", explain:"Incorrecto. Los poison pill messages pueden ocurrir en cualquier sistema por razones legítimas: cambios de schema no retrocompatibles, bugs en versiones intermedias, datos corruptos por fallo de hardware, o simplemente casos edge no contemplados. Todo sistema Kafka en producción necesita estrategia de DLQ."},
], correct:1},

{cat:"Kafka – Brokers & Clusters",
q:"¿Cómo funciona el consumer group coordinator y el rebalancing protocol?",
options:[
  {label:"El consumer group coordinator es un proceso separado que se instala independientemente de los brokers de Kafka", explain:"Incorrecto. El Group Coordinator es un rol que asume uno de los brokers del cluster Kafka (específicamente, el broker que lidera la partición del topic __consumer_offsets correspondiente al hash del groupId)."},
  {label:"Group Coordinator: broker que gestiona un consumer group específico. Protocolo de rebalanceo: (1) JoinGroup → todos los consumers se reportan al coordinator. (2) SyncGroup → el Group Leader (primer consumer en unirse) propone la asignación. (3) Heartbeat → consumers mantienen sesión activa.", explain:"Correcto. Flujo detallado: Consumer envía JoinGroup request al Group Coordinator. El coordinator espera group.initial.rebalance.delay.ms. Elige al Group Leader (generalmente el primer consumer). El Group Leader recibe la lista de todos los consumers y calcula la asignación de particiones usando el assignor configurado (RangeAssignor, RoundRobinAssignor, StickyAssignor, CooperativeStickyAssignor). Todos los consumers envían SyncGroup y reciben su asignación del coordinator. Después: cada consumer envía heartbeats cada heartbeat.interval.ms. Si falta un heartbeat por más de session.timeout.ms, el coordinator considera que el consumer murió y dispara un nuevo rebalanceo."},
  {label:"En el rebalanceo, el broker siempre asigna las particiones de forma aleatoria para garantizar distribución uniforme", explain:"Incorrecto. La asignación la hace el Group Leader (un consumer, no el broker) usando el Partition Assignor configurado. RangeAssignor: asigna rangos de particiones por topic. RoundRobinAssignor: distribuye uniformemente. StickyAssignor: minimiza los movimientos respecto a la asignación anterior. CooperativeStickyAssignor: permite rebalanceo incremental."},
  {label:"El Group Coordinator almacena los offsets de todos los consumer groups en ZooKeeper desde Kafka 2.0+", explain:"Incorrecto. Los offsets se almacenan en el topic interno __consumer_offsets desde Kafka 0.9. ZooKeeper ya no se usa para offset storage en ninguna versión moderna de Kafka. En KRaft mode (Kafka 3.3+), ZooKeeper se elimina completamente."},
], correct:1},

{cat:"Kafka – Preguntas Tricky & Senior",
q:"¿Qué diferencia hay entre at-most-once, at-least-once y exactly-once en Kafka y cuál aplica a cada escenario bancario?",
options:[
  {label:"Kafka solo soporta at-least-once por su naturaleza de log distribuido; los otros modos requieren herramientas externas", explain:"Incorrecto. Kafka soporta los tres modos dependiendo de la configuración del producer y consumer. Exactly-once está disponible desde Kafka 0.11 con el transaction API."},
  {label:"At-most-once: acks=0 o commit antes de procesar → puede perder mensajes. At-least-once: acks=all + retry + commit después de procesar → puede duplicar. Exactly-once: idempotent producer + transactions + idempotent consumer → sin pérdida ni duplicados.", explain:"Correcto. En banca por escenario: Auditoría de accesos (log de quien consultó qué): at-least-once aceptable (duplicar un log de auditoría es tolerable). Transferencias bancarias: exactly-once obligatorio (cobrar dos veces es inaceptable). Notificaciones push (email/SMS de transacción): at-least-once con deduplicación en el consumer (recibir 2 emails es molesto pero no catastrófico). Métricas de telemetría: at-most-once aceptable (perder algunas métricas no impacta el negocio). La elección impacta la complejidad de implementación y el rendimiento."},
  {label:"Exactly-once es la configuración por defecto en Kafka porque es la más segura para todos los casos de uso", explain:"Incorrecto. At-least-once es más cercano al default (enable.auto.commit=true, acks=1). Exactly-once requiere configuración explícita y tiene overhead de rendimiento. Se elige deliberadamente para operaciones críticas."},
  {label:"At-most-once es imposible en Kafka porque el sistema siempre reintenta los mensajes fallidos automáticamente", explain:"Incorrecto. At-most-once es perfectamente posible con acks=0 (el producer no espera confirmación y no reintenta) o haciendo commit de offset ANTES de procesar el mensaje. En ambos casos, si el sistema falla, el mensaje puede perderse sin ser reprocesado."},
], correct:1},

{cat:"Kafka con Spring Boot",
q:"¿Cómo implementas un producer con manejo de errores robusto en Spring Boot para un sistema de pagos?",
options:[
  {label:"En Spring Boot, KafkaTemplate.send() nunca falla; los errores de Kafka son manejados automáticamente por el framework", explain:"Incorrecto. KafkaTemplate.send() puede fallar (broker unavailable, serialization error, timeout). El manejo explícito de errores es esencial en sistemas de pagos."},
  {label:"KafkaTemplate.send() retorna ListenableFuture/CompletableFuture. Manejar con callbacks: onSuccess (offset commiteado), onFailure (loguear, persistir en tabla de fallback, alertar). Combinado con Outbox Pattern para garantizar at-least-once persistente.", explain:"Correcto. Implementación robusta: kafkaTemplate.send('pagos', key, evento).whenComplete((result, ex) -> { if(ex != null) { log.error('Error enviando a Kafka: {}', ex.getMessage()); outboxRepository.save(new OutboxEvent(evento)); // fallback alertingService.sendAlert(ex); } else { log.info('Mensaje enviado a offset {}', result.getRecordMetadata().offset()); } }). Con Outbox Pattern: si Kafka está down, el evento se guarda en la tabla outbox; un proceso de retry lo reintenta periódicamente. Nunca perder un evento de pago por fallo temporal de Kafka."},
  {label:"Para manejo de errores en Kafka con Spring Boot, se debe usar try-catch alrededor de kafkaTemplate.send() con Thread.sleep() para retry manual", explain:"Incorrecto. Thread.sleep() en un thread de request bloquea el servidor y es un antipatrón. Spring Kafka tiene mecanismos de retry configurables (DefaultErrorHandler, @RetryableTopic). El Outbox Pattern es la solución más robusta para garantizar que los eventos no se pierdan."},
  {label:"Si kafkaTemplate.send() falla, la transacción de BD también se revierte automáticamente porque están en la misma transacción", explain:"Incorrecto. La transacción de BD y la publicación a Kafka son dos sistemas diferentes. @Transactional de Spring no engloba automáticamente a Kafka. Por eso el Outbox Pattern escribe en la BD (dentro de la transacción) y publica a Kafka por separado, con el relay como coordinador."},
], correct:1},

{cat:"Kafka – Core Concepts",
q:"¿Qué es el __consumer_offsets topic y cómo lo usas para diagnosticar problemas en producción?",
options:[
  {label:"__consumer_offsets es un topic que debe crearse manualmente antes de usar consumer groups en Kafka", explain:"Incorrecto. __consumer_offsets es un topic interno creado automáticamente por Kafka cuando se usa el primer consumer group. No requiere creación manual."},
  {label:"Topic interno que almacena los offsets commiteados de cada consumer group + topic + partición. Puede leerse con kafka-consumer-groups.sh --describe para ver: current-offset, log-end-offset, lag, consumer ID. Útil para diagnosticar lag, consumers desconectados, y offsets stuck.", explain:"Correcto. Diagnóstico en producción: kafka-consumer-groups.sh --bootstrap-server broker:9092 --group mi-grupo --describe. Output: TOPIC, PARTITION, CURRENT-OFFSET, LOG-END-OFFSET, LAG, CONSUMER-ID, HOST. LAG=0: consumer al día. LAG creciente: consumer más lento que producer. CONSUMER-ID='-': la partición no tiene consumer asignado (consumer caído, más particiones que consumers). En Prometheus+Grafana: exportar kafka_consumer_group_lag via JMX exporter para alertas automáticas. __consumer_offsets tiene 50 particiones por defecto (offsets.topic.num.partitions) para distribuir la carga de muchos consumer groups."},
  {label:"El contenido de __consumer_offsets es confidencial y no puede ser leído directamente por los administradores del cluster", explain:"Incorrecto. Los administradores del cluster pueden leer __consumer_offsets con las herramientas de administración de Kafka (kafka-consumer-groups.sh, Confluent Control Center). La visibilidad de los offsets es necesaria para el monitoreo operacional."},
  {label:"Cada consumer group tiene su propio topic __consumer_offsets dedicado, creado automáticamente", explain:"Incorrecto. Hay un único topic __consumer_offsets compartido por todos los consumer groups. Los offsets de diferentes grupos se almacenan en diferentes particiones del mismo topic (la partición se determina por hash del groupId)."},
], correct:1},

{cat:"Kafka – Brokers & Clusters",
q:"¿Cómo configuras Kafka para un entorno bancario de alta disponibilidad en producción?",
options:[
  {label:"Un solo broker con replication factor=1 es suficiente para alta disponibilidad si está en un servidor potente", explain:"Incorrecto. Un solo broker es un punto único de falla (SPOF). Si el servidor falla, todo el sistema Kafka deja de funcionar. Alta disponibilidad requiere múltiples brokers."},
  {label:"Configuración mínima para producción bancaria: 3 brokers en distintas zonas de disponibilidad (AZ), replication.factor=3, min.insync.replicas=2, unclean.leader.election.enable=false, acks=all en producers, TLS + SASL para seguridad, y retención configurada por tipo de topic.", explain:"Correcto. 3 brokers en 3 AZs distintas (ej: Azure AKS: 3 node pools en 3 AZs). Si 1 AZ falla: 2 brokers disponibles, min.insync.replicas=2 se sigue cumpliendo, el sistema sigue funcionando. Configuración de seguridad: ssl.enabled.protocols=TLSv1.3, sasl.mechanism=SCRAM-SHA-512 o Kerberos para autenticación. ACLs por topic: solo el servicio de pagos puede escribir en 'pagos', solo el servicio de auditoría puede leer de 'auditoria'. Monitoring: Prometheus JMX exporter + Grafana dashboard de métricas del broker (broker count, leader count, under-replicated partitions, ISR shrinks)."},
  {label:"Para alta disponibilidad, Kafka debe desplegarse con replication factor=10 para tolerar la máxima cantidad de fallos", explain:"Incorrecto. Un replication factor alto (>3-5) tiene rendimiento decreciente: más overhead de replicación, más almacenamiento, y el beneficio marginal de tolerar más fallos simultáneos es bajo. Para la mayoría de casos bancarios, RF=3 es el punto óptimo."},
  {label:"La alta disponibilidad de Kafka se logra solo con hardware especial (servidores enterprise certificados); no funciona en cloud VMs", explain:"Incorrecto. Kafka funciona excelentemente en cloud VMs (AWS EC2, Azure VMs, GCP Compute Engine) y Kubernetes. Las consideraciones son: discos de alta IOPS (SSD/NVMe), suficiente RAM para el page cache, y red de baja latencia entre brokers. El hardware commodity es perfectamente válido para Kafka."},
], correct:1},

{cat:"Kafka Streams & ksqlDB",
q:"¿Qué es el windowing en Kafka Streams y cuándo usarías Tumbling vs Sliding vs Session windows?",
options:[
  {label:"El windowing en Kafka Streams solo está disponible en ksqlDB; la librería Kafka Streams no tiene este concepto", explain:"Incorrecto. El windowing es una funcionalidad nativa de la librería Kafka Streams. ksqlDB también lo soporta (usa Kafka Streams internamente), pero es una feature de Kafka Streams core."},
  {label:"Tumbling: ventanas fijas sin overlap (0-5min, 5-10min). Sliding: ventanas que se solapan, cada evento puede estar en múltiples ventanas. Session: ventanas dinámicas basadas en inactividad del usuario. Tumbling para métricas regulares; Session para análisis de comportamiento de usuario.", explain:"Correcto. Tumbling window (5 minutos): contar transacciones por cliente cada 5 minutos exactos. [00:00-05:00], [05:00-10:00]. Cada transacción en exactamente una ventana. Sliding window (5 min, avance 1 min): [00:00-05:00], [01:00-06:00]... Una transacción puede estar en múltiples ventanas. Mejor para alertas de fraude (detectar 5 transacciones en cualquier ventana de 5 minutos). Session window (gap 30 min): agrupa eventos del mismo usuario separados por menos de 30 min de inactividad. Perfecto para analizar 'sesiones' de uso de la app bancaria. En banca con Kafka Streams: detectar fraude por patrones temporales es el caso de uso más común para windowing."},
  {label:"Tumbling windows requieren que todos los eventos tengan el mismo timestamp; si hay eventos desordenados, el cálculo es incorrecto", explain:"Incorrecto. Kafka Streams maneja eventos desordenados con el concepto de 'grace period' (window.grace(Duration.ofSeconds(10))): acepta eventos hasta 10 segundos fuera de orden. La ventana no se cierra (emite resultado final) hasta que el grace period expira."},
  {label:"Session windows tienen duración fija configurable igual que Tumbling windows", explain:"Incorrecto. Session windows tienen duración VARIABLE. La duración depende de la actividad del usuario. Una sesión puede durar 2 minutos (usuario activo 2 min) u 8 horas (usuario activo intermitentemente). La única configuración fija es el 'inactivity gap': cuánto silencio cierra la sesión."},
], correct:1},

{cat:"Kafka – Schema Registry",
q:"¿Cómo evolucionar el schema de un evento Kafka en producción sin interrumpir consumers existentes?",
options:[
  {label:"Para cambiar el schema de un topic en producción, siempre hay que crear un topic nuevo y migrar todos los consumers simultáneamente en una ventana de mantenimiento", explain:"Incorrecto. Con Schema Registry y la estrategia correcta de compatibilidad, es posible evolucionar el schema de forma gradual sin ventanas de mantenimiento ni migración simultánea."},
  {label:"Estrategia BACKWARD compatible: (1) Agregar campo nuevo SIEMPRE con default value en Avro. (2) Registrar el nuevo schema en Schema Registry (se valida compatibilidad). (3) Desplegar consumers nuevo schema (pueden leer mensajes viejos gracias al default). (4) Desplegar producers con nuevo schema.", explain:"Correcto. Regla de oro: consumers primero, producers después. Si el producer envía el nuevo campo antes de que el consumer lo conozca → error de deserialización en el consumer. Orden correcto: 1) Registrar schema v2 con campo 'canalOrigen' (default: 'LEGACY'). 2) Desplegar consumers v2 (entienden el nuevo campo, para mensajes viejos usan el default). 3) Desplegar producers v2 (empiezan a enviar el nuevo campo). En ningún momento hay incompatibilidad. Para campos eliminados (más delicado): usar FULL compatibility para que sea compatible en ambas direcciones."},
  {label:"Los cambios de schema en Kafka son transparentes para los consumers porque Kafka reserializa los mensajes automáticamente al nuevo schema", explain:"Incorrecto. Kafka almacena los bytes tal como los envió el producer. No hace ninguna transformación o reserialización. El Schema Registry guarda el schema ID en el mensaje, y el consumer recupera el schema correcto para deserializar. La compatibilidad depende de la estrategia configurada."},
  {label:"Schema Registry solo valida schemas al momento de registrarlos; en producción no hay ninguna validación en tiempo real", explain:"Incorrecto. En cada mensaje, el producer serializa con el Avro serializer que consulta Schema Registry. En el consumer, el Avro deserializer lee el schema ID del mensaje, recupera el schema del registry, y deserializa. Si hay incompatibilidad, falla en runtime. Schema Registry también rechaza el registro de un schema nuevo si no es compatible con el modo configurado (BACKWARD, FORWARD, FULL)."},
], correct:1},
