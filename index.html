    {label:"Reduce bugs al detectar problemas de lógica y seguridad, mejora la mantenibilidad del código, comparte conocimiento entre el equipo y asegura el cumplimiento de estándares", explain:"Correcto. El Code Review es una práctica de equipo que va mucho más allá del análisis automático: detecta errores conceptuales, promueve la consistencia del código y transfiere conocimiento entre desarrolladores."},
    {label:"Reemplaza completamente a SonarQube y las pruebas automatizadas", explain:"Incorrecto. Son complementarios: SonarQube detecta issues automáticamente a escala; el Code Review aporta juicio humano sobre lógica, diseño y contexto de negocio."},
    {label:"Es obligatorio solo para proyectos open source; en proyectos empresariales no es necesario", explain:"Incorrecto. El Code Review es especialmente valioso en proyectos empresariales críticos donde los errores tienen mayor impacto."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuándo elegirías MongoDB sobre SQL Server para almacenar datos en un microservicio?",
  options:[
    {label:"Siempre que los datos sean importantes; MongoDB es más seguro que SQL Server", explain:"Incorrecto. La seguridad no determina la elección entre SQL y NoSQL; ambos tienen mecanismos robustos de seguridad."},
    {label:"Cuando los datos son documentales, el esquema es flexible/variable, se necesita escalabilidad horizontal nativa o el modelo relacional añade complejidad innecesaria", explain:"Correcto. MongoDB brilla en documentos anidados, esquemas que evolucionan frecuentemente, datos semi-estructurados y escalado horizontal. SQL Server es mejor para datos relacionales con integridad referencial y transacciones ACID complejas."},
    {label:"Cuando los datos tienen relaciones complejas entre múltiples entidades con integridad referencial estricta", explain:"Incorrecto. Para relaciones complejas con integridad referencial, las bases de datos relacionales (SQL Server, PostgreSQL) son más adecuadas que MongoDB."},
    {label:"MongoDB es mejor para reportería analítica compleja con JOINs entre muchas tablas", explain:"Incorrecto. MongoDB no usa JOINs relacionales; para reportería analítica compleja con muchas relaciones, SQL Server o herramientas OLAP son más apropiadas."},
  ], correct:1
},
{
  cat:"Balotario 06 – Experiencia Senior",
  q:"¿Cuál es el principal beneficio de una arquitectura reactiva frente a una bloqueante en sistemas de alta concurrencia?",
  options:[
    {label:"Elimina completamente la necesidad de bases de datos en la arquitectura", explain:"Incorrecto. La programación reactiva no elimina la necesidad de persistencia; existen drivers reactivos (R2DBC, MongoDB Reactive) para integrar BD en pipelines reactivos."},
    {label:"Mejor concurrencia, menor uso de threads, mayor escalabilidad y uso más eficiente de recursos, especialmente en escenarios con múltiples I/O simultáneos", explain:"Correcto. El modelo event-loop reactivo procesa muchas más peticiones concurrentes con el mismo hardware al no bloquear hilos durante esperas de I/O. Ideal para API Gateways, BFFs y servicios con muchas integraciones."},
    {label:"Solo es útil cuando se usa Kotlin Coroutines; con Java puro no aporta beneficios", explain:"Incorrecto. Spring WebFlux con Project Reactor es Java puro; Kotlin Coroutines son una forma más idiomática de escribir código reactivo en Kotlin, pero no son requisito."},
    {label:"Garantiza que la latencia siempre sea menor que 1 ms independientemente de la carga", explain:"Incorrecto. La programación reactiva mejora el throughput y la degradación bajo carga, pero no garantiza latencias absolutas; éstas dependen de las dependencias externas y la capacidad del sistema."},
  ], correct:1
},


// ════════════ KAFKA AVANZADO – BANCA ════════════
{
  cat:"Kafka Avanzado – Banca",
  q:"Un productor Kafka envía una transacción bancaria con acks=1. El broker líder confirma pero falla antes de replicar a los followers. ¿Qué riesgo representa esto?",
  options:[
    {label:"Ninguno; Kafka garantiza entrega exactamente una vez (exactly-once) con cualquier configuración de acks", explain:"Incorrecto. Exactly-once requiere configuración explícita de idempotencia y transacciones Kafka; acks=1 solo confirma escritura en el líder, no en réplicas."},
    {label:"Pérdida de mensaje: el broker líder cayó antes de replicar, y al elegirse un nuevo líder el mensaje no existe en los followers", explain:"Correcto. Con acks=1, el productor considera el mensaje enviado en cuanto el líder lo confirma. Si el líder falla antes de replicar, el mensaje se pierde. Para transacciones bancarias se debe usar acks=all + min.insync.replicas≥2."},
    {label:"El mensaje se duplica porque el productor lo reenvía automáticamente al nuevo líder", explain:"Incorrecto. Con acks=1 el productor no sabe que el mensaje se perdió; no hay reenvío automático. La duplicación es el riesgo opuesto que ocurre con retries sin idempotencia."},
    {label:"El consumer group rebalancea y recupera el mensaje de la réplica más cercana", explain:"Incorrecto. Los consumers leen del líder de la partición; si el mensaje no fue replicado y el líder cayó, no existe en ninguna réplica para ser leído."},
  ], correct:1
},
{
  cat:"Kafka Avanzado – Banca",
  q:"En un sistema de pagos bancarios, ¿cuál es la diferencia práctica entre at-least-once y exactly-once delivery en Kafka, y cuándo es crítico garantizar exactly-once?",
  options:[
    {label:"No hay diferencia real; Kafka siempre entrega exactamente una vez internamente", explain:"Incorrecto. At-least-once puede generar duplicados ante retries del productor o rebalanceos del consumer; exactly-once requiere configuración explícita (enable.idempotence=true + transacciones)."},
    {label:"At-least-once puede generar duplicados (ej: doble débito); exactly-once es crítico en operaciones monetarias donde la idempotencia no puede garantizarse en el consumidor", explain:"Correcto. En pagos, un débito duplicado es un error grave. Si el consumer no puede hacer la operación idempotente por diseño (ej: registros contables), exactly-once en Kafka es la barrera de protección necesaria."},
    {label:"Exactly-once es siempre obligatorio en Kafka; at-least-once está deprecado en versiones recientes", explain:"Incorrecto. At-least-once es el modo por defecto y es apropiado en muchos casos donde el consumer puede manejar idempotencia o los duplicados son aceptables."},
    {label:"At-least-once es más rápido y seguro; exactly-once degrada el rendimiento sin beneficio real", explain:"Incorrecto. Exactly-once tiene overhead de coordinación transaccional, pero en operaciones financieras el costo de un duplicado supera ampliamente ese overhead."},
  ], correct:1
},
{
  cat:"Kafka Avanzado – Banca",
  q:"¿Qué es el 'consumer lag' en Kafka y por qué es una métrica crítica de monitoreo en un sistema bancario de alto volumen?",
  options:[
    {label:"Es el tiempo que tarda el broker en replicar mensajes entre particiones; no afecta a los consumidores", explain:"Incorrecto. Consumer lag mide la diferencia entre el offset del último mensaje producido y el último offset committeado por el consumidor; es una métrica del consumidor, no del broker."},
    {label:"Es la diferencia entre el offset más reciente del topic y el offset del consumer group; indica cuántos mensajes están pendientes de procesar, y un lag creciente en pagos señala un problema crítico de capacidad o fallo del consumer", explain:"Correcto. Un lag de 0 es ideal. En banca, un lag creciente puede significar que los pagos se están acumulando sin procesar, afectando SLAs y la experiencia del cliente. Se monitorea con Prometheus/Grafana."},
    {label:"Es la latencia de red entre el productor y el broker; se resuelve aumentando el ancho de banda", explain:"Incorrecto. La latencia de red es un factor separado; el consumer lag es específico del estado de procesamiento del consumidor vs. lo que el productor ha escrito."},
    {label:"Es un parámetro de configuración que define cuántos mensajes puede acumular un topic antes de borrar los más antiguos", explain:"Incorrecto. Eso describe la política de retención (retention.ms o retention.bytes); el consumer lag es una métrica operacional de estado del consumidor."},
  ], correct:1
},
{
  cat:"Kafka Avanzado – Banca",
  q:"Un microservicio bancario consume eventos de Kafka y los persiste en SQL Server. Después de persistir, el pod falla antes de hacer commit del offset. Al reiniciarse, ¿qué problema ocurre y cómo lo mitigas?",
  options:[
    {label:"No ocurre ningún problema; Kafka descarta los mensajes ya procesados automáticamente", explain:"Incorrecto. Kafka no sabe qué hizo el consumidor con el mensaje; solo sabe si el offset fue commiteado. Sin commit, al reiniciar reprocessará desde el último offset confirmado."},
    {label:"El mensaje se reprocesa (at-least-once), lo que puede causar registros duplicados en SQL Server; se mitiga haciendo la operación de persistencia idempotente (ej: INSERT con clave única + ON CONFLICT DO NOTHING, o verificar existencia antes de insertar)", explain:"Correcto. Este es el escenario clásico de at-least-once. La solución es diseñar el consumer como idempotente: usar claves de negocio únicas en la BD que rechacen duplicados silenciosamente, o guardar el event ID y verificar antes de procesar."},
    {label:"El mensaje se pierde definitivamente porque el offset no fue commiteado antes del fallo", explain:"Incorrecto. Sin commit del offset, Kafka no avanza el puntero del consumer group; al reiniciar, el consumer leerá desde el último offset commiteado, re-procesando los mensajes."},
    {label:"Kafka reenvía el mensaje solo si el pod tardó más de 30 segundos en reiniciarse", explain:"Incorrecto. Kafka no tiene lógica de reenvío basada en tiempos de reinicio del consumidor; el reprocessing ocurre en base al estado del offset commiteado."},
  ], correct:1
},
{
  cat:"Kafka Avanzado – Banca",
  q:"¿Qué garantía ofrece la clave de partición (partition key) en Kafka y por qué es relevante en procesamiento de transacciones bancarias por cuenta?",
  options:[
    {label:"Garantiza que todos los mensajes se distribuyen equitativamente entre todas las particiones sin importar la clave", explain:"Incorrecto. Eso ocurre con mensajes sin clave (round-robin); con partition key, mensajes de la misma clave siempre van a la misma partición."},
    {label:"Garantiza que todos los mensajes con la misma clave van a la misma partición, preservando el orden por clave; en banca, usar el número de cuenta como clave garantiza que las transacciones de una cuenta se procesan en orden", explain:"Correcto. Kafka garantiza orden solo dentro de una partición. Usar el número de cuenta como partition key asegura que las transacciones de esa cuenta siempre llegan en orden al mismo consumer, evitando condiciones de carrera en el saldo."},
    {label:"La partition key encripta el mensaje para cumplir con regulaciones bancarias de la SBS", explain:"Incorrecto. La partition key es solo un mecanismo de routing; no tiene funciones de cifrado ni relación con cumplimiento normativo de la SBS."},
    {label:"Garantiza que el mensaje se almacena en el broker con mayor disponibilidad del cluster", explain:"Incorrecto. La partition key determina a qué partición va el mensaje; la disponibilidad depende del factor de replicación, no de la clave."},
  ], correct:1
},
{
  cat:"Kafka Avanzado – Banca",
  q:"En un sistema bancario peruano con regulación de la SBS, ¿cómo implementarías retención de eventos Kafka para cumplir con auditoría?",
  options:[
    {label:"Configurar retention.ms=86400000 (1 día) para mantener los topics ligeros y eficientes", explain:"Incorrecto. 1 día es insuficiente para auditoría regulatoria; la SBS puede requerir trazabilidad de años. Los eventos de auditoría deben archivarse fuera de Kafka."},
    {label:"Retención corta en Kafka (días/semanas para procesamiento) + sink connector a almacenamiento frío (Azure Blob/S3) con retención de años para cumplir auditoría SBS y posibles investigaciones", explain:"Correcto. Kafka no está diseñado para almacenamiento a largo plazo; la práctica correcta es retención operacional corta en Kafka y archivar en almacenamiento duradero y económico para cumplir requerimientos regulatorios."},
    {label:"Usar log.retention.bytes=0 para retención ilimitada directamente en Kafka", explain:"Incorrecto. log.retention.bytes=0 deshabilita el límite por tamaño (retención controlada solo por tiempo), pero almacenar años de eventos en Kafka es costoso e ineficiente operacionalmente."},
    {label:"Los eventos Kafka no son válidos para auditoría SBS; se debe usar solo SQL Server para trazabilidad regulatoria", explain:"Incorrecto. Los eventos Kafka archivados apropiadamente sí son válidos como evidencia de auditoría, especialmente en arquitecturas event-driven donde son la fuente de verdad."},
  ], correct:1
},

// ════════════ CI/CD & DEVOPS – BANCA ════════════
{
  cat:"CI/CD & DevOps – Banca",
  q:"En un banco, ¿qué estrategia de despliegue usarías para actualizar un microservicio crítico de pagos sin downtime y con rollback inmediato si falla?",
  options:[
    {label:"Recreate deployment: detener todos los pods de la versión antigua y levantar los nuevos simultáneamente", explain:"Incorrecto. Recreate genera downtime porque hay un período sin pods disponibles; es inaceptable para servicios críticos de pago."},
    {label:"Blue-Green deployment: dos ambientes idénticos (Blue=actual, Green=nueva versión); el tráfico se redirige al Green tras validación; rollback es cambiar el switch de vuelta al Blue en segundos", explain:"Correcto. Blue-Green elimina el downtime y el rollback es instantáneo. Es la estrategia preferida para servicios financieros críticos. El costo es doble infraestructura durante la transición."},
    {label:"Desplegar directamente en producción sin entorno previo para minimizar el tiempo de deploy", explain:"Incorrecto. Desplegar sin validación previa en un entorno espejo es una práctica de alto riesgo en sistemas bancarios donde los errores tienen impacto financiero y regulatorio."},
    {label:"Desplegar siempre los viernes por la tarde para tener el fin de semana para corregir errores", explain:"Incorrecto. Desplegar antes de períodos de baja disponibilidad del equipo es una mala práctica; la estrategia correcta es deploys frecuentes con capacidad de rollback inmediato."},
  ], correct:1
},
{
  cat:"CI/CD & DevOps – Banca",
  q:"¿Cuál es la diferencia entre Canary Release y Blue-Green deployment, y cuándo preferirías Canary en un banco?",
  options:[
    {label:"Son sinónimos; ambos redirigen el 100% del tráfico a la nueva versión simultáneamente", explain:"Incorrecto. Blue-Green redirige el 100% del tráfico de golpe (con switch). Canary envía un porcentaje pequeño primero (ej: 5%), incrementándolo gradualmente."},
    {label:"Canary envía un porcentaje pequeño de tráfico real a la nueva versión; se prefiere cuando se quiere validar el comportamiento con usuarios reales antes de un rollout completo, minimizando el blast radius si hay bugs", explain:"Correcto. En banca, Canary permite detectar problemas con un 5% de transacciones antes de afectar al 100%. Es ideal para cambios con incertidumbre alta. Blue-Green es mejor cuando hay alta confianza y se necesita rollback instantáneo total."},
    {label:"Canary es un tipo de test de carga; Blue-Green es una estrategia de deploy", explain:"Incorrecto. Canary es también una estrategia de despliegue progresivo, no un tipo de test de carga."},
    {label:"Canary solo funciona con Kubernetes; Blue-Green es para on-premise", explain:"Incorrecto. Ambas estrategias se pueden implementar en Kubernetes, on-premise o cualquier plataforma; no están atadas a infraestructura específica."},
  ], correct:1
},
{
  cat:"CI/CD & DevOps – Banca",
  q:"¿Por qué es importante el análisis de composición de software (SCA) en el pipeline CI/CD de un banco peruano?",
  options:[
    {label:"Para medir la velocidad de compilación del proyecto y optimizar los tiempos de build", explain:"Incorrecto. El análisis de composición (SCA) escanea dependencias de terceros en busca de vulnerabilidades CVE; no tiene relación con tiempos de compilación."},
    {label:"Para detectar vulnerabilidades conocidas (CVEs) en dependencias de terceros (Maven/npm), cumpliendo requerimientos de seguridad de la SBS y evitando que librerías comprometidas lleguen a producción", explain:"Correcto. Herramientas como OWASP Dependency-Check, Snyk o Trivy escanean el classpath en busca de CVEs. En banca regulada, una dependencia vulnerable puede ser un vector de ataque y un incumplimiento regulatorio."},
    {label:"Para verificar que el código cumple con el estilo de Google Java Style Guide", explain:"Incorrecto. El estilo de código lo verifican herramientas como Checkstyle o PMD; SCA es específicamente para seguridad de dependencias."},
    {label:"Para generar automáticamente la documentación Javadoc del proyecto", explain:"Incorrecto. La generación de documentación es un paso separado del pipeline; SCA es análisis de seguridad de dependencias."},
  ], correct:1
},
{
  cat:"CI/CD & DevOps – Banca",
  q:"En un pipeline GitLab CI para un microservicio bancario, ¿qué deben incluir los 'quality gates' antes de permitir el merge a main?",
  options:[
    {label:"Solo verificar que el código compile sin errores; los tests se corren manualmente antes del release", explain:"Incorrecto. Tests manuales pre-release son un proceso lento y propenso a errores; un quality gate robusto automatiza todas las validaciones."},
    {label:"Tests unitarios + integración, cobertura ≥80%, análisis SonarQube (0 bloqueantes), escaneo de vulnerabilidades en dependencias y validación de contrato de API", explain:"Correcto. Un quality gate bancario robusto combina: validación funcional (tests), calidad estructural (SonarQube), seguridad (CVEs) y contrato (para no romper consumidores). Si alguno falla, el merge es bloqueado."},
    {label:"Solo SonarQube; los tests son responsabilidad del desarrollador antes de hacer push", explain:"Incorrecto. Dejar los tests fuera del pipeline automatizado elimina la red de seguridad del equipo; cualquier miembro puede olvidar correr los tests localmente."},
    {label:"Solo verificar que no haya conflictos de merge en Git; la calidad se revisa en el ambiente de staging", explain:"Incorrecto. Detectar problemas en staging es más costoso que en el pipeline; el principio de 'shift left' dicta encontrar problemas lo más temprano posible."},
  ], correct:1
},
{
  cat:"CI/CD & DevOps – Banca",
  q:"¿Qué es Infrastructure as Code (IaC) y por qué es crítico en un banco que opera en Azure?",
  options:[
    {label:"Es el proceso de documentar la infraestructura en wikis y manuales para el equipo de operaciones", explain:"Incorrecto. Documentar en wikis es útil pero no es IaC. IaC significa definir la infraestructura en archivos de código versionados y ejecutables automáticamente."},
    {label:"Es definir la infraestructura (redes, VMs, AKS, bases de datos) en código versionado (Terraform, Bicep) que se puede desplegar repetiblemente, auditarse en Git y revertirse, garantizando entornos consistentes y trazabilidad regulatoria", explain:"Correcto. En un banco, IaC garantiza que dev/staging/prod sean idénticos, que los cambios de infraestructura sean revisados (pull requests), auditados y que ante un desastre se pueda reconstruir el entorno en minutos."},
    {label:"Es escribir scripts SQL para crear tablas y procedimientos almacenados automáticamente", explain:"Incorrecto. Los scripts SQL de migración (Flyway, Liquibase) son un tipo específico de IaC para la BD; IaC abarca toda la infraestructura de la plataforma."},
    {label:"Es un servicio de Azure que genera infraestructura automáticamente basándose en el tráfico observado", explain:"Incorrecto. Eso describe el autoscaling. IaC es una práctica de ingeniería donde los humanos definen la infraestructura deseada en código."},
  ], correct:1
},
{
  cat:"CI/CD & DevOps – Banca",
  q:"¿Qué estrategia de gestión de secretos (passwords, API keys, certificados) es correcta en un pipeline CI/CD bancario?",
  options:[
    {label:"Guardar los secretos en el repositorio Git cifrados con una clave simétrica compartida entre el equipo", explain:"Incorrecto. Almacenar secretos en Git (incluso cifrados) es una mala práctica; si la clave simétrica se compromete, todos los secretos del repositorio están expuestos."},
    {label:"Usar Azure Key Vault o HashiCorp Vault; el pipeline accede a los secretos en tiempo de ejecución mediante Managed Identity o service principal con mínimos privilegios, sin almacenarlos en el repositorio ni en variables de texto plano", explain:"Correcto. Vault centraliza los secretos, los rota automáticamente, registra accesos y permite revocarlos inmediatamente. Managed Identity elimina la necesidad de credenciales estáticas en el pipeline."},
    {label:"Pasar secretos como argumentos de línea de comando al ejecutar el pipeline; son efímeros y seguros", explain:"Incorrecto. Los argumentos de línea de comando pueden quedar en logs del CI/CD, en el historial del shell y son visibles para otros procesos del sistema."},
    {label:"Cada desarrollador administra sus propios secretos localmente; en CI/CD no se necesitan secretos porque los entornos son efímeros", explain:"Incorrecto. Los pipelines CI/CD necesitan secretos para conectarse a la BD de integración, registros de contenedores, servicios cloud, etc."},
  ], correct:1
},

// ════════════ CLOUD & AZURE – BANCA ════════════
{
  cat:"Cloud & Azure – Banca",
  q:"Un banco peruano despliega microservicios en AKS con múltiples zonas de disponibilidad. ¿Qué configuración de pods garantiza alta disponibilidad real ante la caída de una zona?",
  options:[
    {label:"Tener 2 réplicas del pod en la misma zona; si una falla la otra absorbe el tráfico", explain:"Incorrecto. 2 réplicas en la misma zona de disponibilidad no protege ante una falla de zona completa; ambas caerían simultáneamente."},
    {label:"Mínimo 3 réplicas con Pod Anti-Affinity rules que fuercen distribución en distintas zonas, combinado con PodDisruptionBudget que garantice disponibilidad durante mantenimientos", explain:"Correcto. Anti-Affinity evita que todas las réplicas estén en la misma zona. Con 3 zonas y 3 réplicas, la caída de una zona solo pierde 1 réplica y el servicio continúa. PodDisruptionBudget evita que mantenimientos planificados dejen el servicio sin réplicas."},
    {label:"Configurar HPA con mínimo 1 réplica; HPA escalará automáticamente si una zona falla", explain:"Incorrecto. HPA escala según métricas de carga, no ante fallas de zona. Si la única réplica está en la zona que falla, HPA tardará en levantar nuevas réplicas en otra zona."},
    {label:"No es necesaria configuración especial; AKS redirige automáticamente el tráfico a zonas sanas sin configuración adicional", explain:"Incorrecto. AKS puede distribuir nodos entre zonas, pero la distribución de pods entre esas zonas requiere configurar explícitamente topologySpreadConstraints o Anti-Affinity rules."},
  ], correct:1
},
{
  cat:"Cloud & Azure – Banca",
  q:"¿Qué es Azure Service Bus y en qué se diferencia de Kafka para un caso de uso bancario?",
  options:[
    {label:"Son exactamente lo mismo; Microsoft renombró Kafka como Azure Service Bus", explain:"Incorrecto. Son productos completamente distintos con arquitecturas diferentes; Azure Service Bus es un broker de mensajes administrado y Kafka es una plataforma de streaming distribuido."},
    {label:"Service Bus es un broker de mensajes administrado (queues/topics con TTL, DLQ, sessions); Kafka es una plataforma de streaming con retención, replay y alto throughput. Service Bus es ideal para workflows transaccionales con orden garantizado por sesión; Kafka para streaming de alto volumen con replayability", explain:"Correcto. En banca: Service Bus encaja bien para orquestación de procesos con garantías de orden y DLQ (Dead Letter Queue) nativa. Kafka es mejor para event streaming masivo, auditoría y casos donde necesitas releer eventos históricos."},
    {label:"Kafka soporta transacciones ACID entre topics; Service Bus no soporta transacciones en ningún escenario", explain:"Incorrecto. Kafka tiene soporte transaccional para exactly-once entre topics. Service Bus también soporta transacciones para operaciones atómicas. Ambos tienen capacidades transaccionales."},
    {label:"Service Bus es más barato que Kafka en todos los escenarios de volumen bancario", explain:"Incorrecto. El costo depende del volumen, patrón de uso y si se usa Kafka managed (Confluent, Azure Event Hubs for Kafka) vs. autohosteado; no hay una respuesta absoluta."},
  ], correct:1
},
{
  cat:"Cloud & Azure – Banca",
  q:"¿Qué es Managed Identity en Azure y por qué elimina un riesgo de seguridad significativo en microservicios bancarios?",
  options:[
    {label:"Es una identidad de usuario humano gestionada por el equipo de IT del banco para acceder a Azure Portal", explain:"Incorrecto. Managed Identity es para recursos de Azure (pods AKS, VMs, Functions), no para usuarios humanos. Los usuarios humanos usan Azure AD con MFA."},
    {label:"Es una identidad asignada a un recurso de Azure (ej: pod AKS) que se autentica automáticamente ante otros servicios Azure (Key Vault, SQL, Storage) sin credenciales estáticas; elimina el riesgo de credenciales hardcodeadas o expiradas que causan brechas", explain:"Correcto. Con Managed Identity, el pod obtiene tokens de acceso del Azure Instance Metadata Service sin necesitar passwords ni service principal secrets en el código o variables de entorno. Si el pod es comprometido, la identidad puede revocarse centralmente."},
    {label:"Es el servicio de Azure Active Directory para gestionar grupos de seguridad de usuarios finales del banco", explain:"Incorrecto. La gestión de grupos de AD es una función de Azure AD; Managed Identity es específicamente para autenticación de recursos de Azure entre sí."},
    {label:"Es una funcionalidad de AKS que encripta automáticamente toda la comunicación entre pods sin configuración adicional", explain:"Incorrecto. El cifrado de comunicación entre pods se logra con mTLS (ej: via service mesh como Istio); Managed Identity es para autenticación ante servicios Azure externos."},
  ], correct:1
},
{
  cat:"Cloud & Azure – Banca",
  q:"En AKS, ¿cuál es la diferencia entre un ConfigMap y un Secret, y qué precaución adicional debes tomar con los Secrets en un banco?",
  options:[
    {label:"ConfigMap y Secret son idénticos; la diferencia es solo visual en el dashboard de Kubernetes", explain:"Incorrecto. Son recursos distintos: ConfigMap para configuración no sensible, Secret para datos sensibles. Aunque internamente Secret solo usa base64 (no cifrado real) por defecto."},
    {label:"ConfigMap almacena configuración no sensible (ej: URLs, parámetros); Secret almacena datos sensibles (passwords, tokens). En banca, los Secrets deben cifrarse en etcd (encryption at rest), accederse vía Managed Identity desde Azure Key Vault y nunca commitearse en Git", explain:"Correcto. El mayor problema de Kubernetes Secrets es que están solo en base64 (no cifrado) por defecto en etcd. En banca se debe habilitar encryption at rest en etcd y preferentemente usar el CSI driver de Azure Key Vault para que los secretos nunca residan en el cluster."},
    {label:"Los Secrets en Kubernetes están cifrados con AES-256 por defecto sin configuración adicional", explain:"Incorrecto. Por defecto, los Secrets en Kubernetes están codificados en base64 pero NO cifrados. El cifrado en etcd debe habilitarse explícitamente con EncryptionConfiguration."},
    {label:"ConfigMap soporta hasta 1 MB de datos; Secret no tiene límite de tamaño", explain:"Incorrecto. Ambos tienen el límite de 1 MB en etcd. La diferencia no es de tamaño sino de propósito y manejo de datos sensibles."},
  ], correct:1
},
{
  cat:"Cloud & Azure – Banca",
  q:"¿Qué es Network Policy en Kubernetes y por qué es obligatoria en un cluster bancario?",
  options:[
    {label:"Es una regla de firewall de Azure para controlar el tráfico entre el cluster y el internet público", explain:"Incorrecto. Las reglas de Azure Firewall/NSG controlan el tráfico externo al cluster; Network Policy controla el tráfico entre pods dentro del cluster."},
    {label:"Define reglas de ingress/egress entre pods y namespaces; en banca es obligatoria para aislar microservicios (ej: el servicio de pagos solo habla con el servicio de cuentas y la BD, no con todos los pods), implementando el principio de mínimo privilegio a nivel de red", explain:"Correcto. Sin Network Policy, cualquier pod comprometido puede conectarse a cualquier otro pod del cluster. En banca, el aislamiento de red entre servicios limita el blast radius de un incidente de seguridad."},
    {label:"Es la configuración de DNS interno del cluster para resolver nombres de servicios entre namespaces", explain:"Incorrecto. La resolución DNS interna es gestionada por CoreDNS en Kubernetes; Network Policy es específicamente para control de tráfico de red."},
    {label:"Solo aplica para tráfico externo hacia los pods; el tráfico interno entre pods no puede restringirse en Kubernetes", explain:"Incorrecto. Network Policy controla exactamente el tráfico este-oeste (entre pods) dentro del cluster, que es el tráfico que más necesita control en arquitecturas de microservicios."},
  ], correct:1
},

// ════════════ SOLID & CLEAN CODE ════════════
{
  cat:"SOLID & Clean Code",
  q:"Un clase 'TransferService' en un banco valida el saldo, ejecuta la transferencia, envía la notificación y genera el reporte contable. ¿Qué principio SOLID viola y cuál sería la refactorización correcta?",
  options:[
    {label:"Viola el Open/Closed Principle porque no se puede extender sin modificar; se resuelve con herencia", explain:"Incorrecto. OCP dice que una clase debe estar abierta a extensión pero cerrada a modificación; aquí el problema es que tiene múltiples responsabilidades, no que no sea extensible."},
    {label:"Viola el Single Responsibility Principle (SRP); se resuelve separando en BalanceValidator, TransferExecutor, NotificationService y AccountingReportService, cada uno con una única razón de cambio", explain:"Correcto. SRP establece que una clase debe tener una sola razón para cambiar. Si cambia la lógica de notificación, no debería afectar la lógica de transferencia. Separar responsabilidades mejora testabilidad y mantenibilidad."},
    {label:"Viola el Interface Segregation Principle porque tiene demasiados métodos públicos", explain:"Incorrecto. ISP trata sobre interfaces que obligan a implementar métodos que no se usan; el problema de TransferService es de responsabilidades mezcladas, no de interfaces."},
    {label:"No viola ningún principio; es normal que un service orqueste múltiples operaciones en arquitecturas de microservicios", explain:"Incorrecto. Un service puede orquestar, pero debe delegar cada responsabilidad a colaboradores especializados, no implementar todas las responsabilidades internamente."},
  ], correct:1
},
{
  cat:"SOLID & Clean Code",
  q:"¿Cuál es el riesgo concreto de violar el Open/Closed Principle (OCP) en un módulo de cálculo de comisiones de un banco con múltiples tipos de producto?",
  options:[
    {label:"El código corre más lento porque los if/else añaden ciclos de CPU", explain:"Incorrecto. El impacto en rendimiento de condicionales es negligible; el riesgo de violar OCP es de mantenibilidad y estabilidad del código, no de performance."},
    {label:"Cada nuevo tipo de producto requiere modificar el código existente (añadir un case/if), aumentando el riesgo de regresiones en tipos ya funcionales y haciendo el código difícil de testear aisladamente", explain:"Correcto. Con OCP, cada tipo de comisión sería una implementación de una interfaz (Strategy); añadir un nuevo tipo es añadir una nueva clase sin tocar el código existente. En banca, modificar código probado para añadir un nuevo producto es un riesgo regulatorio y operacional."},
    {label:"El compilador lanzará un error si hay más de 10 tipos de producto en la misma clase", explain:"Incorrecto. El compilador no impone límites de complejidad ciclomática; los problemas de OCP son de diseño, no de compilación."},
    {label:"Solo aplica a lenguajes dinámicos; en Java con tipado estático el OCP no es relevante", explain:"Incorrecto. OCP es un principio de diseño independiente del lenguaje; es especialmente relevante en Java donde se puede aplicar mediante interfaces, herencia y polimorfismo."},
  ], correct:1
},
{
  cat:"SOLID & Clean Code",
  q:"¿Qué diferencia al Liskov Substitution Principle (LSP) del simple polimorfismo, y qué problema causa violarlo en un servicio de cuentas bancarias?",
  options:[
    {label:"LSP es igual a polimorfismo; si una clase hereda de otra, automáticamente cumple LSP", explain:"Incorrecto. Herencia e implementación de interfaces garantizan polimorfismo sintáctico, pero LSP exige que el comportamiento sea sustituible: una subclase no debe lanzar excepciones inesperadas ni debilitar precondiciones."},
    {label:"LSP exige que una subclase pueda sustituir a su superclase sin alterar el comportamiento esperado. Violarlo en cuentas bancarias (ej: CuentaBloqueada extiende Cuenta pero lanza excepción en debitar()) rompe el código cliente que asume que todas las Cuentas se pueden debitar", explain:"Correcto. Si el cliente llama cuenta.debitar() y funciona para CuentaCorriente pero lanza UnsupportedOperationException en CuentaBloqueada, el polimorfismo falla en runtime. LSP obliga a modelar correctamente las jerarquías."},
    {label:"LSP solo aplica a interfaces, no a herencia de clases abstractas o concretas", explain:"Incorrecto. LSP aplica a cualquier jerarquía de tipos (clases, interfaces, clases abstractas); cualquier subtipo debe ser sustituible por su supertipo."},
    {label:"LSP no es aplicable en Java porque el lenguaje tiene checked exceptions que documentan el comportamiento", explain:"Incorrecto. Las checked exceptions documentan excepciones pero no garantizan que el comportamiento sea consistente con el contrato del supertipo; LSP va más allá de la firma del método."},
  ], correct:1
},
{
  cat:"SOLID & Clean Code",
  q:"¿Qué problema específico resuelve el Dependency Inversion Principle (DIP) en la arquitectura de un microservicio bancario y cómo se implementa?",
  options:[
    {label:"Evita que los módulos de alto nivel dependan de módulos de bajo nivel directamente; se implementa haciendo que ambos dependan de abstracciones (interfaces), permitiendo cambiar implementaciones (ej: BD, broker) sin tocar la lógica de negocio", explain:"Correcto. En banca, la lógica de transferencias no debe saber si persiste en SQL Server o PostgreSQL. Si depende de una interfaz TransferRepository, se puede cambiar la implementación sin modificar el dominio. Facilita testing con mocks y cumple Clean Architecture."},
    {label:"Evita que dos servicios se llamen mutuamente de forma circular; se implementa con un API Gateway central", explain:"Incorrecto. Las dependencias circulares entre servicios son un problema de acoplamiento de microservicios; DIP trata sobre la dirección de las dependencias entre módulos dentro de un servicio."},
    {label:"Resuelve el problema de inyección de dependencias en Spring Boot; @Autowired implementa DIP automáticamente", explain:"Incorrecto. @Autowired es el mecanismo de Spring IoC para inyectar dependencias, pero DIP es el principio de diseño que guía qué se inyecta. Se puede usar @Autowired violando DIP si se inyectan implementaciones concretas en lugar de interfaces."},
    {label:"Garantiza que todos los métodos de una clase tengan exactamente un parámetro de entrada", explain:"Incorrecto. Eso no es ningún principio SOLID; DIP trata sobre la dirección y abstracción de las dependencias entre capas."},
  ], correct:0
},
{
  cat:"SOLID & Clean Code",
  q:"¿Qué hace que un nombre de variable o método sea 'limpio' según Clean Code, y por qué es especialmente importante en código bancario?",
  options:[
    {label:"Debe ser lo más corto posible (1-2 caracteres) para reducir el tiempo de escritura y el tamaño del bytecode", explain:"Incorrecto. Nombres cortos como 'x', 'tmp' o 'amt' son ilegibles; el bytecode no cambia significativamente con nombres largos. Clean Code prioriza la intención sobre la brevedad."},
    {label:"Debe revelar intención (calculateDailyTransferLimit en lugar de calc), sin abreviaciones oscuras, sin prefijos técnicos innecesarios (no iAmount) y describir exactamente lo que hace sin necesitar un comentario que lo explique", explain:"Correcto. En código bancario regulado, un nombre claro como validateSBSTransactionLimit() es autodocumentado para auditores, nuevos ingenieros y herramientas de análisis. Un nombre críptico como vTrLm() es una deuda técnica de alto riesgo."},
    {label:"Debe incluir el tipo de dato como prefijo (strName, intAmount) siguiendo la notación húngara para claridad", explain:"Incorrecto. Clean Code (Robert Martin) explícitamente desaconseja la notación húngara; los IDEs modernos ya muestran el tipo; el nombre debe comunicar intención, no tipo."},
    {label:"Solo importa en código público de la API; el código interno puede usar cualquier nombre porque los IDEs refactorizan automáticamente", explain:"Incorrecto. El código interno es donde más tiempo pasa el equipo; nombres pobres en la lógica de negocio generan errores difíciles de detectar en código bancario crítico."},
  ], correct:1
},
{
  cat:"SOLID & Clean Code",
  q:"¿Cuál es la señal más clara de que una función viola el principio de 'hace una sola cosa' de Clean Code, y qué riesgo representa en un servicio de pagos?",
  options:[
    {label:"Que tenga más de 5 líneas de código; toda función debe caber en la pantalla sin scroll", explain:"Incorrecto. No hay un límite de líneas absoluto en Clean Code; la señal es la responsabilidad, no el tamaño. Una función de 10 líneas puede ser perfectamente cohesiva."},
    {label:"Que necesite conjunciones (Y, O) para describirse: 'valida el monto Y persiste la transacción Y notifica al cliente'; cada 'Y' indica una responsabilidad adicional que debe extraerse", explain:"Correcto. Si al describir qué hace la función necesitas 'y' o 'o', está haciendo más de una cosa. En pagos, mezclar validación y persistencia dificulta testear cada parte aisladamente y hace que un cambio en notificaciones pueda romper la validación."},
    {label:"Que tenga parámetros booleanos; siempre indica que hace dos cosas diferentes según el flag", explain:"Incorrecto. Los parámetros booleanos son una señal de alerta (Flag Arguments en Clean Code) pero no son la señal más clara de múltiple responsabilidad; una función puede tener un boolean sin hacer dos cosas."},
    {label:"Que sea llamada desde más de un lugar en el código; la reutilización indica múltiples responsabilidades", explain:"Incorrecto. La reutilización es deseable; ser llamada desde múltiples lugares no indica múltiple responsabilidad. Una función de utilidad cohesiva puede y debe ser reutilizada."},
  ], correct:1
},

// ════════════ CLEAN ARCHITECTURE & HEXAGONAL ════════════
{
  cat:"Clean Architecture & Hexagonal",
  q:"En Clean Architecture para un servicio bancario, ¿en qué capa reside la regla de negocio 'una transferencia no puede superar el límite diario regulado por la SBS'?",
  options:[
    {label:"En la capa de Infrastructure, dentro del repositorio JPA que persiste la transacción", explain:"Incorrecto. Las reglas de negocio en la capa de infraestructura son un antipatrón; si se cambia la BD, la regla se pierde. La infraestructura debe ser solo mecanismos técnicos."},
    {label:"En la capa de Domain/Entities (núcleo interno), ya que es una regla de negocio crítica independiente de frameworks, BD o protocolo HTTP", explain:"Correcto. Clean Architecture sitúa las reglas de negocio más críticas en el núcleo (Entities). Reglas como límites SBS son invariantes del negocio que no dependen de cómo se persiste o expone el servicio."},
    {label:"En el Controller REST, en el método que recibe la petición HTTP de transferencia", explain:"Incorrecto. El Controller es un adaptador de entrada (capa externa); mezclar reglas de negocio con el manejo HTTP viola la separación de capas y hace imposible reutilizar la regla en otros casos de uso (ej: procesamiento batch)."},
    {label:"En la capa de Application Services, como un @Service de Spring con @Transactional", explain:"Incorrecto. Application Services (Use Cases) orquestan el flujo de negocio pero no deben contener las reglas de negocio más fundamentales. Una regla como el límite SBS pertenece a la Entity o Value Object del dominio."},
  ], correct:1
},
{
  cat:"Clean Architecture & Hexagonal",
  q:"¿Qué es un 'Puerto' (Port) en la Arquitectura Hexagonal y cuál es su diferencia con un 'Adaptador' (Adapter)?",
  options:[
    {label:"Puerto es la URL del endpoint REST; Adaptador es la implementación del Controller que maneja esa URL", explain:"Incorrecto. Los puertos y adaptadores son conceptos de diseño internos que no se limitan a REST; aplican a cualquier tecnología de entrada/salida."},
    {label:"Puerto es una interfaz que define el contrato de comunicación con el mundo exterior (ej: TransferRepository, NotificationPort); Adaptador es la implementación concreta de ese puerto para una tecnología específica (ej: JpaTransferRepository, KafkaNotificationAdapter)", explain:"Correcto. Los puertos son las fronteras del hexágono (interfaces puras). Los adaptadores son los conectores al mundo externo que implementan esos puertos. El dominio solo conoce los puertos, nunca los adaptadores, logrando máximo desacoplamiento."},
    {label:"Puerto y Adaptador son sinónimos; ambos se refieren a la capa de Controller en Spring Boot", explain:"Incorrecto. Son conceptos distintos con roles complementarios; confundirlos elimina el beneficio del patrón."},
    {label:"Puerto es el parámetro en application.yml que define el número de puerto HTTP del servicio", explain:"Incorrecto. En la terminología de Arquitectura Hexagonal, Puerto es una abstracción de diseño (interfaz), no una configuración de red."},
  ], correct:1
},
{
  cat:"Clean Architecture & Hexagonal",
  q:"¿Por qué en Clean Architecture el dominio no debe importar clases de Spring Framework (ej: @Service, @Component, @Transactional)?",
  options:[
    {label:"Porque Spring Framework es incompatible con las reglas de negocio en Java moderno", explain:"Incorrecto. Spring Framework es perfectamente compatible con Java; el problema es de diseño, no de compatibilidad técnica."},
    {label:"Porque importar Spring en el dominio acopla la lógica de negocio a un framework específico, haciendo imposible testear el dominio sin levantar el contexto Spring y dificultando migrar a otro framework (ej: Quarkus) en el futuro", explain:"Correcto. El dominio debe ser POJOs puros. Si ValidarTransferenciaUseCase tiene @Transactional de Spring, no puede ejecutarse en un test unitario sin Spring. Clean Architecture exige que el núcleo sea independiente de frameworks."},
    {label:"Porque las anotaciones de Spring generan bytecode adicional que degrada el rendimiento del dominio", explain:"Incorrecto. El impacto de las anotaciones en rendimiento es negligible en runtime; el problema es de acoplamiento de diseño, no de performance."},
    {label:"Es solo una recomendación estética; en proyectos bancarios reales Spring puede usarse en el dominio por practicidad", explain:"Incorrecto. Es una decisión de arquitectura con consecuencias concretas de testabilidad y mantenibilidad; no es estética. Muchos proyectos bancarios mantienen el dominio limpio de frameworks precisamente por los beneficios de testabilidad y portabilidad."},
  ], correct:1
},
{
  cat:"Clean Architecture & Hexagonal",
  q:"En una arquitectura hexagonal para un microservicio de onboarding bancario, ¿cómo implementarías la integración con RENIEC para validar el DNI?",
  options:[
    {label:"Llamar directamente al API REST de RENIEC desde el caso de uso de negocio con WebClient", explain:"Incorrecto. Esto acopla el caso de uso al detalle técnico de REST y a RENIEC específicamente; si RENIEC cambia o se reemplaza por otro validador, hay que modificar el caso de uso."},
    {label:"Definir un puerto de salida (ej: IdentityVerificationPort con método verifyDNI(dni)), implementar el adaptador (ReniecRestAdapter que llama a RENIEC), e inyectar el adaptador vía DI; el caso de uso solo conoce el puerto", explain:"Correcto. El caso de uso de onboarding depende de la abstracción IdentityVerificationPort. Se puede testear con un mock sin llamar a RENIEC. Si mañana el banco usa INFOCORP o una validación interna, solo se cambia el adaptador."},
    {label:"Crear un microservicio separado para RENIEC y llamarlo vía HTTP desde el dominio directamente", explain:"Incorrecto. Separar en microservicio es una decisión de despliegue válida, pero el dominio del servicio de onboarding no debería conocer el detalle de HTTP hacia ese servicio; se sigue necesitando el puerto como abstracción."},
    {label:"Poner la lógica de llamada a RENIEC en el Controller REST que recibe la petición de onboarding", explain:"Incorrecto. El Controller es un adaptador de entrada; mezclar integración con RENIEC en él viola SRP y hace imposible reutilizar esa lógica en un flujo batch de validación masiva de DNIs."},
  ], correct:1
},
{
  cat:"Clean Architecture & Hexagonal",
  q:"¿Qué es un Value Object en Domain-Driven Design y cómo se usaría para modelar un 'Monto de Transferencia' en un banco peruano?",
  options:[
    {label:"Es simplemente un wrapper de BigDecimal para el monto; no añade valor real al modelo", explain:"Incorrecto. Un Value Object bien diseñado encapsula validaciones, invariantes y comportamiento relacionado; no es un wrapper pasivo."},
    {label:"Es un objeto inmutable que se define por su valor (no por identidad), que encapsula validaciones de dominio (ej: Monto no puede ser negativo, máximo 1M PEN según política SBS) y operaciones relacionadas (sumar, convertir a USD)", explain:"Correcto. MontoTransferencia como Value Object garantiza que en ningún punto del dominio exista un monto inválido; si el constructor lanza excepción ante valores negativos, es imposible instanciar un monto inválido. Mucho más seguro que validar en capas superiores."},
    {label:"Es una Entity con ID autogenerado en la base de datos; se diferencia de las Entities normales en que tiene campos de solo lectura", explain:"Incorrecto. Las Entities tienen identidad (ID); los Value Objects se comparan por valor y no necesitan ID. Un Value Object de Monto no persiste por sí mismo."},
    {label:"Es un DTO que transfiere datos entre la capa de aplicación y la de infraestructura sin lógica de negocio", explain:"Incorrecto. Un DTO es un objeto de transferencia sin comportamiento. Un Value Object tiene comportamiento de dominio e invariantes; son conceptos distintos."},
  ], correct:1
},

// ════════════ CONCURRENCIA AVANZADA ════════════
{
  cat:"Concurrencia Avanzada – Java",
  q:"¿Cuál es la diferencia entre 'synchronized' y 'ReentrantLock' en Java, y cuándo preferirías ReentrantLock en un servicio bancario?",
  options:[
    {label:"No hay diferencia funcional; ReentrantLock es solo más código verboso para el mismo resultado", explain:"Incorrecto. ReentrantLock ofrece capacidades que synchronized no tiene: tryLock() con timeout, lockInterruptibly(), fairness, múltiples condiciones (Condition), e intentos de adquisición no bloqueantes."},
    {label:"ReentrantLock ofrece tryLock(timeout), lockInterruptibly() y fairness; es preferible en banca cuando necesitas evitar deadlocks con timeout (tryLock(500ms)), o cuando un hilo puede ser interrumpido mientras espera el lock para responder a un circuit breaker", explain:"Correcto. En un servicio de pagos bajo alta carga, tryLock(500, MILLISECONDS) permite que el hilo tome una acción alternativa (fallback, circuit breaker) si no obtiene el lock en tiempo, evitando que el sistema se congele en deadlock."},
    {label:"synchronized es thread-safe; ReentrantLock no garantiza visibilidad entre hilos y puede tener race conditions", explain:"Incorrecto. ReentrantLock garantiza la misma visibilidad de memoria que synchronized (memoria happens-before). Ambos son thread-safe cuando se usan correctamente."},
    {label:"ReentrantLock es más rápido que synchronized porque usa hardware CAS directamente sin intervención del SO", explain:"Incorrecto. Internamente ambos usan comparaciones de bajo nivel. En práctica, synchronized ha mejorado enormemente desde Java 6 con biased locking y adaptive spinning; la diferencia de rendimiento es marginal."},
  ], correct:1
},
{
  cat:"Concurrencia Avanzada – Java",
  q:"Un microservicio bancario procesa 10.000 transacciones concurrentes. Al usar un HashMap compartido entre hilos para caché de límites de crédito, ¿qué problema puede ocurrir y cómo lo resuelves?",
  options:[
    {label:"HashMap es thread-safe en Java moderno; no hay ningún problema con acceso concurrente", explain:"Incorrecto. HashMap NO es thread-safe. Acceso concurrente puede causar bucles infinitos en la tabla interna (Java 7), pérdida silenciosa de datos o ConcurrentModificationException."},
    {label:"Race condition y posible corrupción del estado interno de HashMap; se resuelve con ConcurrentHashMap (thread-safe con granularidad por segmento/bucket) o con Cache de Caffeine/Redis para escenarios distribuidos", explain:"Correcto. ConcurrentHashMap usa lock striping (bloqueo por segmento) permitiendo reads sin bloqueo y writes concurrentes en distintos buckets. Para caché de límites de crédito compartida entre pods, Redis es la solución distribuida correcta."},
    {label:"El problema es de memoria; HashMap consume demasiada RAM con 10.000 entradas y debe reemplazarse por una BD", explain:"Incorrecto. 10.000 entradas en un HashMap es completamente manejable en memoria; el problema es de concurrencia, no de capacidad."},
    {label:"Usar Collections.synchronizedMap(new HashMap()) es la solución moderna recomendada sobre ConcurrentHashMap", explain:"Incorrecto. synchronizedMap sincroniza el mapa completo con un único lock (peor rendimiento bajo alta concurrencia). ConcurrentHashMap es significativamente mejor en escenarios de alta concurrencia como el descrito."},
  ], correct:1
},
{
  cat:"Concurrencia Avanzada – Java",
  q:"¿Qué es el problema de 'False Sharing' en procesadores multi-core y cómo puede afectar a un microservicio bancario con alto paralelismo?",
  options:[
    {label:"Es cuando dos hilos procesan la misma transacción bancaria dos veces por un bug de sincronización", explain:"Incorrecto. Eso sería un problema de idempotencia o race condition; False Sharing es un problema de arquitectura de caché de CPU."},
    {label:"Ocurre cuando dos hilos modifican variables distintas que residen en la misma línea de caché del CPU (64 bytes), causando que el caché de cada core se invalide constantemente aunque los datos no compartan estado lógico, degradando severamente el rendimiento", explain:"Correcto. En Java, variables miembro de un objeto o arrays de primitivos pueden caer en la misma caché line. Se resuelve con padding (añadir campos dummy para separar variables a distintas caché lines) o con @Contended en Java 8+. Crítico en contadores de alto tráfico."},
    {label:"Es cuando múltiples microservicios comparten el mismo token de autenticación OAuth2, causando conflictos de sesión", explain:"Incorrecto. El sharing de tokens es un problema de seguridad; False Sharing es específicamente de arquitectura de caché de CPU a nivel de hardware."},
    {label:"Es un problema de Kafka donde múltiples consumidores leen el mismo mensaje antes del commit", explain:"Incorrecto. Eso es un problema de configuración de consumer groups en Kafka; False Sharing es un fenómeno de caché L1/L2 en procesadores multi-core."},
  ], correct:1
},
{
  cat:"Concurrencia Avanzada – Java",
  q:"¿Cuándo usarías CompletableFuture vs. Virtual Threads (Java 21) para paralelizar múltiples llamadas a servicios externos en un microservicio bancario?",
  options:[
    {label:"CompletableFuture siempre; Virtual Threads son experimentales y no deben usarse en producción bancaria", explain:"Incorrecto. Virtual Threads (Project Loom) fue finalizado como GA en Java 21 LTS y es estable para producción. No es experimental."},
    {label:"CompletableFuture es ideal cuando el flujo es complejo (encadenamiento, transformaciones, manejo de errores con exceptionally/handle); Virtual Threads son preferibles cuando el código debe ser bloqueante-sincrónico por claridad y las llamadas son I/O puras sin lógica de composición compleja", explain:"Correcto. CompletableFuture es poderoso para pipelines asíncronos complejos. Virtual Threads permiten escribir código secuencial legible que escala igualmente bien. Para un equipo acostumbrado a código síncrono, Virtual Threads reducen la curva de aprendizaje sin sacrificar rendimiento."},
    {label:"Son equivalentes; elegir uno u otro es solo preferencia del equipo sin impacto técnico", explain:"Incorrecto. Tienen diferencias reales en modelo de programación, gestión de errores, composición de operaciones y compatibilidad con librerías existentes."},
    {label:"Virtual Threads reemplazan completamente a CompletableFuture; no hay razón para usar CompletableFuture en Java 21", explain:"Incorrecto. CompletableFuture sigue siendo valioso para pipelines reactivos complejos con transformaciones, combinaciones de futuros (thenCombine, allOf) y manejo diferenciado de errores que Virtual Threads no modelan de forma natural."},
  ], correct:1
},

// ════════════ MICROSERVICIOS AVANZADO – BANCA ════════════
{
  cat:"Microservicios Avanzado – Banca",
  q:"¿Qué es el patrón Outbox Pattern y por qué es crítico en un servicio de pagos bancario que publica eventos a Kafka?",
  options:[
    {label:"Es un patrón para configurar el buzón de salida de correos electrónicos en notificaciones bancarias", explain:"Incorrecto. El Outbox Pattern es un patrón de arquitectura de microservicios para garantizar consistencia entre la BD y el broker de mensajes; no tiene relación con correos."},
    {label:"Resuelve el problema de dualidad de escritura: persiste la transacción en BD Y el evento en una tabla 'outbox' en la misma transacción local; un proceso separado (relay) lee el outbox y publica a Kafka, garantizando que el evento nunca se pierde aunque Kafka esté caído", explain:"Correcto. Sin Outbox, si persistes en BD y luego falla la publicación a Kafka, tienes una transacción sin evento. Con Outbox, ambas operaciones son atómicas localmente; el relay usa CDC o polling para publicar a Kafka eventualmente, garantizando consistencia."},
    {label:"Es una tabla temporal en SQL Server para almacenar mensajes salientes que no pudieron enviarse por timeout", explain:"Incorrecto. Aunque la descripción suena similar, el Outbox Pattern es un patrón de arquitectura con un diseño específico que garantiza atomicidad; no es simplemente una tabla de reintentos."},
    {label:"Es una configuración de Kafka que garantiza que los mensajes producidos persistan en disco antes de confirmar al productor", explain:"Incorrecto. Eso describe acks=all con min.insync.replicas; el Outbox Pattern es un patrón de la aplicación, no una configuración de Kafka."},
  ], correct:1
},
{
  cat:"Microservicios Avanzado – Banca",
  q:"¿Cuál es la diferencia entre orchestration y choreography en una SAGA, y cuál es más apropiado para un flujo de desembolso de préstamo bancario con 7 pasos?",
  options:[
    {label:"Orchestration y choreography son términos equivalentes para describir el patrón SAGA", explain:"Incorrecto. Son dos estilos de coordinación fundamentalmente distintos con implicaciones de acoplamiento, observabilidad y complejidad diferentes."},
    {label:"Orchestration usa un coordinador central que dirige cada paso (más control, mejor trazabilidad, punto único de fallo); choreography cada servicio reacciona a eventos (más desacoplado, más difícil de rastrear). Para 7 pasos en un préstamo bancario regulado, orchestration es preferible por la trazabilidad y control del flujo", explain:"Correcto. Con 7 pasos y necesidad de trazabilidad para auditoría SBS/SFC, un orquestador (ej: Camunda, AWS Step Functions, o un saga orchestrator propio) da visibilidad total del estado de cada préstamo. Choreography con 7 eventos sería difícil de depurar cuando un préstamo se queda en estado intermedio."},
    {label:"Choreography siempre es mejor porque no tiene punto único de fallo; orchestration debe evitarse en banca", explain:"Incorrecto. El orquestador puede hacerse resiliente (ej: con estado persistido en BD). La elección depende de la complejidad y los requisitos de trazabilidad, no de una regla absoluta."},
    {label:"Orchestration es para microservicios sincrónicos REST; choreography es exclusivamente para microservicios con Kafka", explain:"Incorrecto. Ambos estilos pueden implementarse con REST o mensajería. La distinción es sobre quién tiene el conocimiento del flujo, no sobre el protocolo de comunicación."},
  ], correct:1
},
{
  cat:"Microservicios Avanzado – Banca",
  q:"¿Qué es el antipatrón 'Distributed Monolith' y cómo se detecta en una arquitectura bancaria?",
  options:[
    {label:"Es un monolito tradicional desplegado en Kubernetes; se detecta porque no usa contenedores Docker", explain:"Incorrecto. Usar Docker/Kubernetes no determina si es un monolito distribuido; el antipatrón se detecta por el nivel de acoplamiento entre servicios, no por la tecnología de despliegue."},
    {label:"Son microservicios que se ven independientes pero están fuertemente acoplados: cambiar uno requiere desplegar múltiples servicios, comparten BD, o tienen llamadas síncronas en cadena que los hacen fallar juntos; tienen la complejidad de microservicios sin sus beneficios", explain:"Correcto. Se detecta cuando: un deploy requiere coordinación con 5 equipos, hay una BD compartida entre 8 servicios, o la latencia acumulada de llamadas síncronas en cadena causa timeouts frecuentes. En banca, esto es peligroso porque combina fragilidad de microservicios con rigidez de monolito."},
    {label:"Es cuando todos los microservicios de un banco usan la misma versión de Spring Boot; se resuelve diversificando las versiones", explain:"Incorrecto. Homogeneidad tecnológica no es el antipatrón; el problema es el acoplamiento lógico y operacional entre servicios que deberían ser autónomos."},
    {label:"Es un sistema bancario legacy que aún no fue migrado a la nube; se resuelve con lift-and-shift a Azure", explain:"Incorrecto. El lift-and-shift de un monolito a la nube no crea microservicios; puede crear precisamente un 'distributed monolith' si se divide sin pensar en los límites de dominio."},
  ], correct:1
},
{
  cat:"Microservicios Avanzado – Banca",
  q:"¿Cómo implementarías comunicación segura mTLS entre microservicios internos en un banco que opera en AKS?",
  options:[
    {label:"Usando HTTPS con certificado autofirmado en cada microservicio; es suficiente para comunicación interna", explain:"Incorrecto. HTTPS con certificado autofirmado solo cifra el tráfico (TLS unidireccional); mTLS requiere que ambas partes presenten certificados, verificando la identidad del cliente además del servidor."},
    {label:"Implementando un service mesh (Istio o Linkerd) que automatiza mTLS entre todos los pods: emite certificados automáticamente via SPIFFE/SPIRE, los rota periódicamente y aplica políticas de autorización (AuthorizationPolicy) sin modificar el código de los microservicios", explain:"Correcto. Un service mesh implementa mTLS de forma transparente (zero-trust networking). En banca, garantiza que solo servicios autorizados puedan comunicarse entre sí (ej: solo el servicio de pagos puede llamar al servicio de cuentas), cumpliendo principios de zero-trust y requerimientos de seguridad bancaria."},
    {label:"Usando API Keys hardcodeadas en variables de entorno de cada pod; son más simples que certificados y suficientemente seguros para red interna", explain:"Incorrecto. API Keys hardcodeadas son un antipatrón de seguridad; no rotan automáticamente, son difíciles de revocar y no verifican la identidad criptográficamente como lo hace mTLS."},
    {label:"La comunicación interna entre pods en el mismo AKS cluster no necesita cifrado porque la red del cluster ya está aislada", explain:"Incorrecto. El modelo de seguridad zero-trust asume que la red interna puede estar comprometida. En banca regulada, el cifrado y autenticación mutua en tráfico interno es un requerimiento de seguridad y posiblemente regulatorio."},
  ], correct:1
},
{
  cat:"Microservicios Avanzado – Banca",
  q:"¿Qué es el patrón Strangler Fig y por qué es la estrategia correcta para migrar un core bancario legacy en Perú a microservicios?",
  options:[
    {label:"Es un antipatrón que debe evitarse; toda migración bancaria debe hacerse con un Big Bang rewrite completo para garantizar consistencia", explain:"Incorrecto. El Big Bang rewrite es extremadamente riesgoso en sistemas bancarios críticos; puede llevar años, generar inconsistencias y resultar en pérdida de funcionalidad del sistema original."},
    {label:"Consiste en construir nuevas funcionalidades como microservicios en paralelo al legacy, redirigiendo gradualmente el tráfico del sistema viejo al nuevo mediante un façade/proxy, hasta que el legacy puede apagarse; minimiza el riesgo al nunca dejar de funcionar el sistema original", explain:"Correcto. En banca peruana con sistemas core críticos 24/7, el Strangler Fig permite migrar incrementalmente: primero consultas de saldo, luego transferencias internas, etc. En cada paso el sistema anterior sigue operando como fallback hasta que el nuevo está estable."},
    {label:"Es una técnica de refactoring para eliminar código legacy dentro de un monolito sin crear microservicios nuevos", explain:"Incorrecto. El Strangler Fig Pattern específicamente describe la sustitución gradual de un sistema completo por uno nuevo que crece a su alrededor; no es solo refactoring interno."},
    {label:"Es un patrón de base de datos para migrar esquemas de SQL Server a PostgreSQL de forma incremental", explain:"Incorrecto. El Strangler Fig es un patrón de arquitectura de sistemas, no de migración de bases de datos; aunque las migraciones de BD pueden usarlo como inspiración."},
  ], correct:1
},
{
  cat:"Microservicios Avanzado – Banca",
  q:"En un microservicio bancario, ¿cuál es el problema de hacer llamadas síncronas en cadena de 5 servicios (A→B→C→D→E) y cómo lo mitigas?",
  options:[
    {label:"No hay problema; las llamadas síncronas son más confiables que los mensajes asíncronos en sistemas financieros", explain:"Incorrecto. Las llamadas síncronas en cadena generan acoplamiento temporal: si E falla o tarda, toda la cadena falla. En sistemas de alta concurrencia, los tiempos de respuesta se suman y los threads se acumulan."},
    {label:"La disponibilidad compuesta se degrada multiplicativamente (ej: 5 servicios al 99.9% = 99.5% disponibilidad total); la latencia se acumula; un fallo en E paraliza A. Se mitiga con Circuit Breaker en cada salto, paralelización donde sea posible y considerando eventos asíncronos para pasos no críticos en el path de respuesta", explain:"Correcto. Con 5 servicios en cadena, la probabilidad de fallo crece. Circuit Breaker en cada cliente HTTP evita que un servicio lento congele la cadena. Identificar qué pasos deben ser síncronos (respuesta requerida en tiempo real) vs. asíncronos (notificación, auditoría) reduce la cadena crítica."},
    {label:"Se resuelve aumentando el timeout de cada llamada a 30 segundos; con más tiempo, los servicios siempre responden", explain:"Incorrecto. Timeouts altos agravan el problema: los hilos de toda la cadena quedan bloqueados durante 30s×N, saturando el sistema bajo carga concurrente."},
    {label:"Usar una base de datos compartida entre los 5 servicios para eliminar la necesidad de llamadas de red entre ellos", explain:"Incorrecto. Una BD compartida crea el antipatrón de 'shared database', acoplando los servicios a nivel de esquema y violando la autonomía de los microservicios."},
  ], correct:1
},

// ════════════ DISEÑO DE SISTEMAS ════════════
{
  cat:"Diseño de Sistemas – Banca",
  q:"Debes diseñar un sistema de detección de fraude en tiempo real para transacciones bancarias en Perú. ¿Cuál es la arquitectura más apropiada?",
  options:[
    {label:"Un único microservicio REST que verifica cada transacción de forma síncrona consultando reglas en BD SQL Server; si tarda más de 10 segundos, la transacción se aprueba automáticamente", explain:"Incorrecto. Un solo servicio síncrono es un SPOF (Single Point of Failure). Aprobar automáticamente por timeout es un vector de explotación de fraude conocido."},
    {label:"Pipeline de streaming: transacciones publicadas a Kafka → servicio de scoring en tiempo real con modelo ML (consumidor Kafka) → resultado publicado a otro topic → servicio de decisión aplica reglas de negocio → notifica al servicio de pagos; todo con latencia <100ms y circuit breaker si el scoring falla", explain:"Correcto. El streaming con Kafka separa el flujo de pagos del análisis de fraude, permite escalar el scoring independientemente, mantiene el historial de eventos para retroalimentar el modelo ML y garantiza que el fallo del antifraude tenga un fallback definido (aprobar con riesgo alto vs. rechazar)."},
    {label:"Verificar fraude después de procesar el pago con un batch nocturno; los fraudes se identifican al día siguiente y se revierten", explain:"Incorrecto. La detección post-facto permite que el dinero salga del banco antes de identificar el fraude; en banca peruana, la reversión puede ser imposible si los fondos ya fueron retirados."},

},
{
  cat:"Diseño de Sistemas – Banca",
  q:"¿Cómo diseñarías el rate limiting para una API bancaria expuesta en Azure APIM que recibe transferencias, protegiendo contra ataques de fuerza bruta y abuso?",
  options:[
    {label:"Bloquear todas las IPs fuera del Perú; las transferencias solo pueden originarse de IPs peruanas", explain:"Incorrecto. El bloqueo por IP geográfica es fácilmente evadible con VPNs y no protege contra ataques desde IPs peruanas. Además, clientes en el extranjero son legítimos (banca por internet)."},

    {label:"Rate limiting de 1 petición por segundo por usuario; es estricto y garantiza que ningún abuso sea posible", explain:"Incorrecto. 1 petición/segundo bloqueará casos de uso legítimos (ej: aplicación que muestra movimientos en tiempo real con múltiples consultas). El rate limiting debe balancear protección con experiencia de usuario."},

},
{

  options:[
    {label:"El cliente no debe reintentar nunca; si hay timeout, debe llamar al banco para saber si la transferencia se realizó", explain:"Incorrecto. Requerir que el cliente llame manualmente al banco es inaceptable en un sistema digital moderno; la idempotencia se diseña en la API para manejar reintentos automáticamente."},

},
{

    {label:"Solo SMS; el email y push son opcionales en banca peruana regulada por la SBS", explain:"Incorrecto. La SBS regula las notificaciones de seguridad (ej: Circular G-191) pero no limita los canales; la elección multicanal mejora la experiencia y la seguridad (alertas de fraude en tiempo real)."},

},

// ════════════ PATRONES DE DISEÑO AVANZADOS ════════════
{
  cat:"Patrones de Diseño Avanzados",
  q:"¿Cuándo el patrón CQRS (Command Query Responsibility Segregation) aporta valor real en un sistema bancario y cuándo es sobreingeniería?",
  options:[
    {label:"CQRS siempre es sobreingeniería; los sistemas CRUD con una sola BD son siempre suficientes en banca", explain:"Incorrecto. Para sistemas de alto volumen con patrones de lectura y escritura muy distintos (ej: millones de consultas de saldo vs. miles de transferencias), CQRS aporta valor real al permitir optimizar cada lado independientemente."},
    {label:"Aporta valor cuando los patrones de lectura y escritura tienen requisitos muy distintos (ej: consultas de extracto con joins complejos vs. débitos/créditos simples), permitiendo escalar y optimizar cada lado independientemente. Es sobreingeniería para CRUDs simples de mantenimiento de parámetros", explain:"Correcto. En banca: el lado de escritura (Command) necesita consistencia fuerte y ACID; el lado de lectura (Query) puede tolerar consistencia eventual con proyecciones desnormalizadas optimizadas para cada vista. Para mantenimiento de listas de países/monedas, CQRS añade complejidad innecesaria."},
    {label:"CQRS solo aplica cuando se usa Event Sourcing; sin Event Sourcing no tiene sentido implementarlo", explain:"Incorrecto. CQRS y Event Sourcing son patrones independientes que se complementan bien pero no se requieren mutuamente. Se puede implementar CQRS con BD relacionales convencionales."},
    {label:"CQRS reemplaza la necesidad de índices en la BD de lectura porque separa los datos en dos almacenes distintos", explain:"Incorrecto. El almacén de lectura de CQRS sigue necesitando índices optimizados para los patrones de consulta; la separación no elimina la necesidad de optimización."},
  ], correct:1
},
{
  cat:"Patrones de Diseño Avanzados",
  q:"¿Qué es Event Sourcing y qué ventaja específica ofrece para la auditoría regulatoria en un banco peruano?",
  options:[
    {label:"Es un patrón donde solo se guarda el último estado de la entidad; los cambios anteriores se descartan para optimizar espacio", explain:"Incorrecto. Eso es el modelo tradicional de persistencia de estado. Event Sourcing es lo opuesto: guarda todos los eventos que llevaron al estado actual."},
    {label:"Persiste todos los eventos de negocio como fuente de verdad (ej: TransferenciaSolicitada, TransferenciaAprobada, SaldoDebitado) permitiendo reconstruir el estado en cualquier momento histórico; para la SBS, cualquier auditoría puede responder '¿qué pasó exactamente con esta cuenta el 15 de enero a las 14:32?' sin depender de logs de aplicación", explain:"Correcto. Event Sourcing provee auditoría perfecta por diseño: cada cambio de estado es un evento inmutable. Para cumplimiento regulatorio (SBS Resolución SBS N° 272-2017), poder reconstruir el historial exacto de una cuenta es invaluable y reduce el tiempo de respuesta ante inspecciones."},
    {label:"Es la práctica de publicar todos los eventos de la aplicación a Kafka para análisis posterior; no afecta el modelo de persistencia", explain:"Incorrecto. Event Sourcing es un patrón de persistencia (la BD de eventos es la fuente de verdad); publicar a Kafka es una técnica separada aunque complementaria."},
    {label:"Es equivalente a tener logs de auditoría en una tabla separada de la BD principal; ya lo tiene cualquier sistema bancario con triggers de BD", explain:"Incorrecto. Los triggers de BD capturan cambios de datos pero no capturan la intención de negocio. Event Sourcing modela eventos de dominio explícitos con contexto de negocio rico, no solo cambios de columnas."},
  ], correct:1
},
{
  cat:"Patrones de Diseño Avanzados",
  q:"¿Cuándo el patrón Bulkhead es más importante que el Circuit Breaker en la arquitectura de resiliencia de un banco?",
  options:[
    {label:"Bulkhead es siempre más importante; el Circuit Breaker es redundante si ya se tiene Bulkhead", explain:"Incorrecto. Son patrones complementarios que resuelven problemas distintos; no son intercambiables ni redundantes."},

    {label:"Bulkhead solo aplica a sistemas on-premise; en Kubernetes el aislamiento de pods cumple la misma función automáticamente", explain:"Incorrecto. El aislamiento de pods de Kubernetes (CPU/memoria limits) es a nivel de infraestructura; el Bulkhead pattern es a nivel de aplicación (pools de threads, semáforos, connection pools) y puede ser necesario incluso dentro de un solo pod."},
    {label:"Circuit Breaker y Bulkhead son el mismo patrón con distintos nombres según si se usa Spring Boot o Resilience4j", explain:"Incorrecto. Son implementaciones distintas en Resilience4j: @CircuitBreaker detecta fallos y abre el circuito; @Bulkhead limita la concurrencia máxima (thread pool o semaphore). Ambos existen en Resilience4j."},

},

  {label:"Race conditions (datos compartidos sin sincronización), Deadlocks (hilos bloqueados mutuamente), Starvation (hilo nunca obtiene recursos), Livelock (hilos activos pero sin progreso). Mitigación: synchronized/Locks, estado inmutable, ConcurrentHashMap, reducir estado compartido.", explain:"Correcto. Son los 4 problemas clásicos de concurrencia. En banca el deadlock más común ocurre al lockear cuentas para transferencias en orden inconsistente. La solución: siempre adquirir locks en el mismo orden (menor ID primero)."},

{cat:"Backend Senior – Performance & BD",

{cat:"Backend Senior – Performance & BD",

  {label:"Index Seek: el motor va directamente a los registros (búsqueda puntual, eficiente, menor I/O). Ocurre con filtros selectivos: WHERE fecha BETWEEN '2025-01-01' AND '2025-12-31'. Index Scan: recorre gran parte del índice, más costoso. Ocurre cuando el filtro no es selectivo o hay funciones sobre la columna indexada: WHERE YEAR(fecha) = 2025.", explain:"Correcto. Seek es búsqueda puntual eficiente; Scan es recorrido amplio. Las consultas deben diseñarse para promover Seek. Evitar funciones sobre columnas indexadas (YEAR(), UPPER(), etc.) que fuerzan Scan al ocultar el valor real al optimizador."},

  {label:"Es la limitación del uso de CPU cuando un contenedor supera su CPU limit. Impacto: aumento de latencia, reducción de throughput, comportamiento inestable. Se detecta en métricas de Kubernetes. Limits muy bajos generan throttling; limits muy altos ocultan ineficiencias.", explain:"Correcto. Un pod con CPU limit de 500m que intenta usar 800m sufrirá throttling: la JVM pausa el proceso hasta que el cuota se renueve (cada 100ms en CFS). Esto aumenta latencia de forma no obvia. La solución: CPU request cercano al consumo promedio estable, limit mayor para absorber picos pero calibrado con pruebas de carga."},

const DP_QUESTIONS = [

// ══════════ SOLID PRINCIPLES ══════════
{cat:"SOLID Principles",
q:"¿Qué establece el Principio de Responsabilidad Única (SRP) y cómo detectas una violación?",
options:[
  {label:"Una clase debe hacer solo operaciones de un mismo tipo de dato (String, Integer, etc.)", explain:"Incorrecto. SRP no tiene que ver con tipos de datos sino con razones de cambio: una clase debe tener un único motivo para cambiar."},
  {label:"Una clase debe tener una sola razón para cambiar. Violación: clase que maneja lógica de negocio, acceso a datos Y formateo de respuesta a la vez. Solución: separar en OrderService, OrderRepository y OrderDTOMapper.", explain:"Correcto. La prueba práctica: ¿cuántas cosas distintas tendrías que cambiar para modificar esta clase? Si la respuesta es más de una (cambio de BD, cambio de regla de negocio, cambio de formato), viola SRP. En banca: un PaymentProcessor que valida, persiste, notifica y loguea viola SRP."},
  {label:"Una clase debe tener un único método público; el resto deben ser privados", explain:"Incorrecto. SRP no restringe el número de métodos. Una clase puede tener varios métodos y aún respetar SRP si todos contribuyen a una única responsabilidad cohesiva."},
  {label:"SRP solo aplica a clases; los métodos y módulos no tienen responsabilidad única", explain:"Incorrecto. SRP aplica a todos los niveles: métodos, clases, módulos. Un método que hace validación Y persistencia Y notificación también viola SRP."},
], correct:1},

{cat:"SOLID Principles",
q:"¿Qué dice el Principio Abierto/Cerrado (OCP) y cuál es el patrón más común para implementarlo?",
options:[
  {label:"Las clases deben ser abiertas al público (public) y cerradas al acceso privado (private)", explain:"Incorrecto. OCP no tiene nada que ver con modificadores de acceso. Es sobre extensibilidad vs modificación."},
  {label:"Las entidades deben estar abiertas para extensión pero cerradas para modificación. Se implementa con interfaces/abstracciones: agregar comportamiento nuevo creando clases nuevas en lugar de modificar las existentes. Ejemplo: Strategy Pattern o Decorator.", explain:"Correcto. En banca: si cada nuevo tipo de validación de pago requiere modificar ValidadorPago, viola OCP. Con OCP: interfaz ValidacionStrategy con implementaciones ValidacionSaldo, ValidacionLimite, ValidacionFraude. Nuevo tipo = nueva clase, sin tocar las existentes."},
  {label:"Las clases deben abrirse para modificación cuando hay bugs y cerrarse cuando están estables", explain:"Incorrecto. OCP no es un ciclo de vida. Es un principio de diseño: diseñar para extensión sin modificación desde el inicio."},
  {label:"OCP significa que todo el código debe ser open source y cerrado a licencias privadas", explain:"Incorrecto. OCP es el principio Open/Closed de SOLID, relacionado con diseño de software, no con licencias."},
], correct:1},

{cat:"SOLID Principles",
q:"¿Qué establece el Principio de Sustitución de Liskov (LSP) y cuál es un ejemplo de violación típica?",
options:[
  {label:"Los objetos de una subclase deben poder reemplazar objetos de la superclase sin alterar la corrección del programa. Violación clásica: Pato (Duck) hereda de Ave (Bird) pero Bird.volar() falla para Pato de Goma que no vuela.", explain:"Correcto. LSP garantiza que la herencia represente genuinamente una relación 'es-un'. Violación en banca: CuentaBloqueada hereda de Cuenta pero lanza excepción en debitar(), rompiendo el contrato de Cuenta. Solución: usar composición o rediseñar la jerarquía."},
  {label:"Una subclase puede agregar cualquier comportamiento nuevo sin restricción porque hereda de la superclase", explain:"Incorrecto. LSP restringe lo que la subclase puede hacer con los métodos heredados. Puede agregar métodos nuevos, pero no puede debilitar postcondiciones ni lanzar nuevas excepciones no declaradas en el contrato de la superclase."},
  {label:"LSP significa que las subclases deben ser más pequeñas en código que la superclase", explain:"Incorrecto. LSP no tiene relación con el tamaño del código. Es sobre la correctitud del comportamiento al sustituir."},
  {label:"LSP solo aplica a interfaces, no a herencia de clases concretas", explain:"Incorrecto. LSP aplica a toda relación de subtipo, incluyendo herencia de clases concretas. De hecho, es más crítico en herencia de clases concretas donde la violación es más sutil."},
], correct:0},

{cat:"SOLID Principles",
q:"¿Qué dice el Principio de Segregación de Interfaces (ISP) y cómo se aplica en microservicios?",
options:[
  {label:"Las interfaces deben tener el mayor número posible de métodos para ser más reutilizables", explain:"Incorrecto. ISP dice exactamente lo contrario: las interfaces grandes ('fat interfaces') fuerzan a los clientes a depender de métodos que no usan."},
  {label:"Los clientes no deben depender de interfaces que no usan. Interfaces grandes deben dividirse en específicas. En microservicios: en lugar de IRepository con 15 métodos, tener IReadRepository y IWriteRepository. El servicio de reportes solo depende de IReadRepository.", explain:"Correcto. Ejemplo real: una interfaz IWorker con trabajar(), descansar(), comer(). Un Robot implementa IWorker pero no necesita comer(). ISP: dividir en IWorkable y IFeedable. En Spring: separar interfaces de lectura y escritura permite distintas implementaciones (réplica para lectura, principal para escritura) de forma limpia."},
